<svg viewBox="0 0 420 130" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif"><rect width="420" height="130" rx="12" fill="#1c1c2e"/><text x="210" y="20" text-anchor="middle" font-size="11" fill="#94a3b8" font-weight="600">Koppel omvormer, batterij en laadpaal (optioneel)</text><rect x="20" y="40" width="100" height="70" rx="9" fill="#fbbf2418" stroke="#fbbf2455" stroke-width="1.5"/><text x="70" y="63" text-anchor="middle" font-size="18">☀️</text><text x="70" y="78" text-anchor="middle" font-size="8.5" fill="#fbbf24" font-weight="600">Omvormer</text><text x="70" y="90" text-anchor="middle" font-size="7" fill="#64748b">vermogenssensor</text><text x="70" y="102" text-anchor="middle" font-size="7" fill="#64748b">(W of kW)</text><rect x="160" y="40" width="100" height="70" rx="9" fill="#22c55e18" stroke="#22c55e55" stroke-width="1.5"/><text x="210" y="63" text-anchor="middle" font-size="18">🔋</text><text x="210" y="78" text-anchor="middle" font-size="8.5" fill="#4ade80" font-weight="600">Batterij</text><text x="210" y="90" text-anchor="middle" font-size="7" fill="#64748b">+ = laden</text><text x="210" y="102" text-anchor="middle" font-size="7" fill="#64748b">- = ontladen</text><rect x="300" y="40" width="100" height="70" rx="9" fill="#818cf818" stroke="#818cf855" stroke-width="1.5"/><text x="350" y="63" text-anchor="middle" font-size="18">🚗</text><text x="350" y="78" text-anchor="middle" font-size="8.5" fill="#818cf8" font-weight="600">Laadpaal</text><text x="350" y="90" text-anchor="middle" font-size="7" fill="#64748b">setpoint entiteit</text><text x="350" y="102" text-anchor="middle" font-size="7" fill="#64748b">(number)</text><text x="210" y="124" text-anchor="middle" font-size="8" fill="#475569">Alle velden zijn optioneel</text></svg>