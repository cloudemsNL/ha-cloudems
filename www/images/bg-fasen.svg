<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
<g opacity="0.07" fill="none" stroke-width="2">
  <!-- L1 golf - rood -->
  <path d="M 0 300 Q 67 180 133 300 Q 200 420 267 300 Q 333 180 400 300 Q 467 420 533 300 Q 600 180 667 300 Q 733 420 800 300" stroke="rgba(239,83,80,0.9)" fill="none"/>
  <!-- L2 golf - geel (120gr verschoven) -->
  <path d="M 0 380 Q 67 260 133 380 Q 200 500 267 380 Q 333 260 400 380 Q 467 500 533 380 Q 600 260 667 380 Q 733 500 800 380" stroke="rgba(255,238,88,0.9)" fill="none"/>
  <!-- L3 golf - blauw (240gr verschoven) -->
  <path d="M 0 220 Q 67 100 133 220 Q 200 340 267 220 Q 333 100 400 220 Q 467 340 533 220 Q 600 100 667 220 Q 733 340 800 220" stroke="rgba(66,165,245,0.9)" fill="none"/>
  <!-- nullijn -->
  <line x1="0" y1="300" x2="800" y2="300" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- labels -->
  <text x="20" y="165" font-size="18" font-family="monospace" fill="rgba(239,83,80,0.5)" stroke="none">L1</text>
  <text x="20" y="210" font-size="18" font-family="monospace" fill="rgba(66,165,245,0.5)" stroke="none">L3</text>
  <text x="20" y="400" font-size="18" font-family="monospace" fill="rgba(255,238,88,0.5)" stroke="none">L2</text>
</g>
</svg>