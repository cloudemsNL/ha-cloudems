<svg width="100%" viewBox="0 0 480 200" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#12121f"/>
      <stop offset="100%" stop-color="#0c0c1a"/>
    </linearGradient>
  </defs>
  <rect width="480" height="200" rx="14" fill="url(#bg)"/>
  <rect width="480" height="200" rx="14" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- Net ingang -->
  <rect x="16" y="76" width="60" height="48" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.2"/>
  <text x="46" y="97" text-anchor="middle" font-size="9" fill="#94a3b8" font-weight="600">NET</text>
  <text x="46" y="112" text-anchor="middle" font-size="8" fill="#64748b">230V/400V</text>
  <line x1="76" y1="100" x2="106" y2="100" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Hoofdzekering box -->
  <rect x="106" y="80" width="48" height="40" rx="6" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
  <text x="130" y="96" text-anchor="middle" font-size="8" fill="#f97316" font-weight="700">MAX</text>
  <text x="130" y="110" text-anchor="middle" font-size="10" fill="#f97316" font-weight="800">25A</text>
  <text x="130" y="158" text-anchor="middle" font-size="8" fill="#64748b">per fase</text>

  <!-- Draad naar splits -->
  <line x1="154" y1="100" x2="184" y2="100" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Splitspunt -->
  <circle cx="190" cy="100" r="4" fill="#475569"/>

  <!-- 1-fase tak -->
  <line x1="190" y1="100" x2="190" y2="60" stroke="#94a3b8" stroke-width="1"/>
  <line x1="190" y1="60" x2="240" y2="60" stroke="#94a3b8" stroke-width="1"/>

  <!-- 3-fase balk -->
  <line x1="190" y1="80" x2="250" y2="80" stroke="#f97316" stroke-width="4" stroke-linecap="round"/>
  <line x1="190" y1="100" x2="250" y2="100" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
  <line x1="190" y1="120" x2="250" y2="120" stroke="#4ade80" stroke-width="4" stroke-linecap="round"/>

  <!-- Labels fasen rechts -->
  <text x="258" y="84" font-size="9" font-weight="700" fill="#f97316">L1</text>
  <text x="258" y="104" font-size="9" font-weight="700" fill="#fbbf24">L2</text>
  <text x="258" y="124" font-size="9" font-weight="700" fill="#4ade80">L3</text>

  <!-- 1-fase optie label -->
  <text x="258" y="64" font-size="9" fill="#818cf8" font-weight="600">L1 alleen</text>

  <!-- Verticale scheidingslijn -->
  <line x1="290" y1="40" x2="290" y2="160" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="295" y="38" font-size="8" fill="#475569">naar huis</text>

  <!-- Huisgroepen rechts -->
  <rect x="300" y="55" width="60" height="20" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="330" y="69" text-anchor="middle" font-size="8" fill="#94a3b8">Verlichting</text>

  <rect x="300" y="82" width="60" height="20" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="330" y="96" text-anchor="middle" font-size="8" fill="#94a3b8">Stopcontact</text>

  <rect x="300" y="109" width="60" height="20" rx="4" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
  <text x="330" y="123" text-anchor="middle" font-size="8" fill="#fbbf24">Wasmachine</text>

  <rect x="300" y="136" width="60" height="20" rx="4" fill="#1e293b" stroke="#4ade80" stroke-width="1"/>
  <text x="330" y="150" text-anchor="middle" font-size="8" fill="#4ade80">EV / Airco</text>

  <!-- Lijnen van fasen naar groepen -->
  <line x1="290" y1="80" x2="300" y2="65" stroke="#f97316" stroke-width="1" opacity=".5"/>
  <line x1="290" y1="80" x2="300" y2="92" stroke="#f97316" stroke-width="1" opacity=".5"/>
  <line x1="290" y1="100" x2="300" y2="119" stroke="#fbbf24" stroke-width="1" opacity=".5"/>
  <line x1="290" y1="120" x2="300" y2="146" stroke="#4ade80" stroke-width="1" opacity=".5"/>

  <!-- DSMR P1 meter onderaan -->
  <rect x="370" y="68" width="94" height="64" rx="8" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="417" y="85" text-anchor="middle" font-size="9" fill="#38bdf8" font-weight="700">P1 / DSMR</text>
  <text x="417" y="99" text-anchor="middle" font-size="8" fill="#94a3b8">Slimme meter</text>
  <text x="417" y="113" text-anchor="middle" font-size="8" fill="#64748b">→ CloudEMS</text>
  <text x="417" y="125" text-anchor="middle" font-size="7" fill="#475569">meetdata</text>

  <!-- Verbindingslijn P1 → fasen -->
  <line x1="370" y1="100" x2="360" y2="100" stroke="#38bdf8" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="360" y1="100" x2="290" y2="100" stroke="#38bdf8" stroke-width="1" stroke-dasharray="3,2" opacity=".4"/>

  <!-- Bottom legend -->
  <rect x="16" y="168" width="448" height="24" rx="6" fill="#0f172a" fill-opacity=".8" stroke="#1e293b" stroke-width="1"/>
  <circle cx="32" cy="180" r="5" fill="#f97316" opacity=".8"/>
  <text x="42" y="184" font-size="9" fill="#94a3b8">L1</text>
  <circle cx="62" cy="180" r="5" fill="#fbbf24" opacity=".8"/>
  <text x="72" y="184" font-size="9" fill="#94a3b8">L2</text>
  <circle cx="92" cy="180" r="5" fill="#4ade80" opacity=".8"/>
  <text x="102" y="184" font-size="9" fill="#94a3b8">L3</text>
  <text x="130" y="184" font-size="9" fill="#64748b">— Vul hieronder het max. ampère per fase in (typisch 25A)</text>
</svg>
