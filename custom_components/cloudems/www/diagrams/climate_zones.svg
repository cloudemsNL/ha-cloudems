<svg width="100%" viewBox="0 0 480 200" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#12121f"/>
      <stop offset="100%" stop-color="#0c0c1a"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="480" height="200" rx="14" fill="url(#bg)"/>
  <rect width="480" height="200" rx="14" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- CV Ketel -->
  <rect x="14" y="72" width="76" height="56" rx="10" fill="#1e293b" stroke="#f97316" stroke-width="1.8"/>
  <text x="52" y="94" text-anchor="middle" font-size="9" fill="#f97316" font-weight="700">CV-KETEL</text>
  <text x="52" y="108" text-anchor="middle" font-size="16">🔥</text>
  <text x="52" y="122" text-anchor="middle" font-size="7" fill="#64748b">switch / climate</text>

  <!-- Verbindingslijn -->
  <line x1="90" y1="100" x2="118" y2="100" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CloudEMS -->
  <rect x="118" y="80" width="72" height="40" rx="8" fill="#0f172a" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="154" y="97" text-anchor="middle" font-size="9" fill="#60a5fa" font-weight="700">CloudEMS</text>
  <text x="154" y="111" text-anchor="middle" font-size="8" fill="#64748b">zone sturing</text>

  <!-- Pijlen naar zones -->
  <line x1="190" y1="88" x2="224" y2="60" stroke="#60a5fa" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="190" y1="100" x2="224" y2="100" stroke="#60a5fa" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="190" y1="112" x2="224" y2="140" stroke="#60a5fa" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Zone 1 - Woonkamer -->
  <rect x="224" y="44" width="108" height="34" rx="7" fill="#1e293b" stroke="#818cf8" stroke-width="1.2"/>
  <text x="278" y="58" text-anchor="middle" font-size="9" fill="#818cf8" font-weight="600">Woonkamer</text>
  <text x="278" y="70" text-anchor="middle" font-size="8" fill="#64748b">climate.woonkamer · 21°C</text>

  <!-- Zone 2 - Slaapkamer -->
  <rect x="224" y="84" width="108" height="34" rx="7" fill="#1e293b" stroke="#818cf8" stroke-width="1.2"/>
  <text x="278" y="98" text-anchor="middle" font-size="9" fill="#818cf8" font-weight="600">Slaapkamer</text>
  <text x="278" y="110" text-anchor="middle" font-size="8" fill="#64748b">climate.slaapkamer · 18°C</text>

  <!-- Zone 3 - Badkamer -->
  <rect x="224" y="124" width="108" height="34" rx="7" fill="#1e293b" stroke="#818cf8" stroke-width="1.2"/>
  <text x="278" y="138" text-anchor="middle" font-size="9" fill="#818cf8" font-weight="600">Badkamer</text>
  <text x="278" y="150" text-anchor="middle" font-size="8" fill="#64748b">climate.badkamer · 22°C</text>

  <!-- Thermostaatpijl naar zones -->
  <line x1="332" y1="61" x2="362" y2="61" stroke="#4ade80" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="332" y1="101" x2="362" y2="101" stroke="#4ade80" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="332" y1="141" x2="362" y2="141" stroke="#4ade80" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Temperatuursensoren -->
  <rect x="362" y="44" width="102" height="34" rx="7" fill="#0f172a" stroke="#4ade80" stroke-width="1"/>
  <text x="413" y="58" text-anchor="middle" font-size="9" fill="#4ade80">🌡 sensor L1</text>
  <text x="413" y="70" text-anchor="middle" font-size="8" fill="#64748b">temp_sensor</text>

  <rect x="362" y="84" width="102" height="34" rx="7" fill="#0f172a" stroke="#4ade80" stroke-width="1"/>
  <text x="413" y="98" text-anchor="middle" font-size="9" fill="#4ade80">🌡 sensor L2</text>
  <text x="413" y="110" text-anchor="middle" font-size="8" fill="#64748b">temp_sensor</text>

  <rect x="362" y="124" width="102" height="34" rx="7" fill="#0f172a" stroke="#4ade80" stroke-width="1"/>
  <text x="413" y="138" text-anchor="middle" font-size="9" fill="#4ade80">🌡 sensor L3</text>
  <text x="413" y="150" text-anchor="middle" font-size="8" fill="#64748b">temp_sensor</text>

  <!-- Bottom -->
  <rect x="14" y="170" width="452" height="22" rx="5" fill="#0f172a" fill-opacity=".8" stroke="#1e293b" stroke-width="1"/>
  <text x="240" y="184" text-anchor="middle" font-size="9" fill="#64748b">CloudEMS stuurt CV-ketel aan op basis van actieve vraag in alle zones</text>
</svg>
