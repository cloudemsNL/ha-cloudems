<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
<rect width="800" height="600" fill="none"/>
<g opacity="0.06" fill="none" stroke="#00b140" stroke-width="1.5">
  <!-- huis -->
  <polygon points="400,80 520,180 520,320 280,320 280,180" />
  <rect x="350" y="230" width="60" height="90" rx="4"/>
  <!-- zon linksboven -->
  <circle cx="120" cy="100" r="40"/>
  <line x1="120" y1="40" x2="120" y2="20"/><line x1="120" y1="160" x2="120" y2="180"/>
  <line x1="60" y1="100" x2="40" y2="100"/><line x1="180" y1="100" x2="200" y2="100"/>
  <line x1="78" y1="58" x2="64" y2="44"/><line x1="162" y1="142" x2="176" y2="156"/>
  <line x1="162" y1="58" x2="176" y2="44"/><line x1="78" y1="142" x2="64" y2="156"/>
  <!-- batterij rechtsonder -->
  <rect x="610" y="440" width="100" height="60" rx="6"/>
  <rect x="710" y="460" width="10" height="20" rx="2"/>
  <rect x="620" y="452" width="20" height="36" rx="2"/>
  <rect x="648" y="452" width="20" height="36" rx="2"/>
  <rect x="676" y="452" width="20" height="36" rx="2"/>
  <!-- pijlen energie -->
  <polyline points="160,120 280,200" stroke-dasharray="6,4"/>
  <polyline points="610,470 520,300" stroke-dasharray="6,4"/>
  <!-- grid links onder -->
  <circle cx="130" cy="480" r="35"/>
  <line x1="130" y1="445" x2="130" y2="515"/>
  <line x1="95" y1="480" x2="165" y2="480"/>
  <line x1="107" y1="452" x2="153" y2="508"/>
  <polyline points="165,480 280,350" stroke-dasharray="6,4"/>
</g>
<!-- subtle grid dots -->
<g opacity="0.025" fill="#ffffff">
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1"/>
  </pattern>
  <rect width="800" height="600" fill="url(#dots)"/>
</g>
</svg>