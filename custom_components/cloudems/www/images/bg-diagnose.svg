<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
<g opacity="0.06" fill="none" stroke="#ef9a9a" stroke-width="1.2">
  <!-- printplaat achtergrond -->
  <!-- horizontale traces -->
  <line x1="0" y1="150" x2="250" y2="150"/><line x1="350" y1="150" x2="500" y2="150"/><line x1="600" y1="150" x2="800" y2="150"/>
  <line x1="0" y1="250" x2="150" y2="250"/><line x1="350" y1="250" x2="800" y2="250"/>
  <line x1="0" y1="350" x2="200" y2="350"/><line x1="400" y1="350" x2="600" y2="350"/><line x1="700" y1="350" x2="800" y2="350"/>
  <line x1="0" y1="450" x2="300" y2="450"/><line x1="450" y1="450" x2="800" y2="450"/>
  <!-- verticale traces -->
  <line x1="150" y1="0" x2="150" y2="250"/><line x1="150" y1="350" x2="150" y2="600"/>
  <line x1="300" y1="0" x2="300" y2="150"/><line x1="300" y1="250" x2="300" y2="600"/>
  <line x1="500" y1="0" x2="500" y2="150"/><line x1="500" y1="350" x2="500" y2="600"/>
  <line x1="650" y1="0" x2="650" y2="350"/><line x1="650" y1="450" x2="650" y2="600"/>
  <!-- chips/IC componenten -->
  <rect x="230" y="190" width="120" height="80" rx="4"/>
  <line x1="230" y1="210" x2="210" y2="210"/><line x1="230" y1="230" x2="210" y2="230"/>
  <line x1="230" y1="250" x2="210" y2="250"/>
  <line x1="350" y1="210" x2="370" y2="210"/><line x1="350" y1="230" x2="370" y2="230"/>
  <rect x="100" y="290" width="100" height="80" rx="4"/>
  <rect x="450" y="110" width="100" height="60" rx="4"/>
  <!-- oscilloscoop golf -->
  <path d="M 60 500 L 100 500 L 100 460 L 140 460 L 140 500 L 200 500 L 200 460 L 240 460 L 240 500 L 300 500" stroke-width="2"/>
  <!-- condensatoren -->
  <g transform="translate(570,290)">
    <line x1="-10" y1="0" x2="0" y2="0"/>
    <line x1="0" y1="-20" x2="0" y2="20"/>
    <line x1="8" y1="-20" x2="8" y2="20"/>
    <line x1="8" y1="0" x2="18" y2="0"/>
  </g>
  <g transform="translate(680,200)">
    <line x1="-10" y1="0" x2="0" y2="0"/>
    <line x1="0" y1="-20" x2="0" y2="20"/>
    <line x1="8" y1="-20" x2="8" y2="20"/>
    <line x1="8" y1="0" x2="18" y2="0"/>
  </g>
</g>
</svg>