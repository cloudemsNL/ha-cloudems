      \ 'batt_ramp_mask_remaining_s') | float(0) %}\n| Filter | Status | Resterend |\n|---|---|---|\n| ☀️ PV-delta maskering | {{ '\U0001F534 ACTIEF' if diag else '\U0001F7E2 inactief' }} | {{ pv_rem |\
      \ round(0) | int }}s |\n| \U0001F50B Batterij-ramp maskering | {{ '\U0001F534 ACTIEF' if batt else '\U0001F7E2 inactief' }} | {{ batt_rem | round(0) | int }}s |\n\n_PV-maskering blokkeert NILM-events\
