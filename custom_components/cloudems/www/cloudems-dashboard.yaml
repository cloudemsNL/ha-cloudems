views:
- title: Overzicht
  path: cloudems-overzicht
  type: sections
  max_columns: 2
  icon: "mdi:home-lightning-bolt"
  background: url(/local/cloudems/images/bg-overzicht.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(0,177,64,0.08) 0%, transparent 60%), rgb(24,24,24)
  card_mod:
    style: "hui-view {\n  padding: 12px 12px 24px !important;\n}\n"
  sections:
  - type: grid
    column_span: 1
    cards:
    - type: "custom:cloudems-flow-card"
      title: ⚡ Energiestroom
      entities:
        grid:
          entity: sensor.cloudems_grid_net_power
          name: Net
          invert_state: false
        solar_system:
          entity: sensor.cloudems_solar_system
        solar:
          entity: sensor.cloudems_solar_system_intelligence
          name: Zonne-energie
          display_zero_state: true
        battery:
          entity: sensor.thuisbatterij_power
          name: Batterij
          state_of_charge: sensor.thuisbatterij_percentage
          display_zero_state: true
          invert_state: true
        home:
          entity: sensor.cloudems_home_rest
          name: Thuis
          display_zero_state: true
      watt_threshold: 1000
      clickable_entities: true
      display_zero_lines: true
      use_new_flow_rate_model: true
    - type: "custom:cloudems-sankey-card"
      title: "Energiestromen"
      max_ampere: 25
  - type: grid
    column_span: 1
    cards:
    - type: "custom:cloudems-home-card"
    - type: "custom:cloudems-rooms-card"
    - type: "custom:cloudems-version-card"
  cards:
  - &id001
    type: "custom:cloudems-mini-price-card"
- title: Solar & PV
  path: cloudems-zon
  type: sections
  max_columns: 1
  icon: "mdi:solar-power-variant"
  background: url(/local/cloudems/images/bg-solar.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(255,204,0,0.07) 0%, transparent 60%), rgb(24,24,24)
  card_mod:
    style: "hui-view { padding: 12px 12px 24px !important; }\n"
  sections:
  - type: grid
    column_span: 1
    cards:
      - type: conditional
        conditions:
        - condition: state
          entity: switch.cloudems_module_solar_learner
          state: 'off'
        card:
          type: markdown
          content: "⚠️ **☀️ Solar learner staat uit.** Schakel hem in via het [Configuratie tabblad](#cloudems-config) om zonnepanelen te monitoren.\n"
          card_mod:
            style: "ha-card { background: rgba(255,140,0,0.12) !important; border: 1px solid rgba(255,140,0,0.4) !important; border-radius: 12px !important; padding: 4px 12px !important; }\n"
      - *id001
      - type: "custom:cloudems-solar-card"
        title: Zonnepanelen
      - type: "custom:cloudems-pv-forecast-card"
        title: "☀️ PV Forecast + EPEX"
        show_tomorrow: true
        show_epex: true
        show_confidence: true
      - type: "custom:cloudems-zelfconsumptie-card"
        title: "♻️ Zelfconsumptie"
      - type: conditional
        conditions:
        - condition: numeric_state
          entity: sensor.cloudems_clipping_voorspelling_morgen
          above: 0.05
        card:
          type: markdown
          title: ⚡ Clipping verwacht morgen
          content: "{% set forecasts = state_attr('sensor.cloudems_clipping_voorspelling_morgen', 'forecasts') or [] %}\n{% set total = state_attr('sensor.cloudems_clipping_voorspelling_morgen', 'total_clipped_kwh')\
            \ or 0 %}\n**Totaal verwacht geclipte energie morgen: {{ total }} kWh**\n\n{% for f in forecasts if f.predicted_clip_kwh > 0.05 %}\n\U0001F536 **{{ f.advice }}**\n{% endfor %}\n\n\U0001F4A1 *Tip:\
            \ laad de batterij vóór de clippinguren volledig op om geclipte energie optimaal te benutten.*\n"
- title: Batterij
  path: cloudems-batterij
  type: sections
  max_columns: 1
  icon: "mdi:battery-charging"
  background: url(/local/cloudems/images/bg-batterij.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(96,165,250,0.07) 0%, transparent 60%), rgb(24,24,24)
  card_mod:
    style: "hui-view { padding: 12px 12px 24px !important; }\n"
  sections:
  - type: grid
    column_span: 1
    cards:
    - type: conditional
      conditions:
      - condition: state
        entity: switch.cloudems_module_batterij
        state: 'off'
      card:
        type: markdown
        content: "⚠️ **🔋 Batterij module staat uit.** Schakel hem in via het [Configuratie tabblad](#cloudems-config) om deze functie te activeren.\n"
        card_mod:
          style: "ha-card { background: rgba(255,140,0,0.12) !important; border: 1px solid rgba(255,140,0,0.4) !important; border-radius: 12px !important; padding: 4px 12px !important; }\n"
    - *id001
    - type: "custom:cloudems-battery-card"
      title: Thuisbatterij

- title: Warm Water
  path: cloudems-boiler
  type: sections
  max_columns: 1
  icon: "mdi:water-boiler"
  background: url(/local/cloudems/images/bg-boiler.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(255,112,67,0.07) 0%, transparent 60%), rgb(24,24,24)
  card_mod:
    style: "hui-view { padding: 12px 12px 24px !important; }\n"
  sections:
  - type: grid
    column_span: 1
    cards:
      - type: conditional
        conditions:
        - condition: state
          entity: switch.cloudems_module_ketel
          state: 'off'
        card:
          type: markdown
          content: "⚠️ **\U0001F6BF Warm Water module staat uit.** Schakel hem in via het [Configuratie tabblad](#cloudems-config) om deze functie te activeren.\n"
          card_mod:
            style: "ha-card { background: rgba(255,140,0,0.12) !important; border: 1px solid rgba(255,140,0,0.4) !important; border-radius: 12px !important; padding: 4px 12px !important; }\n"
      - *id001
      - type: "custom:cloudems-boiler-card"
        tank_liters: 80
        cold_water_temp: 10
        shower_temp: 38
        shower_liters_per_min: 8
        shower_duration_min: 8
        title: Warm water
- title: EV & Mobiliteit
  path: cloudems-mobiliteit
  type: sections
  max_columns: 1
  icon: "mdi:car-electric-outline"
  background: url(/local/cloudems/images/bg-mobiliteit.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(165,214,167,0.07) 0%, transparent 60%), rgb(24,24,24)
  card_mod:
    style: "hui-view { padding: 12px 12px 24px !important; }\n"
  sections:
  - type: grid
    column_span: 1
    cards:
      - *id001
      - type: conditional
        conditions:
        - condition: state
          entity: switch.cloudems_module_ev_lader
          state: 'off'
        card:
          type: markdown
          content: "⚠️ **\U0001F697 EV Lader module staat uit.** Schakel hem in via het [Configuratie tabblad](#cloudems-config) om deze functie te activeren.\n"
          card_mod:
            style: "ha-card { background: rgba(255,140,0,0.12) !important; border: 1px solid rgba(255,140,0,0.4) !important; border-radius: 12px !important; padding: 4px 12px !important; }\n"
      - type: conditional
        conditions:
        - condition: numeric_state
          entity: sensor.cloudems_micro_mobiliteit
          attribute: active_session_count
          above: 0
        card:
          type: markdown
          title: ⚡ Nu aan het laden
          content: "{% set active = state_attr('sensor.cloudems_micro_mobiliteit', 'active_sessions') or [] %}\n{% for s in active %}\n\U0001F50C **{{ s.label }}** ({{ s.vehicle_type }}) — {{ s.kwh_so_far }}\
            \ kWh in {{ s.duration_min | int }} min — Fase {{ s.phase }}\n{% endfor %}\n"
          card_mod:
            style: "ha-card {\n  background: rgb(34,34,34) !important;\n  border: 1px solid rgba(255,255,255,0.06) !important;\n  border-radius: 16px !important;\n  box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;\n\
              \  --primary-text-color: rgb(163,163,163);\n  --secondary-text-color: rgb(102,102,102);\n  --primary-color: rgb(0,177,64);\n  --card-background-color: transparent;\n  --ha-card-border-color: transparent;\n\
              }\nha-card:hover {\n  border-color: rgba(0,177,64,0.5) !important;\n  box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 16px rgba(0,177,64,0.12) !important;\n  transform: translateY(-1px) !important;\n\
              }\n.card-header {\n  background: transparent !important;\n  border-bottom: 1px solid rgba(255,255,255,0.07) !important;\n  color: rgb(255,255,255) !important;\n  font-size: 12px !important;\n\
              \  font-weight: 600 !important;\n  padding: 14px 16px 12px !important;\n}\nha-markdown-element table { width: 100% !important; border-collapse: collapse !important; }\nha-markdown-element th {\n\
              \  background: rgba(0,177,64,0.1) !important;\n  color: rgb(0,212,78) !important;\n  font-size: 10px !important;\n  font-weight: 700 !important;\n  letter-spacing: 0.08em !important;\n  text-transform:\
              \ uppercase !important;\n  padding: 8px 10px !important;\n  border-bottom: 1px solid rgba(0,177,64,0.2) !important;\n}\nha-markdown-element td {\n  color: rgb(163,163,163) !important;\n  border-bottom:\
              \ 1px solid rgba(255,255,255,0.05) !important;\n  padding: 7px 10px !important;\n}\nha-markdown-element tr:hover td {\n  background: rgba(0,177,64,0.06) !important;\n  color: rgb(255,255,255)\
              \ !important;\n}\nha-markdown-element strong { color: rgb(255,255,255) !important; font-weight: 600 !important; }\nha-markdown-element em { color: rgb(102,102,102) !important; }\nha-markdown-element\
              \ code {\n  background: rgba(0,177,64,0.12) !important;\n  color: rgb(0,212,78) !important;\n  padding: 1px 6px !important;\n  border-radius: 4px !important;\n  font-size: 12px !important;\n}\n\
              ha-markdown-element blockquote {\n  border-left: 3px solid rgb(0,177,64) !important;\n  background: rgba(0,177,64,0.07) !important;\n  padding: 8px 14px !important;\n  border-radius: 0 8px 8px\
              \ 0 !important;\n  color: rgb(163,163,163) !important;\n}\n"
      - type: entities
        title: 🚗 EV Sessie Leermodel
        icon: "mdi:ev-plug-type2"
        entities:
        - entity: sensor.cloudems_ev_sessie_leermodel
          name: Verwacht volgende sessie (kWh)
        - type: attribute
          entity: sensor.cloudems_ev_sessie_leermodel
          attribute: session_active
          name: Sessie actief
        - type: attribute
          entity: sensor.cloudems_ev_sessie_leermodel
          attribute: session_kwh_so_far
          name: Geladen tot nu (kWh)
        - type: attribute
          entity: sensor.cloudems_ev_sessie_leermodel
          attribute: predicted_duration_h
          name: Verwachte duur (uur)
        - type: attribute
          entity: sensor.cloudems_ev_sessie_leermodel
          attribute: typical_weekdays
          name: Typische weekdagen
        - type: attribute
          entity: sensor.cloudems_ev_sessie_leermodel
          attribute: avg_cost_per_session
          name: Gem. kosten per sessie (€)
        card_mod:
          style: "ha-card {\n  background: rgb(34,34,34) !important;\n  border: 1px solid rgba(255,255,255,0.06) !important;\n  border-radius: 16px !important;\n  box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;\n\
            \  --primary-text-color: rgb(255,255,255);\n  --secondary-text-color: rgb(163,163,163);\n  --state-active-color: rgb(0,177,64);\n  --state-inactive-color: rgb(68,68,68);\n  --state-unavailable-color:\
            \ rgb(239,68,68);\n  --primary-color: rgb(0,177,64);\n  --accent-color: rgb(0,212,78);\n  --card-background-color: transparent;\n  --ha-card-border-color: transparent;\n  --divider-color: rgba(255,255,255,0.06);\n\
            \  --secondary-background-color: rgba(0,177,64,0.08);\n}\nha-card:hover {\n  border-color: rgba(0,177,64,0.5) !important;\n  box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 16px rgba(0,177,64,0.12)\
            \ !important;\n  transform: translateY(-1px) !important;\n}\n.card-header {\n  background: transparent !important;\n  border-bottom: 1px solid rgba(255,255,255,0.07) !important;\n  color: rgb(255,255,255)\
            \ !important;\n  font-size: 12px !important;\n  font-weight: 600 !important;\n  letter-spacing: 0.04em !important;\n  padding: 14px 16px 12px !important;\n}\n"
      - type: markdown
        title: 📋 Geleerde Voertuigprofielen
        content: "{% set profiles = state_attr('sensor.cloudems_micro_mobiliteit', 'vehicle_profiles') or [] %}\n{% if profiles | length == 0 %}\n*Nog geen voertuigen gedetecteerd. CloudEMS herkent e-bike en\
          \ scooter laders (50–700W) automatisch via NILM.*\n{% else %}\n| Voertuig | Type | Sessies | Gem. kWh | Gem. duur | Per week |\n|----------|------|---------|----------|-----------|----------|\n{%\
          \ for p in profiles %}\n| {{ p.get('label') or 'Onbekend' }} | {{ p.get('vehicle_type') or 'ebike' }} | {{ p.get('sessions', 0) | int(0) }} | {{ '%.2f' % (p.get('avg_kwh', 0) | float(0)) }} kWh |\
          \ {{ p.get('avg_duration_min', 0) | int(0) }} min | {{ '%.1f' % (p.get('sessions_per_week', 0) | float(0)) }}×/week |\n{% endfor %}\n{% endif %}\n"
        card_mod:
          style: "ha-card {\n  background: rgb(34,34,34) !important;\n  border: 1px solid rgba(255,255,255,0.06) !important;\n  border-radius: 16px !important;\n  box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;\n\
            \  --primary-text-color: rgb(163,163,163);\n  --secondary-text-color: rgb(102,102,102);\n  --primary-color: rgb(0,177,64);\n  --card-background-color: transparent;\n  --ha-card-border-color: transparent;\n\
            }\nha-card:hover {\n  border-color: rgba(0,177,64,0.5) !important;\n  box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 16px rgba(0,177,64,0.12) !important;\n  transform: translateY(-1px) !important;\n\
            }\n.card-header {\n  background: transparent !important;\n  border-bottom: 1px solid rgba(255,255,255,0.07) !important;\n  color: rgb(255,255,255) !important;\n  font-size: 12px !important;\n  font-weight:\
            \ 600 !important;\n  padding: 14px 16px 12px !important;\n}\nha-markdown-element table { width: 100% !important; border-collapse: collapse !important; }\nha-markdown-element th {\n  background:\
            \ rgba(0,177,64,0.1) !important;\n  color: rgb(0,212,78) !important;\n  font-size: 10px !important;\n  font-weight: 700 !important;\n  letter-spacing: 0.08em !important;\n  text-transform: uppercase\
            \ !important;\n  padding: 8px 10px !important;\n  border-bottom: 1px solid rgba(0,177,64,0.2) !important;\n}\nha-markdown-element td {\n  color: rgb(163,163,163) !important;\n  border-bottom: 1px\
            \ solid rgba(255,255,255,0.05) !important;\n  padding: 7px 10px !important;\n}\nha-markdown-element tr:hover td {\n  background: rgba(0,177,64,0.06) !important;\n  color: rgb(255,255,255) !important;\n\
            }\nha-markdown-element strong { color: rgb(255,255,255) !important; font-weight: 600 !important; }\nha-markdown-element em { color: rgb(102,102,102) !important; }\nha-markdown-element code {\n \
            \ background: rgba(0,177,64,0.12) !important;\n  color: rgb(0,212,78) !important;\n  padding: 1px 6px !important;\n  border-radius: 4px !important;\n  font-size: 12px !important;\n}\nha-markdown-element\
            \ blockquote {\n  border-left: 3px solid rgb(0,177,64) !important;\n  background: rgba(0,177,64,0.07) !important;\n  padding: 8px 14px !important;\n  border-radius: 0 8px 8px 0 !important;\n  color:\
            \ rgb(163,163,163) !important;\n}\n"
      - type: markdown
        title: ⚡ Flexibel Vermogen Score
        content: "{% set total = states('sensor.cloudems_flexibel_vermogen') | float(0) %}\n{% set bat   = state_attr('sensor.cloudems_flexibel_vermogen', 'battery_kw') | float(0) %}\n{% set ev    = state_attr('sensor.cloudems_flexibel_vermogen',\
          \ 'ev_kw') | float(0) %}\n{% set boil  = state_attr('sensor.cloudems_flexibel_vermogen', 'boiler_kw') | float(0) %}\n{% set nilm  = state_attr('sensor.cloudems_flexibel_vermogen', 'nilm_kw') | float(0)\
          \ %}\n{% set parts = state_attr('sensor.cloudems_flexibel_vermogen', 'components') or [] %}\n**Totaal flex beschikbaar: {{ total }} kW**\n\n| Categorie | Flex (kW) |\n|---|---|\n| \U0001F50B Batterij\
