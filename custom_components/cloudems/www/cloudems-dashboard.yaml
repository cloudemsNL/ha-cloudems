          | Apparaat | Cycli | Verwacht | Slijtage |
          |---|---|---|---|
          {% for d in worn | sort(attribute='wear_pct', reverse=true) %}
          | {{ d.name }} | {{ d.on_events | int }} | {{ d.expected_cycles | int }} | {% if d.wear_status == 'alert' %}🔴{% else %}🟡{% endif %} {{ d.wear_pct | round(0) | int }}% |
          {% endfor %}
          {% else %}
          ✅ Alle apparaten binnen verwachte levensduur.
          {% for d in devs | selectattr('wear_pct', 'ne', none) | list %}
          - **{{ d.name }}**: {{ d.on_events | int }} / {{ d.expected_cycles | int }} cycli ({{ d.wear_pct | round(0) | int }}%)
          {% endfor %}
          {% endif %}
