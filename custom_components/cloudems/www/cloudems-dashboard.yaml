  - type: markdown
    title: "📋 Alle bekende NILM apparaten"
    content: |
      {% set devs = state_attr('sensor.cloudems_nilm_devices','device_list') or [] %}
      {% if devs | length == 0 %}
      *CloudEMS leert apparaten kennen — na een paar uur verschijnen ze hier.*
      {% else %}
      {% set confirmed  = devs | selectattr('confirmed',       'ne', none) | selectattr('confirmed',       'eq', true) | list | length %}
      {% set suppressed = devs | selectattr('user_suppressed', 'ne', none) | selectattr('user_suppressed', 'eq', true) | list | length %}
      {% set total = devs | length %}
      **{{ total }}** apparaten &nbsp;·&nbsp; ✅ **{{ confirmed }}** goedgekeurd &nbsp;·&nbsp; 🚫 **{{ suppressed }}** onderdrukt &nbsp;·&nbsp; ⏳ **{{ total - confirmed - suppressed }}** onbeslist

      | St | Bron | Fase | W | Apparaat | Kamer | ID |
      |---|------|------|---|----------|-------|----|
      {% for d in devs | sort(attribute='power_w', reverse=true) %}
      {%- set is_on   = d.get('is_on', false) or d.get('state','') == 'on' -%}
      {%- set confirmed_d = d.get('confirmed', false) -%}
      {%- set suppressed_d = d.get('user_suppressed', false) -%}
      {%- set status  = '✅' if confirmed_d else ('🚫' if suppressed_d else '⏳') -%}
      {%- set active  = '🟢' if is_on else '⚫' -%}
      {%- set ph = d.get('phase','?') -%}
      {%- set ph_ico  = '🔵' if ph == 'L1' else ('🟡' if ph == 'L2' else ('🟢' if ph == 'L3' else '⚪')) -%}
      {%- set src = d.get('source_type', d.get('source','nilm')) -%}
      {%- set src_ico = '🔌' if src == 'smart_plug' else ('🧠' if src == 'local_ai' else ('☁️' if src == 'cloud_ai' else '🔍')) -%}
      {%- set room = d.get('room', '—') | title -%}
      | {{ active }} {{ status }} | {{ src_ico }} | {{ ph_ico }} {{ ph }} | {{ d.get('power_w', 0) | int }} | {{ d.get('name', d.get('device_type','?')) }} | {{ room }} | `{{ d.get('device_id','?') }}` |
      {% endfor %}

      🟢 actief &nbsp;·&nbsp; ✅ goedgekeurd &nbsp;·&nbsp; ⏳ onbeslist &nbsp;·&nbsp; 🚫 onderdrukt
      **Bevestigd apparaat verwijderen:** kopieer het `ID` → Ontwikkelaarshulpmiddelen → Services → `cloudems.dismiss_device`
      {% endif %}
