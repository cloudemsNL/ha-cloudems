- title: Diagnose
  path: cloudems-diagnose
  max_columns: 2
  icon: mdi:stethoscope
  background: "url(/local/cloudems/images/bg-diagnose.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(239,154,154,0.06) 0%, transparent 60%), rgb(24,24,24)"
  card_mod:
    style: |
      hui-view { padding: 12px 12px 24px !important; }
  cards:

  - type: markdown
    title: 💚 Systeem Gezondheid
    content: |
      {%- set score = states('sensor.cloudems_system_health') | float(0) | round(1) -%}
      {%- set pct = (score / 10 * 100) | round(0) | int -%}
      {%- set bars = (score | round(0) | int) -%}
      {%- set color = '🟢' if score >= 8 else ('🟡' if score >= 5 else '🔴') -%}
      {%- set label = 'Uitstekend' if score >= 9 else ('Goed' if score >= 7 else ('Matig' if score >= 5 else ('Slecht' if score >= 3 else 'Kritiek'))) -%}
      {{ color }} **{{ score }}/10** — {{ label }}

      `{{ '█' * bars }}{{ '░' * (10 - bars) }}` {{ pct }}%

      | Aspect | Waarde |
      |--------|--------|
      | Score | **{{ score }}/10** |
      | Status | {{ label }} |
      | Versie | v{{ state_attr('sensor.cloudems_system_health','version') or '?' }} |
      | Uptime | {{ state_attr('sensor.cloudems_system_health','uptime_h') | round(1) if state_attr('sensor.cloudems_system_health','uptime_h') else '—' }} uur |
      | Update cycli | {{ state_attr('sensor.cloudems_system_health','update_count') or '—' }} |
    card_mod:
      style: |
        ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(0,177,64,0.3) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; --primary-text-color: rgb(163,163,163); --card-background-color: transparent; --ha-card-border-color: transparent; }
        .card-header { background: transparent !important; border-bottom: 1px solid rgba(0,177,64,0.15) !important; color: rgb(0,212,78) !important; font-size: 12px !important; font-weight: 600 !important; padding: 14px 16px 12px !important; }
        ha-markdown-element code { font-family: 'Courier New', Courier, monospace !important; letter-spacing: 0 !important; background: rgba(0,177,64,0.1) !important; color: rgb(0,212,78) !important; padding: 4px 10px !important; border-radius: 6px !important; font-size: 13px !important; display: block !important; }
        ha-markdown-element table { width: 100% !important; border-collapse: collapse !important; }
        ha-markdown-element th { background: rgba(0,177,64,0.1) !important; color: rgb(0,212,78) !important; font-size: 10px !important; font-weight: 700 !important; text-transform: uppercase !important; padding: 8px 10px !important; }
        ha-markdown-element td { color: rgb(163,163,163) !important; border-bottom: 1px solid rgba(255,255,255,0.05) !important; padding: 6px 10px !important; font-size: 12px !important; }
        ha-markdown-element strong { color: rgb(255,255,255) !important; }


  - type: markdown
    title: 🔁 Watchdog — Crashmonitor
    content: |
      {% set wd     = states('sensor.cloudems_watchdog') %}
      {% set cons   = state_attr('sensor.cloudems_watchdog', 'consecutive_failures') | int(0) %}
      {% set total  = state_attr('sensor.cloudems_watchdog', 'total_failures') | int(0) %}
      {% set rests  = state_attr('sensor.cloudems_watchdog', 'total_restarts') | int(0) %}
      {% set lf_ago = state_attr('sensor.cloudems_watchdog', 'last_failure_ago') %}
      {% set lf_msg = state_attr('sensor.cloudems_watchdog', 'last_failure_msg') %}
      {% set lr_ago = state_attr('sensor.cloudems_watchdog', 'last_restart_ago') %}
      {% set ls_ago = state_attr('sensor.cloudems_watchdog', 'last_success_ago') %}
      {% set nxt    = state_attr('sensor.cloudems_watchdog', 'next_restart_in_s') | int(0) %}
      {% set max_c  = state_attr('sensor.cloudems_watchdog', 'max_consecutive') | int(3) %}
      {% set hist   = state_attr('sensor.cloudems_watchdog', 'history') or [] %}
      {% if wd == 'ok' %}
      🟢 **Systeem gezond** — laatste succes {{ ls_ago or 'onbekend' }}
      {% elif wd == 'warning' %}
      🟡 **Waarschuwing** — {{ cons }}/{{ max_c }} opeenvolgende fouten
      {% elif wd == 'critical' %}
      🔴 **Kritiek** — herstart getriggerd ({{ rests }}× totaal)
      {% else %}
      ⏳ Watchdog start op...
      {% endif %}

      | Gegeven | Waarde |
      |---|---|
      | Status | {{ wd }} |
      | Opeenvolgende fouten | {{ cons }}/{{ max_c }} |
      | Totaal fouten (ooit) | {{ total }} |
      | Automatische herstarts | **{{ rests }}** |
      | Laatste fout | {{ lf_ago or '—' }} |
      | Laatste herstart | {{ lr_ago or 'Nooit' }} |
      | Laatste succes | {{ ls_ago or '—' }} |
      {% if nxt > 0 %}| Volgende herstart na | {{ nxt }}s backoff |{% endif %}

      {% if lf_msg %}
      **Laatste foutmelding:**
      ```
      {{ lf_msg }}
      ```
      {% endif %}

      {% if hist %}
      **Crashgeschiedenis (laatste {{ hist | length }}):**
      | Tijdstip | Fout | # |
      |---|---|---:|
      {%- for e in hist | reverse %}
      | `{{ e.ts[11:19] if e.ts else '?' }}` | {{ e.error[:60] }}{% if e.error | length > 60 %}…{% endif %} | {{ e.consecutive }} |
      {%- endfor %}
      {% endif %}
