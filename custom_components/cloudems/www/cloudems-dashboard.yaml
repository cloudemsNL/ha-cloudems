  - type: markdown
    title: ↕️ Per-fase Import & Export Vermogen (W)
    content: |
      {% set l1i = states('sensor.cloudems_grid_phase_l1_import_power') | float(0) | round(0) | int %}
      {% set l2i = states('sensor.cloudems_grid_phase_l2_import_power') | float(0) | round(0) | int %}
      {% set l3i = states('sensor.cloudems_grid_phase_l3_import_power') | float(0) | round(0) | int %}
      {% set l1e = states('sensor.cloudems_grid_phase_l1_export_power') | float(0) | round(0) | int %}
      {% set l2e = states('sensor.cloudems_grid_phase_l2_export_power') | float(0) | round(0) | int %}
      {% set l3e = states('sensor.cloudems_grid_phase_l3_export_power') | float(0) | round(0) | int %}
      {% set l1n = l1i - l1e %}
      {% set l2n = l2i - l2e %}
      {% set l3n = l3i - l3e %}
      {% set max_fase = [l1n, l2n, l3n] | max %}
      {% set min_fase = [l1n, l2n, l3n] | min %}
      {% set spread = max_fase - min_fase %}
      {% set totaal_i = l1i + l2i + l3i %}
      {% set totaal_e = l1e + l2e + l3e %}
      {% set totaal_n = totaal_i - totaal_e %}
      {% set max_abs = ([l1n | abs, l2n | abs, l3n | abs, 1] | max) %}
      {%- set warn = spread > 1000 -%}
      {% if warn %}⚠️ **Fase-onbalans: {{ spread }}W verschil** — controleer enkelvoudige lasten
      {% endif %}
      | Fase | Netto (W) | Import (W) | Export (W) |
      |------:|----------:|-----------:|-----------:|
      | 🔵 **L1** | **{{ l1n }}** | {{ l1i }} | {{ l1e }} |
      | 🟡 **L2** | **{{ l2n }}** | {{ l2i }} | {{ l2e }} |
      | 🟢 **L3** | **{{ l3n }}** | {{ l3i }} | {{ l3e }} |
      | **Totaal** | **{{ totaal_n }}** | **{{ totaal_i }}** | **{{ totaal_e }}** |
      *Alleen beschikbaar met DSMR5 slimme meter.*
