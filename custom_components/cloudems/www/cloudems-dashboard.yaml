  - type: markdown
    title: ⚡🔥 Goedkoopste Warmtebron
    content: |
      {% set s = states('sensor.cloudems_goedkoopste_warmtebron') %}
      {% set elec   = state_attr('sensor.cloudems_goedkoopste_warmtebron', 'elec_price_kwh') | default(0) %}
      {% set gas    = state_attr('sensor.cloudems_goedkoopste_warmtebron', 'gas_per_kwh_heat') | default(0) %}
