  - type: markdown
    title: ⚡ Goedkope Uren Schakelaars & Slimme Uitstelmodus
    content: |
      {%- set cs = state_attr('sensor.cloudems_goedkope_uren_schakelaars', 'switches') or [] -%}
      {%- set actions = state_attr('sensor.cloudems_goedkope_uren_schakelaars', 'last_actions') or [] -%}
      {%- set count = states('sensor.cloudems_goedkope_uren_schakelaars') | int(0) -%}
      {%- set avg_today = state_attr('sensor.cloudems_energy_epex_today', 'avg_today') | float(0) -%}
      ## ⏱️ Goedkope Uren Schakelaars
      {%- if count > 0 %}
      **{{ count }} schakelaar(s) geconfigureerd**

      | Schakelaar | Venster | Status | Blok prijs | Gem. dag | Besparing |
      |---|---|---|---|---|---|
      {% for sw in cs %}
      {%- set blok_prijs = sw.avg_price | float(0) if sw.avg_price else none -%}
      {%- set diff = (avg_today - blok_prijs) | round(4) if blok_prijs else none -%}
      | `{{ sw.entity_id.split('.')[1] }}` | {{ sw.window_hours }}u | {{ '🟢 actief' if sw.active else '⏸️ inactief' }} | {{ '€' ~ blok_prijs | round(4) if blok_prijs else '—' }} | €{{ avg_today | round(4) }} | {{ ('💚 €' ~ diff | round(4) ~ '/kWh') if diff and diff > 0 else ('➖' if diff is not none else '—') }} |
      {% endfor %}
      {%- if actions %}

      **Recente acties:**
      {%- for a in actions[:5] %}
      - {{ a }}
      {%- endfor %}
      {%- endif %}
      {%- else %}
      Geen schakelaars geconfigureerd. Voeg ze toe via **Instellingen → CloudEMS → Goedkope uren schakelaars**.
      {%- endif %}

      ---

      {%- set sd = state_attr('sensor.cloudems_goedkope_uren_schakelaars', 'smart_delay') or {} -%}
      {%- set sd_switches = sd.get('switches', []) -%}
      {%- set pending  = sd.get('pending_count', 0) -%}
      ## ⏳ Slimme Uitstelmodus
      {%- if not sd_switches %}
      Geen schakelaars geconfigureerd. Voeg ze toe via **Instellingen → CloudEMS → Slimme Uitstelmodus**.
      {%- else %}
      {%- if pending > 0 %}
      ⏳ **{{ pending }} schakelaar(s) wachten op goedkoop moment**
      {%- else %}
      ✅ Geen uitgestelde schakelaars
      {%- endif %}

      | Apparaat | Status | Modus | Doel | Wachtend | Deadline |
      |:---|:---:|:---:|:---:|:---:|:---:|
      {% for sw in sd_switches %}
      {%- set ds = sw.get('delay_state','idle') -%}
      {%- set status_map = {'idle': '✅ klaar', 'detected': '🔍 gedetecteerd', 'intercepted': '⏳ uitgesteld', 'deadline_forced': '⏰ deadline', 'disabled': '🚫 uit'} -%}
      {%- set status_lbl = status_map.get(ds, ds) -%}
      {%- set lbl = (sw.get('label') or sw.get('entity_id','?')).split('.')[-1] | replace('_',' ') | title -%}
      {%- set tgt = sw.get('cheap_block_start') or sw.get('target_hour') -%}
      {%- set wmin = sw.get('waiting_min') -%}
      {%- set wmode = sw.get('wait_mode','price') -%}
      {%- set modus_badge = '🏷️ blok' if wmode == 'cheapest_block' else '💶 prijs' -%}
      {%- set mxh = sw.get('max_wait_h', 0) | int -%}
      {%- set dl_ts = sw.get('deadline_ts') -%}
      {%- set mins_left = ((dl_ts | int - now().timestamp() | int) // 60) if dl_ts else none -%}
      {%- set dl_str = ((mins_left | string ~ ' min') if mins_left is not none and mins_left > 0 else '—') if dl_ts else ('∞' if mxh == 0 else (mxh | string ~ 'h max')) -%}
      | **{{ lbl }}** | {{ status_lbl }} | {{ modus_badge }} | {{ '%02d:00' | format(tgt) if tgt is not none else '—' }} | {{ (wmin | int | string ~ ' min') if wmin is not none else '—' }} | {{ dl_str }} |
      {% endfor %}
      {%- if pending > 0 %}

      **Apparaten wachten op inschakeling:**
      {%- for sw in sd_switches if sw.get('delay_state') in ('intercepted','detected','deadline_forced') %}
      {%- set lbl = (sw.get('label') or sw.get('entity_id','?')).split('.')[-1] | replace('_',' ') | title %}
      {%- set tgt = sw.get('cheap_block_start') or sw.get('target_hour') %}
      - **{{ lbl }}** — gepland om {{ '%02d:00' | format(tgt) if tgt is not none else '—' }}
      {%- endfor %}
      {%- endif %}
      {%- endif %}
