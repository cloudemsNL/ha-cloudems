      card_mod:
        style: |
          ha-card { background: rgba(220,50,50,0.12) !important; border: 1px solid rgba(220,50,50,0.35) !important; border-radius: 14px !important; --primary-text-color: rgb(240,100,100); --paper-item-icon-color: rgb(240,100,100); --card-background-color: transparent; }
    - type: button
      name: Weet ik niet
      icon: mdi:help-circle
      icon_height: 28px
      show_state: false
      tap_action:
        action: perform-action
        perform_action: button.press
        data:
          entity_id: button.cloudems_nilm_review_maybe
      card_mod:
        style: |
          ha-card { background: rgba(250,190,40,0.12) !important; border: 1px solid rgba(250,190,40,0.35) !important; border-radius: 14px !important; --primary-text-color: rgb(250,210,80); --paper-item-icon-color: rgb(250,210,80); --card-background-color: transparent; }
    - type: button
      name: Vorige
