    content: "{% set devs = state_attr('sensor.cloudems_apparaat_efficientiedrift', 'devices') or [] %}\n{% set alerts = devs | selectattr('level', 'ne', 'ok') | list %}\n{% if devs | length == 0 %}\n*Nog\
