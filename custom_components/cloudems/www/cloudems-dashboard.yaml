            {%- set all_boilers.list = all_boilers.list + [b | combine({'group': g.name})] -%}
          {%- endfor -%}
        {%- endfor -%}
        {%- for b in solo -%}
          {%- set all_boilers.list = all_boilers.list + [b | combine({'group': 'Enkelvoudig'})] -%}
        {%- endfor -%}
        {%- set dimmers = all_boilers.list | selectattr('control_mode', 'eq', 'dimmer') | list -%}
