- title: Configuratie
  path: cloudems-config
  type: sections
  max_columns: 1
  icon: "mdi:cog-outline"
  background: url(/local/cloudems/images/bg-config.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(176,190,197,0.06) 0%, transparent 60%), rgb(24,24,24)
  card_mod:
    style: "hui-view { padding: 12px 12px 24px !important; }\n"
  sections:
  - type: grid
    column_span: 1
    cards:
      - *id001
      - type: "custom:cloudems-config-card"
      - type: "custom:cloudems-beheer-card"
        title: ⚡ CloudEMS
      - type: conditional
        conditions:
        - condition: state
          entity: switch.cloudems_module_ere
          state_not: 'off'
        - condition: state
          entity: sensor.cloudems_ev
          state_not: unavailable
        card:
          type: markdown
          title: "📋 ERE Certificaten"
        content: "{% set ere = state_attr('sensor.cloudems_ev', 'ere') or {} %}{% set jaar = ere.get('jaar', {}) %}{% set proj = ere.get('projectie_jaar', {}) %}\n\n{% if ere.get('heeft_mid_meter') %}✅ MID-laadpaal gekoppeld{% else %}⚠️ Geen MID-laadpaal{% endif %} · {% if ere.get('heeft_groencontract') %}🌱 Groencontract{% else %}Geen groencontract{% endif %}\n\n| Geladen | ERE's | Opbrengst |\n|---|---|---|\n| {{ jaar.get('kwh','—') }} kWh | {{ jaar.get('ere','—') }} kg CO₂ | €{{ jaar.get('opbrengst_eur','—') }} |\n"

