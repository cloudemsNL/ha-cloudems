  - type: conditional
    conditions:
    - condition: state
      entity: sensor.cloudems_boiler_status
      state_not: unavailable
    card:
      type: markdown
      title: "🌡️ Thermisch verlies & voorspelling"
      content: |
        {%- set groups = state_attr('sensor.cloudems_boiler_status', 'groups') or [] -%}
        {%- set ns = namespace(any_data=false) -%}
        {%- for g in groups -%}
        {%- set ls = g.get('learn_status', {}) -%}
        {%- set delivery_evs = ls.get('delivery_events', {}) -%}
        {%- if delivery_evs -%}
        {%- set ns.any_data = true -%}
        **{{ g.name }}** — thermisch profiel
        {%- set season = g.get('season', 'winter') %}
        Seizoen: {{ '☀️ Zomer' if season == 'summer' else '❄️ Winter' }} · Totaal geleerde cycli: {{ ls.get('total_events', 0) }}

        | Boiler | Verlies | Tijd tot comf.grens | Confid. | kWh cyclus |
        |---|---|---|---|---|
        {%- for b in g.boilers -%}
        {%- set bdata = delivery_evs.get(b.entity_id, {}) -%}
        {%- set loss = b.get('thermal_loss_c_h', 0) | float(0) -%}
        {%- set loss_str = (loss | round(2) | string + ' °C/u') if loss > 0 else 'Lerende…' -%}
        {%- set mtc = b.get('minutes_to_cold') -%}
        {%- set cold_str -%}
          {%- if mtc is none -%}—
          {%- elif mtc < 60 -%}⚠️ {{ mtc | round(0) | int }} min
          {%- elif mtc < 180 -%}{{ (mtc / 60) | round(1) }} u
          {%- else -%}✅ {{ (mtc / 60) | round(1) }} u
          {%- endif -%}
        {%- endset -%}
        {%- set conf = bdata.get('confidence_pct', 0) | float(0) -%}
        {%- set conf_str = (conf | round(0) | int | string + '%') if conf > 0 else '—' -%}
        {%- set kwh = b.get('cycle_kwh', 0) | float(0) -%}
        {%- set delivery_tag = ' 🚿' if b.is_delivery else '' -%}
        | {{ b.label }}{{ delivery_tag }} | {{ loss_str }} | {{ cold_str }} | {{ conf_str }} | {{ kwh | round(3) }} kWh |
        {%- endfor %}
        {%- endif %}
        {%- if not loop.last %}

        ---
        {%- endif %}
        {%- endfor -%}
        {%- if not ns.any_data -%}
        *Nog geen leerdata beschikbaar. Voeg cascade-groepen toe en laat het systeem enkele cycli draaien.*
        {%- endif %}
