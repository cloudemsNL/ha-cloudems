- title: Rolluiken
  path: cloudems-rolluiken
  max_columns: 2
  icon: mdi:blinds
  background: "url(/local/cloudems/images/bg-rolluiken.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(144,202,249,0.07) 0%, transparent 60%), rgb(24,24,24)"
  cards:
  - type: conditional
    conditions:
      - condition: state
        entity: switch.cloudems_module_rolluiken
        state: "off"
    card:
      type: markdown
      content: "⚠️ **🪟 Rolluiken module staat uit.** Schakel hem in via het [Configuratie tabblad](#cloudems-config) om deze functie te activeren."
  # ══════════════════════════════════════════════════════════════════════
  # KOLOM 1 — Status & handmatige bediening
  # ══════════════════════════════════════════════════════════════════════
  - type: vertical-stack
    cards:

    - type: markdown
      title: 🪟 Rolluiken — Status & Beslissing
      content: |
        {%- set shutters = (state_attr('sensor.cloudems_status','shutters') or {}).get('shutters', []) -%}
        {%- if not shutters -%}
        ⚙️ **Nog geen rolluiken geconfigureerd.**

        Koppel je rolluiken via **CloudEMS → Configureren → Rolluiken**.
        {%- else -%}
        | Rolluik | Pos | Status | Automaat | Beslissing | Reden |
        |---|:---:|:---:|:---:|:---:|:---|
        {%- for s in shutters %}
        {%- set pos = s.get('position', -1) -%}
        {%- set act = s.get('last_action','') -%}
        {%- set act_lbl = '🔼 Open' if act == 'open' else ('🔽 Dicht' if act == 'close' else '⏸ Idle') -%}
        {%- set auto_lbl = '🟢 AAN' if s.get('auto_enabled', true) else '🔴 UIT' %}
        | **{{ s.get('label','?') }}** | {{ pos ~ '%' if pos >= 0 else '—' }} | {{ act_lbl }} | {{ auto_lbl }} | {{ s.get('decision','—') }} | {{ s.get('reason','—') }} |
        {%- endfor %}

        _Oriëntatie wordt automatisch geleerd via temperatuur- en zoncorrelatie._
        {%- endif -%}
    - type: custom:cloudems-entity-list
      show_empty: false
      card:
        type: entities
        title: 🎮 Handmatige bediening
        show_header_toggle: false
      filter:
        include:
          - entity_id: "button.cloudems_shutter_*"
      sort:
        method: friendly_name

  # ══════════════════════════════════════════════════════════════════════
  # KOLOM 2 — Instellingen, pauze, automaat, oriëntatie
  # ══════════════════════════════════════════════════════════════════════
  - type: vertical-stack
    cards:

    - type: custom:cloudems-chip-card
      primary: >
        {%- set d = state_attr('sensor.cloudems_status','shutters') -%}
        {%- set shutters = d.get('shutters', []) if d else [] -%}
        {%- if shutters | count == 0 -%}Geen rolluiken geconfigureerd
        {%- else -%}{{ shutters | count }} rolluik{% if shutters | count != 1 %}en{% endif %} actief{%- endif -%}
      secondary: >
        {%- set d = state_attr('sensor.cloudems_status','shutters') -%}
        {%- set shutters = d.get('shutters', []) if d else [] -%}
        {%- set auto_on = shutters | selectattr('auto_enabled','eq',true) | list | count -%}
        {%- set auto_off = shutters | selectattr('auto_enabled','eq',false) | list | count -%}
        Automaat: {{ auto_on }} aan{% if auto_off > 0 %}, {{ auto_off }} uitgeschakeld{% endif %}
      icon: mdi:blinds
      icon_color: >
        {%- set d = state_attr('sensor.cloudems_status','shutters') -%}
        {%- set shutters = d.get('shutters', []) if d else [] -%}
        {%- if shutters | selectattr('auto_enabled','eq',false) | list | count > 0 -%}orange{%- elif shutters | selectattr('override_active','eq',true) | list | count > 0 -%}orange{%- else -%}blue{%- endif -%}
    - type: custom:cloudems-entity-list
      show_empty: true
      unique: true
      card:
        type: entities
        title: ⏱️ Override restant
        show_header_toggle: false
      empty_state_content: Geen actieve pauze of override
      filter:
        include:
          - entity_id: "sensor.cloudems_rolluik_*_override_restant"
        exclude:
          - entity_id: "sensor.cloudems_rolluik_*_override_restant"
            state: "00:00:00"
          - entity_id: "sensor.cloudems_rolluik_*_override_restant"
            state: unavailable
          - entity_id: "sensor.cloudems_rolluik_*_override_restant"
            state: unknown
      sort:
        method: state
        reverse: true
    - type: custom:cloudems-entity-list
      show_empty: true
      card:
        type: entities
        title: ⏰ Tijden & setpoint
        show_header_toggle: false
      empty_state_content: Tijden worden geladen na herstart
      filter:
        include:
          - entity_id: "text.cloudems_rolluik_*"
          - entity_id: "number.cloudems_rolluik_*"
          - entity_id: "input_text.cloudems_shutter_*"
          - entity_id: "input_number.cloudems_shutter_*"
      sort:
        method: friendly_name

    - type: custom:cloudems-entity-list
      show_empty: false
      card:
        type: entities
        title: 🤖 Automaat
        show_header_toggle: false
      filter:
        include:
          - entity_id: switch.cloudems_module_rolluiken
          - entity_id: "switch.cloudems_shutter_*_auto"
      sort:
        method: friendly_name

    - type: markdown
      title: "🧭 Oriëntatie & temperatuurleren"
      content: |
        {%- set d = state_attr('sensor.cloudems_status','shutters') -%}
        {%- set sh = (d.get('shutters',[]) if d else []) -%}
        {%- set lrn = (d.get('learner',[]) if d else []) -%}
        {%- if sh | count == 0 -%}
        *Geen rolluiken geconfigureerd.*
        {%- else -%}
        **🧭 Oriëntatie leren**
        | Rolluik | Sensor | Bron | Richting | Zeker? |
        |---------|--------|------|---------|--------|
        {%- for s in sh %}
        {%- set snsr = s.get('temp_sensor','') -%}
        {%- set snm = snsr.split('.')[-1]|replace('_',' ')|title if snsr else '—' -%}
        {%- set bron = 'config' if snsr else 'auto' -%}
        {%- set ori = s.get('orientation_learned','') -%}
        {%- set ol = ori if ori not in ('','onbekend','unknown') else 'leren…' -%}
        {%- set ld = lrn|selectattr('area_id','eq',s.get('area_id','___'))|list -%}
        {%- set smp = ld[0].get('total_samples',0) if ld else 0 -%}
        {%- set cl = '✅' if s.get('orientation_confident',false) else ('🔄 '~smp) %}
        | **{{ s.get('label',s.get('entity_id','')) }}** | {{ snm }} | {{ bron }} | {{ ol }} | {{ cl }} |
        {%- endfor -%}
        {%- endif -%}

  - type: markdown
    content: |
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:4px 2px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:20px;">⚡</span>
          <div>
            <div style="color:rgb(255,255,255);font-weight:600;font-size:13px;line-height:1.3;">CloudEMS v{{ state_attr('sensor.cloudems_status','version') or state_attr('sensor.cloudems_watchdog','cloudems_version') or '?' }}</div>
            <div style="color:rgb(102,102,102);font-size:11px;">cloudems.eu · MIT License</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <a href="https://github.com/cloudemsNL/ha-cloudems/issues/new?template=bug_report.md" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:#1f2937;border:1px solid rgba(239,68,68,0.4);color:#f87171;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;text-decoration:none;">🐛 Bug melden</a>
          <a href="https://github.com/cloudemsNL/ha-cloudems/issues/new?template=feature_request.md" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:#1f2937;border:1px solid rgba(99,102,241,0.4);color:#a5b4fc;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;text-decoration:none;">💡 Feature verzoek</a>
          <a href="https://buymeacoffee.com/smarthost9m" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,rgb(245,158,11),rgb(217,119,6));color:rgb(26,16,0);padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none;">☕ Steun CloudEMS</a>
        </div>
      </div>

