      \ elif s == 'offline' %}\U0001F534 Offline{% elif s == 'error' %}\U0001F7E0 Fout{% elif s == 'timeout' %}\U0001F7E0 Timeout{% else %}⚪ {{ s }}{% endif %} &nbsp;·&nbsp; **NILM:** {% if mode == 'ollama'\
