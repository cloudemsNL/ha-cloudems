- title: Huis Intelligentie
  path: cloudems-huis
  max_columns: 2
  icon: mdi:home-thermometer-outline
  background: "url(/local/cloudems/images/bg-intelligentie.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(128,222,234,0.07) 0%, transparent 60%), rgb(24,24,24)"
  card_mod:
    style: |
      hui-view { padding: 12px 12px 24px !important; }
  cards:
  - type: markdown
    title: 🏠 Aanwezigheidsdetector
    content: |
      {% set o = states('sensor.cloudems_absence_detector') %}
      {% set conf  = state_attr('sensor.cloudems_absence_detector', 'confidence') | float(0) %}
      {% set sb    = state_attr('sensor.cloudems_absence_detector', 'standby_w') | float(0) %}
      {% set vac   = state_attr('sensor.cloudems_absence_detector', 'vacation_hours') | int(0) %}
      {% set adv   = state_attr('sensor.cloudems_absence_detector', 'advice') %}
      {% if o not in ('unavailable','unknown','') %}
      {% if o == 'home' %}🟢 **Thuis** ({{ (conf * 100) | round(0) | int }}% zekerheid)
      {% elif o == 'away' %}🟡 **Afwezig** ({{ (conf * 100) | round(0) | int }}% zekerheid)
      {% elif o == 'vacation' %}✈️ **Vakantie** — {{ vac }} uur afwezig
      {% else %}⏳ **{{ o }}**{% endif %}

      | Gegeven | Waarde |
      |---|---|
      | Modus | {{ o }} |
      | Zekerheid | {{ (conf * 100) | round(0) | int }}% |
      | Standby verbruik | {{ sb | round(0) | int }} W |
      | Vakantie-uren | {{ vac }} |

      {% if adv %}> {{ adv }}{% endif %}
      {% else %}
      ⏳ Aanwezigheidsdetector leert jouw patroon — beschikbaar na ~3 dagen.
      {% endif %}
    card_mod:
      style: |
        ha-card {
          background: rgb(34,34,34) !important;
