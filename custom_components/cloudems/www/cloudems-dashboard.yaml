  cards:
  - type: conditional
    conditions:
      - condition: state
        entity: switch.cloudems_module_ketel
        state: "off"
    card:
      type: markdown
      content: |
        ⚠️ **🚿 Warm Water module staat uit.** Schakel hem in via het [Configuratie tabblad](#cloudems-config) om deze functie te activeren.
      card_mod:
        style: |
          ha-card { background: rgba(255,140,0,0.12) !important; border: 1px solid rgba(255,140,0,0.4) !important; border-radius: 12px !important; padding: 4px 12px !important; }

  - type: markdown
    title: "🚿 Cascade groepen"
    content: |
      {%- set groups = state_attr('sensor.cloudems_boiler_status', 'groups') or [] -%}
      {%- set cascade = state_attr('sensor.cloudems_boiler_status', 'cascade_active') | default(false) -%}
      {%- if not cascade or not groups %}
      *Geen cascade-groepen geconfigureerd.*
      Voeg boilers toe via **Instellingen → CloudEMS → 🚿 Warm Water Cascade**.
      {%- else %}
      {%- for g in groups %}
      {%- set learned = g.get('delivery_learned', false) %}
      {%- set delivery_eid = g.get('delivery_entity', '') %}
      **{{ g.name }}** · {{ g.mode }} · {{ g.active_count }}/{{ g.boiler_count }} actief · gem {{ g.avg_temp_c | default('—') }}°C
      {%- if learned %}
      🎓 Leveringsboiler (eerst warm): **{{ delivery_eid.split('.')[-1] }}**
      {%- else %}
      {%- set learn_data = g.get('learn_status', {}) %}
      {%- set total_events = learn_data.values() | map(attribute='events') | sum %}
      🔍 Leerproces: {{ total_events }}/{{ 5 }} cycli (nog lerende…)
      {%- endif %}

      {%- set season = g.get('season', 'winter') %}
      🌤️ Seizoen: **{{ '☀️ Zomer' if season == 'summer' else '❄️ Winter' }}** · setpoints {{ 'verlaagd' if season == 'summer' else 'normaal' }}

      | Boiler | Temp | Setpoint | Tot Koud | Status |
      |---|---|---|---|---|
      {%- for b in g.boilers %}
      {%- set icon = '🟢' if b.is_on else '⭕' %}
      {%- set temp = (b.temp_c | round(1) | string + '°C') if b.temp_c else ('~' ~ (b.power_w | int | string) ~ 'W') if b.power_w else '—' %}
      {%- set delivery = ' 🚿' if b.is_delivery else '' %}
      {%- set ctrl = ' (' ~ b.get('control_mode','') ~ ')' if b.get('control_mode','switch') != 'switch' else '' %}
      {%- set mtc = b.get('minutes_to_cold') %}
      {%- set cold_str = (mtc | round(0) | int | string + 'm') if mtc is not none and mtc < 120 else ((mtc / 60) | round(1) | string + 'u') if mtc is not none else '—' %}
      {%- set loss = b.get('thermal_loss_c_h', 0) | float(0) %}
      {%- set loss_str = (loss | round(2) | string + '°/u') if loss > 0 else '—' %}
      | {{ b.label }}{{ delivery }} | {{ temp }} | {{ b.setpoint_c | int }}°C | {{ cold_str }} ({{ loss_str }}) | {{ icon }}{{ ctrl }} |
      {%- endfor %}

      {%- endfor %}
      {%- endif %}
    card_mod:
      style: |
        ha-card {
          background: rgb(34,34,34) !important;
          border: 1px solid rgba(255,255,255,0.06) !important;
          border-radius: 16px !important;
          box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;
          --primary-text-color: rgb(255,255,255);
          --secondary-text-color: rgb(163,163,163);
          --state-active-color: rgb(0,177,64);
          --state-inactive-color: rgb(68,68,68);
