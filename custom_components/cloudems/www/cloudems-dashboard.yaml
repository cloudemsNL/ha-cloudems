  - type: markdown
    title: "🌡️ Warmtepomp COP"
    content: |
      {%- set cop = state_attr('sensor.cloudems_warmtepomp_cop', 'cop_report') or {} -%}
      {%- if cop %}
      **COP nu:** {{ cop.cop_current | default('—') }}
      &nbsp;|&nbsp; **bij 7°C:** {{ cop.cop_at_7c | default('—') }}
      &nbsp;|&nbsp; **Methode:** {{ cop.method | default('—') }}
      {%- if cop.degradation_detected %}
      > ⚠️ **Degradatie:** {{ cop.degradation_advice }}
      {%- else %}
      > ✅ COP gezond.
      {%- endif %}
      | Buitentemp | COP |
      |---|---|
      {%- for temp, val in (cop.get('curve') or {}).items() %}
      | {{ temp }}°C | {{ val }} |
      {%- endfor %}
      {%- else %}
      Leert na ~3 uur gebruik.
      {%- endif %}
    card_mod:
      style: |
        ha-card {
          background: rgb(34,34,34) !important;
          border: 1px solid rgba(255,255,255,0.06) !important;
          border-radius: 16px !important;
