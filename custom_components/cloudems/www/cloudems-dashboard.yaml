- title: Lampen
  path: cloudems-lampen
  type: masonry
  max_columns: 1
  icon: "mdi:lightbulb-group"
  background: url(/local/cloudems/images/bg-overzicht.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(255,238,88,0.07) 0%, transparent 60%), rgb(24,24,24)
  card_mod:
    style: "hui-view { padding: 12px 12px 24px !important; }\n"
  cards:
  - *id001
  - type: custom:cloudems-lamp-card
    title: "💡 Lampcirculatie"
  - type: markdown
    title: "🏠 Slimme Verlichting"
    content: >
      {% set la = state_attr('sensor.cloudems_slimme_verlichting_status', 'lamps') or [] %}
      {% set actions = state_attr('sensor.cloudems_slimme_verlichting_status', 'actions') or [] %}
      {% if la | length == 0 %}
      ⚙️ **Nog niet geconfigureerd.** Ga naar Instellingen → CloudEMS → Verbruik → Slimme Verlichting.
      {% else %}
      | Lamp | Ruimte | Modus | Presence |
      |---|---|---|---|
      {% for l in la %}
      | {{ l.label }} | {{ l.area or '—' }} | {{ '🤖 Auto' if l.mode == 'auto' else ('💬 Semi' if l.mode == 'semi' else '👋 Handmatig') }} | {{ '✅' if l.has_presence else '—' }} |
      {% endfor %}
      {% if actions | length > 0 %}

      **Laatste acties:**
      {% for a in actions[-5:] | reverse %}
      - {{ '💡' if a.action == 'on' else '🌙' }} **{{ a.label }}** {{ 'aan' if a.action == 'on' else 'uit' }} — *{{ a.reason }}* ({{ a.mode }})
      {% endfor %}
      {% endif %}
      {% endif %}
- title: ERE Certificaten
  path: cloudems-ere
  type: masonry
  max_columns: 2
  icon: "mdi:certificate-outline"
  background: url(/local/cloudems/images/bg-ere.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(165,214,167,0.07) 0%, transparent 60%), rgb(24,24,24)
  card_mod:
    style: "hui-view { padding: 12px 12px 24px !important; }\n"
  cards:
  - *id001
  - type: conditional
    conditions:
    - condition: state
      entity: switch.cloudems_module_ere
      state: 'off'
    card:
      type: markdown
      content: "⚠️ **\U0001F4CB ERE Certificaten module staat uit.** Schakel hem in via het [Configuratie tabblad](#cloudems-config) om deze functie te activeren.\n"
      card_mod:
        style: "ha-card { background: rgba(255,140,0,0.12) !important; border: 1px solid rgba(255,140,0,0.4) !important; border-radius: 12px !important; padding: 4px 12px !important; }\n"
  - type: conditional
    conditions:
    - condition: state
      entity: sensor.cloudems_ev
      state_not: unavailable
    - condition: state
      entity: sensor.cloudems_ev
      state_not: unknown
    card:
      type: markdown
      title: 🏆 ERE Certificaten — Jaaroverzicht
      content: "{% set ere = state_attr('sensor.cloudems_ev', 'ere') or {} %}\n{% set jaar = ere.get('jaar', {}) %}\n{% set proj = ere.get('projectie_jaar', {}) %}\n{% set advs = ere.get('laad_advies',\
        \ {}) %}\n{% set adv_icons = {'solar':'☀️','nu_laden':'⚡','wachten':'⏳','onbekend':'❓'} %}\n\n{% if ere.get('heeft_mid_meter') %}✅ **MID-laadpaal gekoppeld** — ERE-registratie actief\n{% else %}⚠️\
        \ **Geen MID-laadpaal geconfigureerd** — Voeg `ere_charger_entities` toe in CloudEMS opties{% endif %}\n{% if ere.get('heeft_groencontract') %}\U0001F331 Groenstroomcontract geregistreerd (100%\
        \ hernieuwbaar){% endif %}\n\n---\n**Dit jaar ({{ now().year }})**\n| Meting | Waarde |\n|---|---|\n| Geladen | **{{ jaar.get('kwh','—') }} kWh** |\n| ERE's verdiend | **{{ jaar.get('ere','—') }}\
        \ kg CO₂** |\n| Netto opbrengst | **€{{ jaar.get('opbrengst_eur','—') }}** |\n| Gem. hernieuwbaar | {{ jaar.get('avg_renewable_pct','—') }}% |\n| Solar-sessies | {{ jaar.get('solar_sessies','—')\
        \ }}× |\n| Laadsessies | {{ jaar.get('sessies','—') }}× |\n\n**Projectie volledig jaar:**\n~{{ proj.get('kwh',0) | int(0) }} kWh → ~{{ proj.get('ere',0) | int(0) }} ERE's → **€{{ proj.get('opbrengst_eur',0)\
        \ | int(0) }}** netto\n\n---\n{{ adv_icons.get(advs.get('advies',''),'❓') }} **Nu laden:** {{ advs.get('advies','—') | replace('_',' ') | title }}\n*{{ advs.get('reden','—') }}*\n{% if advs.get('ere_per_kwh')\
        \ %}Huidige ERE-waarde: {{ advs.ere_per_kwh }} ERE/kWh = €{{ advs.netto_per_kwh }} netto{% endif %}\n"
    card_mod:
      style: "ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }\n"
  - type: markdown
    title: 📊 Kwartaal & Maand Breakdown
    content: "{% set ere = state_attr('sensor.cloudems_ev', 'ere') or {} %}\n{% set kw  = ere.get('kwartaal', {}) %}\n{% set mnd = ere.get('maand', {}) %}\n{% set tot = ere.get('totaal', {}) %}\n\n**Huidig\
      \ kwartaal**\n{{ kw.get('kwh','—') }} kWh → {{ kw.get('ere','—') }} ERE → **€{{ kw.get('opbrengst_eur','—') }}**\n({{ kw.get('avg_renewable_pct','—') }}% hernieuwbaar, {{ kw.get('solar_sessies','—')\
      \ }} solar-sessies)\n\n**Deze maand**\n{{ mnd.get('kwh','—') }} kWh → {{ mnd.get('ere','—') }} ERE → **€{{ mnd.get('opbrengst_eur','—') }}**\n\n**Totaal (alle tijd)**\n{{ tot.get('kwh','—') }} kWh\
      \ → {{ tot.get('ere','—') }} ERE → **€{{ tot.get('opbrengst_eur','—') }}** netto cumulatief\n\n---\n*ERE-prijs: €{{ ere.get('ere_prijs_eur','0.40') }}/ERE | Inboekfee: {{ ere.get('inboekfee_pct','20')\
      \ }}% (via Laadloon, FincoEnergies, Den Hartog etc.)*\n*Meld je aan voor mei 2026 bij een inboekdienstverlener. Vergoeding met terugwerkende kracht.*\n"
    card_mod:
      style: "ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }\n"
  - type: markdown
    title: 🔧 ERE Setup & Configuratie
    content: "**Wat heb je nodig voor ERE-registratie:**\n\n| Vereiste | Status |\n|---|---|\n| MID-gecertificeerde laadpaal | {% set ere = state_attr('sensor.cloudems_ev','ere') or {} %}{{ '✅ Actief' if\
      \ ere.get('heeft_mid_meter') else '❌ Niet geconfigureerd' }} |\n| Registratie inboekdienstverlener | \U0001F517 Handmatig (voor mei 2026) |\n| Jaarlijkse kWh-rapportage | ✅ CloudEMS genereert automatisch\
      \ |\n\n**MID-laadpalen met HA-integratie (aanbevolen):**\n- **Zaptec Go 2** — `sensor.*_energy` — OCPP of Zaptec-integratie\n- **Alfen Single Pro-line** — `sensor.*_meter_value`\n- **Smappee EV Wall**\
      \ — `sensor.*_session_kwh`\n- **Ohme Home Pro** — MID + HA-integratie\n\n\U0001F4A1 *Configureer via CloudEMS opties → ERE & Laadpaal: voeg je MID-meter sensor toe als `ere_charger_entities`.*\n\n\
      **Inboekdienstverleners (NL 2026):**\n[Laadloon](https://laadloon.nl) · [FincoEnergies/Goodpower](https://fincogreen.nl) · [Den Hartog Zero Emission](https://denhartogbv.com) · [Voltico](https://voltico.nl)\n\
      Vergoeding na aftrek fee: **€0.03–€0.10/kWh** (afhankelijk van marktprijs en hernieuwbaarheid)\n\n**ERE-rekenregel (officieel NEa):**\n`ERE = kWh × hernieuwbaar% × 0.6588 kg CO₂/kWh`\n"
    card_mod:
      style: "ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }\n"
  - type: markdown
    content: "<div style=\"display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:4px 2px;\">\n  <div style=\"display:flex;align-items:center;gap:10px;\">\n    <span\
