title: ⚡ CloudEMS
resources:
  - url: /local/cloudems/cloudems-cards.js?v=4.5.101
    type: module
  - url: /local/cloudems/cloudems-card-mod.js
    type: module
views:
- title: Overzicht
  path: cloudems-overzicht
  max_columns: 2
  icon: mdi:home-lightning-bolt
  background: "url(/local/cloudems/images/bg-overzicht.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(0,177,64,0.08) 0%, transparent 60%), rgb(24,24,24)"
  card_mod:
    style: |
      hui-view {
        padding: 12px 12px 24px !important;
      }
  cards:
  - type: conditional
    conditions:
    - condition: numeric_state
      entity: sensor.cloudems_actieve_meldingen
      above: 0
    card:
      type: markdown
      title: 🔔 Actieve Meldingen
      content: |
        {% set n = state_attr('sensor.cloudems_actieve_meldingen', 'active_alerts') or [] %}
        {% for a in n[:3] %}
        {% if a.priority == 'critical' %}🔴{% elif a.priority == 'warning' %}🟡{% else %}🔵{% endif %} **{{ a.title }}** — {{ a.message }}
        {% endfor %}
        {% if n | length > 3 %}*...en {{ n | length - 3 }} meer. Zie tabblad Meldingen.*{% endif %}
      style: |
        ha-card {
          background: linear-gradient(135deg, rgb(45,21,21) 0%, rgb(61,31,31) 100%);
          border-left: 4px solid rgb(231,76,60);
          border-radius: 10px;
        }
      card_mod:
        style: |
          ha-card {
            background: rgb(34,34,34) !important;
            border: 1px solid rgba(255,255,255,0.06) !important;
            border-radius: 16px !important;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;
            --primary-text-color: rgb(163,163,163);
            --secondary-text-color: rgb(102,102,102);
            --primary-color: rgb(0,177,64);
            --card-background-color: transparent;
            --ha-card-border-color: transparent;
          }
          ha-card:hover {
            border-color: rgba(0,177,64,0.5) !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 16px rgba(0,177,64,0.12) !important;
            transform: translateY(-1px) !important;
          }
          .card-header {
            background: transparent !important;
            border-bottom: 1px solid rgba(255,255,255,0.07) !important;
            color: rgb(255,255,255) !important;
            font-size: 12px !important;
            font-weight: 600 !important;
            padding: 14px 16px 12px !important;
          }
          ha-markdown-element table { width: 100% !important; border-collapse: collapse !important; }
          ha-markdown-element th {
            background: rgba(0,177,64,0.1) !important;
            color: rgb(0,212,78) !important;
            font-size: 10px !important;
            font-weight: 700 !important;
            letter-spacing: 0.08em !important;
            text-transform: uppercase !important;
            padding: 8px 10px !important;
            border-bottom: 1px solid rgba(0,177,64,0.2) !important;
          }
          ha-markdown-element td {
            color: rgb(163,163,163) !important;
            border-bottom: 1px solid rgba(255,255,255,0.05) !important;
            padding: 7px 10px !important;
          }
          ha-markdown-element tr:hover td {
            background: rgba(0,177,64,0.06) !important;
            color: rgb(255,255,255) !important;
          }
          ha-markdown-element strong { color: rgb(255,255,255) !important; font-weight: 600 !important; }
          ha-markdown-element em { color: rgb(102,102,102) !important; }
          ha-markdown-element code {
            background: rgba(0,177,64,0.12) !important;
            color: rgb(0,212,78) !important;
            padding: 1px 6px !important;
            border-radius: 4px !important;
            font-size: 12px !important;
          }
          ha-markdown-element blockquote {
            border-left: 3px solid rgb(0,177,64) !important;
            background: rgba(0,177,64,0.07) !important;
            padding: 8px 14px !important;
            border-radius: 0 8px 8px 0 !important;
            color: rgb(163,163,163) !important;
          }
  - type: custom:cloudems-flow-card
    title: ⚡ Energiestroom
    entities:
      grid:
        entity: sensor.cloudems_grid_net_power
        name: Net
        invert_state: false
      solar:
        entity: sensor.cloudems_solar_system_intelligence
        name: Zonne-energie
        display_zero_state: true
      battery:
        entity: sensor.thuisbatterij_power
        name: Batterij
        state_of_charge: sensor.thuisbatterij_percentage
        display_zero_state: true
        invert_state: true
      home:
        entity: sensor.cloudems_home_rest
        name: Thuis
        display_zero_state: true
    watt_threshold: 1000
    clickable_entities: true
    display_zero_lines: true
    use_new_flow_rate_model: true
  - type: markdown
    title: "⚡ Live overzicht"
    content: |
      {%- set import_w  = states('sensor.cloudems_grid_import_power')  | float(0) | round(0) | int -%}
      {%- set export_w  = states('sensor.cloudems_grid_export_power')  | float(0) | round(0) | int -%}
      {%- set pv_w      = states('sensor.cloudems_solar_system_intelligence') | float(0) | round(0) | int -%}
      {%- set dagtype   = states('sensor.cloudems_dag_type_classificatie') -%}
      {%- set flex_kw   = states('sensor.cloudems_flexibel_vermogen')  | float(0) | round(2) -%}
      {%- set thuis     = states('binary_sensor.cloudems_aanwezigheid_op_basis_van_stroom') -%}
      {%- set prijs     = states('sensor.cloudems_energy_price_current_hour') | float(none) -%}
      {%- set zelfcons  = states('sensor.cloudems_pv_zelfconsumptiegraad') | float(0) | round(1) -%}
      {%- set kosten    = states('sensor.cloudems_energy_cost') -%}
      | | | |
      |---|---|---|
      | 🔌 **Afname** | **{{ import_w }} W** | |
      | ⬆️ **Teruglevering** | **{{ export_w }} W** | |
      | ☀️ **Zon PV** | **{{ pv_w }} W** | |
      | 📅 Dagtype | {{ dagtype }} | |
      | ⚡ Flex vermogen | {{ flex_kw }} kW | |
      | 🏠 Aanwezig | {{ '✅ Ja' if thuis == 'on' else '❌ Nee' }} | |
      | 💶 Prijs nu | {{ ((prijs * 100) | round(2) | string ~ ' ct/kWh') if prijs is not none else '—' }} | |
      | 🔁 Zelfconsumptie | {{ zelfcons }} % | |
      | 💰 Kosten vandaag | {{ kosten }} | |
    card_mod:
      style: |
        ha-card {
          background: rgb(34,34,34) !important;
          border: 1px solid rgba(255,255,255,0.06) !important;
          border-radius: 16px !important;
          box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;
          --primary-text-color: rgb(255,255,255);
          --secondary-text-color: rgb(163,163,163);
          --primary-color: rgb(0,177,64);
          --card-background-color: transparent;
          --ha-card-border-color: transparent;
        }
        ha-card:hover {
          border-color: rgba(0,177,64,0.5) !important;
          box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 16px rgba(0,177,64,0.12) !important;
          transform: translateY(-1px) !important;
        }
        .card-header {
          background: transparent !important;
          border-bottom: 1px solid rgba(255,255,255,0.07) !important;
          color: rgb(255,255,255) !important;
          font-size: 12px !important;
          font-weight: 600 !important;
          padding: 14px 16px 12px !important;
        }
        ha-markdown-element table { width: 100% !important; border-collapse: collapse !important; }
        ha-markdown-element td, ha-markdown-element th {
          padding: 5px 8px !important;
          border-bottom: 1px solid rgba(255,255,255,0.05) !important;
          font-size: 13px !important;
        }
        ha-markdown-element th { color: rgb(163,163,163) !important; font-size: 11px !important; font-weight:600 !important; }

  - type: custom:cloudems-graph-card
    name: ⚡ Import · Export (24u)
    entities:
    - entity: sensor.cloudems_grid_import_power
      name: Import
      color: 'rgb(231,76,60)'
    - entity: sensor.cloudems_grid_export_power
      name: Export
      color: 'rgb(46,204,113)'
    hours_to_show: 24
    points_per_hour: 4
    line_width: 2
    show:
      extrema: true
      average: true
  - type: markdown
    title: 📊 Verbruik Vandaag per Categorie
    content: |
      {% set c = state_attr('sensor.cloudems_verbruik_categorien', 'pie_data') or [] %}
      {% set total = state_attr('sensor.cloudems_verbruik_categorien', 'total_kwh_today') or 0 %}
      {% set total_w = state_attr('sensor.cloudems_verbruik_categorien', 'total_w_now') or 0 %}
      {% set insight = state_attr('sensor.cloudems_verbruik_categorien', 'dominant_insight') or '' %}
      {% set batt_dev = state_attr('sensor.cloudems_nilm_running_devices','devices') | selectattr('device_type','eq','battery') | list %}
      {% set batt_w = batt_dev[0].current_power | int if batt_dev | length > 0 else 0 %}
      {% if c | length == 0 %}
      *Categorieën worden opgebouwd gedurende de dag.*
      {% else %}
      **Totaal huisverbruik: {{ total | round(1) }} kWh** *(batterijladen niet meegerekend)*

      | Categorie | Nu | Vandaag | % |
      |-----------|-----|---------|---|
      {% for cat in c -%}
      | {{ cat.name }} | {{ cat.w_now | int }} W | {{ cat.kwh }} kWh | {{ cat.pct }}% |
      {% endfor %}
      {% if batt_w > 50 %}| 🔋 Opslag (batterij) | {{ batt_w }} W | — | — |{% endif %}

      *{{ insight }}*
      {% endif %}
