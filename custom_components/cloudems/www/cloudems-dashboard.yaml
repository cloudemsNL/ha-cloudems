    content: "CloudEMS detecteert automatisch problemen en meldt via:\n\n- **HA Persistent Notifications** (sidebar): altijd actief\n- **Mobiele push** (optioneel): stel `notification_service` in via CloudEMS\
      \ configuratie\n\n**Prioriteiten:**\n\U0001F534 Kritiek → direct + herinnering na 6u\n\U0001F7E1 Waarschuwing → maximaal 1× per dag\n\U0001F535 Info → gebundeld in avonddigest (20:00)\n\nDempen: gebruik\
      \ `cloudems.mute_alert` service met de alert-key als parameter.\n"
