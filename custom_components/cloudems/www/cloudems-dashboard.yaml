      {% set mode   = states('sensor.cloudems_climate_preheat') %}
      {% set offset = state_attr('sensor.cloudems_climate_preheat', 'setpoint_offset_c') | float(0) %}
      {% set reason = state_attr('sensor.cloudems_climate_preheat', 'reason') %}
