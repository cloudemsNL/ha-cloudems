      {% set advies = state_attr('sensor.cloudems_goedkoopste_warmtebron', 'recommendation') | default('') %}

      {% if s in ('unavailable', 'unknown', 'none', '') or s == None %}
      *⏳ Sensor nog niet beschikbaar — wacht op eerste data...*
      {% else %}

      {% if s == 'elektriciteit' %}
      🟢 **Elektriciteit is goedkoper dan gas**
      {% elif s == 'gas' %}
      🔵 **Gas is goedkoper dan elektriciteit**
      {% else %}
      🟡 **Elektriciteit en gas zijn nagenoeg even duur**
      {% endif %}

      | Verwarmingsbron | €/kWh warmte | Goedkoopst? |
      |---|---|:---:|
      | ⛽ Gas via CV (90% eff.) | {{ gas | float(0) | round(4) }} | {{ '✅' if s == 'gas' else '' }} |
      | ⚡ Elektrische boiler (resistief) | {{ boiler | float(0) | round(4) }} | {{ '✅' if s == 'elektriciteit' and bron == 'elektrische_boiler' else '' }} |
      {% if has_hp %}| 🌡️ Warmtepomp (COP {{ state_attr('sensor.cloudems_goedkoopste_warmtebron', 'heat_pump_cop') | default('?') }}) | {{ hp | float(0) | round(4) }} | {{ '✅' if s == 'elektriciteit' and bron == 'warmtepomp' else '' }} |
      {% endif %}

      > {{ advies }}

      **Huidige stroomprijs:** {{ elec | float(0) | round(4) }} €/kWh
      {% endif %}
