- title: Prijzen & Kosten
  path: cloudems-prijzen
  max_columns: 2
  icon: mdi:currency-eur
  background: "url(/local/cloudems/images/bg-prijzen.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(240,192,64,0.07) 0%, transparent 60%), rgb(24,24,24)"
  card_mod:
    style: |
      hui-view { padding: 12px 12px 24px !important; }
  cards:
  - type: markdown
    title: "💶 Uurprijzen"
    content: |
      {%- set ep   = 'sensor.cloudems_energy_epex_today' -%}
      {%- set curr = state_attr(ep, 'current_price_display') | float(none) -%}
      {%- set prev = state_attr(ep, 'prev_hour_price') | float(none) -%}
      {%- set nxt_list = state_attr(ep, 'next_hours') or [] -%}
      {%- set nxt  = nxt_list[0].price | float(none) if nxt_list | length > 0 else none -%}
      {%- set mn   = state_attr(ep, 'min_today') | float(none) -%}
      {%- set avg  = state_attr(ep, 'avg_today') | float(none) -%}
      {%- set mx   = state_attr(ep, 'max_today') | float(none) -%}
      {%- macro ct(v) -%}{{ (v * 100) | round(2) | string ~ ' ct/kWh' if v is not none else '—' }}{%- endmacro -%}
      {%- macro arrow(a,b) -%}{{ '📈' if b is not none and a is not none and b > a else ('📉' if b is not none and a is not none and b < a else '') }}{%- endmacro -%}
      {%- set price_lbl = state_attr(ep, 'price_label') or 'Prijs incl. belasting' -%}
      | | {{ price_lbl }} | |
      |---|---|---|
      | 🕐 Vorig uur | {{ ct(prev) }} | |
      | ⚡ **Nu** | **{{ ct(curr) }}** | {{ arrow(prev, curr) }} |
      | 🕑 Volgend uur | {{ ct(nxt) }} | {{ arrow(curr, nxt) }} |
      | | | |
      | 📉 Min vandaag | {{ ct(mn) }} | |
      | 📊 Gem vandaag | {{ ct(avg) }} | |
      | 📈 Max vandaag | {{ ct(mx) }} | |
    card_mod:
      style: |
        ha-card {
          background: rgb(34,34,34) !important;
          border: 1px solid rgba(255,255,255,0.06) !important;
          border-radius: 16px !important;
          box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;
          --primary-text-color: rgb(255,255,255);
          --secondary-text-color: rgb(163,163,163);
          --primary-color: rgb(0,177,64);
          --card-background-color: transparent;
          --ha-card-border-color: transparent;
        }
        ha-card:hover {
          border-color: rgba(0,177,64,0.5) !important;
          box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 16px rgba(0,177,64,0.12) !important;
          transform: translateY(-1px) !important;
        }
        .card-header {
          background: transparent !important;
          border-bottom: 1px solid rgba(255,255,255,0.07) !important;
          color: rgb(255,255,255) !important;
          font-size: 12px !important;
          font-weight: 600 !important;
          letter-spacing: 0.04em !important;
          padding: 14px 16px 12px !important;
        }
        ha-markdown-element table { width: 100% !important; }
        ha-markdown-element td, ha-markdown-element th {
          padding: 6px 8px !important;
          border-bottom: 1px solid rgba(255,255,255,0.06) !important;
          font-size: 13px !important;
        }
        ha-markdown-element th { color: rgb(163,163,163) !important; font-weight: 600 !important; }
