views:
- title: Overzicht
  path: cloudems-overzicht
  type: sections
  max_columns: 2
  icon: "mdi:home-lightning-bolt"
  background: url(/local/cloudems/images/bg-overzicht.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(0,177,64,0.08) 0%, transparent 60%), rgb(24,24,24)
  card_mod:
    style: "hui-view {\n  padding: 12px 12px 24px !important;\n}\n"
  sections:
  - type: grid
    column_span: 1
    cards:
    - type: "custom:cloudems-flow-card"
      title: ⚡ Energiestroom
      entities:
        grid:
          entity: sensor.cloudems_grid_net_power
          name: Net
          invert_state: false
        solar_system:
          entity: sensor.cloudems_solar_system
        solar:
          entity: sensor.cloudems_solar_system_intelligence
          name: Zonne-energie
          display_zero_state: true
        battery:
          entity: sensor.thuisbatterij_power
          name: Batterij
          state_of_charge: sensor.thuisbatterij_percentage
          display_zero_state: true
          invert_state: true
        home:
          entity: sensor.cloudems_home_rest
          name: Thuis
          display_zero_state: true
      watt_threshold: 1000
      clickable_entities: true
      display_zero_lines: true
      use_new_flow_rate_model: true
  - type: grid
    column_span: 1
    cards:
    - type: "custom:cloudems-home-card"
      max_ampere: 25
  cards:
  - &id001
    type: "custom:cloudems-mini-price-card"
- title: Beslissingen
  path: cloudems-beslissingen
  type: masonry
  max_columns: 1
  icon: "mdi:history"
  background: radial-gradient(ellipse 70% 50% at 50% -10%, rgba(100,100,255,0.08) 0%, transparent 60%), rgb(24,24,24)
  card_mod:
    style: "hui-masonry-view {\n  background: radial-gradient(ellipse 70% 50% at 50% -10%, rgba(100,100,255,0.08) 0%, transparent 60%), rgb(24,24,24) !important;\n}\n"
  cards:
  - *id001
  - type: "custom:cloudems-decisions-card"
- title: Prijzen & Kosten
  path: cloudems-prijzen
  type: masonry
  max_columns: 1
  icon: "mdi:currency-eur"
  background: radial-gradient(ellipse 70% 50% at 50% -10%, rgba(134,239,172,0.07) 0%, transparent 60%), rgb(24,24,24)
  card_mod:
    style: "hui-view { padding: 12px 12px 24px !important; }\n"
  cards:
  - *id001
  - type: "custom:cloudems-gas-card"
    title: Gas
  - type: "custom:cloudems-prijsverloop-card"
    title: Stroom prijzen & kosten
- title: Solar & PV
  path: cloudems-zon
  type: masonry
  max_columns: 2
  icon: "mdi:solar-power-variant"
  background: url(/local/cloudems/images/bg-solar.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(255,204,0,0.07) 0%, transparent 60%), rgb(24,24,24)
  card_mod:
    style: "hui-view { padding: 12px 12px 24px !important; }\n"
  cards:
  - *id001
  - type: conditional
    conditions:
    - condition: state
      entity: switch.cloudems_module_solar_learner
      state: 'off'
    card:
      type: markdown
      content: "⚠️ **\U0001F50B Batterij module staat uit.** Schakel hem in via het [Configuratie tabblad](#cloudems-config) om deze functie te activeren.\n"
      card_mod:
        style: "ha-card { background: rgba(255,140,0,0.12) !important; border: 1px solid rgba(255,140,0,0.4) !important; border-radius: 12px !important; padding: 4px 12px !important; }\n"
  - type: "custom:cloudems-solar-card"
    title: Zonnepanelen
  - type: conditional
    conditions:
    - condition: numeric_state
      entity: sensor.cloudems_clipping_voorspelling_morgen
      above: 0.05
    card:
      type: markdown
      title: ⚡ Clipping verwacht morgen
      content: "{% set forecasts = state_attr('sensor.cloudems_clipping_voorspelling_morgen', 'forecasts') or [] %}\n{% set total = state_attr('sensor.cloudems_clipping_voorspelling_morgen', 'total_clipped_kwh')\
        \ or 0 %}\n**Totaal verwacht geclipte energie morgen: {{ total }} kWh**\n\n{% for f in forecasts if f.predicted_clip_kwh > 0.05 %}\n\U0001F536 **{{ f.advice }}**\n{% endfor %}\n\n\U0001F4A1 *Tip:\
        \ laad de batterij vóór de clippinguren volledig op om geclipte energie optimaal te benutten.*\n"
  - type: conditional
    conditions:
    - condition: state
      entity: switch.cloudems_module_batterij
      state: 'off'
    card:
      type: markdown
      content: "⚠️ **\U0001F50B Batterij module staat uit.** Schakel hem in via het [Configuratie tabblad](#cloudems-config) om deze functie te activeren.\n"
      card_mod:
        style: "ha-card { background: rgba(255,140,0,0.12) !important; border: 1px solid rgba(255,140,0,0.4) !important; border-radius: 12px !important; padding: 4px 12px !important; }\n"
- path: cloudems-batterij
  title: 🔋
  cards:
  - type: "custom:cloudems-mini-price-card"
  - type: conditional
    conditions:
    - condition: state
      entity: switch.cloudems_module_batterij
      state: 'off'
    card:
      type: markdown
      content: "⚠️ **\U0001F50B Batterij module staat uit.** Schakel hem in via het [Configuratie tabblad](#cloudems-config) om deze functie te activeren.\n"
      card_mod:
        style: "ha-card { background: rgba(255,140,0,0.12) !important; border: 1px solid rgba(255,140,0,0.4) !important; border-radius: 12px !important; padding: 4px 12px !important; }\n"
  - type: "custom:cloudems-battery-card"
    title: Thuisbatterij
- title: NILM Apparaten
  path: cloudems-nilm
  type: masonry
  max_columns: 2
  icon: "mdi:chip"
  background: url(/local/cloudems/images/bg-nilm.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(206,147,216,0.07) 0%, transparent 60%), rgb(24,24,24)
  card_mod:
    style: "hui-view { padding: 12px 12px 24px !important; }\n"
  cards:
  - *id001
  - type: horizontal-stack
    cards:
    - type: button
      name: Bevestigen
      icon: "mdi:check-circle"
      icon_height: 28px
      show_state: false
      tap_action:
        action: perform-action
        perform_action: button.press
        data:
          entity_id: button.cloudems_nilm_review_confirm
      card_mod:
        style: "ha-card { background: rgba(0,177,64,0.15) !important; border: 1px solid rgba(0,177,64,0.4) !important; border-radius: 14px !important; --primary-text-color: rgb(0,212,78); --paper-item-icon-color:\
          \ rgb(0,212,78); --card-background-color: transparent; }\n"
    - type: button
      name: Afwijzen
      icon: "mdi:close-circle"
      icon_height: 28px
      show_state: false
      tap_action:
        action: perform-action
        perform_action: button.press
        data:
          entity_id: button.cloudems_nilm_review_dismiss
      card_mod:
        style: "ha-card { background: rgba(220,50,50,0.12) !important; border: 1px solid rgba(220,50,50,0.35) !important; border-radius: 14px !important; --primary-text-color: rgb(240,100,100); --paper-item-icon-color:\
          \ rgb(240,100,100); --card-background-color: transparent; }\n"
    - type: button
      name: Weet ik niet
      icon: "mdi:help-circle"
      icon_height: 28px
      show_state: false
      tap_action:
        action: perform-action
        perform_action: button.press
        data:
          entity_id: button.cloudems_nilm_review_maybe
      card_mod:
        style: "ha-card { background: rgba(250,190,40,0.12) !important; border: 1px solid rgba(250,190,40,0.35) !important; border-radius: 14px !important; --primary-text-color: rgb(250,210,80); --paper-item-icon-color:\
          \ rgb(250,210,80); --card-background-color: transparent; }\n"
    - type: button
      name: Vorige
      icon: "mdi:skip-previous-circle"
      icon_height: 28px
      show_state: false
      tap_action:
        action: perform-action
        perform_action: button.press
        data:
          entity_id: button.cloudems_nilm_review_previous
      card_mod:
        style: "ha-card { background: rgba(100,100,100,0.12) !important; border: 1px solid rgba(100,100,100,0.3) !important; border-radius: 14px !important; --primary-text-color: rgb(163,163,163); --paper-item-icon-color:\
          \ rgb(163,163,163); --card-background-color: transparent; }\n"
    - type: button
      name: Volgende
      icon: "mdi:skip-next-circle"
      icon_height: 28px
      show_state: false
      tap_action:
        action: perform-action
        perform_action: button.press
        data:
          entity_id: button.cloudems_nilm_review_skip
      card_mod:
        style: "ha-card { background: rgba(100,100,100,0.12) !important; border: 1px solid rgba(100,100,100,0.3) !important; border-radius: 14px !important; --primary-text-color: rgb(163,163,163); --paper-item-icon-color:\
          \ rgb(163,163,163); --card-background-color: transparent; }\n"
  - type: markdown
    title: 🔍 NILM Filter Status
    content: "{% set d = state_attr('sensor.cloudems_nilm_diagnostics', 'adaptive_threshold') %}\n{% set ramp = state_attr('sensor.cloudems_nilm_diagnostics', 'batt_ramp_mask_active') %}\n{% set ramp_s\
      \ = state_attr('sensor.cloudems_nilm_diagnostics', 'batt_ramp_mask_remaining_s') | float(0) %}\n{% set inputs = state_attr('sensor.cloudems_nilm_diagnostics', 'sensor_inputs') %}\n| Parameter | Waarde\
      \ |\n|---|---|\n| Detectiedrempel (adaptief) | {{ state_attr('sensor.cloudems_nilm_diagnostics', 'power_threshold_w') | float(0) | round(1) }} W |\n| Batterij-ramp masker | {% if ramp %}\U0001F534\
      \ actief ({{ ramp_s | round(0) }}s){% else %}\U0001F7E2 inactief{% endif %} |\n| Sensor input L1 | {{ inputs.L1 if inputs and inputs.L1 else '—' }} |\n| Sensor input L2 | {{ inputs.L2 if inputs and\
      \ inputs.L2 else '—' }} |\n| Sensor input L3 | {{ inputs.L3 if inputs and inputs.L3 else '—' }} |\n"
    card_mod:
      style: "ha-card {\n  background: rgb(34,34,34) !important;\n  border: 1px solid rgba(255,255,255,0.06) !important;\n  border-radius: 16px !important;\n  box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;\n\
        \  --primary-text-color: rgb(163,163,163);\n  --primary-color: rgb(0,177,64);\n  --card-background-color: transparent;\n  --ha-card-border-color: transparent;\n}\nha-card:hover {\n  border-color:\
        \ rgba(0,177,64,0.5) !important;\n  box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 16px rgba(0,177,64,0.12) !important;\n  transform: translateY(-1px) !important;\n}\n.card-header {\n  background:\
        \ transparent !important;\n  border-bottom: 1px solid rgba(255,255,255,0.07) !important;\n  color: rgb(255,255,255) !important;\n  font-size: 12px !important;\n  font-weight: 600 !important;\n \
        \ padding: 14px 16px 12px !important;\n}\nha-markdown-element table { width: 100% !important; border-collapse: collapse !important; }\nha-markdown-element th {\n  background: rgba(0,177,64,0.1)\
        \ !important;\n  color: rgb(0,212,78) !important;\n  font-size: 10px !important;\n  font-weight: 700 !important;\n  letter-spacing: 0.08em !important;\n  text-transform: uppercase !important;\n\
        \  padding: 8px 10px !important;\n  border-bottom: 1px solid rgba(0,177,64,0.2) !important;\n}\nha-markdown-element td {\n  color: rgb(163,163,163) !important;\n  border-bottom: 1px solid rgba(255,255,255,0.05)\
        \ !important;\n  padding: 7px 10px !important;\n}\nha-markdown-element strong { color: rgb(255,255,255) !important; }\n"
  - type: markdown
    title: 🔗 Co-occurrence — Gekoppelde Apparaten
    content: "{%- set diag = state_attr('sensor.cloudems_nilm_diagnostics', 'co_occurrence') or {} -%}\n{%- set pairs = diag.get('top_coupled', []) -%}\n{%- set total = diag.get('total_pairs', 0) -%}\n\
      {%- set coupled = diag.get('coupled_pairs', 0) -%}\n{%- set candidate = diag.get('candidate_pairs', 0) -%}\n**{{ coupled }}** gekoppeld · **{{ candidate }}** kandidaat · **{{ total }}** paren totaal\n\
      {%- if pairs %}\n\n| Apparaat A | Apparaat B | Ratio | Events |\n|---|---|---|---|\n{%- for p in pairs %}\n{%- set badge = '\U0001F517' if p.get('coupled') else '\U0001F50D' %}\n| {{ badge }} {{ p.get('device_a','?')\
      \ | replace('_',' ') }} | {{ p.get('device_b','?') | replace('_',' ') }} | {{ (p.get('co_ratio',0)*100) | round(0) | int }}% | {{ p.get('total',0) }} |\n{%- endfor %}\n{%- else %}\n*Nog geen co-occurrence\
      \ data. Verschijnt na ~{{ 6 }} gelijktijdige on-events per paar.*\n{%- endif %}\n"
    card_mod:
      style: "ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(147,112,219,0.25) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; --primary-text-color:\
        \ rgb(163,163,163); --card-background-color: transparent; --ha-card-border-color: transparent; }\nha-card:hover { border-color: rgba(147,112,219,0.5) !important; }\n.card-header { background: transparent\
        \ !important; border-bottom: 1px solid rgba(147,112,219,0.15) !important; color: rgb(255,255,255) !important; font-size: 12px !important; font-weight: 600 !important; padding: 14px 16px 12px !important;\
        \ }\nha-markdown-element table { width: 100% !important; border-collapse: collapse !important; }\nha-markdown-element th { background: rgba(147,112,219,0.1) !important; color: rgb(187,152,255) !important;\
        \ font-size: 10px !important; font-weight: 700 !important; text-transform: uppercase !important; padding: 8px 10px !important; }\nha-markdown-element td { color: rgb(163,163,163) !important; border-bottom:\
        \ 1px solid rgba(255,255,255,0.05) !important; padding: 6px 10px !important; font-size: 12px !important; }\nha-markdown-element strong { color: rgb(255,255,255) !important; }\n"
  - type: horizontal-stack
    cards:
    - type: entity
      entity: sensor.cloudems_nilm_devices
      name: Gevonden
      card_mod:
        style: "ha-card {\n  background: rgb(34,34,34) !important;\n  border: 1px solid rgba(255,255,255,0.06) !important;\n  border-radius: 16px !important;\n  box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;\n\
          \  --primary-text-color: rgb(255,255,255);\n  --secondary-text-color: rgb(163,163,163);\n  --state-active-color: rgb(0,177,64);\n  --state-inactive-color: rgb(68,68,68);\n  --primary-color: rgb(0,177,64);\n\
          \  --accent-color: rgb(0,212,78);\n  --card-background-color: transparent;\n  --ha-card-border-color: transparent;\n}\nha-card:hover {\n  border-color: rgba(0,177,64,0.5) !important;\n  box-shadow:\
          \ 0 4px 20px rgba(0,0,0,0.5), 0 0 16px rgba(0,177,64,0.12) !important;\n  transform: translateY(-1px) !important;\n}\n"
    - type: entity
      entity: sensor.cloudems_nilm_running_devices
      name: Nu actief
      card_mod:
        style: "ha-card {\n  background: rgb(34,34,34) !important;\n  border: 1px solid rgba(255,255,255,0.06) !important;\n  border-radius: 16px !important;\n  box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;\n\
          \  --primary-text-color: rgb(255,255,255);\n  --secondary-text-color: rgb(163,163,163);\n  --state-active-color: rgb(0,177,64);\n  --state-inactive-color: rgb(68,68,68);\n  --primary-color: rgb(0,177,64);\n\
          \  --accent-color: rgb(0,212,78);\n  --card-background-color: transparent;\n  --ha-card-border-color: transparent;\n}\nha-card:hover {\n  border-color: rgba(0,177,64,0.5) !important;\n  box-shadow:\
          \ 0 4px 20px rgba(0,0,0,0.5), 0 0 16px rgba(0,177,64,0.12) !important;\n  transform: translateY(-1px) !important;\n}\n"
    - type: entity
      entity: sensor.cloudems_grid_import_power
      name: Afname (W)
      card_mod:
        style: "ha-card {\n  background: rgb(34,34,34) !important;\n  border: 1px solid rgba(255,255,255,0.06) !important;\n  border-radius: 16px !important;\n  box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;\n\
          \  --primary-text-color: rgb(255,255,255);\n  --secondary-text-color: rgb(163,163,163);\n  --state-active-color: rgb(0,177,64);\n  --state-inactive-color: rgb(68,68,68);\n  --primary-color: rgb(0,177,64);\n\
          \  --accent-color: rgb(0,212,78);\n  --card-background-color: transparent;\n  --ha-card-border-color: transparent;\n}\nha-card:hover {\n  border-color: rgba(0,177,64,0.5) !important;\n  box-shadow:\
          \ 0 4px 20px rgba(0,0,0,0.5), 0 0 16px rgba(0,177,64,0.12) !important;\n  transform: translateY(-1px) !important;\n}\n"
  - type: markdown
    title: 🔌 Nu actief — Fase & Bron
    content: "{% set devs = state_attr('sensor.cloudems_nilm_running_devices','device_list') or state_attr('sensor.cloudems_nilm_running_devices','devices') or [] %}\n{% set active = devs | selectattr('state','eq','on')\
      \ | list if devs | selectattr('state','ne',none) | list | length > 0 else devs %}\n{% if active | length == 0 %}\n*Geen actieve apparaten.*\n{% else %}\n{% set plugs = active | selectattr('source_type','eq','smart_plug')\
      \ | list %}\n{% set nilms  = active | rejectattr('source_type','eq','smart_plug') | list %}\n{% set l1w = active | selectattr('phase','eq','L1') | sum(attribute='power_w') | int %}\n{% set l2w = active\
      \ | selectattr('phase','eq','L2') | sum(attribute='power_w') | int %}\n{% set l3w = active | selectattr('phase','eq','L3') | sum(attribute='power_w') | int %}\n\U0001F535 **{{ l1w }} W** · \U0001F7E1\
      \ **{{ l2w }} W** · \U0001F7E2 **{{ l3w }} W** &nbsp;·&nbsp; \U0001F50C {{ plugs|length }} · \U0001F50D {{ nilms|length }}\n\n| Apparaat | W | Fase | Bron | % |\n|----------|---|------|------|---|\n\
      {% for d in active | sort(attribute='power_w', reverse=true) -%}\n| {{ d.name or d.type }} | {{ d.power_w | int }} | {{ '\U0001F535' if d.phase == 'L1' else '\U0001F7E1' if d.phase == 'L2' else '\U0001F7E2\
      ' if d.phase == 'L3' else '⚫' }} {{ d.phase or '?' }} | {{ '\U0001F50C' if (d.source_type or 'nilm') == 'smart_plug' else '\U0001F50D' }} | {{ '✅' if (d.source_type or 'nilm') == 'smart_plug' else\
      \ ('\U0001F7E2' if d.confidence | int(0) >= 70 else '\U0001F7E1' if d.confidence | int(0) >= 50 else '\U0001F534') }}{% if (d.source_type or 'nilm') != 'smart_plug' %} {{ d.confidence | int(0) }}%{%\
      \ endif %} |\n{% endfor %}\n{% endif %}\n"
    card_mod:
      style: "ha-card {\n  background: rgb(34,34,34) !important;\n  border: 1px solid rgba(255,255,255,0.06) !important;\n  border-radius: 16px !important;\n  box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;\n\
        \  --primary-text-color: rgb(163,163,163);\n  --secondary-text-color: rgb(102,102,102);\n  --primary-color: rgb(0,177,64);\n  --card-background-color: transparent;\n  --ha-card-border-color: transparent;\n\
        }\nha-card:hover {\n  border-color: rgba(0,177,64,0.5) !important;\n  box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 16px rgba(0,177,64,0.12) !important;\n  transform: translateY(-1px) !important;\n\
        }\n.card-header {\n  background: transparent !important;\n  border-bottom: 1px solid rgba(255,255,255,0.07) !important;\n  color: rgb(255,255,255) !important;\n  font-size: 12px !important;\n  font-weight:\
        \ 600 !important;\n  padding: 14px 16px 12px !important;\n}\nha-markdown-element table { width: 100% !important; border-collapse: collapse !important; }\nha-markdown-element th {\n  background:\
        \ rgba(0,177,64,0.1) !important;\n  color: rgb(0,212,78) !important;\n  font-size: 10px !important;\n  font-weight: 700 !important;\n  letter-spacing: 0.08em !important;\n  text-transform: uppercase\
        \ !important;\n  padding: 8px 10px !important;\n  border-bottom: 1px solid rgba(0,177,64,0.2) !important;\n}\nha-markdown-element td {\n  color: rgb(163,163,163) !important;\n  border-bottom: 1px\
        \ solid rgba(255,255,255,0.05) !important;\n  padding: 7px 10px !important;\n}\nha-markdown-element tr:hover td {\n  background: rgba(0,177,64,0.06) !important;\n  color: rgb(255,255,255) !important;\n\
        }\nha-markdown-element strong { color: rgb(255,255,255) !important; font-weight: 600 !important; }\nha-markdown-element em { color: rgb(102,102,102) !important; }\nha-markdown-element code {\n \
        \ background: rgba(0,177,64,0.12) !important;\n  color: rgb(0,212,78) !important;\n  padding: 1px 6px !important;\n  border-radius: 4px !important;\n  font-size: 12px !important;\n}\nha-markdown-element\
