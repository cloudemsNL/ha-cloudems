  - type: markdown
    title: 🚲 E-bikes — Live Status
    content: |
      {% set eb  = state_attr('sensor.cloudems_micro_mobility', 'ebike') or {} %}
      {% set fts = eb.get('fietsen', []) %}
      {% set brand_icons = {'bosch':'🔧','specialized':'⚡','yamaha':'🎵','smartphix':'🇳🇱','generic':'🚲'} %}
      {% if not fts %}
      *Geen e-bikes gevonden. CloudEMS herkent automatisch:*
      - **Bosch**: installeer [hass-bosch-ebike](https://github.com/Phil-Barker/hass-bosch-ebike) via HACS
      - **Specialized Turbo**: installeer [ha-specialized-turbo](https://github.com/JamieMagee/ha-specialized-turbo) via HACS (Bluetooth)
      - **Yamaha / Smartphix / Andere**: configureer via `ebikes:` in CloudEMS opties met losse sensors
      {% else %}
      {% for f in fts %}
      {% set soc = f.soc_pct | int(0) %}
      {% set filled = (soc // 10) | int %}
      {% set bar = '█' * filled + '░' * (10 - filled) %}
      {% set adv_icon = {'solar':'☀️','nu_laden':'⚡','wachten':'⏳','vol':'✅','niet_aanbevolen':'⚠️','onbekend':'❓'}.get(f.charge_advice,'❓') %}
      {% set bi = brand_icons.get(f.brand,'🚲') %}
      ---
      **Accu:** `{{ bar }}` **{{ soc }}%** {% if f.is_charging %}🔌 *laden...*{% endif %}
      {% if f.range_km %}🗺️ Bereik: ~**{{ f.range_km | int }} km**{% endif %} {% if f.minutes_to_full %}· ⏱️ vol over ~{{ f.minutes_to_full | int }} min{% endif %}
      {% if f.temp_c is not none %}🌡️ {{ f.temp_c }}°C {% endif %}{% if f.speed_kmh %}🏃 {{ f.speed_kmh | round(1) }} km/h{% endif %}{% if f.motor_w %}⚙️ {{ f.motor_w | int }}W{% endif %}

      {{ adv_icon }} **{{ f.charge_advice | replace('_',' ') | title }}** — *{{ f.charge_reason }}*
      {% endfor %}{% endif %}
    card_mod:
      style: |
        ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }

  - type: markdown
    title: 🔋 Accu Gezondheid
    content: |
      {% set eb  = state_attr('sensor.cloudems_micro_mobility', 'ebike') or {} %}
      {% set fts = eb.get('fietsen', []) %}
      {% if not fts %}*Nog geen data.*{% else %}
      Ideale dagelijkse oplaadbegrenzing: **80%**. Bewaar accu bij 30-60% in koele omgeving.

      | Fiets | Merk | Cycli | Gezondheid | Effectief | Odometer |
      |---|---|---|---|---|---|
      {% for f in fts %}
      {% set h = f.health_pct | float(100) %}
      {% set hi = '🟢' if h >= 85 else ('🟡' if h >= 70 else '🔴') %}
      {% set eff = (f.battery_wh * h / 100) | int %}
      | **{{ f.name }}** | {{ f.brand }} | {{ f.charge_cycles or '—' }} | {{ hi }} {{ h | round(0) }}% | {{ eff }} Wh | {{ f.odometer_km | int if f.odometer_km else '—' }} km |
      {% endfor %}

      *Degradatiemodellen: Bosch 70% na 500 cycli · Yamaha 70% na 1000 cycli · Specialized: sensor-data*
      {% endif %}
    card_mod:
      style: |
        ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }

  - type: markdown
    title: 🔧 Koppelen & Configureren
    content: |
      CloudEMS detecteert e-bikes automatisch via HA-integraties.
      Laadadvies (solar/goedkoopste uur) werkt voor alle merken gelijk.

      **Automatisch herkend (HACS):**
      | Merk | Integratie | Verbinding |
      |---|---|---|
      | Bosch | [hass-bosch-ebike](https://github.com/Phil-Barker/hass-bosch-ebike) | Cloud (eBike Flow) |
      | Specialized Turbo | [ha-specialized-turbo](https://github.com/JamieMagee/ha-specialized-turbo) | Bluetooth Lokaal |
      | Yamaha | community MQTT-bridge | MQTT |
      | Smartphix | community MQTT-bridge | MQTT/Cloud |

      💡 *Handmatig configureren: CloudEMS opties → E-bikes → voeg sensoren toe per merk (soc, range, charging, temperature, odometer). Werkt met MQTT, ESPHome, Zigbee — elke HA-sensor.*
    card_mod:
      style: |
        ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }

  - type: markdown
