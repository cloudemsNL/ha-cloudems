- title: Zwembad
  path: cloudems-zwembad
  type: masonry
  max_columns: 2
  icon: "mdi:pool"
  background: url(/local/cloudems/images/bg-zwembad.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(41,182,246,0.08) 0%, transparent 60%), rgb(24,24,24)
  card_mod:
    style: "hui-view { padding: 12px 12px 24px !important; }\n"
  cards:
  - *id001
  - type: conditional
    conditions:
    - condition: state
      entity: switch.cloudems_module_zwembad
      state: 'off'
    card:
      type: markdown
      content: "⚠️ **\U0001F3CA Zwembad module staat uit.** Schakel hem in via het [Configuratie tabblad](#cloudems-config) om deze functie te activeren.\n"
      card_mod:
        style: "ha-card { background: rgba(255,140,0,0.12) !important; border: 1px solid rgba(255,140,0,0.4) !important; border-radius: 12px !important; padding: 4px 12px !important; }\n"
  - type: markdown
    title: 🏊 Zwembad — Status & Sturing
    content: "{%- set st = states('sensor.cloudems_zwembad_status') -%}\n{%- set geconfigureerd = st not in ['unavailable','unknown','Niet geconfigureerd',''] -%}\n{%- if not geconfigureerd -%}\n⚙️ **Zwembad\
      \ nog niet geconfigureerd**\n\nKoppel je apparaten via **CloudEMS → Configureren → Zwembad Controller**.\nOndersteunde apparaten: filtreerpomp, warmtepomp, UV/zout installatie, robotreiniger, temperatuursensor.\n\
      {%- else -%}\n{%- set pomp_ok   = states('switch.zwembad_pomp') not in ['unavailable','unknown'] -%}\n{%- set temp_ok   = states('sensor.zwembad_temperatuur') not in ['unavailable','unknown'] -%}\n\
      {%- set wp_ok     = states('switch.zwembad_verwarming') not in ['unavailable','unknown'] -%}\n{%- set uv_ok     = states('switch.zwembad_uv') not in ['unavailable','unknown'] -%}\n{%- set robot_ok\
      \  = states('switch.zwembad_robot') not in ['unavailable','unknown'] -%}\n**Status:** {{ st }}\n\n| Apparaat | Status | Sturing |\n|---|---|---|\n{%- if pomp_ok %}\n| \U0001F504 Filtreerpomp | {{\
      \ '\U0001F7E2 Aan' if is_state('switch.zwembad_pomp','on') else '⚫ Uit' }} | {{ state_attr('sensor.cloudems_zwembad_status','filter_mode') or '—' }} |\n{%- endif %}\n{%- if wp_ok %}\n| \U0001F321\
      ️ Warmtepomp | {{ '\U0001F7E2 Aan' if is_state('switch.zwembad_verwarming','on') else '⚫ Uit' }} | {{ state_attr('sensor.cloudems_zwembad_status','heat_mode') or '—' }} |\n{%- endif %}\n{%- if uv_ok\
      \ %}\n| ☀️ UV/Zout | {{ '\U0001F7E2 Aan' if is_state('switch.zwembad_uv','on') else '⚫ Uit' }} | Mee met filtratie |\n{%- endif %}\n{%- if robot_ok %}\n| \U0001F916 Robotreiniger | {{ '\U0001F7E2\
      \ Aan' if is_state('switch.zwembad_robot','on') else '⚫ Uit' }} | Handmatig / goedkoop uur |\n{%- endif %}\n{%- if temp_ok %}\n| \U0001F321️ Watertemperatuur | **{{ states('sensor.zwembad_temperatuur')\
      \ }}°C** | Setpoint: {{ state_attr('sensor.cloudems_zwembad_status','setpoint_c') or 28 }}°C |\n{%- endif %}\n\n{%- set reden_f = state_attr('sensor.cloudems_zwembad_status','filter_reason') %}\n\
      {%- set reden_h = state_attr('sensor.cloudems_zwembad_status','heat_reason') %}\n{%- if reden_f %}\n> \U0001F504 Filtreerpomp: *{{ reden_f }}*\n{%- endif %}\n{%- if reden_h %}\n> \U0001F321️ Warmtepomp:\
      \ *{{ reden_h }}*\n{%- endif %}\n{%- set uren = state_attr('sensor.cloudems_zwembad_status','filter_hours_today') | int(0) %}\n{%- set doel = state_attr('sensor.cloudems_zwembad_status','filter_target_hours')\
      \ | int(4) %}\n{%- if doel > 0 %}\nGefilterd vandaag: **{{ uren }}u** / {{ doel }}u doel\n{%- endif %}\n{%- endif %}\n"
    card_mod:
      style: "ha-card {\n  background: rgb(34,34,34) !important;\n  border: 1px solid rgba(255,255,255,0.06) !important;\n  border-radius: 16px !important;\n  box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;\n\
        \  --primary-text-color: rgb(255,255,255);\n  --secondary-text-color: rgb(163,163,163);\n  --state-active-color: rgb(0,177,64);\n  --primary-color: rgb(0,177,64);\n  --card-background-color: transparent;\n\
        \  --ha-card-border-color: transparent;\n  --divider-color: rgba(255,255,255,0.06);\n}\nha-card:hover {\n  border-color: rgba(0,177,64,0.5) !important;\n  box-shadow: 0 4px 20px rgba(0,0,0,0.5),\
        \ 0 0 16px rgba(0,177,64,0.12) !important;\n  transform: translateY(-1px) !important;\n}\n.card-header {\n  background: transparent !important;\n  border-bottom: 1px solid rgba(255,255,255,0.07)\
        \ !important;\n  color: rgb(255,255,255) !important;\n  font-size: 12px !important;\n  font-weight: 600 !important;\n  letter-spacing: 0.04em !important;\n  padding: 14px 16px 12px !important;\n\
        }\n"
  - type: markdown
    title: 💡 Zwembad advies
    content: "{%- set pool = state_attr('sensor.cloudems_zwembad_status', 'advice') -%}\n{%- set st   = states('sensor.cloudems_zwembad_status') -%}\n{%- if st in ['unavailable','unknown','Niet geconfigureerd','']\
      \ -%}\n⚙️ Koppel apparaten via **CloudEMS → Configureren → Zwembad Controller** om advies te ontvangen.\nOndersteund: filtreerpomp, warmtepomp, watertemperatuur, UV/zout, robotreiniger.\n{%- elif\
      \ pool %}\n{{ pool }}\n{%- else -%}\n✅ Zwembad actief — geen bijzonderheden.\n{%- endif %}\n"
    card_mod:
      style: "ha-card {\n  background: rgb(34,34,34) !important;\n  border: 1px solid rgba(255,255,255,0.06) !important;\n  border-radius: 16px !important;\n  box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;\n\
        \  --primary-text-color: rgb(255,255,255);\n  --secondary-text-color: rgb(163,163,163);\n  --state-active-color: rgb(0,177,64);\n  --primary-color: rgb(0,177,64);\n  --card-background-color: transparent;\n\
        \  --ha-card-border-color: transparent;\n  --divider-color: rgba(255,255,255,0.06);\n}\nha-card:hover {\n  border-color: rgba(0,177,64,0.5) !important;\n  box-shadow: 0 4px 20px rgba(0,0,0,0.5),\
        \ 0 0 16px rgba(0,177,64,0.12) !important;\n  transform: translateY(-1px) !important;\n}\n.card-header {\n  background: transparent !important;\n  border-bottom: 1px solid rgba(255,255,255,0.07)\
        \ !important;\n  color: rgb(255,255,255) !important;\n  font-size: 12px !important;\n  font-weight: 600 !important;\n  letter-spacing: 0.04em !important;\n  padding: 14px 16px 12px !important;\n\
        }\n"
  - type: conditional
    conditions:
    - condition: state
      entity: sensor.cloudems_zwembad_status
      state_not: unavailable
    - condition: state
      entity: sensor.cloudems_zwembad_status
      state_not: unknown
    - condition: state
      entity: sensor.cloudems_zwembad_status
      state_not: Niet geconfigureerd
    - condition: numeric_state
      entity: sensor.cloudems_zwembad_status
      attribute: filter_hours_today
      above: -1
    card:
      type: markdown
      title: 📊 Zwembad apparaten (24u)
      content: "{%- set f_eid = state_attr('sensor.cloudems_zwembad_status','filter_entity_id') or '' -%}\n{%- set h_eid = state_attr('sensor.cloudems_zwembad_status','heat_entity_id') or '' -%}\n{%- set\
        \ t_eid = state_attr('sensor.cloudems_zwembad_status','temp_entity_id') or '' -%}\n{%- set filter_ok = f_eid != '' and states(f_eid) not in ['unavailable','unknown','none'] -%}\n{%- set heat_ok\
        \   = h_eid != '' and states(h_eid) not in ['unavailable','unknown','none'] -%}\n{%- set temp_ok   = t_eid != '' and states(t_eid) not in ['unavailable','unknown','none'] -%}\n{%- if not filter_ok\
        \ and not heat_ok %}\n*Zwembad apparaten nog niet beschikbaar in Home Assistant. Controleer of je apparaten online zijn.*\n{%- else %}\n| Apparaat | Status | Modus |\n|---|---|---|\n{%- if filter_ok\
        \ %}\n| \U0001F504 Filtreerpomp | {{ '\U0001F7E2 Aan' if is_state(f_eid,'on') else '⚫ Uit' }} | {{ state_attr('sensor.cloudems_zwembad_status','filter_mode') or '—' }} |\n{%- endif %}\n{%- if heat_ok\
        \ %}\n| \U0001F321️ Warmtepomp | {{ '\U0001F7E2 Aan' if is_state(h_eid,'on') else '⚫ Uit' }} | {{ state_attr('sensor.cloudems_zwembad_status','heat_mode') or '—' }} |\n{%- endif %}\n{%- if temp_ok\
        \ %}\n| \U0001F321️ Watertemp. | **{{ states(t_eid) }}°C** | Setpoint: {{ state_attr('sensor.cloudems_zwembad_status','heat_setpoint_c') or 28 }}°C |\n{%- endif %}\n{%- endif %}\n"
      card_mod:
        style: "ha-card {\n  background: rgb(34,34,34) !important;\n  border: 1px solid rgba(255,255,255,0.06) !important;\n  border-radius: 16px !important;\n  box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;\n\
          \  --primary-text-color: rgb(255,255,255);\n  --secondary-text-color: rgb(163,163,163);\n  --state-active-color: rgb(0,177,64);\n  --primary-color: rgb(0,177,64);\n  --card-background-color: transparent;\n\
          \  --ha-card-border-color: transparent;\n  --divider-color: rgba(255,255,255,0.06);\n}\nha-card:hover {\n  border-color: rgba(0,177,64,0.5) !important;\n  box-shadow: 0 4px 20px rgba(0,0,0,0.5),\
          \ 0 0 16px rgba(0,177,64,0.12) !important;\n  transform: translateY(-1px) !important;\n}\n.card-header {\n  background: transparent !important;\n  border-bottom: 1px solid rgba(255,255,255,0.07)\
          \ !important;\n  color: rgb(255,255,255) !important;\n  font-size: 12px !important;\n  font-weight: 600 !important;\n  letter-spacing: 0.04em !important;\n  padding: 14px 16px 12px !important;\n\
          }\n"
  - type: markdown
    content: "<div style=\"display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:4px 2px;\">\n  <div style=\"display:flex;align-items:center;gap:10px;\">\n    <span\
      \ style=\"font-size:20px;\">⚡</span>\n    <div>\n      <div style=\"color:rgb(255,255,255);font-weight:600;font-size:13px;line-height:1.3;\">CloudEMS v{{ state_attr('sensor.cloudems_status','version')\
      \ or state_attr('sensor.cloudems_watchdog','cloudems_version') or '?' }}</div>\n      <div style=\"color:rgb(102,102,102);font-size:11px;\">cloudems.eu · Proprietary License</div>\n    </div>\n  </div>\n\
      \  <div style=\"display:flex;gap:8px;flex-wrap:wrap;\">\n    <a href=\"https://github.com/cloudemsNL/ha-cloudems/issues/new?template=bug_report.md\" target=\"_blank\" style=\"display:inline-flex;align-items:center;gap:6px;background:#1f2937;border:1px\
