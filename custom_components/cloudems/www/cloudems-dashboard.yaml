      {%- set log = state_attr('sensor.cloudems_boiler_status', 'log') or [] -%}
      {%- if log %}
      {%- for entry in log %}
      {%- set ts = entry[0][11:19] %}
      {%- set msg = entry[1] %}
      {%- set parts = msg.split(' — ') %}
      {%- set header = parts[0] if parts|length > 0 else msg %}
      {%- set reason = parts[1:] | join(' — ') if parts|length > 1 else '' %}
      {%- set action = 'hold_on' if 'hold_on' in msg else ('turn_on' if 'turn_on' in msg else ('hold_off' if 'hold_off' in msg else '')) %}
      {%- set icon = '🟢' if action in ['hold_on','turn_on'] else '⚫' %}
      {{ icon }} **{{ ts }}** &nbsp;·&nbsp; {{ header }}
      {%- if reason %}
      <small style="color:var(--secondary-text-color)">↳ {{ reason }}</small>
      {%- endif %}
      ---
      {%- endfor %}
      {%- else %}
      _Nog geen beslissingen gelogd._
      {%- endif %}
    card_mod:
      style: |
        ha-card {
          background: rgb(34,34,34) !important;
          border: 1px solid rgba(255,255,255,0.06) !important;
