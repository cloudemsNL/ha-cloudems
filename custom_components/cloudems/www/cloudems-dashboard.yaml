    content: "{% set spikes  = states('sensor.cloudems_ema_diagnostics') | int(0) %}\n{% set frozen  = state_attr('sensor.cloudems_ema_diagnostics', 'frozen_sensors') or [] %}\n{% set slow    = state_attr('sensor.cloudems_ema_diagnostics',\
      \ 'slow_sensors') or [] %}\n{% set tracked = state_attr('sensor.cloudems_ema_diagnostics', 'tracked_sensors') | int(0) %}\n{% set summ    = state_attr('sensor.cloudems_ema_diagnostics', 'summary')\
      \ %}\n{% if tracked > 0 %}\n{% if spikes == 0 and frozen | length == 0 %}\U0001F7E2{% else %}\U0001F7E1{% endif %} **{{ tracked }} sensoren gevolgd · {{ spikes }} spikes geblokkeerd**\n\n{% if summ\
      \ %}> {{ summ }}{% endif %}\n\n| Categorie | Aantal |\n|---|---|\n| Gevolgde sensoren | {{ tracked }} |\n| Geblokkeerde spikes (totaal) | {{ spikes }} |\n| Bevroren sensoren | {{ frozen | length }}\
      \ |\n| Trage sensoren | {{ slow | length }} |\n\n{% if frozen %}\n**⚠️ Bevroren sensoren** (leveren geen updates):\n{% for s in frozen %}\n- `{{ s }}`\n{% endfor %}\n{% endif %}\n{% if slow %}\n**⏳\
      \ Trage sensoren** (vertraging > verwacht):\n{% for s in slow %}\n- `{{ s }}`\n{% endfor %}\n{% endif %}\n{% else %}\n⏳ EMA diagnostiek start zodra sensoren data leveren.\n{% endif %}\n"
