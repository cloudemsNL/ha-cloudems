        style: |
          ha-card { background: rgba(0,177,64,0.15) !important; border: 1px solid rgba(0,177,64,0.4) !important; border-radius: 14px !important; --primary-text-color: rgb(0,212,78); --paper-item-icon-color: rgb(0,212,78); --card-background-color: transparent; }
