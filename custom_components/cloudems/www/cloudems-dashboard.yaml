  - type: markdown
    title: 📊 Prijsverloop
    content: |
      {%- set today     = state_attr('sensor.cloudems_energy_epex_today', 'today_prices') or [] -%}
      {%- set tomorrow  = state_attr('sensor.cloudems_energy_epex_today', 'tomorrow_prices') or [] -%}
      {%- set t_avail   = state_attr('sensor.cloudems_energy_epex_today', 'tomorrow_available') | default(false) -%}
      {%- set cur_h     = now().hour -%}
      {%- set all_p     = (today | map(attribute='price') | list) + (tomorrow | map(attribute='price') | list) -%}
      {%- set max_p     = ([0.001] + all_p) | max -%}
      {%- set avg_today = (all_p[:24] | sum / ([all_p[:24] | length, 1] | max)) | round(4) -%}
      {%- if not today %}*EPEX prijsdata nog niet beschikbaar.*
      {%- else %}
      {%- set sorted_p = today | map(attribute='price') | list | sort -%}
      {%- set n = sorted_p | length -%}
      {%- set cheap_thresh = sorted_p[((n * 0.25) | int)] if n > 0 else 0 -%}
      {%- set exp_thresh   = sorted_p[((n * 0.75) | int)] if n > 0 else 999 -%}
      {%- set ns = namespace(cheap_hour=-1) -%}
      {%- for p in today %}
        {%- if p.hour | int > cur_h and (ns.cheap_hour == -1 or p.price | float(0) < (today | selectattr('hour','eq', ns.cheap_hour) | map(attribute='price') | first | float(999))) -%}
          {%- set ns.cheap_hour = p.hour | int -%}
        {%- endif -%}
      {%- endfor -%}
      **Vandaag** — gem. €{{ state_attr('sensor.cloudems_energy_epex_today', 'avg_today') | float(0) | round(4) }}/kWh{% if ns.cheap_hour >= 0 %} · ⏱ goedkoopst om **{{ '%02d:00' % ns.cheap_hour }}** (€{{ (today | selectattr('hour','equalto', ns.cheap_hour) | map(attribute='price') | first | float(0)) | round(4) }}){% elif t_avail and tomorrow %}{%- set sorted_tmr2 = tomorrow | sort(attribute='price') -%} · ⏱ morgen goedkoopst om **{{ '%02d:00' % (sorted_tmr2[0].hour | int) }}** (€{{ sorted_tmr2[0].price | float(0) | round(4) }}){% endif %}{% if t_avail %} · **Morgen ✅**{% endif %}

      | Uur | Icon | €/kWh | Grafiek |
      |---|:---:|---:|---|
      {%- for p in today %}
      {%- set h = p.hour | int -%}{%- set v = p.price | float(0) -%}
      {%- set pct = ([0, ((v / max_p) * 20)] | max) | int -%}
      {%- set bar_fill = '░' if v <= cheap_thresh else ('█' if v >= exp_thresh else '▓') -%}
      {%- set bar = bar_fill * pct %}
      | {% if h == cur_h %}**{{ '%02d:00' % h }} ◄**{% else %}{{ '%02d:00' % h }}{% endif %} | {% if v < 0 %}⚡{% elif v >= exp_thresh %}⚠️{% elif v <= cheap_thresh %}💚{% else %} {% endif %} | {% if v < 0 %}**{{ '%.4f' % v }}**{% else %}{{ '%.4f' % v }}{% endif %} | {{ bar }} |
      {%- endfor %}
      {%- if t_avail and tomorrow %}

      **Morgen** — gem. €{{ (tomorrow | map(attribute='price') | list | sum / (tomorrow | length)) | round(4) }}/kWh

      | Uur | Icon | €/kWh | Grafiek |
      |---|:---:|---:|---|
      {%- set avg_tmr = (tomorrow | map(attribute='price') | list | sum / (tomorrow | length)) | round(4) -%}
      {%- set sorted_tmr = tomorrow | map(attribute='price') | list | sort -%}
      {%- set nt = sorted_tmr | length -%}
      {%- set cheap_t = sorted_tmr[((nt * 0.25) | int)] if nt > 0 else 0 -%}
      {%- set exp_t   = sorted_tmr[((nt * 0.75) | int)] if nt > 0 else 999 -%}
      {%- for p in tomorrow %}
      {%- set h = p.hour | int -%}{%- set v = p.price | float(0) -%}
      {%- set pct = ([0, ((v / max_p) * 20)] | max) | int -%}
      {%- set bar_fill = '░' if v <= cheap_t else ('█' if v >= exp_t else '▓') -%}
      {%- set bar = bar_fill * pct %}
      | {{ '%02d:00' % h }} | {% if v < 0 %}⚡{% elif v >= exp_t %}⚠️{% elif v <= cheap_t %}💚{% else %} {% endif %} | {% if v < 0 %}**{{ '%.4f' % v }}**{% else %}{{ '%.4f' % v }}{% endif %} | {{ bar }} |
      {%- endfor %}
      {%- elif not t_avail %}
      *Morgen-prijzen beschikbaar na ~13:00 uur.*
      {%- endif %}
      {%- endif %}
