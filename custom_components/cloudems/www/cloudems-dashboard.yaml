  - type: markdown
    title: "⚙️ Hoe werkt de cascade-sturing?"
    content: |
      CloudEMS stuurt warmwaterboilers via koppelde HA-entiteiten
      (`switch.*`, `climate.*`, `water_heater.*`).

      **Modi:**
      - 🔁 **Sequentieel** — één boiler per keer (min. netbelasting)
      - ⚡ **Parallel** — alles tegelijk (maximale PV-absorptie)
      - 🎯 **Prioriteit** — op volgorde van belang
      - 🔄 **Auto** — systeem kiest op basis van PV en EPEX-prijs

      Voeg boilers toe via **Instellingen → CloudEMS → 🚿 Warm Water Cascade**.
