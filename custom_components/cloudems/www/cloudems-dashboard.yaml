  - type: markdown
    title: 🫧 Verbruik Breakdown — Sense stijl
    content: |
      {% set grid  = state_attr('sensor.cloudems_onbekend_verbruik', 'grid_import_w') | float(0) | round(0) | int %}
      {% set nilm  = state_attr('sensor.cloudems_onbekend_verbruik', 'nilm_known_w')  | float(0) | round(0) | int %}
      {% set pc    = state_attr('sensor.cloudems_onbekend_verbruik', 'powercalc_w')   | float(0) | round(0) | int %}
      {% set lrn   = state_attr('sensor.cloudems_onbekend_verbruik', 'learned_w')     | float(0) | round(0) | int %}
      {% set stby  = state_attr('sensor.cloudems_onbekend_verbruik', 'standby_w')     | float(0) | round(0) | int %}
      {% set other = states('sensor.cloudems_onbekend_verbruik') | float(0) | round(0) | int %}
      {% set cov   = state_attr('sensor.cloudems_onbekend_verbruik', 'coverage_pct')  | float(0) | round(1) %}
      {% set trend = state_attr('sensor.cloudems_onbekend_verbruik', 'trend') or 'onbekend' %}
      {% set trend_icon = {'stijgend':'📈','dalend':'📉','stabiel':'➡️','onbekend':'❓'}.get(trend,'❓') %}
      {% set devs  = state_attr('sensor.cloudems_onbekend_verbruik', 'active_devices') or [] %}
      {% set total = [grid, 1] | max %}
      {% set nilm_pct  = (nilm  / total * 100) | round(0) | int %}
      {% set pc_pct    = (pc    / total * 100) | round(0) | int %}
      {% set lrn_pct   = (lrn   / total * 100) | round(0) | int %}
      {% set stby_pct  = (stby  / total * 100) | round(0) | int %}
      {% set other_pct = (other / total * 100) | round(0) | int %}
      **📊 Totaal: {{ grid }} W** · verklaard: **{{ cov }}%** {{ trend_icon }}

      | Categorie | Watt | % |
      |:---|---:|---:|
      | 🔌 NILM apparaten | {{ nilm }} W | {{ nilm_pct }}% |
      | 📐 PowerCalc profielen | {{ pc }} W | {{ pc_pct }}% |
      | 🧠 Zelfgeleerd | {{ lrn }} W | {{ lrn_pct }}% |
      | 💤 Standby/altijd-aan | {{ stby }} W | {{ stby_pct }}% |
      | ❓ **Onbekend** | **{{ other }} W** | **{{ other_pct }}%** |

      {% if other_pct > 30 %}⚠️ *Meer dan 30% onbekend — overweeg een slimme stekker of extra NILM training.*
      {% elif other_pct > 15 %}🟡 *Redelijke dekking — NILM leert nog bij.*
      {% else %}✅ *Uitstekende dekking — CloudEMS herkent het meeste verbruik.*
      {% endif %}
      {% if devs | length > 0 %}

      **🔌 Nu actief ({{ devs | length }}):**

      | Apparaat | Watt | Fase |
      |:---|---:|:---:|
      {% for d in devs | sort(attribute='power_w', reverse=true) %}| {{ d.name }} | {{ d.power_w | int }} W | {{ d.phase }} |
      {% endfor %}
      {% endif %}
