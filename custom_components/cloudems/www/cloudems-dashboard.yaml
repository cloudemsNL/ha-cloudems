          \ rgb(229,57,53);\n  --card-background-color: transparent;\n}\nha-card:hover { border-color: rgba(229,57,53,0.8) !important; transform: translateY(-1px) !important; }"
    - type: button
      name: ⚙️ Lampen uitsluiten
      icon: "mdi:cog"
      tap_action:
        action: navigate
        navigation_path: /config/integrations
      card_mod:
        style: "ha-card {\n  background: rgb(26,34,51) !important;\n  border: 1px solid rgba(100,160,255,0.3) !important;\n  border-radius: 16px !important;\n  --primary-text-color: rgb(255,255,255);\n\
          \  --primary-color: rgb(100,160,255);\n  --card-background-color: transparent;\n}\nha-card:hover { border-color: rgba(100,160,255,0.8) !important; transform: translateY(-1px) !important; }"
  - type: markdown
    content: "{%- set tip = state_attr('sensor.cloudems_lampcirculatie_status', 'phase_tip') -%}\n{%- if tip and tip != '' and tip != 'None' -%}\n⚡ **Fase-detectie:** {{ tip }}\n{%- endif -%}\n"
    card_mod:
      style: "ha-card {\n  background: {% if state_attr('sensor.cloudems_lampcirculatie_status', 'phase_tip') %} rgb(26,46,26) {% else %} transparent {% endif %} !important;\n  border: 0 !important;\n \
        \ box-shadow: none !important;\n  padding: 0 !important;\n  margin: 0 !important;\n  min-height: 0 !important;\n}\nha-card:empty { display: none !important; }"
  - type: markdown
    content: "\n**\U0001F512 Inbraakbeveiliging** — Dynamische circulatie met willekeurige tijden (2-8 min)\nen wisselend 1-3 lampen tegelijk. Geen enkel herhaalbaar patroon.\n\n**⚡ Energiebesparing** —\
      \ Alle lampen automatisch uit bij gedetecteerde afwezigheid.\n\n**\U0001F319 Seizoensintelligentie** — Nacht wordt bepaald op basis van `sun.sun` (zon onder\nde horizon), zodat de circulatie automatisch\
      \ later start in de zomer en eerder in\nde winter.\n\n**✨ Gedragsmimicry** — CloudEMS leert welke lampen bewoners normaal aandoen op\nwelk tijdstip. Die lampen krijgen een hogere kans om gekozen te\
      \ worden, zodat het\ngedrag realistischer lijkt.\n\n**\U0001F3D8️ Buurt-correlatie** — Als buur-lampen worden gedetecteerd, verschuift CloudEMS\nde eigen schakelmoment zodat de timing niet gelijktijdig\
      \ valt.\n\n**\U0001F6B6 PIR-bypass** — Lampen gekoppeld aan een bewegingsmelder worden tijdelijk\nuitgesloten als de PIR recent actief was (iemand in de kamer).\n\n**\U0001F4B6 Negatieve prijs** —\
      \ Bij negatieve EPEX-prijs wordt de circulatieduur verlengd:\ngratis stroom én maximale beveiligingstijd.\n\n**⚡ Fase-detectie** — Bij elke schakelactie leert CloudEMS passief de netfase\nvan de lamp.\
      \ Start de **Test** om dit direct te triggeren.\n"
    card_mod:
      style: "ha-card {\n  background: rgb(26,26,46) !important;\n  border: 1px solid rgba(255,200,0,0.15) !important;\n  border-radius: 16px !important;\n  box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;\n\
        \  --primary-text-color: rgb(255,255,255);\n  --secondary-text-color: rgb(163,163,163);\n  --card-background-color: transparent;\n  --ha-card-border-color: transparent;\n  padding: 4px;\n}\n"
  - type: markdown
    title: ⚡ Lamp Fase-detectie + Gedragspatroon
    content: "{% set lamps = state_attr('sensor.cloudems_lampcirculatie_status', 'lamp_phases') %}\n{% set on_ids = state_attr('sensor.cloudems_lampcirculatie_status', 'lamps_on') or [] %}\n{% if lamps\
      \ %}\n| Lamp | Status | Fase | ~W | Mimicry |\n|------|--------|------|----|---------| \n{%- for l in lamps %}\n{%- set status = 'uitgesloten' if l.excluded else ('**AAN**' if l.entity_id in on_ids\
      \ else 'uit') -%}{%- set fase = l.phase if l.phase else '?' -%}{%- set watt = (l.power_w | int | string ~ ' W') if l.power_w else '-' -%}{%- set mp = ((l.mimicry or 0) * 100) | round(0) | int -%}{%-\
      \ set bar = '█' * (mp // 10) ~ '░' * (10 - mp // 10) %}\n| {{ l.label }} | {{ status }} | {{ fase }} | {{ watt }} | `{{ bar }}` {{ mp }}% |\n{%- endfor %}\n*Mimicry = kans dat bewoners dit licht nu\
      \ zelf aan zouden doen.*\n{% else %}\n*Geen lampen gevonden. CloudEMS detecteert automatisch alle `light.*` entiteiten na herstart.*\n{% endif %}\n"
    card_mod:
      style: "ha-card {\n  background: rgb(34,34,34) !important;\n  border: 1px solid rgba(255,255,255,0.06) !important;\n  border-radius: 16px !important;\n  box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;\n\
        \  --primary-text-color: rgb(163,163,163);\n  --primary-color: rgb(240,165,0);\n  --card-background-color: transparent;\n  --ha-card-border-color: transparent;\n}\nha-card:hover {\n  border-color:\
