      state_not: unavailable
    card:
      type: markdown
      title: "📊 Warm water — gebruikspatroon per uur"
      content: |
        {%- set groups = state_attr('sensor.cloudems_boiler_status', 'groups') or [] -%}
        {%- for g in groups -%}
        {%- set ls = g.get('learn_status', {}) -%}
        {%- set pattern = ls.get('usage_pattern', []) -%}
        {%- if pattern | length == 24 -%}
        **{{ g.name }}** — warmwatergebruik per uur (donker = weinig, groen = piek)

        {%- set max_val = pattern | max | float(0.01) -%}
        | Uur | Niveau | Bar |
        |---|---|---|
        {%- for i in range(24) %}
        {%- set v = pattern[i] | float(0) %}
        {%- set pct = (v / max_val * 100) | round(0) | int %}
        {%- set bar_len = (pct / 10) | round(0) | int %}
        {%- set bar = '█' * bar_len ~ '░' * (10 - bar_len) %}
        {%- set highlight = ' ← **piek**' if pct >= 80 else '' %}
        | {{ '%02d' | format(i) }}:00 | {{ (v * 100) | round(0) | int }}% | {{ bar }}{{ highlight }} |
        {%- endfor %}

        {%- else -%}
        *{{ g.name }}: nog geen gebruiksdata. Flow-sensor koppelen en een paar dagen wachten.*
        {%- endif -%}
        {%- if not loop.last %}

        ---
        {%- endif %}
        {%- endfor %}
