- title: Configuratie
  path: cloudems-config
  max_columns: 2
  icon: mdi:cog-outline
  background: "url(/local/cloudems/images/bg-config.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(176,190,197,0.06) 0%, transparent 60%), rgb(24,24,24)"
  card_mod:
    style: |
      hui-view { padding: 12px 12px 24px !important; }
  cards:

  - type: entities
    title: 🔧 CloudEMS Modules
    show_header_toggle: false
    entities:

      - type: section
        label: "⚡ Energie & Vermogen"

      - entity: switch.cloudems_module_nilm
        name: NILM Apparaatdetectie
        icon: mdi:blur-radial

      - entity: switch.cloudems_module_piekbeperking
        name: Piekbeperking (capaciteitstarief)
        icon: mdi:chart-bell-curve-cumulative

      - entity: switch.cloudems_module_faseverdeling
        name: Faseverdeling
        icon: mdi:sine-wave

      - entity: switch.cloudems_module_goedkope_uren
        name: Goedkope uren schakelaars
        icon: mdi:clock-check-outline

      - type: section
        label: "☀️ Zonne-energie"

      - entity: switch.cloudems_module_pv_forecast
        name: PV-prognose & Azimuth leren
        icon: mdi:solar-power

      - entity: switch.cloudems_module_schaduw
        name: Schaduwdetectie
        icon: mdi:weather-sunset

      - entity: switch.cloudems_module_solar_learner
        name: Omvormer fase-detectie (SolarLearner)
        icon: mdi:lightning-bolt-circle

      - type: section
        label: "🌡️ Klimaat"

      - entity: switch.cloudems_module_klimaat
        name: Slim Klimaatbeheer (zones)
        icon: mdi:home-thermometer-outline

      - entity: switch.cloudems_module_ketel
        name: Boiler sturing
        icon: mdi:fire

      - type: section
        label: "🚗 Laden & Accu"

      - entity: switch.cloudems_module_ev_lader
        name: EV-lader sturing
        icon: mdi:ev-station

      - entity: switch.cloudems_module_batterij
        name: Thuisbatterij scheduler
        icon: mdi:battery-charging

      - entity: switch.cloudems_zonneplan_auto_sturing
        name: Zonneplan Nexus auto-sturing
        icon: mdi:lightning-bolt-circle

      - entity: switch.cloudems_module_ere
        name: ERE Certificaten (NEa)
        icon: mdi:certificate-outline

      - type: section
        label: "📊 Rapportage & Meldingen"

      - entity: switch.cloudems_module_inzichten
        name: Wekelijkse inzichten
        icon: mdi:chart-line

      - entity: switch.cloudems_slaapstand_actief
        name: Nachtstand detectie
        icon: mdi:sleep

      - entity: switch.cloudems_module_notificaties
        name: Notificaties (alle modules)
        icon: mdi:bell-outline

      - type: section
        label: "🔌 Optionele modules"

      - entity: switch.cloudems_module_lampcirculatie
        name: Lampcirculatie & Beveiliging
        icon: mdi:lightbulb-group-outline
      - entity: switch.cloudems_module_ebike
        name: E-bike & Scooter
        icon: mdi:bicycle-electric
      - entity: switch.cloudems_module_zwembad
        name: Zwembad Controller
        icon: mdi:pool
      - entity: switch.cloudems_module_rolluiken
        name: Rolluiken
        icon: mdi:blinds

    card_mod:
      style: |
        ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }

  - type: custom:cloudems-stack-card
    mode: vertical
    cards:
      - type: markdown
        content: "## 🧠 Leerdata Beheer\nCloudEMS leert automatisch van jouw installatie. Gebruik de knoppen hieronder om selectief te resetten."
        card_mod:
          style: |
            ha-card { background: transparent !important; border: none !important; box-shadow: none !important; padding: 16px 16px 4px 16px !important; }

      - type: grid
        columns: 2
        square: false
        cards:

          - type: button
            name: Azimuth / tilt
            icon: mdi:rotate-3d-variant
            label: Azimuth, hellingshoek, kalibratie
            tap_action:
              action: perform-action
              perform_action: cloudems.reset_pv_orientation
              data: {}
            card_mod:
              style: |
                ha-card { background: rgba(255,180,0,0.08) !important; border: 1px solid rgba(255,180,0,0.25) !important; border-radius: 12px !important; box-shadow: none !important; }

          - type: button
            name: Fase-detectie
            icon: mdi:sine-wave
            label: Omvormer fase-toewijzing resetten
            tap_action:
              action: perform-action
              perform_action: cloudems.reset_phase_detection
              data: {}
            card_mod:
              style: |
                ha-card { background: rgba(100,160,255,0.08) !important; border: 1px solid rgba(100,160,255,0.25) !important; border-radius: 12px !important; box-shadow: none !important; }

          - type: button
            name: NILM apparaten
            icon: mdi:lightning-bolt-outline
            label: Alle geleerde apparaten
            tap_action:
              action: perform-action
              perform_action: cloudems.reset_nilm
              data: {}
            card_mod:
              style: |
                ha-card { background: rgba(80,200,120,0.08) !important; border: 1px solid rgba(80,200,120,0.25) !important; border-radius: 12px !important; box-shadow: none !important; }

          - type: button
            name: Aanwezigheid
            icon: mdi:home-account
            label: 7×24 aanwezigheidspatroon
            tap_action:
              action: perform-action
              perform_action: cloudems.reset_presence
              data: {}
            card_mod:
              style: |
                ha-card { background: rgba(180,100,255,0.08) !important; border: 1px solid rgba(180,100,255,0.25) !important; border-radius: 12px !important; box-shadow: none !important; }

          - type: button
            name: "⚠️ Forceer 3-fase"
            icon: mdi:check-decagram
            label: Alle omvormers direct 3F instellen
            tap_action:
              action: perform-action
              perform_action: cloudems.reset_phase_detection
              data:
                force_three_phase: true
            card_mod:
              style: |
                ha-card { background: rgba(100,160,255,0.14) !important; border: 1px solid rgba(100,160,255,0.50) !important; border-radius: 12px !important; box-shadow: none !important; }

          - type: button
            name: "⚠️ Alle leerdata"
            icon: mdi:delete-sweep
            label: Alles wissen — vers begin
            tap_action:
              action: perform-action
              perform_action: cloudems.reset_all_learning
              data: {}
            card_mod:
              style: |
                ha-card { background: rgba(255,60,60,0.08) !important; border: 1px solid rgba(255,60,60,0.30) !important; border-radius: 12px !important; box-shadow: none !important; }
  - type: markdown
    title: 📊 Systeem Status
    content: |
      {%- set d = state_attr('sensor.cloudems_status', 'system') or {} -%}
      {%- set ver = d.get('version') or state_attr('sensor.cloudems_watchdog', 'cloudems_version') or '2.7.0' -%}
      {%- set uptime = d.get('uptime_h', 0) | int -%}
      **CloudEMS v{{ ver }}** — uptime {{ uptime }}u
      | Module | Status |
      |---|---|
      {%- set modules = [
        ('NILM', 'nilm_active'),
        ('PV Forecast', 'pv_forecast_active'),
        ('Klimaat', 'climate_mgr_active'),
        ('EV Lader', 'ev_charger_active'),
        ('Batterij', 'battery_scheduler_active'),
        ('ERE', 'ere_active'),
      ] %}
      {%- for label, key in modules %}
      {%- set mval = d.get(key) %}
      | {{ label }} | {% if mval == true %}✅{% elif mval == false %}⭕{% else %}❓{% endif %} |
      {%- endfor %}

      *Wijzigingen in de toggle-lijst hierboven worden direct toegepast via CloudEMS services.*
      *Sommige modules vereisen HA herstart na in-/uitschakelen.*
    card_mod:
      style: |
        ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }
