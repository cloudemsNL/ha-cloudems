      \ else '\U0001F7E1' }} {{ d.label }} | {{ d.baseline_w }} W | {{ d.current_w }} W | {{ '⬆' if d.drift_pct > 0 else '⬇' }} {{ d.drift_pct | float(0) | round(0) | abs }}% |\n{% endfor %}\n{% endif %}\n"
