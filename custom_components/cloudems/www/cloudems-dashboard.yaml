title: ⚡ CloudEMS
views:
- title: Overzicht
  path: cloudems-overzicht
  type: sections
  max_columns: 2
  icon: mdi:home-lightning-bolt
  background: url(/local/cloudems/images/bg-overzicht.svg) center/cover no-repeat,
    radial-gradient(ellipse 70% 50% at 50% -10%, rgba(0,177,64,0.08) 0%, transparent
    60%), rgb(24,24,24)
  card_mod:
    style: "hui-view {\n  padding: 12px 12px 24px !important;\n}\n"
  sections:
  - type: grid
    column_span: 1
    cards:
    - type: custom:cloudems-mini-price-card
    - type: custom:cloudems-flow-card
      title: ⚡ Energiestroom
      entities:
        grid:
          entity: sensor.cloudems_grid_net_power
          name: Net
          invert_state: false
        solar_system:
          entity: sensor.cloudems_solar_system
        solar:
          entity: sensor.cloudems_solar_system_intelligence
          name: Zonne-energie
          display_zero_state: true
        battery:
          entity: sensor.thuisbatterij_power
          name: Batterij
          state_of_charge: sensor.thuisbatterij_percentage
          display_zero_state: true
          invert_state: true
        home:
          entity: sensor.cloudems_home_rest
          name: Thuis
          display_zero_state: true
      watt_threshold: 1000
      clickable_entities: true
      display_zero_lines: true
      use_new_flow_rate_model: true
    - type: custom:cloudems-sankey-card
      title: Energiestromen
      max_ampere: 25
  - type: grid
    column_span: 1
    cards:
    - type: custom:cloudems-dagrapport-card
      title: 📊 Dagrapport
    - type: custom:cloudems-home-card
    - type: custom:cloudems-vacation-card
      title: 🏖 Vakantiemodus
    - type: custom:cloudems-rooms-card
    - type: custom:cloudems-version-card
- title: Solar & PV
  path: cloudems-zon
  type: sections
  max_columns: 1
  icon: mdi:solar-power-variant
  background: url(/local/cloudems/images/bg-solar.svg) center/cover no-repeat, radial-gradient(ellipse
    70% 50% at 50% -10%, rgba(255,204,0,0.07) 0%, transparent 60%), rgb(24,24,24)
  card_mod:
    style: 'hui-view { padding: 12px 12px 24px !important; }

      '
  sections:
  - type: grid
    column_span: 1
    cards:
    - type: conditional
      conditions:
      - condition: state
        entity: switch.cloudems_module_solar_learner
        state: 'off'
      card:
        type: markdown
        content: '⚠ **☀ Solar learner staat uit.** Schakel hem in via het [Configuratie
          tabblad](#cloudems-config) om zonnepanelen te monitoren.

          '
        card_mod:
          style: 'ha-card { background: rgba(255,140,0,0.12) !important; border: 1px
            solid rgba(255,140,0,0.4) !important; border-radius: 12px !important;
            padding: 4px 12px !important; }

            '
    - type: custom:cloudems-mini-price-card
    - type: custom:cloudems-solar-card
      title: Zonnepanelen
    - type: custom:cloudems-pv-forecast-card
      title: ☀ PV Forecast + EPEX
      show_tomorrow: true
      show_epex: true
      show_confidence: true
    - type: custom:cloudems-zelfconsumptie-card
      title: ♻ Zelfconsumptie
    - type: conditional
      conditions:
      - condition: state
        entity: sensor.cloudems_pv_forecast_today
        state_not: unavailable
      card:
        type: custom:cloudems-pv-forecast-card
        title: ☀ PV Voorspelling
- title: Batterij
  path: cloudems-batterij
  type: sections
  max_columns: 1
  icon: mdi:battery-charging
  background: url(/local/cloudems/images/bg-batterij.svg) center/cover no-repeat,
    radial-gradient(ellipse 70% 50% at 50% -10%, rgba(96,165,250,0.07) 0%, transparent
    60%), rgb(24,24,24)
  card_mod:
    style: 'hui-view { padding: 12px 12px 24px !important; }

      '
  sections:
  - type: grid
    column_span: 1
    cards:
    - type: conditional
      conditions:
      - condition: state
        entity: switch.cloudems_module_batterij
        state: 'off'
      card:
        type: markdown
        content: '⚠ **🔋 Batterij module staat uit.** Schakel hem in via het [Configuratie
          tabblad](#cloudems-config) om deze functie te activeren.

          '
        card_mod:
          style: 'ha-card { background: rgba(255,140,0,0.12) !important; border: 1px
            solid rgba(255,140,0,0.4) !important; border-radius: 12px !important;
            padding: 4px 12px !important; }

            '
    - type: custom:cloudems-mini-price-card
    - type: custom:cloudems-battery-card
      title: Thuisbatterij
    - type: conditional
      conditions:
      - condition: state
        entity: sensor.cloudems_standby_intelligence
        state_not: unavailable
      card:
        type: custom:cloudems-standby-card
        title: 💤 Sluimerverbruik
    - type: conditional
      conditions:
      - condition: state
        entity: sensor.cloudems_lifecycle_arbitrage
        state_not: unavailable
      card:
        type: custom:cloudems-lifecycle-card
        title: ⚙ Slijtage Arbitrage
    - type: conditional
      conditions:
      - condition: state
        entity: sensor.cloudems_fcr_afrr
        state_not: not_eligible
      card:
        type: custom:cloudems-fcr-card
        title: 📈 FCR/aFRR
    - type: conditional
      conditions:
      - condition: state
        entity: sensor.cloudems_battery_savings
        state_not: unavailable
      card:
        type: custom:cloudems-batterij-arbitrage-card
        title: 💰 Batterij Besparingen
    - type: conditional
      conditions:
      - condition: state
        entity: sensor.cloudems_battery_savings
        state_not: unavailable
      card:
        type: custom:cloudems-batterij-levensduur-card
        title: 🔋 Levensduur
        nominal_capacity_kwh: 5.8
        max_cycles: 6000
- title: Warm Water
