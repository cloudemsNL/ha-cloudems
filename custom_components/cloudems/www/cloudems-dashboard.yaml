  - type: markdown
    title: 🗄️ NILM Database Status
    content: "{% set total = states('sensor.cloudems_nilm_db') | int(0) %}\n{% set stats = state_attr('sensor.cloudems_nilm_db', 'total') %}\n{% if total > 0 %}\n**{{ total }} events opgeslagen in NILM-database**\n\
      \n{% set keys = ['total','devices','events_today','events_week','oldest_event','newest_event','db_size_kb'] %}\n| Gegeven | Waarde |\n|---|---|\n{% for k in keys %}\n{% set v = state_attr('sensor.cloudems_nilm_db',\
      \ k) %}\n{% if v is not none %}\n| {{ k | replace('_',' ') | title }} | {{ v }} |\n{% endif %}\n{% endfor %}\n{% else %}\n⏳ NILM-database wordt opgebouwd — beschikbaar na eerste apparaatdetecties.\n\
      {% endif %}\n"
    card_mod:
      style: "ha-card {\n  background: rgb(34,34,34) !important;\n  border: 1px solid rgba(255,255,255,0.06) !important;\n  border-radius: 16px !important;\n  box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;\n\
        \  --primary-text-color: rgb(255,255,255);\n  --secondary-text-color: rgb(163,163,163);\n  --primary-color: rgb(0,177,64);\n  --card-background-color: transparent;\n  --ha-card-border-color: transparent;\n\
        }\nha-card:hover {\n  border-color: rgba(0,177,64,0.5) !important;\n  box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 16px rgba(0,177,64,0.12) !important;\n  transform: translateY(-1px) !important;\n\
        }\n.card-header {\n  background: transparent !important;\n  border-bottom: 1px solid rgba(255,255,255,0.07) !important;\n  color: rgb(255,255,255) !important;\n  font-size: 12px !important;\n  font-weight:\
        \ 600 !important;\n  padding: 14px 16px 12px !important;\n}\n"
  - type: entities
    title: 🎛️ NILM Modellen
    entities:
    - entity: switch.cloudems_nilm_actief
      name: 🔍 NILM Actief
      icon: "mdi:home-analytics"
    - entity: switch.cloudems_hybridnilm_actief
      name: 🔗 HybridNILM (smart plug + context)
      icon: "mdi:layers-triple"
    - entity: switch.cloudems_nilm_sessietracking_hmm
      name: 🔄 HMM Sessietracking (wasmachine/droger/vaatwasser)
      icon: "mdi:state-machine"
    - entity: switch.cloudems_nilm_bayesian_classifier
      name: 📊 Bayesian Classifier (tijdstip + seizoen prior)
      icon: "mdi:chart-bell-curve-cumulative"
    card_mod:
      style: "ha-card {\n  background: rgb(34,34,34) !important;\n  border: 1px solid rgba(255,255,255,0.06) !important;\n  border-radius: 16px !important;\n  box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;\n\
        \  --primary-text-color: rgb(255,255,255);\n  --secondary-text-color: rgb(163,163,163);\n  --state-active-color: rgb(0,177,64);\n  --state-inactive-color: rgb(68,68,68);\n  --primary-color: rgb(0,177,64);\n\
        \  --card-background-color: transparent;\n  --ha-card-border-color: transparent;\n  --divider-color: rgba(255,255,255,0.06);\n}\n.card-header {\n  color: rgb(255,255,255) !important;\n  font-size:\
        \ 12px !important;\n  font-weight: 600 !important;\n  padding: 14px 16px 12px !important;\n  border-bottom: 1px solid rgba(255,255,255,0.07) !important;\n}\n"
  - type: entities
    title: 🧹 NILM Opruimen
    entities:
    - entity: button.cloudems_nilm_volledig_opruimen
      name: 💣 Volledig opruimen (schone start)
      icon: "mdi:delete-sweep"
    - entity: button.cloudems_nilm_opruimen_laatste_7_dagen
      name: 📅 Onbevestigd — laatste 7 dagen
      icon: "mdi:calendar-week"
    - entity: button.cloudems_nilm_opruimen_laatste_30_dagen
      name: 📅 Onbevestigd — laatste 30 dagen
      icon: "mdi:calendar-month"
    - entity: button.cloudems_nilm_energietellers_resetten
      name: 🔢 Energietellers resetten (alle kWh)
      icon: "mdi:counter"
    - entity: button.cloudems_nilm_week_resetten
      name: 📊 Week-kWh resetten
      icon: "mdi:calendar-week-begin"
    - entity: button.cloudems_nilm_maand_resetten
      name: 📊 Maand-kWh resetten
      icon: "mdi:calendar-month-outline"
    - entity: button.cloudems_nilm_jaar_resetten
      name: 📊 Jaar-kWh resetten
      icon: "mdi:calendar-year"
    - entity: button.cloudems_bijwerken
      name: 🔄 Data vernieuwen
      icon: "mdi:refresh"
    card_mod:
      style: "ha-card {\n  background: rgb(34,34,34) !important;\n  border: 1px solid rgba(255,255,255,0.06) !important;\n  border-radius: 16px !important;\n  box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;\n\
        \  --primary-text-color: rgb(255,255,255);\n  --primary-color: rgb(0,177,64);\n  --card-background-color: transparent;\n  --ha-card-border-color: transparent;\n  --divider-color: rgba(255,255,255,0.06);\n\
        }\n.card-header {\n  color: rgb(255,255,255) !important;\n  font-size: 12px !important;\n  font-weight: 600 !important;\n  padding: 14px 16px 12px !important;\n  border-bottom: 1px solid rgba(255,255,255,0.07)\
        \ !important;\n}\n"
  - type: markdown
    title: 👻 Niet Recente Apparaten (> 7 dagen)
    content: "{%- set devs = state_attr('sensor.cloudems_nilm_devices', 'devices') or [] -%}\n{%- set ghosts = devs | selectattr('last_seen_days', 'defined') | selectattr('last_seen_days', '>', 7) | list\
      \ -%}\n{%- if ghosts | length == 0 %}\n✅ Alle apparaten zijn recent gezien (< 7 dagen).\n{%- else %}\n*{{ ghosts | length }} apparaat/apparaten al meer dan 7 dagen niet gezien. Overweeg ze te verwijderen\
      \ als ze niet meer in gebruik zijn.*\n\n| Apparaat | Niet gezien | Conf |\n|----------|------------|------|\n{%- for d in ghosts | sort(attribute='last_seen_days', reverse=true) %}\n| {{ d.name }}\
      \ | {{ d.last_seen_days | round(0) | int }} dagen | {{ d.confidence | int(0) }}% |\n{%- endfor %}\n{%- endif %}\n"
    card_mod:
      style: "ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,200,0,0.2) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; --primary-text-color:\
        \ rgb(163,163,163); --card-background-color: transparent; --ha-card-border-color: transparent; }\n.card-header { background: transparent !important; border-bottom: 1px solid rgba(255,200,0,0.15)\
        \ !important; color: rgb(255,200,0) !important; font-size: 12px !important; font-weight: 600 !important; padding: 14px 16px 12px !important; }\nha-markdown-element table { width: 100% !important;\
        \ border-collapse: collapse !important; }\nha-markdown-element th { background: rgba(255,200,0,0.08) !important; color: rgb(255,200,0) !important; font-size: 10px !important; font-weight: 700 !important;\
        \ text-transform: uppercase !important; padding: 8px 10px !important; }\nha-markdown-element td { color: rgb(163,163,163) !important; border-bottom: 1px solid rgba(255,255,255,0.05) !important;\
        \ padding: 6px 10px !important; font-size: 12px !important; }\nha-markdown-element strong { color: rgb(255,255,255) !important; }\n"
  - type: markdown
    content: "<div style=\"display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:4px 2px;\">\n  <div style=\"display:flex;align-items:center;gap:10px;\">\n    <span\
      \ style=\"font-size:20px;\">⚡</span>\n    <div>\n      <div style=\"color:rgb(255,255,255);font-weight:600;font-size:13px;line-height:1.3;\">CloudEMS v{{ state_attr('sensor.cloudems_status','version')\
      \ or state_attr('sensor.cloudems_watchdog','cloudems_version') or '?' }}</div>\n      <div style=\"color:rgb(102,102,102);font-size:11px;\">cloudems.eu · Proprietary License</div>\n    </div>\n  </div>\n\
      \  <div style=\"display:flex;gap:8px;flex-wrap:wrap;\">\n    <a href=\"https://github.com/cloudemsNL/ha-cloudems/issues/new?template=bug_report.md\" target=\"_blank\" style=\"display:inline-flex;align-items:center;gap:6px;background:#1f2937;border:1px\
      \ solid rgba(239,68,68,0.4);color:#f87171;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;text-decoration:none;\">\U0001F41B Bug melden</a>\n    <a href=\"https://github.com/cloudemsNL/ha-cloudems/issues/new?template=feature_request.md\"\
      \ target=\"_blank\" style=\"display:inline-flex;align-items:center;gap:6px;background:#1f2937;border:1px solid rgba(99,102,241,0.4);color:#a5b4fc;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;text-decoration:none;\"\
      >\U0001F4A1 Feature verzoek</a>\n    <a href=\"https://buymeacoffee.com/smarthost9m\" target=\"_blank\" style=\"display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,rgb(245,158,11),rgb(217,119,6));color:rgb(26,16,0);padding:6px\
      \ 14px;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none;\">☕ Steun CloudEMS</a>\n  </div>\n</div>\n"
    card_mod:
      style: "ha-card {\n  background: rgb(22,22,22) !important;\n  border: 1px solid rgba(255,255,255,0.05) !important;\n  border-radius: 14px !important;\n  box-shadow: none !important;\n  --card-background-color:\
        \ transparent;\n  --ha-card-border-color: transparent;\n}\nha-markdown-element a { text-decoration: none !important; }\nha-markdown-element a:hover { opacity: 0.85 !important; }\n"
- title: Warm Water
  path: cloudems-boiler
  type: masonry
  max_columns: 3
  icon: "mdi:water-boiler"
  background: url(/local/cloudems/images/bg-boiler.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(255,112,67,0.07) 0%, transparent 60%), rgb(24,24,24)
  card_mod:
    style: "hui-view { padding: 12px 12px 24px !important; }\n"
  cards:
  - *id001
  - type: conditional
    conditions:
    - condition: state
      entity: switch.cloudems_module_ketel
      state: 'off'
    card:
      type: markdown
      content: "⚠️ **\U0001F6BF Warm Water module staat uit.** Schakel hem in via het [Configuratie tabblad](#cloudems-config) om deze functie te activeren.\n"
      card_mod:
        style: "ha-card { background: rgba(255,140,0,0.12) !important; border: 1px solid rgba(255,140,0,0.4) !important; border-radius: 12px !important; padding: 4px 12px !important; }\n"
  - type: "custom:cloudems-boiler-card"
    tank_liters: 80
    cold_water_temp: 10
    shower_temp: 38
    shower_liters_per_min: 8
    shower_duration_min: 8
    title: Warm water
  - type: markdown
    title: 🌡️ Thermisch verlies & voorspelling
    content: "{%- set groups   = (state_attr('sensor.cloudems_boiler_status', 'groups')  or []) %}\n{%- set all_boilers = (state_attr('sensor.cloudems_boiler_status', 'boilers') or []) %}\n\n{%- set ns\
      \ = namespace(found=false) %}\n{%- for g in groups %}\n  {%- for b in g.get('boilers', []) %}\n    {%- set min_cold   = b.get('minutes_to_cold') %}\n    {%- set reheat_min = b.get('reheat_eta_min')\
      \ %}\n    {%- set heat_rate  = b.get('heat_rate_c_h', 0) | float %}\n    {%- set loss_rate  = b.get('thermal_loss_c_h', 0) | float %}\n    {%- if min_cold is not none or reheat_min is not none or\
      \ heat_rate > 0 %}\n      {%- set ns.found = true %}\n    {%- endif %}\n  {%- endfor %}\n{%- endfor %}\n\n{%- if not ns.found %}\n*Nog geen leerdata beschikbaar. Het systeem leert na enkele verwarmingscycli.*\n\
      {%- else %}\n| Boiler | Verlies | Koud over | Reheat |\n|---|---|---|---|\n{%- for g in groups %}\n  {%- for b in g.get('boilers', []) %}\n    {%- set label      = b.get('label', b.get('entity_id',\
      \ '?').split('.')[-1]) %}\n    {%- set loss       = b.get('thermal_loss_c_h', 0) | float %}\n    {%- set min_cold   = b.get('minutes_to_cold') %}\n    {%- set reheat_min = b.get('reheat_eta_min')\
      \ %}\n    {%- if min_cold is not none %}\n      {%- set cold_str = (min_cold | int | string + ' min') if min_cold < 120 else ((min_cold / 60) | round(1) | string + ' u') %}\n    {%- else %}\n    \
      \  {%- set cold_str = '—' %}\n    {%- endif %}\n    {%- if reheat_min is not none %}\n      {%- set reheat_str = (reheat_min | int | string + ' min') if reheat_min < 120 else ((reheat_min / 60) |\
      \ round(1) | string + ' u') %}\n    {%- else %}\n      {%- set reheat_str = '—' %}\n    {%- endif %}\n| {{ label }} | {{ loss | round(1) }}°C/u | {{ cold_str }} | {{ reheat_str }} |\n  {%- endfor\
      \ %}\n{%- endfor %}\n{%- endif %}\n"
    card_mod:
      style: "ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }\n\
        .card-header { border-bottom: 1px solid rgba(255,255,255,0.07) !important; color: rgb(255,255,255) !important; font-size: 14px !important; font-weight: 600 !important; padding: 14px 16px 12px !important;\
        \ }\nha-markdown-element table { width: 100% !important; border-collapse: collapse !important; }\nha-markdown-element td, ha-markdown-element th { padding: 5px 8px !important; border-bottom: 1px\
        \ solid rgba(255,255,255,0.05) !important; font-size: 13px !important; }\nha-markdown-element th { color: rgba(255,255,255,0.5) !important; font-weight: 500 !important; }\n"
  - type: markdown
    title: 🎓 Leerdata & seizoen
    content: "{%- set groups = (state_attr('sensor.cloudems_boiler_status', 'groups') or []) %}\n{%- if not groups %}\n*Geen cascade-groepen geconfigureerd.*\n{%- else %}\n  {%- for g in groups %}\n   \
      \ {%- set season   = g.get('season', 'unknown') %}\n    {%- set season_icon = '☀️' if season == 'summer' else ('❄️' if season == 'winter' else '\U0001F342') %}\n    {%- set delivery = g.get('delivery_entity',\
      \ '') %}\n    {%- set learned  = g.get('delivery_learned', false) %}\n    {%- set learn_st = g.get('learn_status', {}) %}\n\n**{{ g.get('name', 'Groep') }}** · {{ season_icon }} {{ season | title\
      \ }} · modus: `{{ g.get('mode', '—') }}`\n\n{%- if learned and delivery %}\n\U0001F947 Leveringsboiler: **{{ delivery.split('.')[-1] }}**\n{%- else %}\n\U0001F393 Leveringsboiler nog niet geleerd\
      \ ({{ learn_st.get('events', 0) }} cycli)\n{%- endif %}\n\n    {%- set boilers = g.get('boilers', []) %}\n    {%- if boilers | length > 1 %}\n\n| Boiler | Opwarmsnelheid | Cyclus kWh | Prioriteit\
      \ |\n|---|---|---|---|\n      {%- for b in boilers %}\n        {%- set hr = b.get('heat_rate_c_h', 0) | float %}\n| {{ b.get('label', '?') }} | {{ hr | round(1) if hr > 0 else '—' }}°C/u | {{ b.get('cycle_kwh',\
      \ 0) | round(2) }} | {{ '\U0001F947' if b.get('is_delivery') else ('#' ~ loop.index) }} |\n      {%- endfor %}\n    {%- endif %}\n  {%- endfor %}\n{%- endif %}\n"
    card_mod:
      style: "ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }\n\
        .card-header { border-bottom: 1px solid rgba(255,255,255,0.07) !important; color: rgb(255,255,255) !important; font-size: 14px !important; font-weight: 600 !important; padding: 14px 16px 12px !important;\
        \ }\nha-markdown-element table { width: 100% !important; border-collapse: collapse !important; }\nha-markdown-element td, ha-markdown-element th { padding: 5px 8px !important; border-bottom: 1px\
        \ solid rgba(255,255,255,0.05) !important; font-size: 13px !important; }\nha-markdown-element th { color: rgba(255,255,255,0.5) !important; font-weight: 500 !important; }\n"
  - type: markdown
    title: 📊 Warm water — gebruikspatroon per uur
    content: "{%- set groups = (state_attr('sensor.cloudems_boiler_status', 'groups') or []) %}\n{%- set all_boilers = (state_attr('sensor.cloudems_boiler_status', 'boilers') or []) %}\n{%- set ns = namespace(pattern=[])\
      \ %}\n{%- for g in groups %}\n  {%- set ls = g.get('learn_status', {}) %}\n  {%- if ls.get('hourly_demand') %}\n    {%- set ns.pattern = ls.get('hourly_demand') %}\n  {%- endif %}\n{%- endfor %}\n\
      \n{%- if not ns.pattern %}\n*Nog geen gebruikspatroon beschikbaar. Het systeem leert dit automatisch.*\n{%- else %}\nWarmwater gebruik per uur van de dag (genormaliseerd):\n\n{%- set max_val = ns.pattern\
      \ | max | float %}\n{%- for val in ns.pattern %}\n  {%- set hour = loop.index0 %}\n  {%- set bar_len = ((val | float / max_val) * 20) | round(0) | int if max_val > 0 else 0 %}\n  {%- set bar = '█'\
      \ * bar_len %}\n  {%- set pct = ((val | float / max_val) * 100) | round(0) | int if max_val > 0 else 0 %}\n`{{ '%02d' | format(hour) }}u` {{ bar }} {{ pct }}%\n{%- endfor %}\n{%- endif %}\n"
    card_mod:
      style: "ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }\n\
        .card-header { border-bottom: 1px solid rgba(255,255,255,0.07) !important; color: rgb(255,255,255) !important; font-size: 14px !important; font-weight: 600 !important; padding: 14px 16px 12px !important;\
        \ }\nha-markdown-element p, ha-markdown-element code { font-size: 12px !important; line-height: 1.5 !important; font-family: monospace !important; }\n"
- title: Klimaat
  path: cloudems-klimaat
  type: masonry
  max_columns: 2
  icon: "mdi:home-thermometer"
  background: url(/local/cloudems/images/bg-klimaat.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(128,203,196,0.07) 0%, transparent 60%), rgb(24,24,24)
  card_mod:
    style: "hui-view { padding: 12px 12px 24px !important; }\n"
  cards:
  - *id001
  - type: conditional
    conditions:
    - condition: state
      entity: switch.cloudems_module_klimaat
      state: 'off'
    card:
      type: markdown
      content: "⚠️ **\U0001F321️ Klimaat module staat uit.** Schakel hem in via het [Configuratie tabblad](#cloudems-config) om deze functie te activeren.\n"
      card_mod:
        style: "ha-card { background: rgba(255,140,0,0.12) !important; border: 1px solid rgba(255,140,0,0.4) !important; border-radius: 12px !important; padding: 4px 12px !important; }\n"
  - type: markdown
    title: 🔍 Gevonden Klimaatapparaten
    content: "{% set ce = state_attr('sensor.cloudems_climate', 'climate_entities') or {} %}\n{% set sc = state_attr('sensor.cloudems_climate', 'smart_climate') or {} %}\n{% set beheerde_ids = sc.get('zones',\
      \ []) | map(attribute='name') | list %}\n{% set by_area = ce.get('by_area', {}) %}\n{% if not by_area %}\nℹ️ *Geen klimaatapparaten gevonden. Controleer of je thermostaten correct zijn geconfigureerd.*\n\
      {% else %}\nCloudEMS detecteert **{{ ce.get('count', 0) }} apparaten** — alleen-lezen tot je ze activeert.\n\n{% set type_icon = {'vt':'\U0001F321️','trv':'\U0001F527','airco':'❄️','unknown':'❓'}\
      \ %}\n{% set type_label = {'vt':'Versatile Therm.','trv':'TRV/Radiator','airco':'Airco/Warmtepomp','unknown':'Onbekend type'} %}\n{% for area, devices in by_area.items() %}\n---\n| Apparaat | Type\
      \ | Nu | Doel | Status |\n|---|---|---|---|---|\n{% for d in devices %}\n{% set ti = type_icon.get(d.type, '❓') %}\n{% set tl = type_label.get(d.type, d.type) %}\n{% set beheerd = d.name in beheerde_ids\
      \ %}\n{% set status = '✅ beheerd' if beheerd else '\U0001F441️ alleen-lezen' %}\n| `{{ d.entity_id.split('.')[-1] }}` **{{ d.name }}** | {{ ti }} {{ tl }} | {{ d.current_temp or '—' }}°C | {{ d.target_temp\
      \ or '—' }}°C | {{ status }} |\n{% endfor %}\n{% endfor %}\n\n\U0001F4A1 *Activeer apparaten via de **CloudEMS wizard** (opties → Klimaatbeheer) om ze te laten aansturen.*\n{% endif %}\n"
    card_mod:
      style: "ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }\n"
  - type: markdown
    title: 🏠 Actieve Zones — Live Beheer
    content: "{% set sc = state_attr('sensor.cloudems_climate', 'smart_climate') or {} %}\n{% set zones = sc.get('zones', []) %}\n{% if not sc.get('enabled') or not zones %}\n*Geen actieve zones. Activeer\
      \ apparaten via CloudEMS wizard → Klimaatbeheer.*\n{% else %}\n| Zone | Preset | Temp | Doel | Bron | Aanwezigheid | Vraag |\n|---|---|---|---|---|---|---|\n{% for z in zones %}\n{% set pie = {'comfort':'\U0001F3E0\
      ','eco':'\U0001F33F','boost':'\U0001F525','sleep':'\U0001F634','away':'\U0001F697','solar':'☀️','houtfire':'\U0001FAB5','eco_window':'\U0001FA9F'} %}\n{% set src_icon = {'extern':'\U0001F4E1','thermostat':'\U0001F527\
      ','cache':'\U0001F4BE','onbekend':'❓'} %}\n{% set heat = '\U0001F534' if z.heat_demand else ('\U0001F535' if z.cool_demand else '✅') %}\n{% set pres = z.get('presence', {}) %}\n{% set pi = '\U0001F464\
      ' if pres.get('status') == 'thuis' else ('\U0001F697' if pres.get('status') == 'weg' else '❓') %}\n{% set ts = z.get('temp_sensors', []) %}\n{% set bron = src_icon.get(z.get('temp_source',''), '❓')\
      \ %}\n{% if ts %}{% set bron = bron + ' ' + (ts | first).split('.')[-1] %}{% endif %}\n| **{{ z.name }}** | {{ pie.get(z.preset,'❓') }} {{ z.preset }} | {{ z.current_temp or '—' }}°C | **{{ z.target_temp\
      \ }}°C** | {{ bron }} | {{ pi }} {{ pres.get('status','—') }} | {{ heat }} |\n{% endfor %}\n\n{% for z in zones %}\n• **{{ z.name }}**: {{ z.reason }}{% if z.get('override') %} ⚡ *override: {{ z.override\
      \ }}*{% endif %}\n{% endfor %}\n{% endif %}\n"
    card_mod:
      style: "ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }\n"
  - type: markdown
    title: 🌡️ Externe Temperatuursensoren
    content: "{% set sc = state_attr('sensor.cloudems_climate', 'smart_climate') or {} %}\n{% set zones = sc.get('zones', []) %}\nCloudEMS leest ruimtetemperatuur in deze volgorde:\n**1. \U0001F4E1 Externe\
      \ sensor** (los thermometer) → **2. \U0001F527 Ingebouwd in TRV/thermostat** → **3. \U0001F4BE Laatste bekende waarde**\n\n{% if zones %}\n| Zone | Geconfigureerde sensoren | Actieve bron | Temperatuur\
      \ |\n|---|---|---|---|\n{% for z in zones %}\n{% set ts = z.get('temp_sensors', []) %}\n{% set bron = z.get('temp_source', 'onbekend') %}\n{% set bron_icon = {'extern':'\U0001F4E1 extern','thermostat':'\U0001F527\
      \ TRV ingebouwd','cache':'\U0001F4BE cache','onbekend':'❓'} %}\n| **{{ z.name }}** | {% if ts %}{{ ts | join(', ') }}{% else %}*niet geconfigureerd*{% endif %} | {{ bron_icon.get(bron, bron) }} |\
      \ {{ z.current_temp or '—' }}°C |\n{% endfor %}\n\n\U0001F4A1 *Sensoren koppelen via CloudEMS wizard (opties → Klimaatbeheer → zone bewerken).*\n{% else %}\n*Activeer eerst zones via CloudEMS wizard\
      \ → Klimaatbeheer.*\nWerkt met elke HA temperatuursensor: Zigbee, Z-Wave, Bluetooth, ESPHome, DSMR.\nMeerdere sensoren per zone = automatisch gemiddelde.\n{% endif %}\n"
    card_mod:
      style: "ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }\n"
  - type: markdown
    title: 🔥 CV-Ketel
    content: "{% set d = state_attr('sensor.cloudems_climate', 'boiler') or {} %}\n{% set on = d.get('boiler_on', false) %}\n{% set n = d.get('zones_calling', 0) %}\n{% if on %}\U0001F534 **BRANDER AAN**\
      \ — {{ n }} zone{{ 's' if n != 1 else '' }}: *{{ d.get('calling_zones', []) | join(', ') }}*\n{% else %}\U0001F535 **Brander uit** — {{ d.get('reason', '—') }}{% endif %}\n\n{% set pred = state_attr('sensor.cloudems_climate',\
      \ 'predictive') or {} %}\n{% if pred %}---\n**Pre-heat leermodel**\n| Zone | Opwarmsnelheid | Pre-heat | Metingen |\n|---|---|---|---|\n{% for zone, info in pred.items() %}| {{ zone }} | {{ info.rate_k_min\
      \ }}°C/min | {{ info.offset_min }} min eerder | {{ info.samples }} |\n{% endfor %}{% endif %}\n"
    card_mod:
      style: "ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }\n"
  - type: markdown
    title: 📅 Geleerd Aanwezigheidspatroon
    content: "{% set sc = state_attr('sensor.cloudems_climate', 'smart_climate') or {} %}\n{% set zones = sc.get('zones', []) %}\n{% set zone = zones | first if zones else none %}\n{% if zone and zone.get('presence_heatmap')\
      \ %}\n{% set hm = zone.presence_heatmap %}\n{% set dagen = ['Ma','Di','Wo','Do','Vr','Za','Zo'] %}\nAanwezigheid **{{ zone.name }}** — \U0001F7E2 thuis · \U0001F534 weg · \U0001F7E1 onzeker · ⬜ onvoldoende\
      \ data\n\n| Uur | Ma | Di | Wo | Do | Vr | Za | Zo |\n|---|---|---|---|---|---|---|---|\n{% for h in range(24) %}| **{{ '%02d'|format(h) }}** | {% for d in range(7) %}{% set key = d|string + '_' +\
      \ h|string %}{% set b = hm.get(key, {}) %}{% set s = b.get('score', 0.5) %}{% set r = b.get('reliable', false) %}{% if not r %}⬜{% elif s >= 0.55 %}\U0001F7E2{% elif s <= 0.35 %}\U0001F534{% else\
      \ %}\U0001F7E1{% endif %} | {% endfor %}\n{% endfor %}\n{% else %}*Heatmap zichtbaar na 2 weken gebruik.*{% endif %}\n"
    card_mod:
      style: "ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }\n"
  - type: markdown
    content: "<div style=\"display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:4px 2px;\">\n  <div style=\"display:flex;align-items:center;gap:10px;\">\n    <span\
      \ style=\"font-size:20px;\">⚡</span>\n    <div>\n      <div style=\"color:rgb(255,255,255);font-weight:600;font-size:13px;line-height:1.3;\">CloudEMS v{{ state_attr('sensor.cloudems_status','version')\
      \ or state_attr('sensor.cloudems_watchdog','cloudems_version') or '?' }}</div>\n      <div style=\"color:rgb(102,102,102);font-size:11px;\">cloudems.eu · Proprietary License</div>\n    </div>\n  </div>\n\
      \  <div style=\"display:flex;gap:8px;flex-wrap:wrap;\">\n    <a href=\"https://github.com/cloudemsNL/ha-cloudems/issues/new?template=bug_report.md\" target=\"_blank\" style=\"display:inline-flex;align-items:center;gap:6px;background:#1f2937;border:1px\
      \ solid rgba(239,68,68,0.4);color:#f87171;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;text-decoration:none;\">\U0001F41B Bug melden</a>\n    <a href=\"https://github.com/cloudemsNL/ha-cloudems/issues/new?template=feature_request.md\"\
      \ target=\"_blank\" style=\"display:inline-flex;align-items:center;gap:6px;background:#1f2937;border:1px solid rgba(99,102,241,0.4);color:#a5b4fc;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;text-decoration:none;\"\
      >\U0001F4A1 Feature verzoek</a>\n    <a href=\"https://buymeacoffee.com/smarthost9m\" target=\"_blank\" style=\"display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,rgb(245,158,11),rgb(217,119,6));color:rgb(26,16,0);padding:6px\
      \ 14px;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none;\">☕ Steun CloudEMS</a>\n  </div>\n</div>\n"
    card_mod:
      style: "ha-card {\n  background: rgb(22,22,22) !important;\n  border: 1px solid rgba(255,255,255,0.05) !important;\n  border-radius: 14px !important;\n  box-shadow: none !important;\n  --card-background-color:\
