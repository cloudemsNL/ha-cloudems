      show_state: false
      tap_action:
        action: perform-action
        perform_action: button.press
        data:
          entity_id: button.cloudems_nilm_review_previous
      card_mod:
        style: |
          ha-card { background: rgba(100,100,100,0.12) !important; border: 1px solid rgba(100,100,100,0.3) !important; border-radius: 14px !important; --primary-text-color: rgb(163,163,163); --paper-item-icon-color: rgb(163,163,163); --card-background-color: transparent; }
    - type: button
