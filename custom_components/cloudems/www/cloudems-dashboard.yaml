- title: Klimaat
  path: cloudems-klimaat
  max_columns: 2
  icon: mdi:home-thermometer
  background: "url(/local/cloudems/images/bg-klimaat.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(128,203,196,0.07) 0%, transparent 60%), rgb(24,24,24)"
  card_mod:
    style: |
      hui-view { padding: 12px 12px 24px !important; }
  cards:
  - type: conditional
    conditions:
      - condition: state
        entity: switch.cloudems_module_klimaat
        state: "off"
    card:
      type: markdown
      content: |
        ⚠️ **🌡️ Klimaat module staat uit.** Schakel hem in via het [Configuratie tabblad](#cloudems-config) om deze functie te activeren.
      card_mod:
        style: |
          ha-card { background: rgba(255,140,0,0.12) !important; border: 1px solid rgba(255,140,0,0.4) !important; border-radius: 12px !important; padding: 4px 12px !important; }

  - type: markdown
    title: 🔍 Gevonden Klimaatapparaten
    content: |
      {% set ce = state_attr('sensor.cloudems_climate', 'climate_entities') or {} %}
      {% set sc = state_attr('sensor.cloudems_climate', 'smart_climate') or {} %}
      {% set beheerde_ids = sc.get('zones', []) | map(attribute='name') | list %}
      {% set by_area = ce.get('by_area', {}) %}
      {% if not by_area %}
      ℹ️ *Geen klimaatapparaten gevonden. Controleer of je thermostaten correct zijn geconfigureerd.*
      {% else %}
      CloudEMS detecteert **{{ ce.get('count', 0) }} apparaten** — alleen-lezen tot je ze activeert.

      {% set type_icon = {'vt':'🌡️','trv':'🔧','airco':'❄️','unknown':'❓'} %}
      {% set type_label = {'vt':'Versatile Therm.','trv':'TRV/Radiator','airco':'Airco/Warmtepomp','unknown':'Onbekend type'} %}
      {% for area, devices in by_area.items() %}
      ---
      | Apparaat | Type | Nu | Doel | Status |
      |---|---|---|---|---|
      {% for d in devices %}
      {% set ti = type_icon.get(d.type, '❓') %}
      {% set tl = type_label.get(d.type, d.type) %}
      {% set beheerd = d.name in beheerde_ids %}
      {% set status = '✅ beheerd' if beheerd else '👁️ alleen-lezen' %}
      | `{{ d.entity_id.split('.')[-1] }}` **{{ d.name }}** | {{ ti }} {{ tl }} | {{ d.current_temp or '—' }}°C | {{ d.target_temp or '—' }}°C | {{ status }} |
      {% endfor %}
      {% endfor %}

      💡 *Activeer apparaten via de **CloudEMS wizard** (opties → Klimaatbeheer) om ze te laten aansturen.*
      {% endif %}
    card_mod:
      style: |
        ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }

  - type: markdown
    title: 🏠 Actieve Zones — Live Beheer
    content: |
      {% set sc = state_attr('sensor.cloudems_climate', 'smart_climate') or {} %}
      {% set zones = sc.get('zones', []) %}
      {% if not sc.get('enabled') or not zones %}
      *Geen actieve zones. Activeer apparaten via CloudEMS wizard → Klimaatbeheer.*
      {% else %}
      | Zone | Preset | Temp | Doel | Bron | Aanwezigheid | Vraag |
      |---|---|---|---|---|---|---|
      {% for z in zones %}
      {% set pie = {'comfort':'🏠','eco':'🌿','boost':'🔥','sleep':'😴','away':'🚗','solar':'☀️','houtfire':'🪵','eco_window':'🪟'} %}
      {% set src_icon = {'extern':'📡','thermostat':'🔧','cache':'💾','onbekend':'❓'} %}
      {% set heat = '🔴' if z.heat_demand else ('🔵' if z.cool_demand else '✅') %}
      {% set pres = z.get('presence', {}) %}
      {% set pi = '👤' if pres.get('status') == 'thuis' else ('🚗' if pres.get('status') == 'weg' else '❓') %}
      {% set ts = z.get('temp_sensors', []) %}
      {% set bron = src_icon.get(z.get('temp_source',''), '❓') %}
      {% if ts %}{% set bron = bron + ' ' + (ts | first).split('.')[-1] %}{% endif %}
      | **{{ z.name }}** | {{ pie.get(z.preset,'❓') }} {{ z.preset }} | {{ z.current_temp or '—' }}°C | **{{ z.target_temp }}°C** | {{ bron }} | {{ pi }} {{ pres.get('status','—') }} | {{ heat }} |
      {% endfor %}

      {% for z in zones %}
      • **{{ z.name }}**: {{ z.reason }}{% if z.get('override') %} ⚡ *override: {{ z.override }}*{% endif %}
      {% endfor %}
      {% endif %}
    card_mod:
      style: |
        ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }

  - type: markdown
    title: 🌡️ Externe Temperatuursensoren
    content: |
      {% set sc = state_attr('sensor.cloudems_climate', 'smart_climate') or {} %}
      {% set zones = sc.get('zones', []) %}
      CloudEMS leest ruimtetemperatuur in deze volgorde:
      **1. 📡 Externe sensor** (los thermometer) → **2. 🔧 Ingebouwd in TRV/thermostat** → **3. 💾 Laatste bekende waarde**

      {% if zones %}
      | Zone | Geconfigureerde sensoren | Actieve bron | Temperatuur |
      |---|---|---|---|
      {% for z in zones %}
      {% set ts = z.get('temp_sensors', []) %}
      {% set bron = z.get('temp_source', 'onbekend') %}
      {% set bron_icon = {'extern':'📡 extern','thermostat':'🔧 TRV ingebouwd','cache':'💾 cache','onbekend':'❓'} %}
      | **{{ z.name }}** | {% if ts %}{{ ts | join(', ') }}{% else %}*niet geconfigureerd*{% endif %} | {{ bron_icon.get(bron, bron) }} | {{ z.current_temp or '—' }}°C |
      {% endfor %}

      💡 *Sensoren koppelen via CloudEMS wizard (opties → Klimaatbeheer → zone bewerken).*
      {% else %}
      *Activeer eerst zones via CloudEMS wizard → Klimaatbeheer.*
      Werkt met elke HA temperatuursensor: Zigbee, Z-Wave, Bluetooth, ESPHome, DSMR.
      Meerdere sensoren per zone = automatisch gemiddelde.
      {% endif %}
    card_mod:
      style: |
        ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }

  - type: markdown
    title: 🔥 CV-Ketel
    content: |
      {% set d = state_attr('sensor.cloudems_climate', 'boiler') or {} %}
      {% set on = d.get('boiler_on', false) %}
      {% set n = d.get('zones_calling', 0) %}
      {% if on %}🔴 **BRANDER AAN** — {{ n }} zone{{ 's' if n != 1 else '' }}: *{{ d.get('calling_zones', []) | join(', ') }}*
      {% else %}🔵 **Brander uit** — {{ d.get('reason', '—') }}{% endif %}

      {% set pred = state_attr('sensor.cloudems_climate', 'predictive') or {} %}
      {% if pred %}---
      **Pre-heat leermodel**
      | Zone | Opwarmsnelheid | Pre-heat | Metingen |
      |---|---|---|---|
      {% for zone, info in pred.items() %}| {{ zone }} | {{ info.rate_k_min }}°C/min | {{ info.offset_min }} min eerder | {{ info.samples }} |
      {% endfor %}{% endif %}
    card_mod:
      style: |
        ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }

  - type: custom:cloudems-stack-card
    mode: vertical
    cards:
      - type: markdown
        content: |
          ## 🌐 VTherm Central Mode
          Stuur **alle VTherm-thermostaten tegelijk** via Central Mode (vereist Versatile Thermostat v6+).
        card_mod:
          style: |
            ha-card { background: transparent !important; border: none !important; box-shadow: none !important; padding: 16px 16px 4px !important; }
      - type: grid
        columns: 4
        square: false
        cards:
          - type: button
            name: Verwarmen
            icon: mdi:fire
            tap_action:
              action: perform-action
              perform_action: cloudems.vtherm_set_central_mode
              data:
                hvac_mode: heat
            card_mod:
              style: |
                ha-card { background: rgba(255,80,0,0.12) !important; border: 1px solid rgba(255,80,0,0.3) !important; border-radius: 10px !important; }
          - type: button
            name: Eco
            icon: mdi:leaf
            tap_action:
              action: perform-action
              perform_action: cloudems.vtherm_set_central_mode
              data:
                hvac_mode: eco
            card_mod:
              style: |
                ha-card { background: rgba(0,177,64,0.10) !important; border: 1px solid rgba(0,177,64,0.3) !important; border-radius: 10px !important; }
          - type: button
            name: Weg
            icon: mdi:car
            tap_action:
              action: perform-action
              perform_action: cloudems.vtherm_set_central_mode
              data:
                hvac_mode: away
            card_mod:
              style: |
                ha-card { background: rgba(100,100,100,0.12) !important; border: 1px solid rgba(150,150,150,0.3) !important; border-radius: 10px !important; }
          - type: button
            name: Uit
            icon: mdi:power
            tap_action:
              action: perform-action
              perform_action: cloudems.vtherm_set_central_mode
              data:
                hvac_mode: "off"
            card_mod:
              style: |
                ha-card { background: rgba(255,0,0,0.08) !important; border: 1px solid rgba(255,0,0,0.25) !important; border-radius: 10px !important; }
      - type: markdown
        content: |
          {% set sc = state_attr('sensor.cloudems_climate', 'smart_climate') or {} %}
          {% set vt = sc.get('vtherm_central', {}) %}
          {% if vt %}**Central Boiler:** {{ '🔴 AAN' if vt.get('boiler_on') else '🔵 UIT' }} &nbsp;·&nbsp; **Modus:** {{ vt.get('central_mode', '—') }}{% else %}*VTherm Central Mode niet geconfigureerd.*{% endif %}
        card_mod:
          style: |
            ha-card { background: transparent !important; border: none !important; box-shadow: none !important; padding: 4px 16px 12px !important; }

  - type: custom:cloudems-stack-card
    mode: vertical
    cards:
      - type: markdown
        content: |
          ## ⏱️ VTherm Tijdelijke Preset
          Zone tijdelijk op een andere preset — keert automatisch terug.
          Service: `cloudems.vtherm_set_timed_preset` (zone, preset, duration_min)
        card_mod:
          style: |
            ha-card { background: transparent !important; border: none !important; box-shadow: none !important; padding: 16px 16px 4px !important; }
      - type: markdown
        content: |
          {% set sc = state_attr('sensor.cloudems_climate', 'smart_climate') or {} %}
          {% set zones = sc.get('zones', []) %}
          {% if zones %}
          | Zone | Preset | Override | Verloopt |
          |---|---|---|---|
          {% for z in zones %}
          {% set pie = {'comfort':'🏠','eco':'🌿','boost':'🔥','sleep':'😴','away':'🚗','solar':'☀️'} %}
          | **{{ z.name }}** | {{ pie.get(z.preset,'❓') }} {{ z.preset }} | {{ '⚡ ' + z.override if z.get('override') else '—' }} | {{ z.get('override_expires', '—') }} |
          {% endfor %}
          {% else %}*Geen actieve zones.*{% endif %}
        card_mod:
          style: |
            ha-card { background: transparent !important; border: none !important; box-shadow: none !important; padding: 4px 16px 12px !important; }

  - type: markdown
    title: 📅 Geleerd Aanwezigheidspatroon
    content: |
      {% set sc = state_attr('sensor.cloudems_climate', 'smart_climate') or {} %}
      {% set zones = sc.get('zones', []) %}
      {% set zone = zones | first if zones else none %}
      {% if zone and zone.get('presence_heatmap') %}
      {% set hm = zone.presence_heatmap %}
      {% set dagen = ['Ma','Di','Wo','Do','Vr','Za','Zo'] %}
      Aanwezigheid **{{ zone.name }}** — 🟢 thuis · 🔴 weg · 🟡 onzeker · ⬜ onvoldoende data

      | Uur | Ma | Di | Wo | Do | Vr | Za | Zo |
      |---|---|---|---|---|---|---|---|
      {% for h in range(24) %}| **{{ '%02d'|format(h) }}** | {% for d in range(7) %}{% set key = d|string + '_' + h|string %}{% set b = hm.get(key, {}) %}{% set s = b.get('score', 0.5) %}{% set r = b.get('reliable', false) %}{% if not r %}⬜{% elif s >= 0.55 %}🟢{% elif s <= 0.35 %}🔴{% else %}🟡{% endif %} | {% endfor %}
      {% endfor %}
      {% else %}*Heatmap zichtbaar na 2 weken gebruik.*{% endif %}
    card_mod:
      style: |
        ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }

  - type: custom:cloudems-stack-card
    mode: vertical
    cards:
      - type: markdown
        content: "## 🎛️ Handmatige Override\nTijdelijk een zone overschrijven — vervalt automatisch na de ingestelde tijd."
        card_mod:
          style: |
            ha-card { background: transparent !important; border: none !important; box-shadow: none !important; padding: 16px 16px 4px !important; }
      - type: grid
        columns: 3
        square: false
        cards:
          - type: button
            name: Comfort
            icon: mdi:sofa
            label: Woonkamer · 2u
            tap_action:
              action: perform-action
              perform_action: cloudems.set_zone_preset
              data:
                zone_name: woonkamer
                preset: comfort
                hours: 2
            card_mod:
              style: |
                ha-card { background: rgba(255,160,0,0.08) !important; border: 1px solid rgba(255,160,0,0.25) !important; border-radius: 10px !important; box-shadow: none !important; }
          - type: button
            name: Eco
