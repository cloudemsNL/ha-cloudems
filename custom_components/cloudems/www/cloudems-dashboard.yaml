- title: NILM Beheer
  path: cloudems-nilm-beheer
  max_columns: 2
  icon: mdi:check-decagram
  background: "url(/local/cloudems/images/bg-nilm-beheer.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(244,143,177,0.07) 0%, transparent 60%), rgb(24,24,24)"
  card_mod:
    style: |
      hui-view { padding: 12px 12px 24px !important; }
  cards:

  - type: markdown
    title: 🧺 Wasbeurt Cyclus Detector
    content: |
      {% set apps = state_attr('sensor.cloudems_nilm_devices', 'appliance_cycles') %}
      {% set apparaten = apps.apparaten if apps else [] %}
      {% if not apparaten %}
      *Geen apparaten geconfigureerd. CloudEMS detecteert automatisch de wasmachine via NILM.*
      *Voeg een smart plug toe via `appliance_cycle_devices` config voor nauwkeurigere meting.*
      {% else %}
      {% for app in apparaten %}
      {% set fase_icons = {'idle':'💤','voorwas':'💧','verwarmen':'🌡️','wassen':'🌀','spoelen':'💦','centrifuge':'⚡','klaar':'✅'} %}
      {% set fi = fase_icons.get(app.fase, '❓') %}
      ---
      {% if app.is_active %}
      **🔄 Actief** — Fase: **{{ app.fase_nl }}** | Bezig: {{ app.elapsed_min | int }} min
      {% if app.remaining_min %}⏱️ Nog **~{{ app.remaining_min | int }} minuten**{% endif %}
      {% if app.huidig_programma %}📋 Programma: *{{ app.huidig_programma }}*{% endif %}
      {% if app.cyclus_kwh %}⚡ Dit gebruik: {{ app.cyclus_kwh }} kWh{% endif %}

      **Fase-voortgang:**
      {% set fases = ['voorwas','verwarmen','wassen','spoelen','centrifuge'] %}
      {% set actief_idx = fases.index(app.fase) if app.fase in fases else -1 %}
      {% for f in fases %}{% set idx = loop.index0 %}{% if idx < actief_idx %}✅{% elif idx == actief_idx %}🔄{% else %}⬜{% endif %} {{ fase_icons.get(f,'') }} {{ f | title }} {% endfor %}
      {% elif app.fase == 'klaar' %}
      **✅ Klaar!** — Haal de was op 🧺
      {% else %}
      💤 Staat uit — {{ app.totaal_cycli }} cycli geleerd
      {% endif %}

      {% if app.programmas %}
      **Geleerde programma's:**
      | Naam | Duur | Verbruik | Cycli |
      |---|---|---|---|
      {% for p in app.programmas %}| {{ p.naam }} | {{ p.totaal_duur | int }} min | {{ p.totaal_kwh }} kWh | {{ p.cycli }}× |
      {% endfor %}{% endif %}

      {% set lp = app.geleerde_params %}
      {% if lp.idle_max_w %}
      *Parameters geleerd: standby {{ lp.idle_max_w }}W, verwarmen min {{ lp.heat_min_w }}W, centrifuge piek {{ lp.spin_peak_w }}W*
      {% else %}*Nog aan het leren — na 2-3 volledige cycli zijn drempelwaarden bekend.*{% endif %}
      {% endfor %}{% endif %}
    card_mod:
      style: |
        ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }

  - type: markdown
    title: 📡 NILM Live Activiteit
    content: |
      {% set diag     = state_attr('sensor.cloudems_nilm_diagnostics', 'events_total') | int(0) %}
      {% set rate     = states('sensor.cloudems_nilm_diagnostics') | float(0) %}
      {% set classified = state_attr('sensor.cloudems_nilm_diagnostics', 'events_classified') | int(0) %}
      {% set missed   = state_attr('sensor.cloudems_nilm_diagnostics', 'events_missed') | int(0) %}
      {% set last_ts  = state_attr('sensor.cloudems_nilm_diagnostics', 'last_event_ts') %}
      {% set last_dw  = state_attr('sensor.cloudems_nilm_diagnostics', 'last_event_delta_w') | float(0) %}
      {% set last_match = state_attr('sensor.cloudems_nilm_diagnostics', 'last_match') %}
      {% set known    = state_attr('sensor.cloudems_nilm_diagnostics', 'devices_known') | int(0) %}
      {% set confirmed = state_attr('sensor.cloudems_nilm_diagnostics', 'devices_confirmed') | int(0) %}
      {% set b_l1     = state_attr('sensor.cloudems_nilm_diagnostics', 'baseline_l1_w') | float(0) %}
      {% set b_l2     = state_attr('sensor.cloudems_nilm_diagnostics', 'baseline_l2_w') | float(0) %}
      {% set b_l3     = state_attr('sensor.cloudems_nilm_diagnostics', 'baseline_l3_w') | float(0) %}
      {% set ai_mode  = state_attr('sensor.cloudems_nilm_diagnostics', 'ai_mode') %}
      {% set thr_w    = state_attr('sensor.cloudems_nilm_sensor_input', 'adaptive_threshold_w') | float(0) %}
      {% set thr_ada  = state_attr('sensor.cloudems_nilm_sensor_input', 'threshold_adapted') %}
      {% set noise_w  = state_attr('sensor.cloudems_nilm_sensor_input', 'noise_p80_w') | float(0) %}
      {% set thr_samp = state_attr('sensor.cloudems_nilm_sensor_input', 'threshold_samples') | int(0) %}
      {% set running  = state_attr('sensor.cloudems_nilm_running_devices', 'device_list') or [] %}
      {% set ankers   = states('sensor.cloudems_nilm_hybride_status') | int(0) %}
      {% set enrich   = state_attr('sensor.cloudems_nilm_hybride_status', 'stat_enrich_calls') | int(0) %}
      {% set hits     = state_attr('sensor.cloudems_nilm_hybride_status', 'stat_anchor_hits') | int(0) %}

      {% if diag == 0 and rate == 0 %}
      🔴 **NILM ziet nog geen vermogensveranderingen.** Controleer of de netmeter-sensor kloppende waarden levert.
      {% elif rate < 50 %}
      🟡 **NILM actief — classificatiegraad laag ({{ rate | round(1) }}%)**
      {% else %}
      🟢 **NILM actief — {{ rate | round(1) }}% geclassificeerd**
      {% endif %}

      **Metingstatus:**

      | Gegeven | Waarde |
      |---|---|
      | Vermogensevents totaal | {{ diag }} |
      | Geclassificeerd | {{ classified }} ({{ rate | round(1) }}%) |
      | Niet herkend | {{ missed }} |
      | Laatste event | {% if last_ts %}{{ last_ts }} · Δ{{ last_dw | round(0) | int }} W{% else %}—{% endif %} |
      | Laatste match | {{ last_match if last_match else '—' }} |
      | Apparaten bekend/bevestigd | {{ known }} / {{ confirmed }} |
      | AI modus | {{ ai_mode if ai_mode else '—' }} |

      **Drempelwaarde & Ruis:**

      | Gegeven | Waarde |
      |---|---|
      | Adaptieve drempel | {{ thr_w | round(1) }} W {% if thr_ada %}✅ aangepast{% else %}⏳ aan het leren ({{ thr_samp }} samples){% endif %} |
