- title: EV & Mobiliteit
  path: cloudems-mobiliteit
  type: sections
  max_columns: 1
  icon: mdi:car-electric-outline
  background: url(/local/cloudems/images/bg-mobiliteit.svg) center/cover no-repeat,
    radial-gradient(ellipse 70% 50% at 50% -10%, rgba(165,214,167,0.07) 0%, transparent
    60%), rgb(24,24,24)
  card_mod:
    style: 'hui-view { padding: 12px 12px 24px !important; }

      '
  sections:
  - type: grid
    column_span: 1
    cards:
    - type: custom:cloudems-mini-price-card
    - type: conditional
      conditions:
      - condition: state
        entity: switch.cloudems_module_ev_lader
        state: 'off'
      card:
        type: markdown
        content: '⚠ **🚗 EV Lader module staat uit.** Schakel hem in via het [Configuratie
          tabblad](#cloudems-config) om deze functie te activeren.

          '
        card_mod:
          style: 'ha-card { background: rgba(255,140,0,0.12) !important; border: 1px
            solid rgba(255,140,0,0.4) !important; border-radius: 12px !important;
            padding: 4px 12px !important; }

            '
    - type: custom:cloudems-ev-trip-card
      title: 🗓 EV Ritplanning
    - type: custom:cloudems-v2h-card
      title: 🔄 Vehicle-to-Home
    - type: entities
      title: 🚗 EV Sessie Leermodel
      icon: mdi:ev-plug-type2
      entities:
      - entity: sensor.cloudems_ev_sessie_leermodel
        name: Verwacht volgende sessie (kWh)
      - type: attribute
        entity: sensor.cloudems_ev_sessie_leermodel
        attribute: session_active
        name: Sessie actief
      - type: attribute
        entity: sensor.cloudems_ev_sessie_leermodel
        attribute: predicted_duration_h
        name: Verwachte duur (uur)
    - type: markdown
      title: 📋 Geleerde Voertuigprofielen
      content: '{% set profiles = state_attr(''sensor.cloudems_micro_mobiliteit'',
        ''vehicle_profiles'') or [] %} {% if profiles | length == 0 %} *Nog geen voertuigen
        gedetecteerd.* {% else %} | Voertuig | Sessies | Gem. kWh | |----------|---------|----------|
        {% for p in profiles %} | {{ p.get(''label'') or ''Onbekend'' }} | {{ p.get(''sessions'',
        0) | int(0) }} | {{ ''%.2f'' % (p.get(''avg_kwh'', 0) | float(0)) }} | {%
        endfor %} {% endif %}

        '
    - type: conditional
      conditions:
      - condition: state
        entity: sensor.cloudems_ev_trip_planner
        state_not: unavailable
      card:
        type: custom:cloudems-ev-trip-card
        title: 🗺 EV Trip Planner
    - type: conditional
      conditions:
      - condition: state
        entity: sensor.cloudems_phase_outlet_detector
        state_not: unavailable
      card:
        type: custom:cloudems-phase-outlet-card
        title: 🔌 Fase Outlet
    - type: conditional
      conditions:
      - condition: state
        entity: sensor.cloudems_egauge
        state_not: unavailable
      card:
        type: custom:cloudems-egauge-card
        title: 📊 EV Vermogen
    - type: conditional
      conditions:
      - condition: state
        entity: sensor.cloudems_neighbourhood
        state_not: unavailable
      card:
        type: custom:cloudems-neighbourhood-card
        title: 🏘 Buurt Energie
    - type: conditional
      conditions:
      - condition: state
        entity: sensor.cloudems_vve
        state_not: unavailable
      card:
        type: custom:cloudems-vve-card
        title: 🏢 VvE Splitsing
    - type: conditional
      conditions:
      - condition: state
        entity: sensor.cloudems_batterij_epex_schema
        state_not: unavailable
      card:
        type: custom:cloudems-ev-laadplan-card
        title: 🚗 EV Laadplan 24u
