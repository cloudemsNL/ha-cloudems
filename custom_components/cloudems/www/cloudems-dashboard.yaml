          title: "📅 Wekelijkse Vergelijking"
          content: |
            {% set d = state_attr('sensor.cloudems_weekly_comparison', 'kwh_delta_pct') %}
            {% set tw = state_attr('sensor.cloudems_weekly_comparison', 'this_week_kwh') | float(0) %}
            {% set lw = state_attr('sensor.cloudems_weekly_comparison', 'last_week_kwh') | float(0) %}
            {% set tc = state_attr('sensor.cloudems_weekly_comparison', 'this_week_cost') | float(0) %}
            {% set lc = state_attr('sensor.cloudems_weekly_comparison', 'last_week_cost') | float(0) %}
            {% set dp = d | float(0) %}
            {% set arr = '▲' if dp > 0 else '▼' %}
            | | Deze week | Vorige week | Δ |
            |---|---|---|---|
            | Verbruik | **{{ tw }} kWh** | {{ lw }} kWh | {% if d %}{{ arr }} {{ dp | abs | round(0) | int }}%{% else %}—{% endif %} |
            | Kosten | **€{{ tc }}** | €{{ lc }} | {% set cp = state_attr('sensor.cloudems_weekly_comparison', 'cost_delta_pct') | float(0) %}{% if cp %}{{ '▲' if cp > 0 else '▼' }} {{ cp | abs | round(0) | int }}%{% else %}—{% endif %} |
            | Zonne | **{{ state_attr('sensor.cloudems_weekly_comparison', 'this_week_solar') | float(0) }} kWh** | {{ state_attr('sensor.cloudems_weekly_comparison', 'last_week_solar') | float(0) }} kWh | — |
