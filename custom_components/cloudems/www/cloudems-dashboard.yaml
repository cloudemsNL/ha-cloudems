  - type: markdown
    title: ⚡ CloudEMS — Energie Monitor
    content: |
      {% set ov = state_attr('sensor.cloudems_kamers_overzicht', 'rooms') or [] %}
      {% set top = states('sensor.cloudems_kamers_overzicht') %}
      {% set total_w = state_attr('sensor.cloudems_kamers_overzicht', 'total_power_w') | float(0) %}
      {% set all_devs = state_attr('sensor.cloudems_nilm_devices','device_list') or [] %}
      {% if ov %}
      ## ⚡ Huisverbruik
      **Totaal:** {{ total_w | int }} W
      **Hoogste verbruiker:** 🏆 {{ top }}

      ---

      ## 📊 Vermogen per kamer

      | Kamer | Vermogen | Bar | Vandaag |
      | --- | ---: | --- | ---: |
      {% for r in ov | sort(attribute='power_w', reverse=True) %}{% set bar = '█' * ((r.power_w | int / total_w * 20) | int) if total_w > 0 else '' %}| {{ r.room | title }} | {{ r.power_w | int }} W | {{ bar }} | {{ r.kwh_today | round(2) }} kWh |
      {% endfor %}
      ---
      {% for r in ov | sort(attribute='power_w', reverse=True) %}{% set room_devs = all_devs | selectattr('room','defined') | selectattr('room','eq', r.room) | list %}{% if room_devs | length > 0 %}

      ## 🔌 {{ r.room | title }} ({{ r.power_w | int }} W)

      | Apparaat | W | Fase | Status |
      | --- | ---: | --- | --- |
      {% for d in room_devs | sort(attribute='power_w', reverse=True) %}{% set ph = d.get('phase','?') %}{% set ph_ico = '🔵' if ph == 'L1' else ('🟡' if ph == 'L2' else ('🟢' if ph == 'L3' else '⚪')) %}{% set status = '✅ confirmed' if d.get('confirmed') else ('🚫 ignored' if d.get('user_suppressed') else '🧠 learning') %}{% set active = '🟢' if d.get('is_on') else '⚫' %}| {{ active }} {{ d.get('name', d.get('device_type','?')) }} | {{ d.get('power_w',0) | int }} | {{ ph_ico }} {{ ph }} | {{ status }} |
      {% endfor %}{% endif %}{% endfor %}

      ---

      🧠 **NILM status**
      - 🟢 actief apparaat
      - ⚫ standby
      - 🧠 learning
      - ✅ bevestigd
      - 🚫 genegeerd
      {% else %}
      🧠 **CloudEMS NILM is nog aan het leren.**
      Apparaten verschijnen automatisch zodra herkenning klaar is
      (meestal binnen **12-24 uur**).
      {% endif %}
