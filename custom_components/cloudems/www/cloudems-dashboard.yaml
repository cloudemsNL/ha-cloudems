      {% else %}
      {% set plugs = active | selectattr('source_type','eq','smart_plug') | list %}
      {% set nilms  = active | rejectattr('source_type','eq','smart_plug') | list %}
      {% set l1w = active | selectattr('phase','eq','L1') | sum(attribute='power_w') | int %}
      {% set l2w = active | selectattr('phase','eq','L2') | sum(attribute='power_w') | int %}
