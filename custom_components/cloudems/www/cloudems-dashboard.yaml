      content: "{% set m = states('sensor.cloudems_micro_mobiliteit') | float(0) %}\n{% set kwh_today   = state_attr('sensor.cloudems_micro_mobiliteit', 'kwh_today') | float(0) %}\n{% set cost_today  =\
        \ state_attr('sensor.cloudems_micro_mobiliteit', 'cost_today_eur') | float(0) %}\n{% set weekly_avg  = state_attr('sensor.cloudems_micro_mobiliteit', 'weekly_kwh_avg') | float(0) %}\n{% set total_sess\
        \  = state_attr('sensor.cloudems_micro_mobiliteit', 'total_sessions') | int(0) %}\n{% set best_hour   = state_attr('sensor.cloudems_micro_mobiliteit', 'best_charge_hour') %}\n{% set advice     \
        \ = state_attr('sensor.cloudems_micro_mobiliteit', 'advice') %}\n{% set profiles    = state_attr('sensor.cloudems_micro_mobiliteit', 'vehicle_profiles') or [] %}\n{% set active      = state_attr('sensor.cloudems_micro_mobiliteit',\
