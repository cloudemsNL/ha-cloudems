  - type: markdown
    title: 📈 Benutting & Clipping-drempel
    content: |
      {%- set invs = state_attr('sensor.cloudems_solar_system_intelligence', 'inverters') or [] -%}
      {%- if not invs -%}
      *Geen omvormers beschikbaar.*
      {%- else -%}
      {%- for inv in invs -%}
      {%- set ceiling = inv.rated_power_w or inv.peak_w_7d or inv.peak_w or 0 -%}
      {%- set ceiling = ceiling | float(0) -%}
      {%- set cur_w = inv.current_w | default(0) | float -%}
      {%- set pct = [[(cur_w / ceiling * 100) | round(0) | int, 0] | max, 100] | min if ceiling > 0 else 0 -%}
      {%- set bar_filled = (pct / 5) | int -%}
      {%- set clipping = inv.clipping | default(false) -%}
      {%- set clip_icon = '⚠️ Clipping!' if clipping else '' -%}
      **{{ inv.label }}** — {{ cur_w | int }} W  {{ clip_icon }}
      `[{{ '█' * bar_filled }}{{ '░' * (20 - bar_filled) }}]` {{ pct }}% van {{ ceiling | int }} W{{ ' *(rating: ' ~ (inv.rated_power_w | int) ~ ' W)*' if inv.rated_power_w else '' }}

      {% endfor %}
      {%- endif %}
