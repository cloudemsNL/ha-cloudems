- title: Diagnose
  path: cloudems-diagnose
  type: masonry
  max_columns: 1
  icon: "mdi:stethoscope"
  background: url(/local/cloudems/images/bg-diagnose.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(239,154,154,0.06) 0%, transparent 60%), rgb(24,24,24)
  card_mod:
    style: "hui-view { padding: 12px 12px 24px !important; }\n"
  cards:
  - *id001
  - type: custom:cloudems-diagnose-card
  - type: markdown
    title: "🔌 Groepenkast Monitor"
    content: "{% set cm = state_attr('sensor.cloudems_status','circuit_monitor') or {} %}
{% set alerts = cm.get('alerts',{}) %}
{% if not cm %}
⏳ *Circuit monitor nog niet actief.*
{% elif not alerts %}
✅ **Alle fasen normaal** — geen uitgevallen groepen gedetecteerd.
{% else %}
{% for ph, a in alerts.items() %}
🚨 **Fase {{ a.phase }} — {{ 'Totaaluitval' if a.type == 'total_zero' else 'Inactief' }}**
- Gemeten: {{ a.power_w | round(1) }} W
- Al {{ (a.inactive_s // 60) if a.inactive_s else (a.since_s // 60) }} min inactief
{% if a.devices %}- Getroffen: {{ a.devices[:4] | join(', ') }}{% endif %}
{% endfor %}
{% endif %}
"
  - type: custom:cloudems-version-card
- title: Configuratie
  path: cloudems-config
  type: masonry
  max_columns: 2
  icon: "mdi:cog-outline"
  background: url(/local/cloudems/images/bg-config.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(176,190,197,0.06) 0%, transparent 60%), rgb(24,24,24)
  card_mod:
    style: "hui-view { padding: 12px 12px 24px !important; }\n"
  cards:
  - *id001
  - type: "custom:cloudems-config-card"
  - type: "custom:cloudems-beheer-card"
    title: ⚡ CloudEMS
