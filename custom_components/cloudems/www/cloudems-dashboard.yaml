    card_mod:
      style: "ha-card {\n  background: rgb(34,34,34) !important;\n  border: 1px solid rgba(255,255,255,0.06) !important;\n  border-radius: 16px !important;\n  box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;\n\
        \  --primary-text-color: rgb(255,255,255);\n  --secondary-text-color: rgb(163,163,163);\n  --state-active-color: rgb(0,177,64);\n  --state-inactive-color: rgb(68,68,68);\n  --state-unavailable-color:\
        \ rgb(239,68,68);\n  --primary-color: rgb(0,177,64);\n  --accent-color: rgb(0,212,78);\n  --card-background-color: transparent;\n  --ha-card-border-color: transparent;\n  --divider-color: rgba(255,255,255,0.06);\n\
        \  --secondary-background-color: rgba(0,177,64,0.08);\n}\nha-card:hover {\n  border-color: rgba(0,177,64,0.5) !important;\n  box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 16px rgba(0,177,64,0.12)\
        \ !important;\n  transform: translateY(-1px) !important;\n}\n.card-header {\n  background: transparent !important;\n  border-bottom: 1px solid rgba(255,255,255,0.07) !important;\n  color: rgb(255,255,255)\
        \ !important;\n  font-size: 12px !important;\n  font-weight: 600 !important;\n  letter-spacing: 0.04em !important;\n  padding: 14px 16px 12px !important;\n}\n"
  - type: markdown
    title: 📥 Rapport downloaden
    content: "{% set url = states('sensor.cloudems_last_report_url') %}\n{% set label = state_attr('sensor.cloudems_last_report_url', 'label') %}\n{% if url and url != 'geen' %}\n✅ Rapport klaar — **{{\
      \ label }}**\n\n<a href=\"{{ url }}\" target=\"_blank\" style=\"display:inline-flex;align-items:center;gap:8px;background:rgb(0,177,64);color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;margin-top:6px;\"\
      >\U0001F4E5 Rapport openen / downloaden</a>\n\n*Klik Opslaan als PDF in je browser om een PDF te maken.*\n{% else %}\nKlik op **\U0001F4E5 Energierapport downloaden** hierboven om een rapport te genereren.\n\
      \n*Het rapport bevat verbruik, kosten, zonne-energie, top-apparaten en CO₂ van de afgelopen maand.*\n{% endif %}\n"
    card_mod:
      style: "ha-card {\n  background: rgb(34,34,34) !important;\n  border: 1px solid rgba(0,177,64,0.25) !important;\n  border-radius: 16px !important;\n  box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;\n\
        \  --primary-text-color: rgb(163,163,163);\n  --card-background-color: transparent;\n  --ha-card-border-color: transparent;\n}\n.card-header { color: rgb(255,255,255) !important; font-size: 12px\
        \ !important; font-weight: 600 !important; padding: 14px 16px 12px !important; border-bottom: 1px solid rgba(255,255,255,0.07) !important; }\nha-markdown-element { padding: 12px 16px 14px !important;\
        \ }\n"
  - type: markdown
    content: "<div style=\"display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:4px 2px;\">\n  <div style=\"display:flex;align-items:center;gap:10px;\">\n    <span\
      \ style=\"font-size:20px;\">⚡</span>\n    <div>\n      <div style=\"color:rgb(255,255,255);font-weight:600;font-size:13px;line-height:1.3;\">CloudEMS v{{ state_attr('sensor.cloudems_status','version')\
      \ or state_attr('sensor.cloudems_watchdog','cloudems_version') or '?' }}</div>\n      <div style=\"color:rgb(102,102,102);font-size:11px;\">cloudems.eu · Proprietary License</div>\n    </div>\n  </div>\n\
      \  <div style=\"display:flex;gap:8px;flex-wrap:wrap;\">\n    <a href=\"https://github.com/cloudemsNL/ha-cloudems/issues/new?template=bug_report.md\" target=\"_blank\" style=\"display:inline-flex;align-items:center;gap:6px;background:#1f2937;border:1px\
      \ solid rgba(239,68,68,0.4);color:#f87171;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;text-decoration:none;\">\U0001F41B Bug melden</a>\n    <a href=\"https://github.com/cloudemsNL/ha-cloudems/issues/new?template=feature_request.md\"\
      \ target=\"_blank\" style=\"display:inline-flex;align-items:center;gap:6px;background:#1f2937;border:1px solid rgba(99,102,241,0.4);color:#a5b4fc;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;text-decoration:none;\"\
      >\U0001F4A1 Feature verzoek</a>\n    <a href=\"https://buymeacoffee.com/smarthost9m\" target=\"_blank\" style=\"display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,rgb(245,158,11),rgb(217,119,6));color:rgb(26,16,0);padding:6px\
      \ 14px;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none;\">☕ Steun CloudEMS</a>\n  </div>\n</div>\n"
    card_mod:
      style: "ha-card {\n  background: rgb(22,22,22) !important;\n  border: 1px solid rgba(255,255,255,0.05) !important;\n  border-radius: 14px !important;\n  box-shadow: none !important;\n  --card-background-color:\
        \ transparent;\n  --ha-card-border-color: transparent;\n}\nha-markdown-element a { text-decoration: none !important; }\nha-markdown-element a:hover { opacity: 0.85 !important; }\n"
  - type: markdown
    title: ⚡ Systeembelasting
    content: "{%- set mode  = states('sensor.cloudems_performance') -%}\n{%- set avg   = state_attr('sensor.cloudems_performance', 'avg_ms') | float(0) | round(0) -%}\n{%- set p95   = state_attr('sensor.cloudems_performance',\
      \ 'p95_ms') | float(0) | round(0) -%}\n{%- set maxms = state_attr('sensor.cloudems_performance', 'max_ms') | float(0) | round(0) -%}\n{%- set ivl   = state_attr('sensor.cloudems_performance', 'interval_s')\
      \ | int(10) -%}\n{%- set nilm  = state_attr('sensor.cloudems_performance', 'nilm_enabled') -%}\n{%- set learn = state_attr('sensor.cloudems_performance', 'nilm_learning') -%}\n{%- set rec   = state_attr('sensor.cloudems_performance',\
      \ 'recovery_progress') | int(0) -%}\n{%- set recn  = state_attr('sensor.cloudems_performance', 'recovery_needed') | int(5) -%}\n{%- set color = '\U0001F7E2' if mode == 'NORMAL' else ('\U0001F7E1'\
      \ if mode == 'REDUCED' else ('\U0001F7E0' if mode == 'MINIMAL' else '\U0001F534')) -%}\n\n{{ color }} **{{ mode }}** — cyclus interval {{ ivl }}s\n\n| Meting | Waarde |\n|--------|--------|\n| Gemiddeld\
      \ | **{{ avg }} ms** |\n| P95 | {{ p95 }} ms |\n| Maximum | {{ maxms }} ms |\n| Interval | {{ ivl }} s |\n| NILM | {{ '✅ aan' if nilm else '⏸ gepauzeerd' }} |\n| Leren | {{ '✅ aan' if learn else '⏸\
      \ gepauzeerd' }} |\n{%- if mode != 'NORMAL' %}\n| Herstel | {{ rec }}/{{ recn }} cycli |\n{%- endif %}\n\n{%- if mode == 'CRITICAL' %}\n\n\U0001F534 **Kritieke belasting** — CloudEMS heeft de werklast\
      \ gereduceerd om HA stabiel te houden.\n{%- elif mode == 'MINIMAL' %}\n\n\U0001F7E0 **Hoge belasting** — NILM gepauzeerd, interval verlengd naar {{ ivl }}s.\n{%- elif mode == 'REDUCED' %}\n\n\U0001F7E1\
      \ **Verhoogde belasting** — NILM leren gepauzeerd.\n{%- endif %}\n"
    card_mod:
      style: "ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,200,0,0.2) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; --primary-text-color:\
        \ rgb(163,163,163); --card-background-color: transparent; --ha-card-border-color: transparent; }\n.card-header { background: transparent !important; border-bottom: 1px solid rgba(255,200,0,0.15)\
        \ !important; color: rgb(255,200,0) !important; font-size: 12px !important; font-weight: 600 !important; padding: 14px 16px 12px !important; }\nha-markdown-element table { width: 100% !important;\
        \ border-collapse: collapse !important; }\nha-markdown-element th { background: rgba(255,200,0,0.08) !important; color: rgb(255,200,0) !important; font-size: 10px !important; font-weight: 700 !important;\
        \ text-transform: uppercase !important; padding: 8px 10px !important; }\nha-markdown-element td { color: rgb(163,163,163) !important; border-bottom: 1px solid rgba(255,255,255,0.05) !important;\
        \ padding: 6px 10px !important; font-size: 12px !important; }\nha-markdown-element strong { color: rgb(255,255,255) !important; }\n"
