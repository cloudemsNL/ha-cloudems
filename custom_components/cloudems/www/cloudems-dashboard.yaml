      {% if mode not in ('unavailable','unknown','') %}
      {% if mode == 'preheat' %}🔼 **Voorverwarmen actief** — zet {{ offset | round(1) }}°C hoger in
      {% elif mode == 'save' %}🔽 **Energiebesparing actief** — zet {{ (offset | abs) | round(1) }}°C lager in
      {% else %}✅ **Normaal** — geen aanpassing nodig{% endif %}

      | Gegeven | Waarde |
      |---|---|
      | Modus | {{ mode }} |
      | Setpoint aanpassing | {% if offset > 0 %}+{% endif %}{{ offset | round(1) }}°C |
      | Prijsverhouding nu/gem | {{ ratio | round(2) }} |
      | Thermisch verlies | {{ wpk | round(1) }} W/K |
      | Model betrouwbaar | {{ '✅ ja' if ok else '⏳ nog leren' }} |

      {% if reason %}> {{ reason }}{% endif %}
      {% else %}
      ⏳ Thermisch model leert jouw woning — beschikbaar na ~7 dagen.
      {% endif %}
