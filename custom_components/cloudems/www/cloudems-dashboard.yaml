  - type: markdown
    title: 🫧 Verbruik Breakdown — Sense stijl
    content: "{% set grid  = state_attr('sensor.cloudems_onbekend_verbruik', 'grid_import_w') | float(0) | round(0) | int %}\n{% set nilm  = state_attr('sensor.cloudems_onbekend_verbruik', 'nilm_known_w')\
      \  | float(0) | round(0) | int %}\n{% set pc    = state_attr('sensor.cloudems_onbekend_verbruik', 'powercalc_w')   | float(0) | round(0) | int %}\n{% set lrn   = state_attr('sensor.cloudems_onbekend_verbruik',\
      \ 'learned_w')     | float(0) | round(0) | int %}\n{% set stby  = state_attr('sensor.cloudems_onbekend_verbruik', 'standby_w')     | float(0) | round(0) | int %}\n{% set other = states('sensor.cloudems_onbekend_verbruik')\
      \ | float(0) | round(0) | int %}\n{% set cov   = state_attr('sensor.cloudems_onbekend_verbruik', 'coverage_pct')  | float(0) | round(1) %}\n{% set trend = state_attr('sensor.cloudems_onbekend_verbruik',\
      \ 'trend') or 'onbekend' %}\n{% set trend_icon = {'stijgend':'\U0001F4C8','dalend':'\U0001F4C9','stabiel':'➡️','onbekend':'❓'}.get(trend,'❓') %}\n{% set devs  = state_attr('sensor.cloudems_onbekend_verbruik',\
      \ 'active_devices') or [] %}\n{% set total = [grid, 1] | max %}\n{% set nilm_pct  = (nilm  / total * 100) | round(0) | int %}\n{% set pc_pct    = (pc    / total * 100) | round(0) | int %}\n{% set\
      \ lrn_pct   = (lrn   / total * 100) | round(0) | int %}\n{% set stby_pct  = (stby  / total * 100) | round(0) | int %}\n{% set other_pct = (other / total * 100) | round(0) | int %}\n**\U0001F4CA Totaal:\
      \ {{ grid }} W** · verklaard: **{{ cov }}%** {{ trend_icon }}\n\n| Categorie | Watt | % |\n|:---|---:|---:|\n| \U0001F50C NILM apparaten | {{ nilm }} W | {{ nilm_pct }}% |\n| \U0001F4D0 PowerCalc\
      \ profielen | {{ pc }} W | {{ pc_pct }}% |\n| \U0001F9E0 Zelfgeleerd | {{ lrn }} W | {{ lrn_pct }}% |\n| \U0001F4A4 Standby/altijd-aan | {{ stby }} W | {{ stby_pct }}% |\n| ❓ **Onbekend** | **{{ other\
      \ }} W** | **{{ other_pct }}%** |\n\n{% if other_pct > 30 %}⚠️ *Meer dan 30% onbekend — overweeg een slimme stekker of extra NILM training.*\n{% elif other_pct > 15 %}\U0001F7E1 *Redelijke dekking\
      \ — NILM leert nog bij.*\n{% else %}✅ *Uitstekende dekking — CloudEMS herkent het meeste verbruik.*\n{% endif %}\n{% if devs | length > 0 %}\n\n**\U0001F50C Nu actief ({{ devs | length }}):**\n\n\
      | Apparaat | Watt | Fase |\n|:---|---:|:---:|\n{% for d in devs | sort(attribute='power_w', reverse=true) %}| {{ d.name }} | {{ d.power_w | int }} W | {{ d.phase }} |\n{% endfor %}\n{% endif %}\n"
