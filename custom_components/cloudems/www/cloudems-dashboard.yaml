  - type: markdown
    title: 🧭 Oriëntatie leervoortgang (helling & hoek)
    content: |
      {% set invs = state_attr('sensor.cloudems_solar_system_intelligence', 'inverters') or [] %}
      {% if invs | length == 0 %}*Geen omvormers.*
      {% else %}
      {% for inv in invs -%}
      {%- set have = inv.clear_sky_samples | default(0) | int -%}
      {%- set need = inv.orientation_samples_needed | default(1800) | int -%}
      {%- set pct  = [[((have / need * 100) | round(0) | int), 0] | max, 100] | min -%}
      {%- set conf = inv.orientation_confident | default(false) -%}
      {%- set filled = (pct / 100 * 20) | round(0) | int -%}
      {%- set empty  = 20 - filled -%}
      {%- set bar    = '█' * filled ~ '░' * empty -%}
      {%- set icon   = '✅' if conf else ('🟡' if pct >= 50 else '🔴') -%}
      **{{ icon }} {{ inv.label }}** — {{ pct }}% geleerd
      `{{ bar }}` {{ have }}/{{ need }} zonneminuten
      Azimut: {{ inv.azimuth_compass or '?' }}{% if inv.azimuth_learned %} ({{ inv.azimuth_learned | round(0) | int }}°){% endif %} · Helling: {% if inv.tilt_learned %}{{ inv.tilt_learned | round(0) | int }}°{% else %}?{% endif %}{% if not conf %} · nog ~{{ [((need - have) / 60) | round(0) | int, 0] | max }} zonne-uren{% endif %}

      {% endfor %}
      {% endif %}
    card_mod:
      style: |
        ha-card {
          background: rgb(34,34,34) !important;
          border: 1px solid rgba(255,255,255,0.06) !important;
          border-radius: 16px !important;
          box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;
          --primary-text-color: rgb(163,163,163);
          --secondary-text-color: rgb(102,102,102);
          --primary-color: rgb(0,177,64);
          --card-background-color: transparent;
          --ha-card-border-color: transparent;
        }
        ha-card:hover {
          border-color: rgba(0,177,64,0.5) !important;
          box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 16px rgba(0,177,64,0.12) !important;
          transform: translateY(-1px) !important;
        }
        .card-header {
          background: transparent !important;
          border-bottom: 1px solid rgba(255,255,255,0.07) !important;
          color: rgb(255,255,255) !important;
          font-size: 12px !important;
          font-weight: 600 !important;
          padding: 14px 16px 12px !important;
        }
        ha-markdown-element table { width: 100% !important; border-collapse: collapse !important; }
        ha-markdown-element th {
          background: rgba(0,177,64,0.1) !important;
          color: rgb(0,212,78) !important;
          font-size: 10px !important;
          font-weight: 700 !important;
          letter-spacing: 0.08em !important;
          text-transform: uppercase !important;
          padding: 8px 10px !important;
          border-bottom: 1px solid rgba(0,177,64,0.2) !important;
        }
        ha-markdown-element td {
          color: rgb(163,163,163) !important;
          border-bottom: 1px solid rgba(255,255,255,0.05) !important;
          padding: 7px 10px !important;
        }
        ha-markdown-element tr:hover td {
          background: rgba(0,177,64,0.06) !important;
          color: rgb(255,255,255) !important;
        }
        ha-markdown-element strong { color: rgb(255,255,255) !important; font-weight: 600 !important; }
        ha-markdown-element em { color: rgb(102,102,102) !important; }
        ha-markdown-element code {
          background: rgba(0,177,64,0.12) !important;
          color: rgb(0,212,78) !important;
          padding: 1px 6px !important;
          border-radius: 4px !important;
          font-size: 12px !important;
        }
        ha-markdown-element blockquote {
          border-left: 3px solid rgb(0,177,64) !important;
          background: rgba(0,177,64,0.07) !important;
          padding: 8px 14px !important;
          border-radius: 0 8px 8px 0 !important;
          color: rgb(163,163,163) !important;
        }
  - type: markdown
    title: 🎯 PV Voorspelling Nauwkeurigheid
    content: |
      {% set acc   = states('sensor.cloudems_pv_forecast_accuracy') | float(0) %}
      {% set m14   = state_attr('sensor.cloudems_pv_forecast_accuracy', 'mape_14d_pct') | float(0) %}
      {% set m30   = state_attr('sensor.cloudems_pv_forecast_accuracy', 'mape_30d_pct') | float(0) %}
      {% set bias  = state_attr('sensor.cloudems_pv_forecast_accuracy', 'bias_factor') | float(1) %}
      {% set samp  = state_attr('sensor.cloudems_pv_forecast_accuracy', 'samples') | int(0) %}
      {% set last  = state_attr('sensor.cloudems_pv_forecast_accuracy', 'last_day_mape') | float(0) %}
      {% set last_raw = state_attr('sensor.cloudems_pv_forecast_accuracy', 'last_day_error_pct') | float(0) %}
      {% if samp > 0 %}
      {% if acc >= 85 %}🟢{% elif acc >= 70 %}🟡{% else %}🔴{% endif %} **Nauwkeurigheid: {{ [[acc, 0] | max, 100] | min | round(1) }}%**

      | Periode | Fout | Nauwkeurigheid |
      |---|---|---|
      | Gisteren | {{ last_raw | round(1) }}% | {{ [[100 - last, 0] | max, 100] | min | round(1) }}% |
      | Laatste 14 dagen | {{ m14 | round(1) }}% | {{ [[100 - m14, 0] | max, 100] | min | round(1) }}% |
      | Laatste 30 dagen | {{ m30 | round(1) }}% | {{ [[100 - m30, 0] | max, 100] | min | round(1) }}% |

      | Bias factor | Betekenis |
      |---|---|
      | {{ bias | round(2) }} | {% if bias > 1.05 %}Model overschat opbrengst{% elif bias < 0.95 %}Model onderschat opbrengst{% else %}✅ Goed gekalibreerd{% endif %} |

      _Gebaseerd op {{ samp }} meetdagen_
      {% else %}
      ⏳ PV nauwkeurigheidsmodel verzamelt data — beschikbaar na ~7 meetdagen.
      {% endif %}
    card_mod:
      style: |
        ha-card {
          background: rgb(34,34,34) !important;
          border: 1px solid rgba(255,255,255,0.06) !important;
          border-radius: 16px !important;
          box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;
          --primary-text-color: rgb(255,255,255);
          --secondary-text-color: rgb(163,163,163);
          --primary-color: rgb(0,177,64);
          --card-background-color: transparent;
          --ha-card-border-color: transparent;
        }
        ha-card:hover {
          border-color: rgba(0,177,64,0.5) !important;
          box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 16px rgba(0,177,64,0.12) !important;
          transform: translateY(-1px) !important;
        }
        .card-header {
          background: transparent !important;
          border-bottom: 1px solid rgba(255,255,255,0.07) !important;
          color: rgb(255,255,255) !important;
          font-size: 12px !important;
          font-weight: 600 !important;
          padding: 14px 16px 12px !important;
        }

  - type: markdown
    title: 💰 PV Opbrengst & Terugverdientijd
    content: |
      {% set val     = states('sensor.cloudems_pv_opbrengst_terugverdientijd') | float(0) %}
      {% set wp      = state_attr('sensor.cloudems_pv_opbrengst_terugverdientijd', 'estimated_wp_total') | float(0) %}
      {% set peak_w  = state_attr('sensor.cloudems_pv_opbrengst_terugverdientijd', 'peak_w_alltime') | float(0) %}
      {% set kwh_yr  = state_attr('sensor.cloudems_pv_opbrengst_terugverdientijd', 'annual_yield_kwh_est') | float(0) %}
      {% set eur_yr  = state_attr('sensor.cloudems_pv_opbrengst_terugverdientijd', 'annual_value_eur_est') | float(0) %}
      {% set price      = state_attr('sensor.cloudems_pv_opbrengst_terugverdientijd', 'roi_price_eur_kwh') | float(0) or state_attr('sensor.cloudems_pv_opbrengst_terugverdientijd', 'avg_price_eur_kwh') | float(0) %}
      {% set price_lbl  = state_attr('sensor.cloudems_pv_opbrengst_terugverdientijd', 'roi_price_label') or 'gem.' %}
      {% set is_fixed   = state_attr('sensor.cloudems_pv_opbrengst_terugverdientijd', 'is_fixed_contract') %}
      {% set cons_kwh   = state_attr('sensor.cloudems_pv_opbrengst_terugverdientijd', 'annual_consumption_kwh_est') | float(0) %}
      {% set opt_wp     = state_attr('sensor.cloudems_pv_opbrengst_terugverdientijd', 'optimal_wp') | float(0) %}
      {% set exp_kwp    = state_attr('sensor.cloudems_pv_opbrengst_terugverdientijd', 'expansion_advice_kwp') %}
      {% set self_pct   = state_attr('sensor.cloudems_pv_opbrengst_terugverdientijd', 'self_sufficiency_pct') | float(0) %}
      {% set price_row  = ('Stroomprijs (vast tarief)' if is_fixed else 'Stroomprijs (' ~ price_lbl ~ ')') %}
      {% if wp > 0 %}
      | Gegeven | Waarde |
      |---|---|
      | Gedetecteerd piekvermogen | {{ (wp / 1000) | round(2) }} kWp |
      | Hoogste gemeten productie | {{ peak_w | round(0) | int }} W |
      | Geschatte jaaropbrengst | {{ kwh_yr | round(0) | int }} kWh |
      | Financiële jaarwaarde | **€{{ eur_yr | round(0) | int }}** |
      | {{ price_row }} | €{{ price | round(4) }}/kWh |
      {% if self_pct > 0 %}| Zelfvoorzieningsgraad | {{ self_pct }}% |{% endif %}

      {% if eur_yr > 0 %}
      | Investering | Terugverdientijd |
      |---|---|
      | €7.000 (5 kWp) | {{ (7000 / eur_yr) | round(1) }} jaar |
      | €12.000 (10 kWp) | {{ (12000 / eur_yr) | round(1) }} jaar |
      {% endif %}

      {% if exp_kwp is not none %}
      ---
      **💡 Uitbreidingsadvies**
      {% if exp_kwp == 0 %}
      ✅ Huidig vermogen ({{ (wp/1000)|round(1) }} kWp) dekt al ~100% van je jaarverbruik.
      {% else %}
      {% if cons_kwh > 0 %}Geschat jaarverbruik: **{{ cons_kwh | round(0) | int }} kWh**{% endif %}

      Optimaal vermogen: **{{ (opt_wp/1000)|round(1) }} kWp** — advies uitbreiding: **+{{ exp_kwp }} kWp**
      ≈ {{ ((exp_kwp * 1000) / 400) | round(0) | int }}–{{ ((exp_kwp * 1000) / 300) | round(0) | int }} extra panelen (300–400 Wp/paneel)

      {% set extra_eur   = exp_kwp * 850 * price %}
      {% set invest_low  = (exp_kwp * 700)  | round(0) | int %}
      {% set invest_high = (exp_kwp * 1000) | round(0) | int %}
      | Uitbreiding | Geschatte invest. | Terugverdientijd |
      |---|---|---|
      | +{{ exp_kwp }} kWp | €{{ invest_low }}–€{{ invest_high }} | {{ (invest_low / extra_eur) | round(1) }}–{{ (invest_high / extra_eur) | round(1) }} jaar |
      {% endif %}
      {% endif %}

      _Prijs: {{ price_lbl }} · Opbrengst: 850 kWh/kWp/jaar (NL gemiddeld)_
      {% else %}
      ⏳ PV-data wordt verzameld — beschikbaar na eerste zonnige dag.
      {% endif %}
