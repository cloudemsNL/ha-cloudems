  - type: markdown
    title: 🔝 Top 10 — Hoogste verbruikers nu
    content: "{% set min_conf = 30 %}\n{% set top = namespace(rows=[]) %}\n{% for rank in range(1, 16) -%}\n{%- set entity = 'sensor.cloudems_nilm_top_' ~ rank ~ '_device' -%}\n{%- set w = states(entity)\
      \ | float(0) -%}\n{%- set nm = state_attr(entity, 'name') -%}\n{%- set conf = state_attr(entity, 'confidence') | float(0) -%}\n{%- set phase = state_attr(entity, 'phase') or '?' -%}\n{%- set src =\
      \ state_attr(entity, 'source') or 'database' -%}\n{%- if states(entity) not in ('unknown','unavailable','none','') and nm and conf >= min_conf and 'atterij' not in nm and top.rows | length < 10 -%}\n\
      {%- set top.rows = top.rows + [{'rank': top.rows | length + 1, 'name': nm, 'w': w, 'conf': conf | round(0) | int, 'phase': phase, 'source': src}] -%}\n{%- endif -%}\n{%- endfor %}\n{% if top.rows\
      \ | length == 0 %}\n*Geen actieve apparaten.*\n{% else %}\n| Nr | Apparaat | W | Fase | Bron | % |\n|---|----------|---|------|------|---|\n{% for r in top.rows -%}\n| **{{ r.rank }}** | {{ r.name\
      \ }} | {{ r.w | int }} | {{ '\U0001F535' if r.phase == 'L1' else '\U0001F7E1' if r.phase == 'L2' else '\U0001F7E2' if r.phase == 'L3' else '⚫' }} {{ r.phase or '?' }} | {{ '\U0001F50C' if r.source\
      \ == 'smart_plug' else '\U0001F50D' }} | {{ '✅' if r.source == 'smart_plug' else ('\U0001F7E2' if r.conf >= 70 else '\U0001F7E1' if r.conf >= 50 else '\U0001F534') }}{% if r.source != 'smart_plug'\
      \ %} {{ r.conf }}%{% endif %} |\n{% endfor %}\n{% endif %}\n"
