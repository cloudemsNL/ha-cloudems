- title: E-bike & Scooter
  path: cloudems-micromobiliteit
  type: masonry
  max_columns: 2
  icon: "mdi:bicycle-electric"
  background: url(/local/cloudems/images/bg-micromobiliteit.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(197,225,165,0.07) 0%, transparent 60%), rgb(24,24,24)
  card_mod:
    style: "hui-view { padding: 12px 12px 24px !important; }\n"
  cards:
  - *id001
  - type: conditional
    conditions:
    - condition: state
      entity: switch.cloudems_module_ebike
      state: 'off'
    card:
      type: markdown
      content: "⚠️ **\U0001F6B2 E-bike module staat uit.** Schakel hem in via het [Configuratie tabblad](#cloudems-config) om deze functie te activeren.\n"
      card_mod:
        style: "ha-card { background: rgba(255,140,0,0.12) !important; border: 1px solid rgba(255,140,0,0.4) !important; border-radius: 12px !important; padding: 4px 12px !important; }\n"
  - type: conditional
    conditions:
    - condition: numeric_state
      entity: sensor.cloudems_micro_mobiliteit
      below: 0.001
    card:
      type: markdown
      content: "\nCloudEMS herkent e-bike en scooter laders **automatisch** via NILM.\n\n**Hoe werkt het?**\nSluit je e-bike of scooter aan op een stopcontact dat CloudEMS monitort. Na de eerste laadsessie\
        \ (50–700 W, minimaal 20 minuten) wordt het voertuig automatisch herkend en bijgehouden.\n\n> Zorg dat NILM actief is en dat de lader zichtbaar is als een apparaat in het NILM overzicht.\n"
      card_mod:
        style: "ha-card {\n  background: rgb(34,34,34) !important;\n  border: 1px solid rgba(0,177,64,0.2) !important;\n  border-radius: 16px !important;\n  box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;\n\
          \  --primary-text-color: rgb(163,163,163);\n  --secondary-text-color: rgb(102,102,102);\n  --primary-color: rgb(0,177,64);\n  --card-background-color: transparent;\n  --ha-card-border-color: transparent;\n\
          }\nha-markdown-element h2 { color: rgb(0,212,78) !important; font-size: 15px !important; margin-bottom: 8px !important; }\nha-markdown-element strong { color: rgb(255,255,255) !important; }\n\
          ha-markdown-element blockquote {\n  border-left: 3px solid rgb(0,177,64) !important;\n  background: rgba(0,177,64,0.07) !important;\n  padding: 8px 14px !important;\n  border-radius: 0 8px 8px\
          \ 0 !important;\n  color: rgb(163,163,163) !important;\n}\n"
  - type: conditional
    conditions:
    - condition: state
      entity: sensor.cloudems_micro_mobiliteit
      state_not: unavailable
    - condition: state
      entity: sensor.cloudems_micro_mobiliteit
      state_not: unknown
    card:
      type: vertical-stack
      cards:
      - type: glance
        show_name: true
        show_icon: true
        show_state: true
        entities:
        - entity: sensor.cloudems_micro_mobiliteit
          name: Totaal geladen
          icon: "mdi:lightning-bolt"
        - entity: sensor.cloudems_micro_mobiliteit
          name: kWh vandaag
          attribute: kwh_today
          icon: "mdi:battery-charging"
        - entity: sensor.cloudems_micro_mobiliteit
          name: Voertuigen vandaag
          attribute: vehicles_today
          icon: "mdi:counter"
        - entity: sensor.cloudems_micro_mobiliteit
