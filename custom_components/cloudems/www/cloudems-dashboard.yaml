        title: "🌡️ Zone details"
        content: |
          {% set zc = state_attr('sensor.cloudems_zone_klimaat_kosten_vandaag', 'zones') or [] %}
          | Zone | Preset | Temp | Doel | Bron | Kosten/dag | Kosten/mnd |
          |------|--------|------|------|------|-----------|-----------|
          {% for z in zc -%}
          | {{ z.name }} | {{ z.preset }} | {{ state_attr('sensor.cloudems_zone_' ~ z.name | lower | replace(' ','_'), 'huidige_temp') | default('?') }}°C | {{ state_attr('sensor.cloudems_zone_' ~ z.name | lower | replace(' ','_'), 'doeltemperatuur') | default('?') }}°C | {{ z.bron }} | €{{ z.kosten_vandaag }} | €{{ z.kosten_maand }} |
          {% endfor %}

      - type: markdown
        title: "🔥 CV-ketel status"
        content: |
          {%- set boiler = state_attr('sensor.cloudems_zone_klimaat_kosten_vandaag', 'boiler') or {} -%}
          **Status:** {{ '🔥 AAN' if boiler.get('boiler_on', false) else '⭕ UIT' }}
          **Zones die vragen:** {{ boiler.get('zones_calling', 0) }} ({{ boiler.get('zones', 'geen') }})
          **Reden:** {{ boiler.get('reason', 'onbekend') }}

      - type: markdown
        title: "🎮 Zone presets instellen"
        content: |
          Gebruik de CloudEMS service via Ontwikkelaarstools of een automatisering:

          ```
          perform_action: cloudems.set_zone_preset
          data:
            area_id: woonkamer   # of "all"
            preset: boost        # comfort / eco / boost / away
            hours: 2
          ```
