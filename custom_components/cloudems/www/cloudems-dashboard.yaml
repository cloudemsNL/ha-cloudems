        \ {%- if state_attr('sensor.cloudems_lampcirculatie_status', 'enabled') %} rgba(0,177,64,0.4) {%- else %} rgba(229,57,53,0.4) {%- endif %} !important;\n  border-radius: 16px !important;\n  box-shadow:\
        \ 0 2px 12px rgba(0,0,0,0.4) !important;\n  --primary-text-color: rgb(255,255,255);\n  --secondary-text-color: rgb(163,163,163);\n  --card-background-color: transparent;\n}"
