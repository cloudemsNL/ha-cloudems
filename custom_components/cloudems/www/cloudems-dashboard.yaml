        *Geen dimmer-gestuurde boilers geconfigureerd.*
        Stel `control_mode: dimmer` in via **Instellingen → CloudEMS → 🚿 Warm Water**.
        {%- else -%}
        | Boiler | Groep | Prop. | Huidig | Max % | Min % |
        |---|---|---|---|---|---|
        {%- for b in dimmers %}
        {%- set prop = '✅ Aan' if b.get('dimmer_proportional', false) else '❌ Uit' %}
        {%- set power_pct = b.get('power_pct', 0) | float(0) %}
        {%- set cur = (power_pct | round(0) | int | string + '%') if power_pct > 0 else ('🟢 100%' if b.is_on else '⭕ 0%') %}
        | {{ b.label }} | {{ b.group }} | {{ prop }} | {{ cur }} | {{ b.get('dimmer_on_pct', 100) | int }}% | {{ b.get('dimmer_off_pct', 0) | int }}% |
        {%- endfor %}

