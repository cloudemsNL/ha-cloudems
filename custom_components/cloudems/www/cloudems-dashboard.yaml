  - type: markdown
    title: 📋 Alle bekende NILM apparaten
    content: "{% set devs = state_attr('sensor.cloudems_nilm_devices','device_list') or [] %}\n{% if devs | length == 0 %}\n*CloudEMS leert apparaten kennen — na een paar uur verschijnen ze hier.*\n{% else\
      \ %}\n{% set confirmed  = devs | selectattr('confirmed',       'ne', none) | selectattr('confirmed',       'eq', true) | list | length %}\n{% set suppressed = devs | selectattr('user_suppressed',\
      \ 'ne', none) | selectattr('user_suppressed', 'eq', true) | list | length %}\n{% set total = devs | length %}\n**{{ total }}** apparaten &nbsp;·&nbsp; ✅ **{{ confirmed }}** goedgekeurd &nbsp;·&nbsp;\
      \ \U0001F6AB **{{ suppressed }}** onderdrukt &nbsp;·&nbsp; ⏳ **{{ total - confirmed - suppressed }}** onbeslist\n\n| St | Bron | Fase | W | Apparaat | Kamer | ID |\n|---|------|------|---|----------|-------|----|\n\
      {% for d in devs | sort(attribute='power_w', reverse=true) %}\n{%- set is_on   = d.get('is_on', false) or d.get('state','') == 'on' -%}\n{%- set confirmed_d = d.get('confirmed', false) -%}\n{%- set\
      \ suppressed_d = d.get('user_suppressed', false) -%}\n{%- set status  = '✅' if confirmed_d else ('\U0001F6AB' if suppressed_d else '⏳') -%}\n{%- set active  = '\U0001F7E2' if is_on else '⚫' -%}\n\
      {%- set ph = d.get('phase','?') -%}\n{%- set ph_ico  = '\U0001F535' if ph == 'L1' else ('\U0001F7E1' if ph == 'L2' else ('\U0001F7E2' if ph == 'L3' else '⚪')) -%}\n{%- set src = d.get('source_type',\
      \ d.get('source','nilm')) -%}\n{%- set src_ico = '\U0001F50C' if src == 'smart_plug' else ('\U0001F9E0' if src == 'local_ai' else ('☁️' if src == 'cloud_ai' else '\U0001F50D')) -%}\n{%- set room =\
      \ d.get('room', '—') | title -%}\n| {{ active }} {{ status }} | {{ src_ico }} | {{ ph_ico }} {{ ph }} | {{ d.get('power_w', 0) | int }} | {{ d.get('name', d.get('device_type','?')) }} | {{ room }}\
      \ | `{{ d.get('device_id','?') }}` |\n{% endfor %}\n\n\U0001F7E2 actief &nbsp;·&nbsp; ✅ goedgekeurd &nbsp;·&nbsp; ⏳ onbeslist &nbsp;·&nbsp; \U0001F6AB onderdrukt\n**Bevestigd apparaat verwijderen:**\
      \ kopieer het `ID` → Ontwikkelaarshulpmiddelen → Services → `cloudems.dismiss_device`\n{% endif %}\n"
    card_mod:
      style: "ha-card {\n  background: rgb(34,34,34) !important;\n  border: 1px solid rgba(255,255,255,0.06) !important;\n  border-radius: 16px !important;\n  box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;\n\
