  - type: markdown
    title: 💰 Apparaatvervangings-ROI
    content: "{% set roi = state_attr('sensor.cloudems_nilm_overzicht', 'roi') or {} %}\n{% set devices = roi.get('devices', []) if roi else [] %}\n{% if devices %}\n{% set total = roi.get('total_saving_eur_year',\
      \ 0) | float(0) %}\n{% set top = roi.get('top_candidate', '—') %}\n{% set top_pb = roi.get('top_candidate_payback') %}\n{% if roi.get('advice') %}>  {{ roi.get('advice') }}{% endif %}\n| Apparaat\
      \ | Huidig (kWh/j) | A+++ (kWh/j) | Besparing/j | Terugverdientijd |\n|---|---|---|---|---|\n{%- set seen_roi = namespace(names=[]) -%}\n{%- for d in devices -%}\n{%- set lbl = d.get('label', 'Onbekend')\
      \ -%}\n{%- if lbl not in seen_roi.names -%}\n{%- set seen_roi.names = seen_roi.names + [lbl] -%}\n{%- set cur = d.get('current_kwh_year', 0) -%}\n{%- set bench = d.get('benchmark_kwh_year', 0) -%}\n\
      {%- set sav = d.get('saving_eur_year', 0) -%}\n{%- set pb = d.get('payback_years') -%}\n{%- set icon = '✅' if d.get('recommend') else '⏳' -%}\n| {{ icon }} {{ lbl }} | {{ cur }} | {{ bench }} | €{{\
      \ sav }} | {{ pb ~ ' jr' if pb else '—' }} |\n{%- endif -%}\n{%- endfor %}\n_Totale jaarlijkse besparing bij vervanging: **€{{ total | round(0) | int }}**_\n{% else %}\nNog geen NILM-apparaatdata\
      \ beschikbaar. ROI-analyse start na ~24 uur meting.\n{% endif %}\n"
