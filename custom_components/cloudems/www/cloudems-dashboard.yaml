  background: "url(/local/cloudems/images/bg-ere.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(165,214,167,0.07) 0%, transparent 60%), rgb(24,24,24)"
  card_mod:
    style: |
      hui-view { padding: 12px 12px 24px !important; }
  cards:
  - type: conditional
    conditions:
      - condition: state
        entity: switch.cloudems_module_ere
        state: "off"
    card:
      type: markdown
      content: |
        ⚠️ **📋 ERE Certificaten module staat uit.** Schakel hem in via het [Configuratie tabblad](#cloudems-config) om deze functie te activeren.
      card_mod:
        style: |
          ha-card { background: rgba(255,140,0,0.12) !important; border: 1px solid rgba(255,140,0,0.4) !important; border-radius: 12px !important; padding: 4px 12px !important; }

  - type: conditional
    conditions:
    - condition: state
      entity: sensor.cloudems_ev
      state_not: unavailable
    - condition: state
      entity: sensor.cloudems_ev
      state_not: unknown
    card:
      type: markdown
      title: 🏆 ERE Certificaten — Jaaroverzicht
      content: |
        {% set ere = state_attr('sensor.cloudems_ev', 'ere') or {} %}
        {% set jaar = ere.get('jaar', {}) %}
        {% set proj = ere.get('projectie_jaar', {}) %}
        {% set advs = ere.get('laad_advies', {}) %}
        {% set adv_icons = {'solar':'☀️','nu_laden':'⚡','wachten':'⏳','onbekend':'❓'} %}

        {% if ere.get('heeft_mid_meter') %}✅ **MID-laadpaal gekoppeld** — ERE-registratie actief
        {% else %}⚠️ **Geen MID-laadpaal geconfigureerd** — Voeg `ere_charger_entities` toe in CloudEMS opties{% endif %}
        {% if ere.get('heeft_groencontract') %}🌱 Groenstroomcontract geregistreerd (100% hernieuwbaar){% endif %}

        ---
        **Dit jaar ({{ now().year }})**
        | Meting | Waarde |
        |---|---|
        | Geladen | **{{ jaar.get('kwh','—') }} kWh** |
        | ERE's verdiend | **{{ jaar.get('ere','—') }} kg CO₂** |
        | Netto opbrengst | **€{{ jaar.get('opbrengst_eur','—') }}** |
        | Gem. hernieuwbaar | {{ jaar.get('avg_renewable_pct','—') }}% |
        | Solar-sessies | {{ jaar.get('solar_sessies','—') }}× |
        | Laadsessies | {{ jaar.get('sessies','—') }}× |

        **Projectie volledig jaar:**
        ~{{ proj.get('kwh',0) | int(0) }} kWh → ~{{ proj.get('ere',0) | int(0) }} ERE's → **€{{ proj.get('opbrengst_eur',0) | int(0) }}** netto

        ---
        {{ adv_icons.get(advs.get('advies',''),'❓') }} **Nu laden:** {{ advs.get('advies','—') | replace('_',' ') | title }}
        *{{ advs.get('reden','—') }}*
        {% if advs.get('ere_per_kwh') %}Huidige ERE-waarde: {{ advs.ere_per_kwh }} ERE/kWh = €{{ advs.netto_per_kwh }} netto{% endif %}
    card_mod:
      style: |
        ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }

  - type: markdown
    title: 📊 Kwartaal & Maand Breakdown
    content: |
      {% set ere = state_attr('sensor.cloudems_ev', 'ere') or {} %}
      {% set kw  = ere.get('kwartaal', {}) %}
      {% set mnd = ere.get('maand', {}) %}
      {% set tot = ere.get('totaal', {}) %}

      **Huidig kwartaal**
      {{ kw.get('kwh','—') }} kWh → {{ kw.get('ere','—') }} ERE → **€{{ kw.get('opbrengst_eur','—') }}**
      ({{ kw.get('avg_renewable_pct','—') }}% hernieuwbaar, {{ kw.get('solar_sessies','—') }} solar-sessies)

      **Deze maand**
      {{ mnd.get('kwh','—') }} kWh → {{ mnd.get('ere','—') }} ERE → **€{{ mnd.get('opbrengst_eur','—') }}**

      **Totaal (alle tijd)**
      {{ tot.get('kwh','—') }} kWh → {{ tot.get('ere','—') }} ERE → **€{{ tot.get('opbrengst_eur','—') }}** netto cumulatief

      ---
      *ERE-prijs: €{{ ere.get('ere_prijs_eur','0.40') }}/ERE | Inboekfee: {{ ere.get('inboekfee_pct','20') }}% (via Laadloon, FincoEnergies, Den Hartog etc.)*
      *Meld je aan voor mei 2026 bij een inboekdienstverlener. Vergoeding met terugwerkende kracht.*
    card_mod:
      style: |
        ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }

  - type: markdown
    title: 🔧 ERE Setup & Configuratie
    content: |
      **Wat heb je nodig voor ERE-registratie:**

      | Vereiste | Status |
      |---|---|
      | MID-gecertificeerde laadpaal | {% set ere = state_attr('sensor.cloudems_ev','ere') or {} %}{{ '✅ Actief' if ere.get('heeft_mid_meter') else '❌ Niet geconfigureerd' }} |
      | Registratie inboekdienstverlener | 🔗 Handmatig (voor mei 2026) |
      | Jaarlijkse kWh-rapportage | ✅ CloudEMS genereert automatisch |

      **MID-laadpalen met HA-integratie (aanbevolen):**
      - **Zaptec Go 2** — `sensor.*_energy` — OCPP of Zaptec-integratie
      - **Alfen Single Pro-line** — `sensor.*_meter_value`
      - **Smappee EV Wall** — `sensor.*_session_kwh`
      - **Ohme Home Pro** — MID + HA-integratie

      💡 *Configureer via CloudEMS opties → ERE & Laadpaal: voeg je MID-meter sensor toe als `ere_charger_entities`.*

      **Inboekdienstverleners (NL 2026):**
      [Laadloon](https://laadloon.nl) · [FincoEnergies/Goodpower](https://fincogreen.nl) · [Den Hartog Zero Emission](https://denhartogbv.com) · [Voltico](https://voltico.nl)
      Vergoeding na aftrek fee: **€0.03–€0.10/kWh** (afhankelijk van marktprijs en hernieuwbaarheid)

      **ERE-rekenregel (officieel NEa):**
      `ERE = kWh × hernieuwbaar% × 0.6588 kg CO₂/kWh`
    card_mod:
      style: |
        ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }

  - type: markdown
