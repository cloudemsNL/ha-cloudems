- title: Batterij
  path: cloudems-batterij
  max_columns: 2
  icon: mdi:battery-charging-80
  background: "url(/local/cloudems/images/bg-batterij.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(79,195,247,0.07) 0%, transparent 60%), rgb(24,24,24)"
  cards:
  - type: conditional
    conditions:
      - condition: state
        entity: switch.cloudems_module_batterij
        state: "off"
    card:
      type: markdown
      content: |
        ⚠️ **🔋 Batterij module staat uit.** Schakel hem in via het [Configuratie tabblad](#cloudems-config) om deze functie te activeren.
      card_mod:
        style: |
          ha-card { background: rgba(255,140,0,0.12) !important; border: 1px solid rgba(255,140,0,0.4) !important; border-radius: 12px !important; padding: 4px 12px !important; }

  # ── Batterij providers status (altijd zichtbaar) ──────────────────────────
  - type: markdown
    title: "⚡ Batterij providers"
    content: |
      {%- set bp = state_attr('sensor.cloudems_batterij_epex_schema', 'battery_providers') or {} -%}
      {%- set providers = bp.get('providers', []) -%}
      {%- set warnings = bp.get('setup_warnings', []) -%}
      {%- set zp = state_attr('sensor.cloudems_batterij_epex_schema', 'zonneplan') -%}
      {%- if providers | length == 0 and zp is none -%}
      ℹ️ Geen beheerde provider gevonden. Heb je Zonneplan of Tibber? Installeer de integratie en configureer via **Instellingen → CloudEMS → Batterijen & Providers**.
      {%- else %}
      {%- set balancer = bp.get('balancer', {}) %}
      {%- set lag_s    = balancer.get('battery_lag_s') %}
      {%- set lag_n    = balancer.get('battery_lag_samples', 0) %}
      {%- set lag_c    = balancer.get('battery_lag_conf') %}
      {%- set int_s    = balancer.get('battery_interval_s') %}
      {%- set stale    = balancer.get('battery_stale', false) %}
      {%- if lag_s is not none %}
        {%- set lag_label = '⏱ ' ~ (lag_s | round(1) | string) ~ 's' %}
        {%- if lag_c is not none %}
          {%- set lag_label = lag_label ~ ' (' ~ (lag_c * 100) | round(0) | int | string ~ '%)' %}
        {%- endif %}
      {%- elif lag_n > 0 %}
        {%- set lag_label = '⏱ lerend ' ~ lag_n | string ~ '/5' %}
      {%- else %}
        {%- set lag_label = '⏱ —' %}
      {%- endif %}
      {%- if int_s is not none %}
        {%- set int_label = ('⚠ ' if stale else '') ~ (int_s | round(1) | string if int_s < 10 else int_s | round(0) | int | string) ~ 's' %}
      {%- else %}
        {%- set int_label = '—' %}
      {%- endif %}
      | Provider | Status | Modus | Interval | Vertraging |
      |---|---|---|---|---|
      {%- if zp is not none %}
      {%- set ok = zp.get('available', false) %}
      {%- set det = zp.get('detected', false) %}
      {%- set mode_raw = zp.get('active_mode') %}
      {%- set mode_map = {'home_optimization':'🏠 Thuisopt.','self_consumption':'☀️ Zelfverbruik','powerplay':'⚡ Powerplay','manual_control':'🔧 Handmatig','Thuisoptimalisatie':'🏠 Thuisopt.','Zelfverbruik':'☀️ Zelfverbruik','Powerplay':'⚡ Powerplay','Huisoptimalisatie':'🏠 Thuisopt.','thuisoptimalisatie':'🏠 Thuisopt.','huisoptimalisatie':'🏠 Thuisopt.','zelfverbruik':'☀️ Zelfverbruik','handmatig':'🔧 Handmatig'} %}
      {%- set mode = mode_map.get(mode_raw, (mode_raw | replace('_',' ') | title) if mode_raw else '—') %}
      | ⚡ Zonneplan Nexus | {{ '✅ Actief' if ok else ('🟡 Gevonden' if det else '❌') }} | {{ mode }} | {{ int_label }} | {{ lag_label }} |
      {%- endif %}
      {%- for p in providers if p.get('provider_id') != 'zonneplan' %}
      | {{ p.get('provider_label', p.get('provider_id')) }} | {{ '✅' if p.get('available') else ('🟡' if p.get('detected') else '❌') }} | — | {{ int_label }} | {{ lag_label }} |
      {%- endfor %}
      {%- endif %}
      {%- if warnings | length > 0 %}

      {%- for w in warnings %}
      {%- set sev = w.get('severity','warning') %}
      {%- set icon = '🔴' if sev == 'error' else ('⚠️' if sev == 'warning' else 'ℹ️') %}
      {{ icon }} {{ w.get('message', w) }}
      {%- endfor %}
      {%- endif %}
    card_mod:
      style: |
        ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; --primary-text-color: rgb(255,255,255); --card-background-color: transparent; --ha-card-border-color: transparent; }
        .card-header { background: transparent !important; border-bottom: 1px solid rgba(255,255,255,0.07) !important; color: rgb(255,255,255) !important; font-size: 12px !important; font-weight: 600 !important; padding: 14px 16px 12px !important; }
        ha-markdown-element table { width: 100% !important; border-collapse: collapse !important; }
        ha-markdown-element th { background: rgba(0,177,64,0.1) !important; color: rgb(0,212,78) !important; font-size: 10px !important; font-weight: 700 !important; text-transform: uppercase !important; padding: 8px 10px !important; }
        ha-markdown-element td { color: rgb(163,163,163) !important; border-bottom: 1px solid rgba(255,255,255,0.05) !important; padding: 6px 10px !important; font-size: 12px !important; }

  # ── Batterijen — Live status ───────────────────────────────────────────────
  - type: markdown
    title: "🔋 Batterijen — Live status"
    content: |
      {%- set bats = state_attr('sensor.cloudems_batterij_epex_schema', 'batteries') or [] -%}
      {%- set action = states('sensor.cloudems_batterij_epex_schema') -%}
      {%- set reason = state_attr('sensor.cloudems_batterij_epex_schema', 'reason') -%}
      {%- set soc    = state_attr('sensor.cloudems_batterij_epex_schema', 'soc_pct') -%}
      {%- if bats | length == 0 -%}
      {%- set soc_icon = '🟢' if soc and soc >= 60 else ('🟡' if soc and soc >= 20 else ('🔴' if soc else '⚫')) -%}
      {%- if action == 'unknown' or (not soc and not action) -%}
      ⏳ *Batterijdata wordt geladen na herstart...*
      - CloudEMS leest de batterijsensoren op — dit duurt meestal 10–30 seconden.
      - Als dit langer aanhoudt: controleer of de batterijsensor entity beschikbaar is in HA.
      {%- else -%}
      **Batterij 1** &nbsp;·&nbsp; {{ soc_icon }} {{ soc | round(0) | int if soc else '—' }}% SOC
      - Actie: {{ action or '—' }}
      - Reden: {{ reason or '—' }}
      {%- endif -%}
      {%- else -%}
      | Batterij | SOC | Status | Vermogen | Actie |
      |---|---|---|---|---|
      {%- for b in bats %}
      {%- set s = b.soc_pct %}
      {%- set p = b.power_w %}
      {%- set si = '🟢' if s and s >= 60 else ('🟡' if s and s >= 20 else ('🔴' if s else '⚫')) %}
      {%- set pstr = (p | int | string ~ ' W') if p else '—' %}
      | {{ b.label or 'Batterij' }} | {{ si }} {{ s | round(0) | int if s else '—' }}% | {{ '⚡ Laden' if p and p > 50 else ('↗ Leveren' if p and p < -50 else 'idle') }} | {{ pstr }} | {{ b.action or '—' }} |
      {%- endfor %}
      {%- endif %}
    card_mod:
      style: |
        ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; --primary-text-color: rgb(255,255,255); --card-background-color: transparent; --ha-card-border-color: transparent; }
        .card-header { background: transparent !important; border-bottom: 1px solid rgba(255,255,255,0.07) !important; color: rgb(255,255,255) !important; font-size: 12px !important; font-weight: 600 !important; padding: 14px 16px 12px !important; }
        ha-markdown-element table { width: 100% !important; border-collapse: collapse !important; }
        ha-markdown-element th { background: rgba(0,177,64,0.1) !important; color: rgb(0,212,78) !important; font-size: 10px !important; font-weight: 700 !important; text-transform: uppercase !important; padding: 8px 10px !important; }
        ha-markdown-element td { color: rgb(163,163,163) !important; border-bottom: 1px solid rgba(255,255,255,0.05) !important; padding: 6px 10px !important; font-size: 12px !important; }

  # ── Batterij gezondheid (SoH) ─────────────────────────────────────────────
  - type: markdown
    title: "🩺 Batterij gezondheid (SoH)"
    content: |
      {%- set schema = state_attr('sensor.cloudems_batterij_epex_schema', 'batteries') or [] -%}
      {%- set soh_raw = state_attr('sensor.cloudems_batterij_soh', 'soh_pct') -%}
      {%- set cycles  = state_attr('sensor.cloudems_batterij_soh', 'total_cycles') -%}
      {%- set cap     = state_attr('sensor.cloudems_batterij_soh', 'usable_kwh') -%}
      {%- set zp      = state_attr('sensor.cloudems_batterij_epex_schema', 'zonneplan') or {} -%}
      {%- set e_cycles = zp.get('entity_cycles') -%}
      {%- set e_state  = zp.get('entity_state') -%}
      {%- set hw_cycles = (states(e_cycles) | int(none)) if e_cycles else none -%}
      {%- set cycles_display = cycles if cycles is not none else hw_cycles -%}
      {%- set cycles_src = '' if cycles is not none else (' *(hardware)*' if hw_cycles is not none else '') -%}
      {%- set batt_state = states(e_state) if e_state else none -%}
      {%- if soh_raw is not none -%}
      {%- set soh = soh_raw | float(0) -%}
      {%- set soh_icon = '✅' if soh >= 80 else ('🟡' if soh >= 60 else '🔴') -%}
      {{ soh_icon }} **SoH: {{ soh | round(1) }}%**
      - Bruikbare capaciteit: {{ (cap | round(2) | string ~ ' kWh') if cap else '— kWh' }}
      - Totaal cycli: {{ (cycles_display | string ~ cycles_src) if cycles_display is not none else '—' }}
      {%- if batt_state %}- Batterijstatus: **{{ batt_state }}**{% endif %}
      {%- else -%}
      ⏳ **SoH: nog aan het leren**
      - CloudEMS volgt SOC-schommelingen om de gezondheid te berekenen.
      - Bruikbare capaciteit: — kWh *(wordt berekend na eerste laadcyclus)*
      - Totaal cycli: {{ (cycles_display | string ~ cycles_src) if cycles_display is not none else '—' }}
      {%- if batt_state %}- Batterijstatus: **{{ batt_state }}**{% endif %}
      {%- endif %}
    card_mod:
      style: |
        ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; --primary-text-color: rgb(255,255,255); --card-background-color: transparent; }
        .card-header { background: transparent !important; border-bottom: 1px solid rgba(255,255,255,0.07) !important; color: rgb(255,255,255) !important; font-size: 12px !important; font-weight: 600 !important; padding: 14px 16px 12px !important; }

  # ── Batterij besparingen ───────────────────────────────────────────────────
  - type: markdown
    title: "💰 Batterij besparingen"
    content: |
      {%- set s = state_attr('sensor.cloudems_battery_besparingen', 'total_savings_eur') -%}
      {%- set ev = state_attr('sensor.cloudems_battery_besparingen', 'eigenverbruik_savings_eur') -%}
      {%- set arb = state_attr('sensor.cloudems_battery_besparingen', 'arbitrage_savings_eur') -%}
      {%- set pv = state_attr('sensor.cloudems_battery_besparingen', 'pv_selfconsumption_eur') -%}
      {%- set loss = state_attr('sensor.cloudems_battery_besparingen', 'saldering_loss_eur') -%}
      {%- set kwh = state_attr('sensor.cloudems_battery_besparingen', 'kwh_charged_today') -%}
      {%- set sess = state_attr('sensor.cloudems_battery_besparingen', 'sessions_today') -%}
      {%- if s is not none -%}
      💰 **Totaal bespaard: € {{ s | round(2) }}**

      | Categorie | Besparing |
      |---|---|
      | Eigenverbruik | € {{ (ev or 0) | round(2) }} |
      | Arbitrage | € {{ (arb or 0) | round(2) }} |
      | PV zelfconsumptie | € {{ (pv or 0) | round(2) }} |
      | Saldering-verlies | -€ {{ (loss or 0) | round(2) }} |

      Vandaag: {{ sess or 0 }} cycli · {{ (kwh or 0) | round(1) }} kWh geladen
      {%- else -%}
      ⏳ **Nog aan het leren** — berekening start na eerste laadcyclus.
      {%- endif %}
    card_mod:
      style: |
        ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; --primary-text-color: rgb(255,255,255); --card-background-color: transparent; }
        .card-header { background: transparent !important; border-bottom: 1px solid rgba(255,255,255,0.07) !important; color: rgb(255,255,255) !important; font-size: 12px !important; font-weight: 600 !important; padding: 14px 16px 12px !important; }
        ha-markdown-element table { width: 100% !important; border-collapse: collapse !important; }
        ha-markdown-element th { background: rgba(0,177,64,0.1) !important; color: rgb(0,212,78) !important; font-size: 10px !important; font-weight: 700 !important; text-transform: uppercase !important; padding: 8px 10px !important; }
        ha-markdown-element td { color: rgb(163,163,163) !important; border-bottom: 1px solid rgba(255,255,255,0.05) !important; padding: 6px 10px !important; font-size: 12px !important; }

  # ── BatteryDecisionEngine ─────────────────────────────────────────────────
  - type: markdown
    title: "🧠 Batterij beslissing"
    content: |
      {%- set bd = state_attr('sensor.cloudems_batterij_epex_schema', 'battery_decision') or {} %}
      {%- set action = bd.get('action', 'idle') %}
      {%- set a_icon = '⚡ Laden' if action == 'charge' else ('🔋 Ontladen' if action == 'discharge' else '💤 Idle') %}
      {%- set prio_labels = {1: '🛡️ Veiligheid', 2: '📊 Tariefgroep', 3: '💶 EPEX', 4: '☀️ PV forecast', 5: '💤 Standaard'} %}
      **{{ a_icon }}** · {{ bd.get('reason', '—') }}

      | Gegeven | Waarde |
      |---|---|
      | **Beslissing** | {{ a_icon }} |
      | **Laag** | {{ prio_labels.get(bd.get('priority', 5), '—') }} |
      | **Zekerheid** | {{ (bd.get('confidence', 0) * 100) | int }}% |
      | **Bron** | `{{ bd.get('source', '—') }}` |
      | **Tariefgroep** | {{ bd.get('tariff_group', '?') | upper }} |
    card_mod:
      style: |
        ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }

  # ── EPEX Batterij Schema (entities) ──────────────────────────────────────
  - type: entities
    title: "🗓️ EPEX Batterij Schema"
    entities:
      - entity: sensor.cloudems_batterij_epex_schema
        name: Huidige actie
        icon: mdi:battery-clock
      - attribute: reason
        entity: sensor.cloudems_batterij_epex_schema
        name: Reden
        icon: mdi:information-outline
      - attribute: soc_pct
        entity: sensor.cloudems_batterij_epex_schema
        name: "Batterij SOC (%)"
        icon: mdi:battery-charging
      - attribute: plan_accuracy_pct
        entity: sensor.cloudems_batterij_epex_schema
        name: "Schema nauwkeurigheid (%)"
        icon: mdi:bullseye-arrow
    card_mod:
      style: |
        ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; --primary-text-color: rgb(255,255,255); --secondary-text-color: rgb(163,163,163); --card-background-color: transparent; }
        .card-header { background: transparent !important; border-bottom: 1px solid rgba(255,255,255,0.07) !important; color: rgb(255,255,255) !important; font-size: 12px !important; font-weight: 600 !important; padding: 14px 16px 12px !important; }

  # ── Batterij EPEX prijsvenster ────────────────────────────────────────────
  - type: entities
    title: "💶 Batterij EPEX prijsvenster"
    entities:
      - attribute: soc_pct
        entity: sensor.cloudems_batterij_epex_schema
        name: "Batterij SOC (%)"
        icon: mdi:battery
      - entity: sensor.cloudems_batterij_epex_schema
        name: Huidige actie
        icon: mdi:flash
      - attribute: reason
        entity: sensor.cloudems_batterij_epex_schema
        name: Reden
        icon: mdi:comment-outline
      - entity: sensor.cloudems_energy_price_current_hour
        name: EPEX prijs nu
        icon: mdi:currency-eur
    card_mod:
      style: |
        ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; --primary-text-color: rgb(255,255,255); --secondary-text-color: rgb(163,163,163); --card-background-color: transparent; }
        .card-header { background: transparent !important; border-bottom: 1px solid rgba(255,255,255,0.07) !important; color: rgb(255,255,255) !important; font-size: 12px !important; font-weight: 600 !important; padding: 14px 16px 12px !important; }

  # ── Zonneplan Nexus status ────────────────────────────────────────────────
  - type: conditional
    conditions:
      - condition: state
        entity: sensor.cloudems_batterij_epex_schema
        state_not: unavailable
    card:
      type: markdown
      title: "⚡ Zonneplan Nexus — CloudEMS sturing"
      content: |
        {%- set zp = state_attr('sensor.cloudems_batterij_epex_schema', 'zonneplan') or {} -%}
        {%- set ok  = zp.get('available', false) -%}
        {%- set det = zp.get('detected', false) -%}
        {%- set mode_raw = zp.get('active_mode') -%}
        {%- set tg   = zp.get('tariff_group', '') | upper -%}
        {%- set tg_icon = {'HIGH':'🔴','NORMAL':'🟡','LOW':'🟢'}.get(tg, '⚪') -%}
        {%- set mode_labels = {
          'home_optimization': '🏠 Thuisoptimalisatie',
          'self_consumption':  '☀️ Zelfverbruik',
          'powerplay':         '⚡ Powerplay',
          'manual_control':    '🔧 Handmatig',
          'Thuisoptimalisatie':'🏠 Thuisoptimalisatie',
          'Zelfverbruik':      '☀️ Zelfverbruik',
          'Zelfconsumptie':    '☀️ Zelfverbruik',
          'Powerplay':         '⚡ Powerplay'
        } -%}
        {%- set mode_display = mode_labels.get(mode_raw, mode_raw | replace('_',' ') | title if mode_raw else '—') -%}
        {%- set eid_soc = zp.get('entity_soc') -%}
        {%- set eid_pwr = zp.get('entity_power') -%}
        {%- set soc_val = states(eid_soc) | float(0) if eid_soc else (state_attr('sensor.cloudems_batterij_epex_schema', 'soc_pct') | float(0)) -%}
        {%- set pwr_val = states(eid_pwr) | float(0) if eid_pwr else 0 -%}
        {%- set soc_icon = '🟢' if soc_val >= 60 else ('🟡' if soc_val >= 20 else '🔴') -%}
        {%- set fc = zp.get('forecast') or {} -%}
        {%- set reasons = fc.get('action_reasons', []) -%}
        {%- set forecast8 = fc.get('forecast_8h', []) -%}
        {%- set pwr_str = (pwr_val | int | string ~ ' W ⬆️') if pwr_val > 50 else ((pwr_val | abs | int | string ~ ' W ⬇️') if pwr_val < -50 else 'idle') -%}

        {{ '✅ **Actief**' if ok else ('🟡 **Gevonden**' if det else '❌ **Niet gevonden**') }} &nbsp;·&nbsp; {{ soc_icon }} **{{ soc_val | round(0) | int }}% SOC** &nbsp;·&nbsp; {{ pwr_str }}

        | Parameter | Waarde |
        |---|---|
        | **Modus** | {{ mode_display }} |
        | **Tariefgroep** | {{ tg_icon }} {{ tg if tg and tg != 'NONE' else 'Onbekend' }} |
        {%- set all_reasons = fc.get('action_reasons_all', fc.get('action_reasons', [])) -%}
        {%- set decision_time = fc.get('decision_time', '') -%}
        {%- set auto_on = zp.get('auto_forecast_enabled', false) -%}
        {%- set action_raw = fc.get('recommended_action', '') -%}
        {%- set action_icons = {'charge':'⬆️ Laden','discharge':'⬇️ Ontladen','hold':'⏸ Hold','idle':'💤 Idle'} -%}
        {%- set action_lbl = action_icons.get(action_raw, action_raw | upper if action_raw else '—') -%}
        {%- set conf_pct = (fc.get('action_confidence', 0) * 100) | round(0) | int -%}
        | **Auto-sturing** | {{ '✅ Actief' if auto_on else '⚠️ Uit — schakel in via Configuratie' }} |
        | **Beslissing** | {{ action_lbl }}{% if conf_pct %} · {{ conf_pct }}%{% endif %}{% if decision_time %} · 🕐 {{ decision_time }}{% endif %} |
        | **Reden** | {{ all_reasons | join(' · ') if all_reasons else '—' }} |
        {%- if fc.get('soc_target', 0) > 0 %}
        | **SoC doel** | {{ fc.get('soc_target') }}% (bereikbaar: {{ fc.get('soc_reachable', 0) }}%) |
        {%- endif %}
        {%- if forecast8 %}
        | **Forecast 8u** | {% for g in forecast8 %}{{ '🔴' if g == 'high' else ('🟢' if g == 'low' else '🟡') }}{% endfor %} |
        {%- endif %}
        {%- if zp.get('has_sliders') %}
        | **Sliders** | ✅ Pad A |
        {%- endif %}
        | **Entiteiten** | {{ zp.get('entities_mapped', []) | length }} gekoppeld |
        {%- if zp.get('last_slider_write_min') is not none %}
        | **Laatste sturing** | ⏱ {{ zp.get('last_slider_write_min') | round(0) | int }} min geleden |
        {%- endif %}
        {%- if zp.get('saved_mode') and not auto_on %}
        {%- set override_min = zp.get('override_since_min', 0) | round(0) | int %}
        | **🔒 Override** | **{{ zp.get('saved_mode') }}** · ⏱ {{ override_min }} min actief |
        {%- endif %}
      card_mod:
        style: |
          ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(0,177,64,0.4) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4), 0 0 16px rgba(0,177,64,0.08) !important; --primary-text-color: rgb(255,255,255); --card-background-color: transparent; --ha-card-border-color: transparent; }
          .card-header { background: transparent !important; border-bottom: 1px solid rgba(0,177,64,0.15) !important; color: rgb(255,255,255) !important; font-size: 12px !important; font-weight: 600 !important; padding: 14px 16px 12px !important; }
          ha-markdown-element table { width: 100% !important; border-collapse: collapse !important; }
          ha-markdown-element th { background: rgba(0,177,64,0.1) !important; color: rgb(0,212,78) !important; font-size: 10px !important; font-weight: 700 !important; text-transform: uppercase !important; padding: 8px 10px !important; }
          ha-markdown-element td { color: rgb(163,163,163) !important; border-bottom: 1px solid rgba(255,255,255,0.05) !important; padding: 6px 10px !important; font-size: 12px !important; }
          ha-markdown-element strong { color: rgb(255,255,255) !important; }

  # ── Zonneplan opbrengsten (alleen als Nexus beschikbaar én data aanwezig) ──
  - type: conditional
    conditions:
      - condition: state
        entity: sensor.cloudems_batterij_epex_schema
        state_not: unavailable
    card:
      type: markdown
      title: "💶 Zonneplan opbrengsten"
      content: |
        {%- set zp = state_attr('sensor.cloudems_batterij_epex_schema', 'zonneplan') or {} -%}
        {%- set inv = zp.get('inverter_status') -%}
        {%- set pp  = zp.get('powerplay_active') -%}
        {%- set prod = zp.get('production_today_kwh') -%}
        {%- set ew   = zp.get('energy_weekly_kwh') -%}
        {%- set has_data = (zp.get('revenue_today_eur') is not none or
                            zp.get('revenue_month_eur') is not none or
                            zp.get('revenue_year_eur') is not none or
                            prod is not none) -%}
        {%- if not has_data %}
        *Opbrengstdata nog niet beschikbaar. Wordt geladen zodra Zonneplan ONE entiteiten zijn gekoppeld.*
        {%- else %}
        {%- if inv %}{{ '🟢 ' ~ inv }}{% endif %}{% if pp %} &nbsp;·&nbsp; ⚡ Powerplay {{ 'aan' if pp in ('on','true','Aan') else 'uit' }}{% endif %}

        | Periode | Opbrengst |
        |---|---|
        {%- if zp.get('revenue_today_eur') is not none %}
        | Vandaag | **€ {{ zp.get('revenue_today_eur') | round(2) }}** |
        {%- endif %}
        {%- if prod is not none %}
        | Productie vandaag | {{ prod | round(2) }} kWh |
        {%- endif %}
        {%- if ew is not none %}
        | Afgelopen week | {{ ew | round(2) }} kWh |
        {%- endif %}
        {%- if zp.get('revenue_month_eur') is not none %}
        | Deze maand | **€ {{ zp.get('revenue_month_eur') | round(2) }}** |
        {%- endif %}
        {%- if zp.get('revenue_prev_month_eur') is not none %}
        | Vorige maand | € {{ zp.get('revenue_prev_month_eur') | round(2) }} |
        {%- endif %}
        {%- if zp.get('revenue_year_eur') is not none %}
        | Dit jaar | **€ {{ zp.get('revenue_year_eur') | round(2) }}** |
        {%- endif %}
        {%- if zp.get('revenue_prev_year_eur') is not none %}
        | Vorig jaar | € {{ zp.get('revenue_prev_year_eur') | round(2) }} |
        {%- endif %}
        {%- if zp.get('revenue_total_eur') is not none %}
        | **Totaal verdiend** | **€ {{ zp.get('revenue_total_eur') | round(2) }}** |
        {%- endif %}
        {%- endif %}
      card_mod:
        style: |
          ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(0,177,64,0.3) !important; border-radius: 16px !important; --primary-text-color: rgb(255,255,255); --card-background-color: transparent; }
          .card-header { background: transparent !important; border-bottom: 1px solid rgba(0,177,64,0.15) !important; color: rgb(255,255,255) !important; font-size: 12px !important; font-weight: 600 !important; padding: 14px 16px 12px !important; }
          ha-markdown-element table { width: 100% !important; border-collapse: collapse !important; }
          ha-markdown-element th { background: rgba(0,177,64,0.1) !important; color: rgb(0,212,78) !important; font-size: 10px !important; font-weight: 700 !important; text-transform: uppercase !important; padding: 8px 10px !important; }
          ha-markdown-element td { color: rgb(163,163,163) !important; border-bottom: 1px solid rgba(255,255,255,0.05) !important; padding: 6px 10px !important; font-size: 12px !important; }
          ha-markdown-element strong { color: rgb(255,255,255) !important; font-weight: 700 !important; }

  # ── Zonneplan modus knoppen ───────────────────────────────────────────────
  - type: conditional
    conditions:
      - condition: state
        entity: sensor.cloudems_batterij_epex_schema
        state_not: unavailable
    card:
      type: grid
      columns: 4
      square: false
      cards:
        - type: button
          name: Thuis opt.
          icon: mdi:home-battery
          tap_action:
            action: perform-action
            perform_action: cloudems.zonneplan_set_mode
            data:
              mode: home_optimization
          card_mod:
            style: |
              ha-card { background: rgba(0,177,64,0.12) !important; border: 1px solid rgba(0,177,64,0.3) !important; border-radius: 10px !important; --primary-text-color: rgb(200,200,200); }
        - type: button
          name: Zelfverbruik
          icon: mdi:solar-power
          tap_action:
            action: perform-action
            perform_action: cloudems.zonneplan_set_mode
            data:
              mode: self_consumption
          card_mod:
            style: |
              ha-card { background: rgba(251,191,36,0.10) !important; border: 1px solid rgba(251,191,36,0.3) !important; border-radius: 10px !important; --primary-text-color: rgb(200,200,200); }
        - type: button
          name: Powerplay
          icon: mdi:lightning-bolt
          tap_action:
            action: perform-action
            perform_action: cloudems.zonneplan_set_mode
            data:
              mode: powerplay
          card_mod:
            style: |
              ha-card { background: rgba(239,68,68,0.10) !important; border: 1px solid rgba(239,68,68,0.25) !important; border-radius: 10px !important; --primary-text-color: rgb(200,200,200); }
        - type: button
          name: Auto herstel
          icon: mdi:restart
          tap_action:
            action: perform-action
            perform_action: cloudems.zonneplan_battery_auto
            data: {}
          card_mod:
            style: |
              ha-card { background: rgba(100,116,139,0.12) !important; border: 1px solid rgba(100,116,139,0.3) !important; border-radius: 10px !important; --primary-text-color: rgb(200,200,200); }

  # ── Zonneplan sliders (alleen als Pad A beschikbaar) ──────────────────────
  - type: conditional
    conditions:
      - condition: state
        entity: sensor.cloudems_batterij_epex_schema
        state_not: unavailable
    card:
      type: markdown
      title: "🎚️ Nexus vermogenssliders (Pad A)"
      content: |
        {%- set zp = state_attr('sensor.cloudems_batterij_epex_schema', 'zonneplan') or {} -%}
        {%- set e_dth = zp.get('entity_deliver_to_home') -%}
        {%- set e_sc  = zp.get('entity_solar_charge') -%}
        {%- set e_mch = zp.get('entity_max_charge_home') -%}
        | Slider | Huidige waarde |
        |---|---|
        {%- if e_dth %}
        | ⬇️ **Leveren aan huis** | {{ states(e_dth) }} W |
        {%- endif %}
        {%- if e_sc %}
        | ☀️ **Zonneladen** | {{ states(e_sc) }} W |
        {%- endif %}
        {%- if e_mch %}
        | ⚡ **Max. laadvermogen** | {{ states(e_mch) }} W |
        {%- endif %}
      card_mod:
        style: |
          ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(0,177,64,0.3) !important; border-radius: 16px !important; --primary-text-color: rgb(255,255,255); --card-background-color: transparent; }
          .card-header { background: transparent !important; border-bottom: 1px solid rgba(0,177,64,0.15) !important; color: rgb(255,255,255) !important; font-size: 12px !important; font-weight: 600 !important; padding: 14px 16px 12px !important; }
          ha-markdown-element table { width: 100% !important; border-collapse: collapse !important; }
          ha-markdown-element th { background: rgba(0,177,64,0.1) !important; color: rgb(0,212,78) !important; font-size: 10px !important; font-weight: 700 !important; text-transform: uppercase !important; padding: 8px 10px !important; }
          ha-markdown-element td { color: rgb(163,163,163) !important; border-bottom: 1px solid rgba(255,255,255,0.05) !important; padding: 6px 10px !important; font-size: 12px !important; }
          ha-markdown-element strong { color: rgb(255,255,255) !important; font-weight: 700 !important; }
          ha-markdown-element code { color: rgb(100,180,100) !important; font-size: 10px !important; }
          ha-markdown-element em { color: rgb(100,100,100) !important; font-size: 11px !important; }

  # ── Slider kalibratie knop ─────────────────────────────────────────────────
  - type: conditional
    conditions:
      - condition: state
        entity: sensor.cloudems_batterij_epex_schema
        state_not: unavailable
    card:
      type: button
      entity: button.cloudems_slider_kalibratie
      name: "🎯 Slider kalibratie"
      show_name: true
      show_icon: true
      icon: mdi:tune-variant
      tap_action:
        action: call-service
        service: button.press
        service_data:
          entity_id: button.cloudems_slider_kalibratie
      card_mod:
        style: |
          ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(0,177,64,0.3) !important; border-radius: 16px !important; --primary-text-color: rgb(255,255,255); }

  # ── Handmatig laden / ontladen: verwijderd (Zonneplan Nexus stuurt niet direct via charge/discharge) ──

  - type: markdown
    content: |
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:4px 2px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:20px;">⚡</span>
          <div>
            <div style="color:rgb(255,255,255);font-weight:600;font-size:13px;line-height:1.3;">CloudEMS v{{ state_attr('sensor.cloudems_status','version') or state_attr('sensor.cloudems_watchdog','cloudems_version') or '?' }}</div>
            <div style="color:rgb(102,102,102);font-size:11px;">cloudems.eu · MIT License</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <a href="https://github.com/cloudemsNL/ha-cloudems/issues/new?template=bug_report.md" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:#1f2937;border:1px solid rgba(239,68,68,0.4);color:#f87171;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;text-decoration:none;">🐛 Bug melden</a>
          <a href="https://github.com/cloudemsNL/ha-cloudems/issues/new?template=feature_request.md" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:#1f2937;border:1px solid rgba(99,102,241,0.4);color:#a5b4fc;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;text-decoration:none;">💡 Feature verzoek</a>
          <a href="https://buymeacoffee.com/smarthost9m" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,rgb(245,158,11),rgb(217,119,6));color:rgb(26,16,0);padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none;">☕ Steun CloudEMS</a>
        </div>
      </div>
    card_mod:
      style: |
        ha-card {
          background: rgb(22,22,22) !important;
          border: 1px solid rgba(255,255,255,0.05) !important;
          border-radius: 14px !important;
          box-shadow: none !important;
          --card-background-color: transparent;
          --ha-card-border-color: transparent;
        }
        ha-markdown-element a { text-decoration: none !important; }
        ha-markdown-element a:hover { opacity: 0.85 !important; }

- title: NILM Apparaten
  path: cloudems-nilm
  max_columns: 2
  icon: mdi:chip
  background: "url(/local/cloudems/images/bg-nilm.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(206,147,216,0.07) 0%, transparent 60%), rgb(24,24,24)"
  card_mod:
    style: |
      hui-view { padding: 12px 12px 24px !important; }
  cards:
  - type: custom:cloudems-chip-card
    primary: >-
      {% set name = state_attr('sensor.cloudems_nilm_review_current', 'name') %}
      {% if name %}{{ name }}{% else %}✅ Alle apparaten beoordeeld{% endif %}
    secondary: >-
      {% set s = states('sensor.cloudems_nilm_review_current') %}
      {% set count = state_attr('sensor.cloudems_nilm_review_current', 'pending_count') | int(0) %}
      {% if s == 'none' %}Geen onbesliste apparaten.
      {% else %}{% set dtype = state_attr('sensor.cloudems_nilm_review_current', 'device_type') or '?' %}{% set pw = state_attr('sensor.cloudems_nilm_review_current', 'power_w') | int(0) %}{% set conf = state_attr('sensor.cloudems_nilm_review_current', 'confidence') | int(0) %}{% set ph = state_attr('sensor.cloudems_nilm_review_current', 'phase') or '?' %}{% set ev = state_attr('sensor.cloudems_nilm_review_current', 'on_events') | int(0) %}{{ dtype }} · {{ pw }} W · {{ ph }} · {{ conf }}% · {{ ev }}× gezien | nog {{ count }} te beoordelen{% endif %}
    icon: >-
      {% if states('sensor.cloudems_nilm_review_current') == 'none' %}mdi:check-all{% else %}mdi:help-circle-outline{% endif %}
    icon_color: >-
