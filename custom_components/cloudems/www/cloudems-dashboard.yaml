        ha-markdown-element th { text-align: center !important; font-size: 0.78em; color: rgb(163,163,163); padding: 4px !important; }
  - type: markdown
    title: ☀️ Omvormers — Live status
    content: |
      {% set invs = state_attr('sensor.cloudems_solar_system_intelligence', 'inverters') or [] %}
      {% set inv_count_cfg = state_attr('sensor.cloudems_solar_system_intelligence', 'inverter_count') %}
      {% if invs | length == 0 %}
      {% if inv_count_cfg is none %}
      ⏳ *Omvormerdata wordt geladen...*
      {% else %}
      *Geen omvormers geconfigureerd.*
      {% endif %}
      {% else %}
      | Omvormer | Nu | Piek 7d | Rated | Benutting | Richting | Fase | Clipping |
      |----------|----|---------|-------|-----------|----------|------|----------|
      {% for inv in invs -%}
      {%- set ph = inv.phase_display -%}
      {%- set ph_conf = (inv.phase_confidence | default(0)) | round(0) | int -%}
      {%- set ph_cert = inv.phase_certain | default(false) -%}
      {%- set is_3f   = inv.is_three_phase | default(false) -%}
      {%- if ph_cert and is_3f -%}{%- set fase_col = '✅ 3-fase' -%}
      {%- elif ph_cert -%}{%- set fase_col = '✅ ' ~ ph -%}
      {%- elif ph == '3F' -%}{%- set fase_col = '🔍 ~3F ' ~ ph_conf ~ '%' -%}
      {%- elif ph -%}{%- set fase_col = '🔍 ~' ~ ph ~ ' ' ~ ph_conf ~ '%' -%}
      {%- else -%}{%- set fase_col = '⏳ leren' -%}{%- endif -%}
      | **{{ inv.label }}** | {{ inv.current_w | int }} W | {{ inv.peak_w_7d | int }} W | {{ (inv.rated_power_w | int | string ~ ' W') if inv.rated_power_w else '—' }} | {{ '🟢' if inv.utilisation_pct >= 60 else '🟡' if inv.utilisation_pct >= 20 else '⚫' }} {{ inv.utilisation_pct | round(0) }}% | {{ inv.azimuth_compass or '?' }} {{ inv.tilt_deg | int if inv.tilt_deg else '' }}° | {{ fase_col }} | {{ '⚠️ JA' if inv.clipping else '✅' }} |
      {% endfor %}
      {% endif %}
