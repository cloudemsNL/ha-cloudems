    content: "{% set scheds = state_attr('sensor.cloudems_nilm_apparaat_schemas', 'schedules') or [] %}\n{% set ready = scheds | selectattr('ready') | list %}\n{% if ready | length == 0 %}\n*Schema's worden geleerd — na ~2 weken verschijnen hier weekpatronen per apparaat.*\n{% else %}\n| Apparaat | Piek dag | Piek uur | Gebruik | Altijd aan |\n|---|---|---|---|---|\n{%- set seen = namespace(names=[]) -%}\n{%- for s in ready -%}\n{%- set lbl = s.get('label') or s.get('device_type','?') -%}\n{%- if lbl not in seen.names -%}\n{%- set seen.names = seen.names + [lbl] -%}\n{%- set pct = ((s.get('on_ratio',0)*100)|round(0)|int) -%}\n{%- set always = s.get('always_on', false) -%}\n| {{ lbl }} | {{ s.get('peak_weekday') or '—' }} | {{ ('%02d:00' % s.get('peak_hour',0)) if s.get('peak_hour') != none else '—' }} | {{ pct }}% | {{ '✅ ja' if always else '—' }} |\n{%- endif -%}\n{%- endfor %}\n{% endif %}\n"
