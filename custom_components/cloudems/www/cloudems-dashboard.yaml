- title: Rolluiken
  path: cloudems-rolluiken
  type: masonry
  max_columns: 2
  icon: "mdi:blinds"
  background: url(/local/cloudems/images/bg-rolluiken.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(144,202,249,0.07) 0%, transparent 60%), rgb(24,24,24)
  cards:
  - *id001
  - type: conditional
    conditions:
    - condition: state
      entity: switch.cloudems_module_rolluiken
      state: 'off'
    card:
      type: markdown
      content: "⚠️ **\U0001FA9F Rolluiken module staat uit.** Schakel hem in via het [Configuratie tabblad](#cloudems-config) om deze functie te activeren."
  - type: vertical-stack
    cards:
    - type: "custom:cloudems-shutter-card"
      title: 🪟 Rolluiken
    - type: markdown
      title: 🪟 Rolluiken — Status & Beslissing (legacy)
      content: "{%- set shutters = (state_attr('sensor.cloudems_status','shutters') or {}).get('shutters', []) -%}\n{%- if not shutters -%}\n⚙️ **Nog geen rolluiken geconfigureerd.**\n\nKoppel je rolluiken\
        \ via **CloudEMS → Configureren → Rolluiken**.\n{%- else %}\n{% for s in shutters %}\n{%- set pos = s.get('position', -1) %}\n{%- set act = s.get('last_action','') %}\n{%- set reason = s.get('last_reason','')\
        \ %}\n{%- set shadow = s.get('shadow_action','') %}\n{%- set shadow_reason = s.get('shadow_reason','') %}\n{%- set auto = s.get('auto_enabled', true) %}\n{%- set override = s.get('override_active',\
        \ false) %}\n{%- if act == 'open' %}{%- set act_icon = '\U0001F53C' %}\n{%- elif act == 'close' %}{%- set act_icon = '\U0001F53D' %}\n{%- elif act == 'position' %}{%- set act_icon = '↕️' %}\n{%-\
        \ else %}{%- set act_icon = '⏸' %}\n{%- endif %}\n{%- if not auto %}{%- set status_lbl = '\U0001F534 UIT' %}\n{%- elif override %}{%- set status_lbl = '\U0001F7E0 Override' %}\n{%- else %}{%- set\
        \ status_lbl = '\U0001F7E2 AAN' %}\n{%- endif %}\n---\n#### {{ act_icon }} **{{ s.get('label','?') }}** · {{ pos ~ '%' if pos >= 0 else '—' }} · {{ status_lbl }}\n{%- if reason %}\n\U0001F4AC *{{\
        \ reason }}*\n{%- endif %}\n{%- if shadow and shadow != act and not auto %}\n\U0001F916 Automaat zou: **{{ shadow }}**{% if shadow_reason %} — *{{ shadow_reason }}*{% endif %}\n{%- endif %}\n{%\
        \ endfor %}\n{%- endif %}"
    - type: "custom:cloudems-entity-list"
      show_empty: false
      card:
        type: entities
        title: 🎮 Handmatige bediening
        show_header_toggle: false
      filter:
        include:
        - entity_id: button.cloudems_shutter_*
      sort:
        method: friendly_name
  - type: vertical-stack
    cards:
    - type: "custom:cloudems-chip-card"
      primary: "{%- set d = state_attr('sensor.cloudems_status','shutters') -%} {%- set shutters = d.get('shutters', []) if d else [] -%} {%- if shutters | count == 0 -%}Geen rolluiken geconfigureerd {%-\
        \ else -%}{{ shutters | count }} rolluik{% if shutters | count != 1 %}en{% endif %} actief{%- endif -%}\n"
      secondary: "{%- set d = state_attr('sensor.cloudems_status','shutters') -%} {%- set shutters = d.get('shutters', []) if d else [] -%} {%- set auto_on = shutters | selectattr('auto_enabled','eq',true)\
        \ | list | count -%} {%- set auto_off = shutters | selectattr('auto_enabled','eq',false) | list | count -%} Automaat: {{ auto_on }} aan{% if auto_off > 0 %}, {{ auto_off }} uitgeschakeld{% endif\
        \ %}\n"
      icon: "mdi:blinds"
      icon_color: "{%- set d = state_attr('sensor.cloudems_status','shutters') -%} {%- set shutters = d.get('shutters', []) if d else [] -%} {%- if shutters | selectattr('auto_enabled','eq',false) | list\
        \ | count > 0 -%}orange{%- elif shutters | selectattr('override_active','eq',true) | list | count > 0 -%}orange{%- else -%}blue{%- endif -%}\n"
    - type: "custom:cloudems-entity-list"
      show_empty: true
      unique: true
      card:
        type: entities
        title: ⏱️ Override restant
        show_header_toggle: false
      empty_state_content: Geen actieve pauze of override
      filter:
        include:
        - entity_id: sensor.cloudems_rolluik_*_override_restant
        exclude:
        - entity_id: sensor.cloudems_rolluik_*_override_restant
          state: "00:00:00"
        - entity_id: sensor.cloudems_rolluik_*_override_restant
          state: unavailable
        - entity_id: sensor.cloudems_rolluik_*_override_restant
          state: unknown
      sort:
        method: state
        reverse: true
    - type: "custom:cloudems-entity-list"
      show_empty: true
      card:
        type: entities
        title: ⏰ Tijden & setpoint
        show_header_toggle: false
      empty_state_content: Tijden worden geladen na herstart
      filter:
        include:
        - entity_id: text.cloudems_rolluik_*
        - entity_id: number.cloudems_rolluik_*
        - entity_id: input_text.cloudems_shutter_*
        - entity_id: input_number.cloudems_shutter_*
      sort:
        method: friendly_name
    - type: "custom:cloudems-entity-list"
      show_empty: false
      card:
        type: entities
        title: 🤖 Automaat
        show_header_toggle: false
      filter:
        include:
        - entity_id: switch.cloudems_module_rolluiken
        - entity_id: switch.cloudems_shutter_*_auto
      sort:
        method: friendly_name
    - type: "custom:cloudems-entity-list"
      show_empty: false
      card:
        type: entities
        title: 🧠 Tijdschema leren
        show_header_toggle: false
      filter:
        include:
        - entity_id: switch.cloudems_shutter_*_learning
      sort:
        method: friendly_name
    - type: "custom:cloudems-entity-list"
      show_empty: false
      card:
        type: entities
        title: 📊 Leer voortgang
        show_header_toggle: false
      filter:
        include:
        - entity_id: sensor.cloudems_rolluik_*_leer_voortgang
      sort:
        method: friendly_name
    - type: markdown
      title: 🧭 Oriëntatie & temperatuurleren
      content: "{%- set d = state_attr('sensor.cloudems_status','shutters') -%}\n{%- set sh = (d.get('shutters',[]) if d else []) -%}\n{%- set lrn = (d.get('learner',[]) if d else []) -%}\n{%- if sh | count\
        \ == 0 -%}\n*Geen rolluiken geconfigureerd.*\n{%- else -%}\n**\U0001F9ED Oriëntatie leren**\n| Rolluik | Sensor | Bron | Richting | Zeker? |\n|---------|--------|------|---------|--------|\n{%-\
        \ for s in sh %}\n{%- set snsr = s.get('temp_sensor','') -%}\n{%- set snm = snsr.split('.')[-1]|replace('_',' ')|title if snsr else '—' -%}\n{%- set bron = 'config' if snsr else 'auto' -%}\n{%-\
        \ set ori = s.get('orientation_learned','') -%}\n{%- set ol = ori if ori not in ('','onbekend','unknown') else 'leren…' -%}\n{%- set ld = lrn|selectattr('area_id','eq',s.get('area_id','___'))|list\
        \ -%}\n{%- set smp = ld[0].get('total_samples',0) if ld else 0 -%}\n{%- set cl = '✅' if s.get('orientation_confident',false) else ('\U0001F504 '~smp) %}\n| **{{ s.get('label',s.get('entity_id',''))\
        \ }}** | {{ snm }} | {{ bron }} | {{ ol }} | {{ cl }} |\n{%- endfor -%}\n{%- endif -%}\n"
  - type: markdown
    content: "<div style=\"display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:4px 2px;\">\n  <div style=\"display:flex;align-items:center;gap:10px;\">\n    <span\
      \ style=\"font-size:20px;\">⚡</span>\n    <div>\n      <div style=\"color:rgb(255,255,255);font-weight:600;font-size:13px;line-height:1.3;\">CloudEMS v{{ state_attr('sensor.cloudems_status','version')\
