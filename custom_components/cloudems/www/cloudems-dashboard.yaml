      | Apparaat | W | Fase | Bron | % |
      |----------|---|------|------|---|
      {% for d in active | sort(attribute='power_w', reverse=true) -%}
      | {{ d.name or d.type }} | {{ d.power_w | int }} | {{ '🔵' if d.phase == 'L1' else '🟡' if d.phase == 'L2' else '🟢' if d.phase == 'L3' else '⚫' }} {{ d.phase or '?' }} | {{ '🔌' if (d.source_type or 'nilm') == 'smart_plug' else '🔍' }} | {{ '✅' if (d.source_type or 'nilm') == 'smart_plug' else ('🟢' if d.confidence | int(0) >= 70 else '🟡' if d.confidence | int(0) >= 50 else '🔴') }}{% if (d.source_type or 'nilm') != 'smart_plug' %} {{ d.confidence | int(0) }}%{% endif %} |
