        \ geladen | {{ kwh_today | round(2) }} kWh |\n| Kosten vandaag | €{{ cost_today | round(2) }} |\n| Gem. per week | {{ weekly_avg | round(2) }} kWh |\n| Totaal sessies | {{ total_sess }} |\n| Beste\
        \ laaduur | {% if best_hour is not none %}{{ '%02d:00'|format(best_hour) }}{% else %}Onbekend{% endif %} |\n\n{% if advice %}> {{ advice }}{% endif %}\n\n{% if profiles %}\n**Herkende voertuigen:**\n\
        \n| Voertuig | Type | Sessies | Gem. kWh | Gem. duur | Piekuur | Gem. vermogen |\n|---|---|---|---|---|---|---|\n{%- for p in profiles %}\n{%- set vtype = p.get('vehicle_type') or 'ebike' %}\n{%-\
        \ set vicon = '\U0001F6B2' if vtype == 'ebike' else ('\U0001F6F5' if vtype == 'scooter' else '\U0001F50B') %}\n{%- set vname = p.get('vehicle_name') if p.get('vehicle_name') else (vicon ~ ' ' ~\
        \ vtype ~ ' #' ~ loop.index) %}\n| **{{ vname }}** | {{ vicon }} {{ vtype }} | {{ p.get('sessions', 0) | int(0) }} | {{ p.get('avg_kwh', 0) | float(0) | round(2) }} kWh | {{ p.get('avg_duration_min',\
        \ 0) | float(0) | round(0) | int }} min | {{ '%02d:00' % (p.get('avg_start_hour', 0) | int(0)) }} | {{ p.get('peak_power_w', 0) | float(0) | round(0) | int }} W |\n{%- endfor %}\n{% endif %}\n"
