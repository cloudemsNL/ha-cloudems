      {%- endfor %}
      {%- set ambiguous = profiles | selectattr('vehicle_type', 'eq', 'ambiguous_micro_ev') | list %}
      {% if ambiguous %}
      > ℹ️ **Onbepaald type:** {{ ambiguous | length }} voertuig(en) in de 181–250W zone. CloudEMS wacht op meer sessies om e-bike/scooter te onderscheiden op laadduur.
