- title: NILM Beheer
  path: cloudems-nilm-beheer
  type: masonry
  max_columns: 2
  icon: "mdi:check-decagram"
  background: url(/local/cloudems/images/bg-nilm-beheer.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(244,143,177,0.07) 0%, transparent 60%), rgb(24,24,24)
  card_mod:
    style: "hui-view { padding: 12px 12px 24px !important; }\n"
  cards:
  - *id001
  - type: markdown
    title: 🧺 Wasbeurt Cyclus Detector
    content: "{% set apps = state_attr('sensor.cloudems_nilm_devices', 'appliance_cycles') %}\n{% set apparaten = apps.apparaten if apps else [] %}\n{% if not apparaten %}\n*Geen apparaten geconfigureerd.\
      \ CloudEMS detecteert automatisch de wasmachine via NILM.*\n*Voeg een smart plug toe via `appliance_cycle_devices` config voor nauwkeurigere meting.*\n{% else %}\n{% for app in apparaten %}\n{% set\
      \ fase_icons = {'idle':'\U0001F4A4','voorwas':'\U0001F4A7','verwarmen':'\U0001F321️','wassen':'\U0001F300','spoelen':'\U0001F4A6','centrifuge':'⚡','klaar':'✅'} %}\n{% set fi = fase_icons.get(app.fase,\
      \ '❓') %}\n---\n{% if app.is_active %}\n**\U0001F504 Actief** — Fase: **{{ app.fase_nl }}** | Bezig: {{ app.elapsed_min | int }} min\n{% if app.remaining_min %}⏱️ Nog **~{{ app.remaining_min | int\
      \ }} minuten**{% endif %}\n{% if app.huidig_programma %}\U0001F4CB Programma: *{{ app.huidig_programma }}*{% endif %}\n{% if app.cyclus_kwh %}⚡ Dit gebruik: {{ app.cyclus_kwh }} kWh{% endif %}\n\n\
      **Fase-voortgang:**\n{% set fases = ['voorwas','verwarmen','wassen','spoelen','centrifuge'] %}\n{% set actief_idx = fases.index(app.fase) if app.fase in fases else -1 %}\n{% for f in fases %}{% set\
      \ idx = loop.index0 %}{% if idx < actief_idx %}✅{% elif idx == actief_idx %}\U0001F504{% else %}⬜{% endif %} {{ fase_icons.get(f,'') }} {{ f | title }} {% endfor %}\n{% elif app.fase == 'klaar' %}\n\
      **✅ Klaar!** — Haal de was op \U0001F9FA\n{% else %}\n\U0001F4A4 Staat uit — {{ app.totaal_cycli }} cycli geleerd\n{% endif %}\n\n{% if app.programmas %}\n**Geleerde programma's:**\n| Naam | Duur\
      \ | Verbruik | Cycli |\n|---|---|---|---|\n{% for p in app.programmas %}| {{ p.naam }} | {{ p.totaal_duur | int }} min | {{ p.totaal_kwh }} kWh | {{ p.cycli }}× |\n{% endfor %}{% endif %}\n\n{% set\
      \ lp = app.geleerde_params %}\n{% if lp.idle_max_w %}\n*Parameters geleerd: standby {{ lp.idle_max_w }}W, verwarmen min {{ lp.heat_min_w }}W, centrifuge piek {{ lp.spin_peak_w }}W*\n{% else %}*Nog\
      \ aan het leren — na 2-3 volledige cycli zijn drempelwaarden bekend.*{% endif %}\n{% endfor %}{% endif %}\n"
    card_mod:
      style: "ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }\n"
  - type: markdown
    title: 📡 NILM Live Activiteit
    content: "{% set diag     = state_attr('sensor.cloudems_nilm_diagnostics', 'events_total') | int(0) %}\n{% set rate     = states('sensor.cloudems_nilm_diagnostics') | float(0) %}\n{% set classified\
      \ = state_attr('sensor.cloudems_nilm_diagnostics', 'events_classified') | int(0) %}\n{% set missed   = state_attr('sensor.cloudems_nilm_diagnostics', 'events_missed') | int(0) %}\n{% set last_ts \
      \ = state_attr('sensor.cloudems_nilm_diagnostics', 'last_event_ts') %}\n{% set last_dw  = state_attr('sensor.cloudems_nilm_diagnostics', 'last_event_delta_w') | float(0) %}\n{% set last_match = state_attr('sensor.cloudems_nilm_diagnostics',\
      \ 'last_match') %}\n{% set known    = state_attr('sensor.cloudems_nilm_diagnostics', 'devices_known') | int(0) %}\n{% set confirmed = state_attr('sensor.cloudems_nilm_diagnostics', 'devices_confirmed')\
      \ | int(0) %}\n{% set b_l1     = state_attr('sensor.cloudems_nilm_diagnostics', 'baseline_l1_w') | float(0) %}\n{% set b_l2     = state_attr('sensor.cloudems_nilm_diagnostics', 'baseline_l2_w') |\
      \ float(0) %}\n{% set b_l3     = state_attr('sensor.cloudems_nilm_diagnostics', 'baseline_l3_w') | float(0) %}\n{% set ai_mode  = state_attr('sensor.cloudems_nilm_diagnostics', 'ai_mode') %}\n{% set\
      \ thr_w    = state_attr('sensor.cloudems_nilm_sensor_input', 'adaptive_threshold_w') | float(0) %}\n{% set thr_ada  = state_attr('sensor.cloudems_nilm_sensor_input', 'threshold_adapted') %}\n{% set\
      \ noise_w  = state_attr('sensor.cloudems_nilm_sensor_input', 'noise_p80_w') | float(0) %}\n{% set thr_samp = state_attr('sensor.cloudems_nilm_sensor_input', 'threshold_samples') | int(0) %}\n{% set\
      \ running  = state_attr('sensor.cloudems_nilm_running_devices', 'device_list') or [] %}\n{% set ankers   = states('sensor.cloudems_nilm_hybride_status') | int(0) %}\n{% set enrich   = state_attr('sensor.cloudems_nilm_hybride_status',\
      \ 'stat_enrich_calls') | int(0) %}\n{% set hits     = state_attr('sensor.cloudems_nilm_hybride_status', 'stat_anchor_hits') | int(0) %}\n\n{% if diag == 0 and rate == 0 %}\n\U0001F534 **NILM ziet\
      \ nog geen vermogensveranderingen.** Controleer of de netmeter-sensor kloppende waarden levert.\n{% elif rate < 50 %}\n\U0001F7E1 **NILM actief — classificatiegraad laag ({{ rate | round(1) }}%)**\n\
      {% else %}\n\U0001F7E2 **NILM actief — {{ rate | round(1) }}% geclassificeerd**\n{% endif %}\n\n**Metingstatus:**\n\n| Gegeven | Waarde |\n|---|---|\n| Vermogensevents totaal | {{ diag }} |\n| Geclassificeerd\
      \ | {{ classified }} ({{ rate | round(1) }}%) |\n| Niet herkend | {{ missed }} |\n| Laatste event | {% if last_ts %}{{ last_ts }} · Δ{{ last_dw | round(0) | int }} W{% else %}—{% endif %} |\n| Laatste\
      \ match | {{ last_match if last_match else '—' }} |\n| Apparaten bekend/bevestigd | {{ known }} / {{ confirmed }} |\n| AI modus | {{ ai_mode if ai_mode else '—' }} |\n\n**Drempelwaarde & Ruis:**\n\
      \n| Gegeven | Waarde |\n|---|---|\n| Adaptieve drempel | {{ thr_w | round(1) }} W {% if thr_ada %}✅ aangepast{% else %}⏳ aan het leren ({{ thr_samp }} samples){% endif %} |\n| Ruisniveau (P80) | {{\
      \ noise_w | round(1) }} W |\n\n**Fasebasislijnen (altijd-aan last):**\n\n| Fase | Basislijn |\n|---|---|\n| L1 | {{ b_l1 | round(1) }} W |\n| L2 | {{ b_l2 | round(1) }} W |\n| L3 | {{ b_l3 | round(1)\
      \ }} W |\n\n**HybridNILM ankers:**\n\n| Gegeven | Waarde |\n|---|---|\n| Actieve ankers | {{ ankers }} |\n| Verrijkingsoproepen | {{ enrich }} |\n| Anker-hits | {{ hits }} |\n\n{% if running %}\n\
      **Nu actief ({{ running | length }} apparaat/apparaten):**\n\n| Apparaat | Type | Zekerheid | Fase | Bron |\n|---|---|---|---|---|\n{% for d in running -%}\n| {{ d.name }} | {{ d.type }} | {{ d.confidence\
      \ | round(0) | int }}% | {{ d.phase if d.phase else '—' }} | {{ d.source if d.source else '—' }} |\n{% endfor %}\n{% else %}\n_Geen apparaten op dit moment actief._\n{% endif %}\n"
    card_mod:
      style: "ha-card {\n  background: rgb(34,34,34) !important;\n  border: 1px solid rgba(255,255,255,0.06) !important;\n  border-radius: 16px !important;\n  box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;\n\
        \  --primary-text-color: rgb(255,255,255);\n  --secondary-text-color: rgb(163,163,163);\n  --primary-color: rgb(0,177,64);\n  --card-background-color: transparent;\n  --ha-card-border-color: transparent;\n\
        }\nha-card:hover {\n  border-color: rgba(0,177,64,0.5) !important;\n  box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 16px rgba(0,177,64,0.12) !important;\n  transform: translateY(-1px) !important;\n\
        }\n.card-header {\n  background: transparent !important;\n  border-bottom: 1px solid rgba(255,255,255,0.07) !important;\n  color: rgb(255,255,255) !important;\n  font-size: 12px !important;\n  font-weight:\
        \ 600 !important;\n  padding: 14px 16px 12px !important;\n}\nha-markdown-element table { width: 100% !important; border-collapse: collapse !important; }\nha-markdown-element th {\n  background:\
        \ rgba(0,177,64,0.1) !important;\n  color: rgb(0,212,78) !important;\n  font-size: 10px !important;\n  font-weight: 700 !important;\n  letter-spacing: 0.06em !important;\n  text-transform: uppercase\
        \ !important;\n  padding: 7px 10px !important;\n  border-bottom: 1px solid rgba(0,177,64,0.2) !important;\n}\nha-markdown-element td {\n  color: rgb(163,163,163) !important;\n  border-bottom: 1px\
        \ solid rgba(255,255,255,0.04) !important;\n  padding: 6px 10px !important;\n}\nha-markdown-element tr:last-child td { border-bottom: none !important; }\nha-markdown-element strong { color: rgb(255,255,255)\
        \ !important; }\n"
