  - type: markdown
    content: |
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:4px 2px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:20px;">⚡</span>
          <div>
            <div style="color:rgb(255,255,255);font-weight:600;font-size:13px;line-height:1.3;">CloudEMS v{{ state_attr('sensor.cloudems_status','version') or state_attr('sensor.cloudems_watchdog','cloudems_version') or '?' }}</div>
            <div style="color:rgb(102,102,102);font-size:11px;">cloudems.eu · MIT License</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <a href="https://github.com/cloudemsNL/ha-cloudems/issues/new?template=bug_report.md" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:#1f2937;border:1px solid rgba(239,68,68,0.4);color:#f87171;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;text-decoration:none;">🐛 Bug melden</a>
          <a href="https://github.com/cloudemsNL/ha-cloudems/issues/new?template=feature_request.md" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:#1f2937;border:1px solid rgba(99,102,241,0.4);color:#a5b4fc;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;text-decoration:none;">💡 Feature verzoek</a>
          <a href="https://buymeacoffee.com/smarthost9m" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,rgb(245,158,11),rgb(217,119,6));color:rgb(26,16,0);padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none;">☕ Steun CloudEMS</a>
        </div>
      </div>
