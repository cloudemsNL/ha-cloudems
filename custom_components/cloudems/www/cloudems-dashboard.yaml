        \ padding: 14px 16px 12px !important;\n}\n"
  - type: markdown
    title: 🚲 E-bikes — Live Status
    content: "{% set eb  = state_attr('sensor.cloudems_micro_mobility', 'ebike') or {} %}\n{% set fts = eb.get('fietsen', []) %}\n{% set brand_icons = {'bosch':'\U0001F527','specialized':'⚡','yamaha':'\U0001F3B5\
      ','smartphix':'\U0001F1F3\U0001F1F1','generic':'\U0001F6B2'} %}\n{% if not fts %}\n*Geen e-bikes gevonden. CloudEMS herkent automatisch:*\n- **Bosch**: installeer [hass-bosch-ebike](https://github.com/Phil-Barker/hass-bosch-ebike)\
      \ via HACS\n- **Specialized Turbo**: installeer [ha-specialized-turbo](https://github.com/JamieMagee/ha-specialized-turbo) via HACS (Bluetooth)\n- **Yamaha / Smartphix / Andere**: configureer via\
      \ `ebikes:` in CloudEMS opties met losse sensors\n{% else %}\n{% for f in fts %}\n{% set soc = f.soc_pct | int(0) %}\n{% set filled = (soc // 10) | int %}\n{% set bar = '█' * filled + '░' * (10 -\
      \ filled) %}\n{% set adv_icon = {'solar':'☀️','nu_laden':'⚡','wachten':'⏳','vol':'✅','niet_aanbevolen':'⚠️','onbekend':'❓'}.get(f.charge_advice,'❓') %}\n{% set bi = brand_icons.get(f.brand,'\U0001F6B2\
      ') %}\n---\n**Accu:** `{{ bar }}` **{{ soc }}%** {% if f.is_charging %}\U0001F50C *laden...*{% endif %}\n{% if f.range_km %}\U0001F5FA️ Bereik: ~**{{ f.range_km | int }} km**{% endif %} {% if f.minutes_to_full\
      \ %}· ⏱️ vol over ~{{ f.minutes_to_full | int }} min{% endif %}\n{% if f.temp_c is not none %}\U0001F321️ {{ f.temp_c }}°C {% endif %}{% if f.speed_kmh %}\U0001F3C3 {{ f.speed_kmh | round(1) }} km/h{%\
      \ endif %}{% if f.motor_w %}⚙️ {{ f.motor_w | int }}W{% endif %}\n\n{{ adv_icon }} **{{ f.charge_advice | replace('_',' ') | title }}** — *{{ f.charge_reason }}*\n{% endfor %}{% endif %}\n"
    card_mod:
      style: "ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }\n"
  - type: markdown
    title: 🔋 Accu Gezondheid
    content: "{% set eb  = state_attr('sensor.cloudems_micro_mobility', 'ebike') or {} %}\n{% set fts = eb.get('fietsen', []) %}\n{% if not fts %}*Nog geen data.*{% else %}\nIdeale dagelijkse oplaadbegrenzing:\
      \ **80%**. Bewaar accu bij 30-60% in koele omgeving.\n\n| Fiets | Merk | Cycli | Gezondheid | Effectief | Odometer |\n|---|---|---|---|---|---|\n{% for f in fts %}\n{% set h = f.health_pct | float(100)\
      \ %}\n{% set hi = '\U0001F7E2' if h >= 85 else ('\U0001F7E1' if h >= 70 else '\U0001F534') %}\n{% set eff = (f.battery_wh * h / 100) | int %}\n| **{{ f.name }}** | {{ f.brand }} | {{ f.charge_cycles\
      \ or '—' }} | {{ hi }} {{ h | round(0) }}% | {{ eff }} Wh | {{ f.odometer_km | int if f.odometer_km else '—' }} km |\n{% endfor %}\n\n*Degradatiemodellen: Bosch 70% na 500 cycli · Yamaha 70% na 1000\
      \ cycli · Specialized: sensor-data*\n{% endif %}\n"
    card_mod:
      style: "ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }\n"
  - type: markdown
    title: 🔧 Koppelen & Configureren
    content: "CloudEMS detecteert e-bikes automatisch via HA-integraties.\nLaadadvies (solar/goedkoopste uur) werkt voor alle merken gelijk.\n\n**Automatisch herkend (HACS):**\n| Merk | Integratie | Verbinding\
      \ |\n|---|---|---|\n| Bosch | [hass-bosch-ebike](https://github.com/Phil-Barker/hass-bosch-ebike) | Cloud (eBike Flow) |\n| Specialized Turbo | [ha-specialized-turbo](https://github.com/JamieMagee/ha-specialized-turbo)\
      \ | Bluetooth Lokaal |\n| Yamaha | community MQTT-bridge | MQTT |\n| Smartphix | community MQTT-bridge | MQTT/Cloud |\n\n\U0001F4A1 *Handmatig configureren: CloudEMS opties → E-bikes → voeg sensoren\
      \ toe per merk (soc, range, charging, temperature, odometer). Werkt met MQTT, ESPHome, Zigbee — elke HA-sensor.*\n"
    card_mod:
      style: "ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }\n"
  - type: markdown
    content: "<div style=\"display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:4px 2px;\">\n  <div style=\"display:flex;align-items:center;gap:10px;\">\n    <span\
