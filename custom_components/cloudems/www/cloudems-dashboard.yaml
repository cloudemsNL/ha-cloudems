- title: Diagnose
  path: cloudems-diagnose
  type: masonry
  max_columns: 2
  icon: "mdi:stethoscope"
  background: url(/local/cloudems/images/bg-diagnose.svg) center/cover no-repeat, radial-gradient(ellipse 70% 50% at 50% -10%, rgba(239,154,154,0.06) 0%, transparent 60%), rgb(24,24,24)
  card_mod:
    style: "hui-view { padding: 12px 12px 24px !important; }\n"
  cards:
  - *id001
  - type: markdown
    title: 💚 Systeem Gezondheid
    content: "{%- set score = states('sensor.cloudems_system_health') | float(0) | round(1) -%}\n{%- set pct = (score / 10 * 100) | round(0) | int -%}\n{%- set bars = (score | round(0) | int) -%}\n{%- set\
      \ color = '\U0001F7E2' if score >= 8 else ('\U0001F7E1' if score >= 5 else '\U0001F534') -%}\n{%- set label = 'Uitstekend' if score >= 9 else ('Goed' if score >= 7 else ('Matig' if score >= 5 else\
      \ ('Slecht' if score >= 3 else 'Kritiek'))) -%}\n{{ color }} **{{ score }}/10** — {{ label }}\n\n`{{ '█' * bars }}{{ '░' * (10 - bars) }}` {{ pct }}%\n\n| Aspect | Waarde |\n|--------|--------|\n\
      | Score | **{{ score }}/10** |\n| Status | {{ label }} |\n| Versie | v{{ state_attr('sensor.cloudems_system_health','version') or '?' }} |\n| Uptime | {{ state_attr('sensor.cloudems_system_health','uptime_h')\
      \ | round(1) if state_attr('sensor.cloudems_system_health','uptime_h') else '—' }} uur |\n| Update cycli | {{ state_attr('sensor.cloudems_system_health','update_count') or '—' }} |\n"
    card_mod:
      style: "ha-card { background: rgb(34,34,34) !important; border: 1px solid rgba(0,177,64,0.3) !important; border-radius: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; --primary-text-color:\
        \ rgb(163,163,163); --card-background-color: transparent; --ha-card-border-color: transparent; }\n.card-header { background: transparent !important; border-bottom: 1px solid rgba(0,177,64,0.15)\
        \ !important; color: rgb(0,212,78) !important; font-size: 12px !important; font-weight: 600 !important; padding: 14px 16px 12px !important; }\nha-markdown-element code { font-family: 'Courier New',\
        \ Courier, monospace !important; letter-spacing: 0 !important; background: rgba(0,177,64,0.1) !important; color: rgb(0,212,78) !important; padding: 4px 10px !important; border-radius: 6px !important;\
        \ font-size: 13px !important; display: block !important; }\nha-markdown-element table { width: 100% !important; border-collapse: collapse !important; }\nha-markdown-element th { background: rgba(0,177,64,0.1)\
        \ !important; color: rgb(0,212,78) !important; font-size: 10px !important; font-weight: 700 !important; text-transform: uppercase !important; padding: 8px 10px !important; }\nha-markdown-element\
        \ td { color: rgb(163,163,163) !important; border-bottom: 1px solid rgba(255,255,255,0.05) !important; padding: 6px 10px !important; font-size: 12px !important; }\nha-markdown-element strong { color:\
        \ rgb(255,255,255) !important; }\n"
  - type: markdown
    title: 🔁 Watchdog — Crashmonitor
    content: "{% set wd     = states('sensor.cloudems_watchdog') %}\n{% set cons   = state_attr('sensor.cloudems_watchdog', 'consecutive_failures') | int(0) %}\n{% set total  = state_attr('sensor.cloudems_watchdog',\
      \ 'total_failures') | int(0) %}\n{% set rests  = state_attr('sensor.cloudems_watchdog', 'total_restarts') | int(0) %}\n{% set lf_ago = state_attr('sensor.cloudems_watchdog', 'last_failure_ago') %}\n\
      {% set lf_msg = state_attr('sensor.cloudems_watchdog', 'last_failure_msg') %}\n{% set lr_ago = state_attr('sensor.cloudems_watchdog', 'last_restart_ago') %}\n{% set ls_ago = state_attr('sensor.cloudems_watchdog',\
      \ 'last_success_ago') %}\n{% set nxt    = state_attr('sensor.cloudems_watchdog', 'next_restart_in_s') | int(0) %}\n{% set max_c  = state_attr('sensor.cloudems_watchdog', 'max_consecutive') | int(3)\
      \ %}\n{% set hist   = state_attr('sensor.cloudems_watchdog', 'history') or [] %}\n{% if wd == 'ok' %}\n\U0001F7E2 **Systeem gezond** — laatste succes {{ ls_ago or 'onbekend' }}\n{% elif wd == 'warning'\
      \ %}\n\U0001F7E1 **Waarschuwing** — {{ cons }}/{{ max_c }} opeenvolgende fouten\n{% elif wd == 'critical' %}\n\U0001F534 **Kritiek** — herstart getriggerd ({{ rests }}× totaal)\n{% else %}\n⏳ Watchdog\
      \ start op...\n{% endif %}\n\n| Gegeven | Waarde |\n|---|---|\n| Status | {{ wd }} |\n| Opeenvolgende fouten | {{ cons }}/{{ max_c }} |\n| Totaal fouten (ooit) | {{ total }} |\n| Automatische herstarts\
      \ | **{{ rests }}** |\n| Laatste fout | {{ lf_ago or '—' }} |\n| Laatste herstart | {{ lr_ago or 'Nooit' }} |\n| Laatste succes | {{ ls_ago or '—' }} |\n{% if nxt > 0 %}| Volgende herstart na | {{\
      \ nxt }}s backoff |{% endif %}\n\n{% if lf_msg %}\n**Laatste foutmelding:**\n```\n{{ lf_msg }}\n```\n{% endif %}\n\n{% if hist %}\n**Crashgeschiedenis (laatste {{ hist | length }}):**\n| Tijdstip\
      \ | Fout | # |\n|---|---|---:|\n{%- for e in hist | reverse %}\n| `{{ e.ts[11:19] if e.ts else '?' }}` | {{ e.error[:60] }}{% if e.error | length > 60 %}…{% endif %} | {{ e.consecutive }} |\n{%- endfor\
