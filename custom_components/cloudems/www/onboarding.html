<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudEMS — Setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #080c14;
      --surface:  #0f1623;
      --surface2: #161e2e;
      --border:   rgba(255,255,255,0.07);
      --green:    #00e676;
      --green-d:  #00b844;
      --green-g:  rgba(0,230,118,0.12);
      --amber:    #ffab00;
      --red:      #ff5252;
      --blue:     #40c4ff;
      --text:     #e2e8f0;
      --muted:    #4e5f72;
      --fh:       'Syne', sans-serif;
      --fb:       'Inter', sans-serif;
      --fm:       'DM Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--fb); overflow: hidden; }

    .shell { height: 100vh; display: grid; grid-template-columns: 260px 1fr; }

    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden; position: relative;
    }
    .sidebar::after {
      content: ''; position: absolute; top: -80px; left: -80px;
      width: 260px; height: 260px;
      background: radial-gradient(circle, var(--green-g) 0%, transparent 65%);
      pointer-events: none;
    }
    .logo {
      padding: 1.6rem 1.6rem 1.4rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: .75rem; position: relative; z-index: 1;
    }
    .logo svg { flex-shrink: 0; }
    .logo-text { line-height: 1.2; }
    .logo-name { font-family: var(--fh); font-size: 1.2rem; font-weight: 800; letter-spacing: -.02em; }
    .logo-name b { color: var(--green); font-weight: 800; }
    .logo-sub { font-size: .65rem; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; margin-top: .1rem; }

    .nav { flex: 1; padding: 1.2rem 0; overflow-y: auto; }
    .nav-item {
      display: flex; align-items: center; gap: .9rem;
      padding: .6rem 1.5rem; cursor: pointer;
      border-left: 2px solid transparent;
      transition: background .12s, border-color .12s;
    }
    .nav-item:hover { background: rgba(255,255,255,0.025); }
    .nav-item.active { background: var(--green-g); border-left-color: var(--green); }
    .nav-item.done .nav-num { background: var(--green-d); color: #000; border-color: var(--green-d); }
    .nav-item.active .nav-num { background: var(--green); color: #000; border-color: var(--green); box-shadow: 0 0 10px var(--green-g); }
    .nav-num {
      width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
      border: 1px solid var(--border); background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--fm); font-size: .7rem; color: var(--muted);
      transition: all .2s;
    }
    .nav-label { font-size: .8rem; font-weight: 500; color: var(--muted); transition: color .2s; }
    .nav-item.active .nav-label { color: var(--text); }
    .nav-item.done .nav-label { color: var(--green-d); }
    .nav-divider { width: 1px; height: 12px; background: var(--border); margin-left: calc(1.5rem + 13px); }

    .sidebar-foot {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      font-family: var(--fm); font-size: .62rem; color: var(--muted);
    }

    .main { display: flex; flex-direction: column; overflow: hidden; }
    .topbar {
      display: flex; align-items: center; gap: 1.5rem;
      padding: .9rem 2rem; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .step-counter { font-family: var(--fm); font-size: .7rem; color: var(--muted); white-space: nowrap; }
    .progress-wrap { flex: 1; }
    .progress-track { height: 2px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--green-d), var(--green)); border-radius: 99px; transition: width .45s cubic-bezier(.4,0,.2,1); }
    .progress-pct { font-family: var(--fm); font-size: .65rem; color: var(--muted); margin-top: .35rem; }
    .skip-btn {
      font-size: .72rem; color: var(--muted); background: none; border: none;
      cursor: pointer; padding: .35rem .7rem; border-radius: 6px;
      transition: color .12s, background .12s; white-space: nowrap;
    }
    .skip-btn:hover { color: var(--text); background: var(--surface2); }

    .steps-wrap { flex: 1; position: relative; overflow: hidden; }
    .step {
      position: absolute; inset: 0;
      display: grid; grid-template-columns: 1fr 360px;
      opacity: 0; pointer-events: none;
      transform: translateX(28px);
      transition: opacity .3s ease, transform .3s ease;
    }
    .step.active { opacity: 1; pointer-events: all; transform: translateX(0); }
    .step.exit   { opacity: 0; transform: translateX(-28px); }

    .step-text {
      padding: 2rem 2.5rem 1.5rem;
      display: flex; flex-direction: column; gap: 1rem;
      overflow-y: auto;
    }
    .step-text::-webkit-scrollbar { width: 3px; }
    .step-text::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .eyebrow { font-family: var(--fm); font-size: .62rem; letter-spacing: .14em; text-transform: uppercase; color: var(--green); }
    .step-title { font-family: var(--fh); font-size: 1.75rem; font-weight: 800; line-height: 1.15; letter-spacing: -.03em; color: #fff; }
    .step-title em { color: var(--green); font-style: normal; }
    .step-desc { font-size: .84rem; line-height: 1.7; color: var(--muted); }
    .step-desc strong { color: var(--text); font-weight: 500; }

    /* ── Interactive fields ── */
    .field-group { display: flex; flex-direction: column; gap: .55rem; }
    .field-label {
      font-size: .75rem; font-weight: 600; color: var(--text);
      display: flex; align-items: center; gap: .5rem;
    }
    .field-label .badge {
      font-size: .62rem; padding: .1rem .4rem; border-radius: 99px;
      font-weight: 500; font-family: var(--fm);
    }
    .badge-opt { background: rgba(78,95,114,.25); color: var(--muted); border: 1px solid rgba(78,95,114,.3); }
    .badge-req { background: rgba(255,171,0,.1); color: var(--amber); border: 1px solid rgba(255,171,0,.25); }

    .field-row { display: flex; gap: .5rem; align-items: center; }
    .field-select, .field-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: .8rem; font-family: var(--fb);
      padding: .5rem .75rem; outline: none;
      transition: border-color .15s;
      appearance: none; -webkit-appearance: none;
    }
    .field-select:focus, .field-input:focus { border-color: var(--green); }
    .field-select option { background: #1c2333; }

    .validate-btn {
      width: 34px; height: 34px; border-radius: 7px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: .85rem;
      transition: all .15s; flex-shrink: 0;
    }
    .validate-btn:hover { border-color: var(--green); color: var(--green); }
    .validate-btn.ok  { border-color: var(--green-d); color: var(--green); background: var(--green-g); }
    .validate-btn.err { border-color: var(--red); color: var(--red); }
    .validate-btn.spin { animation: spin .6s linear infinite; pointer-events:none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .field-hint { font-size: .72rem; color: var(--muted); line-height: 1.5; }
    .field-status { font-size: .72rem; padding: .3rem .6rem; border-radius: 5px; margin-top: .15rem; display: none; }
    .field-status.ok  { display: block; color: var(--green); background: var(--green-g); }
    .field-status.err { display: block; color: var(--red); background: rgba(255,82,82,.08); }

    /* Radio row */
    .radio-row { display: flex; gap: .6rem; }
    .radio-opt {
      flex: 1; padding: .65rem .9rem; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface2); cursor: pointer; transition: all .15s;
      display: flex; align-items: center; gap: .55rem; font-size: .82rem;
    }
    .radio-opt:hover { border-color: var(--green-d); }
    .radio-opt.selected { border-color: var(--green); background: var(--green-g); color: var(--green); }
    .radio-dot {
      width: 14px; height: 14px; border-radius: 50%; border: 1px solid var(--muted);
      flex-shrink: 0; transition: all .15s; display: flex; align-items: center; justify-content: center;
    }
    .radio-opt.selected .radio-dot { border-color: var(--green); background: var(--green); }
    .radio-opt.selected .radio-dot::after { content: ''; width: 5px; height: 5px; background: #000; border-radius: 50%; }

    /* NILM checkboxes */
    .nilm-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: .45rem;
    }
    .nilm-item {
      padding: .55rem .75rem; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface2); cursor: pointer; transition: all .15s;
      display: flex; align-items: center; gap: .5rem; font-size: .78rem;
    }
    .nilm-item:hover { border-color: var(--green-d); }
    .nilm-item.checked { border-color: var(--green); background: var(--green-g); color: var(--green); }
    .nilm-check {
      width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--muted);
      flex-shrink: 0; transition: all .15s; display: flex; align-items: center; justify-content: center;
    }
    .nilm-item.checked .nilm-check { border-color: var(--green); background: var(--green); }
    .nilm-item.checked .nilm-check::after { content: '✓'; font-size: .6rem; color: #000; font-weight: 700; }

    .tip {
      background: var(--surface2); border: 1px solid var(--border);
      border-left: 3px solid var(--green-d); border-radius: 9px;
      padding: .75rem 1rem; font-size: .78rem; line-height: 1.6; color: var(--muted);
      display: flex; gap: .75rem;
    }
    .tip-icon { font-size: .95rem; flex-shrink: 0; padding-top: .05rem; }

    .actions { display: flex; gap: .75rem; align-items: center; margin-top: auto; padding-top: 1rem; }
    .btn {
      display: inline-flex; align-items: center; gap: .45rem;
      padding: .65rem 1.4rem; border-radius: 8px;
      font-size: .82rem; font-weight: 600; cursor: pointer; border: none;
      transition: all .15s; letter-spacing: .01em; font-family: var(--fb);
    }
    .btn-primary { background: var(--green); color: #000; }
    .btn-primary:hover { background: #2ffb80; transform: translateY(-1px); box-shadow: 0 4px 18px rgba(0,230,118,.25); }
    .btn-primary:disabled { background: var(--muted); cursor: not-allowed; transform: none; box-shadow: none; opacity: .5; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: rgba(255,255,255,.05); }
    .btn-arrow { font-size: 1rem; transition: transform .15s; }
    .btn-primary:hover .btn-arrow { transform: translateX(3px); }

    .save-status {
      font-size: .75rem; padding: .4rem .8rem; border-radius: 6px;
      display: none; margin-left: auto;
    }
    .save-status.ok  { display: block; color: var(--green); background: var(--green-g); }
    .save-status.err { display: block; color: var(--red); background: rgba(255,82,82,.08); }

    /* Right panel */
    .step-visual {
      background: var(--surface); border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 1.5rem; gap: 1rem; position: relative; overflow-y: auto;
    }
    .step-visual::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 60%, var(--green-g), transparent);
      pointer-events: none;
    }
    .vis-title { font-family: var(--fm); font-size: .65rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); position: relative; z-index:1; }
    .sensor-list { display: flex; flex-direction: column; gap: .35rem; position: relative; z-index:1; flex:1; overflow-y:auto; }
    .sensor-list::-webkit-scrollbar { width: 3px; }
    .sensor-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    .sensor-item {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      padding: .45rem .7rem; font-size: .74rem; cursor: pointer;
      transition: border-color .12s, background .12s;
      display: flex; align-items: center; gap: .5rem;
    }
    .sensor-item:hover { border-color: var(--green-d); background: rgba(0,230,118,.04); }
    .sensor-item.active { border-color: var(--green); background: var(--green-g); }
    .sensor-state { font-family: var(--fm); color: var(--green); flex-shrink: 0; font-size: .7rem; }
    .sensor-name { color: var(--muted); flex:1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sensor-item.active .sensor-name { color: var(--text); }
    .search-input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text); font-size: .78rem; font-family: var(--fb);
      padding: .45rem .75rem; outline: none; transition: border-color .15s;
      position: relative; z-index: 1;
    }
    .search-input:focus { border-color: var(--green); }
    .loading-msg { font-size: .75rem; color: var(--muted); text-align: center; padding: 2rem; position: relative; z-index:1; }

    /* Completion */
    .complete-wrap {
      grid-column: 1 / -1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; gap: 1.8rem; padding: 3rem;
    }
    .complete-icon {
      width: 88px; height: 88px; border-radius: 50%;
      background: var(--green-g); border: 1px solid var(--green-d);
      display: flex; align-items: center; justify-content: center; font-size: 2.2rem;
      animation: pop .5s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes pop { from { transform: scale(.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .complete-title { font-family: var(--fh); font-size: 2.2rem; font-weight: 800; color: #fff; letter-spacing: -.04em; }
    .complete-title span { color: var(--green); }
    .complete-sub { font-size: .9rem; color: var(--muted); line-height: 1.8; max-width: 460px; }
    .next-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: .9rem; max-width: 600px; width: 100%; }
    .next-card {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 11px;
      padding: 1.1rem; text-align: left; cursor: pointer; text-decoration: none;
      transition: border-color .15s, transform .15s; display: block;
    }
    .next-card:hover { border-color: var(--green-d); transform: translateY(-2px); }
    .next-card-icon { font-size: 1.3rem; margin-bottom: .5rem; }
    .next-card-title { font-size: .8rem; font-weight: 600; color: var(--text); }
    .next-card-sub { font-size: .7rem; color: var(--muted); margin-top: .2rem; line-height: 1.4; }

    @media (max-width: 860px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .step { grid-template-columns: 1fr; }
      .step-visual { display: none; }
    }
  </style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="logo">
      <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
        <rect width="34" height="34" rx="9" fill="rgba(0,230,118,0.1)" stroke="rgba(0,230,118,0.2)" stroke-width="1"/>
        <path d="M19 7L9 19H17L15 27L25 15H17L19 7Z" fill="#00e676"/>
      </svg>
      <div class="logo-text">
        <div class="logo-name">Cloud<b>EMS</b></div>
        <div class="logo-sub">Setup wizard</div>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-foot" id="sidebarFoot">CloudEMS · Laden…</div>
  </aside>

  <main class="main">
    <div class="topbar">
      <span class="step-counter" id="counter">Stap 1 van 8</span>
      <div class="progress-wrap">
        <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:12%"></div></div>
        <div class="progress-pct" id="progressPct">Welkom</div>
      </div>
      <button class="skip-btn" onclick="finish()">Sla over →</button>
    </div>
    <div class="steps-wrap" id="stepsWrap"></div>
  </main>
</div>

<script>
// ── HA API ──────────────────────────────────────────────────────────────────
let _haToken = null;
let _haStates = null;   // cache: { entity_id: stateObj }

async function _getToken() {
  if (_haToken) return _haToken;
  const keys = Object.keys(localStorage).filter(k => k.startsWith('hassTokens'));
  for (const k of keys) {
    try {
      const parsed = JSON.parse(localStorage.getItem(k));
      if (parsed?.access_token) { _haToken = parsed.access_token; return _haToken; }
    } catch {}
  }
  return null;
}

async function _loadStates() {
  if (_haStates) return _haStates;
  const token = await _getToken();
  if (!token) { _haStates = {}; return {}; }
  try {
    const r = await fetch('/api/states', {
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }
    });
    if (!r.ok) { _haStates = {}; return {}; }
    const arr = await r.json();
    _haStates = {};
    arr.forEach(s => { _haStates[s.entity_id] = s; });
    return _haStates;
  } catch { _haStates = {}; return {}; }
}

async function _callService(domain, service, data) {
  const token = await _getToken();
  if (!token) return false;
  try {
    const r = await fetch(`/api/services/${domain}/${service}`, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    return r.ok;
  } catch { return false; }
}

function _filterSensors(states, keywords, excludeKeywords, domains) {
  const allowed = domains || ['sensor', 'input_number', 'number'];
  return Object.values(states)
    .filter(s => {
      const d = s.entity_id.split('.')[0];
      if (!allowed.includes(d)) return false;
      const id = s.entity_id.toLowerCase();
      const name = (s.attributes?.friendly_name || '').toLowerCase();
      const combined = id + ' ' + name;
      const hasKw = !keywords || keywords.some(k => combined.includes(k));
      const excluded = excludeKeywords && excludeKeywords.some(k => combined.includes(k));
      return hasKw && !excluded;
    })
    .sort((a, b) => {
      const aScore = keywords ? keywords.filter(k => (a.entity_id + ' ' + (a.attributes?.friendly_name||'')).toLowerCase().includes(k)).length : 0;
      const bScore = keywords ? keywords.filter(k => (b.entity_id + ' ' + (b.attributes?.friendly_name||'')).toLowerCase().includes(k)).length : 0;
      return bScore - aScore || a.entity_id.localeCompare(b.entity_id);
    });
}

// ── Wizard state ─────────────────────────────────────────────────────────────
const wizardData = {
  grid_sensor: '',
  grid_phases: 1,
  max_current_per_phase: 25,
  power_sensor_l1: '',
  power_sensor_l2: '',
  power_sensor_l3: '',
  solar_sensor: '',
  ev_charger_entity: '',
  peak_shaving_limit_w: 6000,
  peak_shaving_enabled: true,
  nilm_device_hints: [],
};

// ── Step definitions ──────────────────────────────────────────────────────────
const NAV_LABELS = [
  'Welkom', 'Aansluiting', 'Netmeting', 'Fase-sensoren',
  'Zonnepanelen', 'Apparaten', 'Tarieven & piek', 'NILM apparaten'
];

let current = 0;
const TOTAL_STEPS = NAV_LABELS.length + 1; // +1 completion

// ── Build nav ─────────────────────────────────────────────────────────────────
function buildNav() {
  const nav = document.getElementById('nav');
  NAV_LABELS.forEach((label, i) => {
    if (i > 0) {
      const div = document.createElement('div');
      div.className = 'nav-divider';
      nav.appendChild(div);
    }
    const item = document.createElement('div');
    item.className = 'nav-item' + (i === 0 ? ' active' : '');
    item.dataset.index = i;
    item.innerHTML = `<div class="nav-num">${i + 1}</div><div class="nav-label">${label}</div>`;
    item.addEventListener('click', () => goTo(i));
    nav.appendChild(item);
  });
}

// ── Step renderers ────────────────────────────────────────────────────────────
function _fieldRow(id, label, optional, hint) {
  return `
    <div class="field-group">
      <div class="field-label">${label} <span class="badge ${optional ? 'badge-opt' : 'badge-req'}">${optional ? 'optioneel' : 'vereist'}</span></div>
      <div class="field-row">
        <select class="field-select" id="${id}">
          <option value="">— kies sensor —</option>
        </select>
        <button class="validate-btn" id="${id}_btn" onclick="_validateField('${id}')" title="Valideer">⟳</button>
      </div>
      <div class="field-status" id="${id}_status"></div>
      ${hint ? `<div class="field-hint">${hint}</div>` : ''}
    </div>`;
}

function _radioRow(name, opts, initial, onchange) {
  return `<div class="radio-row" id="radio_${name}">
    ${opts.map(o => `
      <div class="radio-opt ${o.value === initial ? 'selected' : ''}" onclick="_radioSelect('${name}', '${o.value}', this, ${onchange})" data-value="${o.value}">
        <div class="radio-dot"></div>${o.icon || ''} ${o.label}
      </div>`).join('')}
  </div>`;
}

function _radioSelect(name, val, el, cb) {
  el.closest('.radio-row').querySelectorAll('.radio-opt').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  if (cb) cb(val);
}

async function _fillSelect(id, keywords, excludeKeywords, domains) {
  const states = await _loadStates();
  const sensors = _filterSensors(states, keywords, excludeKeywords, domains);
  const sel = document.getElementById(id);
  if (!sel) return sensors;
  const cur = wizardData[id] || '';
  // keep placeholder
  while (sel.options.length > 1) sel.remove(1);
  sensors.slice(0, 80).forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.entity_id;
    const name = s.attributes?.friendly_name || s.entity_id;
    const val = s.state;
    opt.textContent = `${name}  [${val}]`;
    if (s.entity_id === cur) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.onchange = () => { wizardData[id] = sel.value; };
  if (cur) sel.value = cur;
  return sensors;
}

async function _validateField(id) {
  const sel = document.getElementById(id);
  const btn = document.getElementById(id + '_btn');
  const status = document.getElementById(id + '_status');
  if (!sel || !sel.value) {
    _showStatus(status, 'err', 'Geen sensor geselecteerd');
    return;
  }
  btn.classList.add('spin');
  btn.textContent = '↻';
  const states = await _loadStates();
  const s = states[sel.value];
  btn.classList.remove('spin');
  if (!s) {
    btn.classList.add('err'); btn.textContent = '✗';
    _showStatus(status, 'err', `Sensor niet gevonden: ${sel.value}`);
    return;
  }
  const val = parseFloat(s.state);
  if (isNaN(val) && s.state !== 'unavailable') {
    btn.classList.add('ok'); btn.textContent = '✓';
    _showStatus(status, 'ok', `✓ ${s.attributes?.friendly_name || sel.value} · staat: "${s.state}"`);
  } else if (s.state === 'unavailable') {
    btn.classList.add('err'); btn.textContent = '⚠';
    _showStatus(status, 'err', `⚠ Sensor is momenteel unavailable — check je integratie`);
  } else {
    btn.classList.add('ok'); btn.textContent = '✓';
    _showStatus(status, 'ok', `✓ ${s.attributes?.friendly_name || sel.value} · ${val.toFixed(1)} ${s.attributes?.unit_of_measurement || ''}`);
  }
  wizardData[id] = sel.value;
}

function _showStatus(el, type, msg) {
  if (!el) return;
  el.className = 'field-status ' + type;
  el.textContent = msg;
}

// ── Right panel: sensor list ──────────────────────────────────────────────────
let _visPanelActive = null;

async function _buildVisPanel(containerId, keywords, excludeKeywords, targetField, domains) {
  const cont = document.getElementById(containerId);
  if (!cont) return;
  _visPanelActive = { target: targetField, container: containerId };
  cont.innerHTML = `<div class="vis-title">Beschikbare sensoren</div>
    <input class="search-input" id="${containerId}_search" placeholder="Zoeken…">
    <div class="sensor-list" id="${containerId}_list"><div class="loading-msg">Laden…</div></div>`;

  const search = cont.querySelector('.search-input');
  const list = cont.querySelector('.sensor-list');

  const states = await _loadStates();
  let sensors = _filterSensors(states, keywords, excludeKeywords, domains);

  function render(filtered) {
    list.innerHTML = filtered.length
      ? filtered.slice(0, 60).map(s => {
          const name = s.attributes?.friendly_name || s.entity_id;
          const val = s.state + (s.attributes?.unit_of_measurement ? ' ' + s.attributes.unit_of_measurement : '');
          const active = wizardData[targetField] === s.entity_id ? ' active' : '';
          return `<div class="sensor-item${active}" onclick="_selectSensor('${targetField}', '${s.entity_id}', '${containerId}')">
            <span class="sensor-state">${val.length > 10 ? val.slice(0,10)+'…' : val}</span>
            <span class="sensor-name">${name}</span>
          </div>`;
        }).join('')
      : '<div class="loading-msg">Geen sensoren gevonden</div>';
  }

  render(sensors);
  search.oninput = () => {
    const q = search.value.toLowerCase();
    render(sensors.filter(s =>
      s.entity_id.toLowerCase().includes(q) ||
      (s.attributes?.friendly_name || '').toLowerCase().includes(q)
    ));
  };
}

function _selectSensor(field, entityId, containerId) {
  wizardData[field] = entityId;
  const sel = document.getElementById(field);
  if (sel) {
    // add option if not there
    let found = false;
    for (const o of sel.options) { if (o.value === entityId) { sel.value = entityId; found = true; break; } }
    if (!found) {
      const states = _haStates || {};
      const s = states[entityId];
      const name = s?.attributes?.friendly_name || entityId;
      const opt = document.createElement('option');
      opt.value = entityId; opt.textContent = name; sel.appendChild(opt);
      sel.value = entityId;
    }
  }
  // refresh active state in list
  const list = document.getElementById(containerId + '_list');
  if (list) {
    list.querySelectorAll('.sensor-item').forEach(el => {
      const onclick = el.getAttribute('onclick') || '';
      el.classList.toggle('active', onclick.includes(`'${entityId}'`));
    });
  }
}

    <div class="field-group">

      <div class="nilm-grid" id="nilm_grid">
        ${[
          {type:'washing_machine', icon:'👕', label:'Wasmachine'},
          {type:'dishwasher',      icon:'🍽️', label:'Vaatwasser'},
          {type:'dryer',           icon:'💨', label:'Droger'},
          {type:'electric_oven',   icon:'🍳', label:'Oven'},
          {type:'refrigerator',    icon:'🧊', label:'Koelkast'},
          {type:'freezer',         icon:'🧊', label:'Vriezer'},
          {type:'heat_pump',       icon:'♨️', label:'Warmtepomp'},
          {type:'electric_vehicle',icon:'🚗', label:'Elektrische auto'},
          {type:'home_office',     icon:'💻', label:'Thuiskantoor'},
          {type:'tv_entertainment',icon:'📺', label:'TV / Entertain.'},
          {type:'air_conditioning',icon:'❄️', label:'Airco'},
          {type:'electric_boiler', icon:'🚿', label:'Boiler'},
        ].map(a => `
          <div class="nilm-item" id="nilm_${a.type}" onclick="_toggleNilm('${a.type}', this)">
            <div class="nilm-check"></div>
            <span style="font-size:.9rem">${a.icon}</span>
            <span>${a.label}</span>
          </div>`).join('')}
      </div>
    </div>
    <div class="tip"><span class="tip-icon">💡</span>
      <span>Selecteer alle apparaten die je hebt — ook als ze niet aan HA gekoppeld zijn. CloudEMS zoekt hier actief naar in je verbruikspatroon.</span></div>
    <div class="actions">
      <button class="btn btn-secondary" onclick="goTo(6)">← Terug</button>
      <button class="btn btn-primary" id="save_btn" onclick="_saveAndFinish()">Opslaan & afronden <span class="btn-arrow">→</span></button>
      <span class="save-status" id="save_status"></span>
    </div>
  `, `
    <div class="vis-title">NILM detectie</div>
    <div style="position:relative;z-index:1;flex:1;padding-top:.5rem;display:flex;flex-direction:column;gap:.7rem">
      <div style="font-size:.75rem;color:var(--muted)">Hoe NILM werkt:</div>
      ${[
        {icon:'📡', title:'Stroompatroon meten', desc:'Elke 10 seconden lees CloudEMS het netto vermogen van je P1 meter'},
        {icon:'🔍', title:'Transient detectie', desc:'Bij een sprong in vermogen zoekt het systeem naar bekende "handtekeningen"'},
        {icon:'🧠', title:'Bayesiaans leren', desc:'Na 50+ detecties verhoogt de betrouwbaarheid automatisch naar 95%+'},
        {icon:'✅', title:'Bevestigen', desc:'Jij bevestigt in de NILM-kaart welke apparaten correct zijn'},
      ].map(s => `
        <div style="display:flex;gap:.6rem;align-items:flex-start">
          <span style="font-size:1.1rem;flex-shrink:0">${s.icon}</span>
          <div>
            <div style="font-size:.75rem;font-weight:600;color:var(--text)">${s.title}</div>
            <div style="font-size:.7rem;color:var(--muted);line-height:1.5">${s.desc}</div>
          </div>
        </div>`).join('')}
    </div>
  `));

  // Completion screen
  const done = document.createElement('div');
  done.className = 'step';
  done.id = `step-8`;
  done.innerHTML = `
    <div class="complete-wrap">
      <div class="complete-icon">✓</div>
      <h1 class="complete-title">CloudEMS is <span>klaar</span>!</h1>
      <p class="complete-sub">
        Je hebt de setup wizard afgerond. CloudEMS begint nu met leren en optimaliseren.
        De eerste beslissingen verschijnen na een paar uur meting.
      </p>
      <div class="next-cards">
        <a class="next-card" href="/cloudems" target="_top">
          <div class="next-card-icon">⚡</div>
          <div class="next-card-title">CloudEMS Dashboard</div>
          <div class="next-card-sub">Bekijk live verbruik, pieken en aanbevelingen</div>
        </a>
        <a class="next-card" href="https://cloudems.eu/docs" target="_blank">
          <div class="next-card-icon">📖</div>
          <div class="next-card-title">Documentatie</div>
          <div class="next-card-sub">Uitgebreide gids voor alle functies</div>
        </a>
        <a class="next-card" href="/config/integrations/integration/cloudems" target="_top">
          <div class="next-card-icon">⚙️</div>
          <div class="next-card-title">Instellingen aanpassen</div>
          <div class="next-card-sub">Configuratie aanpassen of wizard opnieuw doorlopen</div>
        </a>
      </div>
      <button class="btn btn-secondary" onclick="goTo(7)" style="margin-top:.5rem">← Terug naar wizard</button>
    </div>
  `;
  wrap.appendChild(done);
}

function _makeStep(index, leftHtml, rightHtml, onActive) {
  const el = document.createElement('div');
  el.className = 'step' + (index === 0 ? ' active' : '');
  el.id = `step-${index}`;
  el._onActive = onActive || null;

  if (rightHtml === null) {
    // right panel will be built dynamically (vis panel)
    el.innerHTML = `
      <div class="step-text">${leftHtml}</div>
      <div class="step-visual" id="vis_${index}">
        <div class="loading-msg">Sensoren laden…</div>
      </div>`;
  } else {
    el.innerHTML = `
      <div class="step-text">${leftHtml}</div>
      <div class="step-visual">${rightHtml}</div>`;
  }
  return el;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function _updatePhaseTip(v) {
  const el = document.getElementById('phase_tip');
  if (el) el.textContent = v === '3'
    ? '3-fase: EV-laadpalen, warmtepompen en zwaardere installaties. Controleer je meterkast op 3 dikke kabels.'
    : 'Standaard in de meeste woningen. Kijk op je meterkast: één grote zekering = 1-fase.';
}

function _toggleNilm(type, el) {
  el.classList.toggle('checked');
  if (el.classList.contains('checked')) {
    if (!wizardData.nilm_device_hints.includes(type)) wizardData.nilm_device_hints.push(type);
  } else {
    wizardData.nilm_device_hints = wizardData.nilm_device_hints.filter(t => t !== type);
  }
}

async function _saveAndFinish() {
  const btn = document.getElementById('save_btn');
  const status = document.getElementById('save_status');
  btn.disabled = true;
  btn.textContent = 'Opslaan…';
  status.className = 'save-status';

  const ok = await _callService('cloudems', 'wizard_save_config', {
    grid_sensor:            wizardData.grid_sensor || '',
    grid_phases:            wizardData.grid_phases,
    max_current_per_phase:  wizardData.max_current_per_phase,
    power_sensor_l1:        wizardData.power_sensor_l1 || '',
    power_sensor_l2:        wizardData.power_sensor_l2 || '',
    power_sensor_l3:        wizardData.power_sensor_l3 || '',
    solar_sensor:           wizardData.solar_sensor || '',
    ev_charger_entity:      wizardData.ev_charger_entity || '',
    peak_shaving_limit_w:   wizardData.peak_shaving_limit_w,
    peak_shaving_enabled:   wizardData.peak_shaving_enabled,
    nilm_device_hints:      wizardData.nilm_device_hints,
  });

  btn.disabled = false;
  btn.innerHTML = ok ? 'Opgeslagen ✓' : 'Probeer opnieuw';
  if (ok) {
    status.className = 'save-status ok';
    status.textContent = '✓ Config opgeslagen in CloudEMS';
    setTimeout(() => goTo(8), 1200);
  } else {
    status.className = 'save-status err';
    status.textContent = '⚠ Opslaan mislukt — check HA logs';
    btn.innerHTML = 'Probeer opnieuw <span class="btn-arrow">→</span>';
  }
}

// ── Navigation ────────────────────────────────────────────────────────────────
async function goTo(index) {
  if (index < 0 || index > 8) return;

  const prevEl = document.getElementById(`step-${current}`);
  const nextEl = document.getElementById(`step-${index}`);
  if (!nextEl) return;

  prevEl.classList.add('exit');
  setTimeout(() => { prevEl.classList.remove('active', 'exit'); }, 300);
  nextEl.classList.add('active');

  document.querySelectorAll('.nav-item').forEach(el => {
    const i = parseInt(el.dataset.index);
    if (isNaN(i)) return;
    el.classList.toggle('active', i === index);
    el.classList.toggle('done', i < index);
    el.querySelector('.nav-num').textContent = i < index ? '✓' : i + 1;
  });

  current = index;
  updateProgress();

  // Trigger dynamic panel build
  if (nextEl._onActive) {
    nextEl._onActive();
  }
}

function finish() { goTo(8); }

function updateProgress() {
  const pct = Math.round((current / 8) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = current < 8 ? (NAV_LABELS[current] || 'Klaar!') : 'Klaar!';
  document.getElementById('counter').textContent = current < 8 ? `Stap ${current + 1} van ${NAV_LABELS.length}` : 'Voltooid';
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildNav();
buildSteps();

// Load HA version into footer
_getToken().then(token => {
  if (!token) return;
  fetch('/api/', {headers:{'Authorization':'Bearer '+token}})
    .then(r => r.json())
    .then(d => {
      document.getElementById('sidebarFoot').textContent = `CloudEMS · HA ${d.version || ''}`;
    }).catch(() => {});
});
</script>
</body>
</html>
