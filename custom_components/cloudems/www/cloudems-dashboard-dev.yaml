title: Rolluiken
path: test2
icon: mdi:window-shutter-cog
type: sections
max_columns: 3
theme: waves
background:
  opacity: 33
  alignment: center
  size: cover
  repeat: repeat
  attachment: fixed
  image: /api/image/serve/333f837bb72fb920ec1ba145713922bb/original
visible:
  - user: d1a543d6493147f1a866c28cb857b41d
  - user: 53e8eefa9f9b419e84b80090a68c2974
  - user: b2b43e2e5ec24c24816f29d2d268e1cf
  - user: cce385c9c49849a2ac756c3b1caea7aa
  - user: 4392905d12b9442b81a8b5dd7e348e5c
cards: []
badges: []

sections:

  # ── Kolom 1 — Slaapkamer Britt ───────────────────────────────────────────────
  - type: grid
    column_span: 1
    cards:
      - type: vertical-stack
        cards:

          - type: horizontal-stack
            cards:
              - type: custom:bubble-card
                card_type: button
                entity: switch.cloudems_shutter_rolluik_slaapkamer_britt_auto
                button_type: switch
                show_state: true
                show_name: true
                scrolling_effect: false
                tap_action:
                  action: toggle
                sub_button:
                  - name: "50"
                    show_icon: true
                    show_name: true
                    show_state: false
                    show_background: true
                    state_background: false
                    tap_action:
                      action: perform-action
                      perform_action: cover.set_cover_position
                      target:
                        entity_id: cover.rolluik_slaapkamer_britt
                      data:
                        position: 50
            grid_options:
              columns: 24
              rows: auto

          - type: horizontal-stack
            cards:
              - type: custom:shutter-card
                entities:
                  - entity: cover.rolluik_slaapkamer_britt
                    name: Rolluik Slaapkamer Britt
                    buttons_position: left
                    title_position: bottom
            grid_options:
              columns: full
              rows: auto

          - type: markdown
            content: >
              {% set shutters = state_attr('sensor.cloudems_status', 'shutters') %}
              {% set s = (shutters.shutters | selectattr('entity_id', 'eq', 'cover.rolluik_slaapkamer_britt') | list | first) if shutters and shutters.shutters else none %}
              {% if s %}
              {% if s.shadow_action == 'close' %}🌞 **Zon schijnt** — sluiten{% elif s.shadow_action == 'open' %}💨 **Geen zon** — openen{% else %}⬜ **Zonschaduw:** idle{% endif %}{% if s.shadow_reason %} _({{ s.shadow_reason }})_{% endif %}

              **Laatste beslissing:** {{ s.last_action | default('—') }}

              {% if s.override_active %}⏱ **Override actief**{% if s.override_until %} tot {{ as_timestamp(s.override_until) | timestamp_custom('%H:%M') }}{% endif %}
              {% else %}✅ Geen override{% endif %}
              {% else %}_Geen data_{% endif %}

          - type: markdown
            title: Beslissingslog Britt
            content: >
              {% set all = state_attr('sensor.cloudems_decisions_history', 'decisions') %}
              {% set entries = (all | selectattr('cat', 'eq', 'shutter') | selectattr('label', 'eq', 'cover.rolluik_slaapkamer_britt') | list)[:8] if all else [] %}
              {% if entries %}
              {% for e in entries %}
              `{{ e.iso[11:16] }}` **{{ e.action }}** — {{ e.reason }}
              {% endfor %}
              {% else %}
              _Nog geen beslissingen gelogd_
              {% endif %}

          - type: horizontal-stack
            cards:
              - type: custom:scheduler-card
                include:
                  - switch.cloudems_shutter_rolluik_slaapkamer_britt_auto
                exclude: []
                discover_existing: false
                title: false
                show_header_toggle: false
                time_step: 15
                default_editor: scheme
                display_options:
                  primary_info: default
                  secondary_info:
                    - relative-time
                  icon: action
                sort_by:
                  - state
                  - relative-time
                customize: {}
                tags: []
                exclude_tags: []

          - type: horizontal-stack
            cards:
              - type: sensor
                graph: line
                entity: sensor.thermometer_slaapkamer_britt_temperatuur
                detail: 1
                name: Temperatuur Slaapkamer Britt
            grid_options:
              columns: 24
              rows: auto

          - type: horizontal-stack
            cards:
              - type: custom:mini-graph-card
                hours_to_show: 24
                points_per_hour: 2
                show:
                  graph: bar
                entities:
                  - entity: cover.rolluik_slaapkamer_britt
                    attribute: current_position
                    name: Rolluik Slaapkamer Britt
            grid_options:
              columns: 24
              rows: auto

        grid_options:
          columns: 24
          rows: auto

