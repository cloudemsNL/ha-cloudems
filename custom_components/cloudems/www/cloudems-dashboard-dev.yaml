  # ── Rij 2, kolom 1–2 — CloudEMS overzicht + windwaarschuwing ─────────────────
  - type: grid
    column_span: 2
    cards:
      - type: vertical-stack
        cards:
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: sensor.weather_station_windsnelheid
                above: 45
            card:
              type: markdown
              content: >
                ## ⚠️ Hoge wind — rolluiken omhoog!
                Windsnelheid: **{{ states('sensor.weather_station_windsnelheid') }} km/h**
                CloudEMS trekt de rolluiken automatisch omhoog boven de drempel.
          - type: horizontal-stack
            cards:
              - type: custom:cloudems-shutter-card
                title: Britt
                filter_entity: cover.rolluik_slaapkamer_britt
              - type: custom:cloudems-shutter-card
                title: Overloop
                filter_entity: cover.rolluik_overloop_mama
              - type: custom:cloudems-shutter-card
                title: Lynn
                filter_entity: cover.rolluik_slaapkamer_lynn

  # ── Rij 2, kolom 3 — Module + wind ───────────────────────────────────────────
  - type: grid
    column_span: 1
    cards:
      - type: vertical-stack
        cards:
          - type: entities
            title: CloudEMS Rolluiken Module
            entities:
              - entity: switch.cloudems_module_rolluiken
                name: Module aan/uit
                icon: mdi:robot
          - type: entities
            title: Wind
            entities:
              - entity: sensor.weather_station_windsnelheid
                name: Windsnelheid
