confirm_device:
  name: Bevestig NILM apparaat
  description: Bevestigt een door NILM gedetecteerd apparaat en traint het lokale AI model.
  fields:
    device_id:
      name: Apparaat ID
      description: Het unieke ID van het gedetecteerde apparaat
      required: true
      selector:
        text:
    device_type:
      name: Apparaattype
      description: Het type van het apparaat
      required: true
      selector:
        select:
          options:
            - refrigerator
            - washing_machine
            - dryer
            - dishwasher
            - oven
            - microwave
            - kettle
            - television
            - computer
            - heat_pump
            - boiler
            - ev_charger
            - light
            - unknown
    name:
      name: Naam
      description: Aangepaste naam voor het apparaat
      required: false
      selector:
        text:

dismiss_device:
  name: Verwijder NILM apparaat
  description: Verwijdert een gedetecteerd apparaat.
  fields:
    device_id:
      name: Apparaat ID
      required: true
      selector:
        text:

set_phase_max_current:
  name: Stel max stroom fase in
  description: Stel de maximale stroom in voor een specifieke fase.
  fields:
    phase:
      name: Fase
      required: true
      selector:
        select:
          options:
            - value: "L1"
              label: "L1"
            - value: "L2"
              label: "L2"
            - value: "L3"
              label: "L3"
    max_current:
      name: Max stroom (A)
      required: true
      selector:
        number:
          min: 6
          max: 63
          unit_of_measurement: A

force_price_update:
  name: Energieprijzen bijwerken
  description: Forceert een directe update van de energieprijzen.

generate_report:
  name: Genereer diagnoserapport
  description: Genereert een CloudEMS status rapport als persistente notificatie.
  fields: {}

rename_nilm_device:
  name: Hernoem NILM apparaat
  description: >
    Geeft een gedetecteerd NILM-apparaat een eigen weergavenaam (en optioneel een
    gecorrigeerd apparaattype). De naam is zichtbaar in het dashboard, sensoren en
    notificaties. Gebruik de apparaat-ID uit het attribuut van de NILM-sensor.
  fields:
    device_id:
      name: Apparaat ID
      description: Uniek ID van het gedetecteerde apparaat (zie NILM sensor attributen)
      required: true
      selector:
        text:
    name:
      name: Nieuwe naam
      description: Weergavenaam, max. 60 tekens (bijv. "Wasmachine badkamer")
      required: true
      selector:
        text:
    device_type:
      name: Apparaattype (optioneel)
      description: Corrigeer het apparaattype als NILM het verkeerd heeft herkend
      required: false
      selector:
        select:
          options:
            - refrigerator
            - washing_machine
            - dryer
            - dishwasher
            - oven
            - microwave
            - kettle
            - television
            - computer
            - heat_pump
            - boiler
            - ev_charger
            - light
            - unknown

hide_nilm_device:
  name: Verberg/toon NILM apparaat
  description: >
    Verbergt een NILM-apparaat uit het dashboard en sensoren zonder het te verwijderen.
    Handig voor valse positieven of apparaten die je niet wilt zien. Gebruik hidden: false
    om een verborgen apparaat weer zichtbaar te maken.
  fields:
    device_id:
      name: Apparaat ID
      description: Uniek ID van het gedetecteerde apparaat
      required: true
      selector:
        text:
    hidden:
      name: Verbergen
      description: "true = verbergen, false = weer weergeven (standaard: true)"
      required: false
      selector:
        boolean:

nilm_feedback:
  name: NILM apparaat feedback
  description: Geeft feedback (correct/incorrect/maybe) voor een NILM-detectie.
  fields:
    device_id:
      name: Apparaat ID
      required: true
      selector:
        text:
    feedback:
      name: Feedback
      required: true
      selector:
        select:
          options:
            - value: "correct"
              label: "Correct"
            - value: "incorrect"
              label: "Incorrect"
            - value: "maybe"
              label: "Misschien"
    name:
      name: Naam
      required: false
      selector:
        text:
    device_type:
      name: Apparaattype
      required: false
      selector:
        text:

boiler_override:
  name: Boiler handmatig aansturen
  description: Forceert de boiler aan of uit.
  fields:
    entity_id:
      name: Entiteit
      required: true
      selector:
        entity:
          domain: [switch, input_boolean]
    state:
      name: Status
      required: false
      selector:
        select:
          options:
            - value: "on"
              label: "Aan"
            - value: "off"
              label: "Uit"

reset_drift_baseline:
  name: Reset drift basislijn
  description: Reset de efficiëntie-basislijn van één of alle apparaten.
  fields:
    device_id:
      name: Apparaat ID
      required: false
      selector:
        text:

mute_alert:
  name: Stil CloudEMS melding
  description: Dempt een CloudEMS melding voor 24 uur.
  fields:
    alert_key:
      name: Melding sleutel
      required: true
      selector:
        text:

reset_pv_orientation:
  name: Reset PV oriëntatie leerdata
  description: >
    Wist de geleerde azimuth en hellingshoek voor één of alle omvormers.
    Gebruik dit na testperioden waarbij de leerdata corrupt is geraakt.
    De omvormer hertraint automatisch over de komende zonnedagen.
  fields:
    inverter_id:
      name: Omvormer entity ID
      description: >
        Entity ID van de omvormer om te resetten (bijv. sensor.growatt_total_power).
        Laat leeg om ALLE omvormers te resetten.
      required: false
      selector:
        entity:
          domain: sensor

assign_device_to_room:
  name: Wijs NILM apparaat toe aan kamer
  description: >
    Wijst een NILM-apparaat toe aan een specifieke kamer voor de virtuele stroommeter.
    Overschrijft de automatisch gedetecteerde ruimte (via HA area registry of heuristiek).
    Laat 'room' leeg om de handmatige toewijzing te verwijderen.
  fields:
    device_id:
      name: Apparaat ID
      description: Uniek ID van het NILM-apparaat (zie NILM sensor attributen)
      required: true
      selector:
        text:
    room:
      name: Kamernaam
      description: >
        Naam van de kamer (bijv. woonkamer, keuken, slaapkamer, badkamer, bijkeuken,
        garage, kantoor). Leeg laten om automatische detectie te herstellen.
      required: false
      selector:
        text:

include_nilm_device:
  name: Includeer uitgesloten apparaat
  description: >
    Heft de automatische uitsluiting op van een apparaat in "CloudEMS Exclude".
    Het apparaat wordt daarna ingedeeld via keyword of heuristiek (→ overig als
    er geen match is). Gebruik dit als een auto-excluded apparaat toch een echt
    huishoudelijk apparaat blijkt te zijn.
  fields:
    device_id:
      name: Apparaat ID
      description: Uniek ID van het NILM-apparaat (zie NILM sensor attributen of CloudEMS Exclude ruimte)
      required: true
      selector:
        text:

exclude_nilm_device:
  name: Excludeer apparaat
  description: >
    Plaatst een apparaat altijd in "CloudEMS Exclude", ook als het een bekende
    ruimte heeft via de HA area registry. Gebruik dit voor meters, omvormers of
    andere installatie-apparaten die niet in de kamerweergave horen.
  fields:
    device_id:
      name: Apparaat ID
      description: Uniek ID van het NILM-apparaat
      required: true
      selector:
        text:

label_nilm_device:
  name: Geef NILM apparaat een label
  description: >
    Sla een categorie-label op voor een NILM-apparaat. Het label is zichtbaar
    in het dashboard en kan gebruikt worden voor filtering. Los van de kamer.
    Laat 'label' leeg om het label te wissen.
  fields:
    device_id:
      name: Apparaat ID
      description: Uniek ID van het NILM-apparaat
      required: true
      selector:
        text:
    label:
      name: Label
      description: >
        Categorie: meter, solar, battery, ev, heating, cooling,
        appliance, lighting, network, unknown. Leeg = label wissen.
      required: false
      selector:
        select:
          options:
            - label: "Energiemeter"
              value: "meter"
            - label: "Zonnepanelen"
              value: "solar"
            - label: "Thuisbatterij"
              value: "battery"
            - label: "Laadpaal"
              value: "ev"
            - label: "Verwarming"
              value: "heating"
            - label: "Koeling"
              value: "cooling"
            - label: "Huishoudelijk"
              value: "appliance"
            - label: "Verlichting"
              value: "lighting"
            - label: "Netwerk/IT"
              value: "network"
            - label: "Onbekend"
              value: "unknown"

cleanup_nilm:
  name: NILM opruimen
  description: >
    Ruimt NILM-apparaten en/of energietellers op.
    Kies een scope en geef optioneel het aantal dagen op.
  fields:
    scope:
      name: Scope
      description: >
        Wat er opgeruimd wordt:
        - full: verwijder ALLE apparaten en reset alles (schone start)
        - devices: verwijder apparaten die langer dan x dagen niet gezien zijn
        - energy: reset alle energietellers (kWh)
        - last_x_days: verwijder onbevestigde apparaten van de laatste x dagen
        - week: reset week-kWh tellers
        - month: reset maand-kWh tellers
        - year: reset jaar-kWh tellers
      required: true
      selector:
        select:
          options:
            - full
            - devices
            - energy
            - last_x_days
            - week
            - month
            - year
    days:
      name: Aantal dagen
      description: >
        Alleen nodig bij scope 'devices' en 'last_x_days'.
        Bij 'devices': verwijder apparaten die langer dan dit aantal dagen niet gezien zijn.
        Bij 'last_x_days': verwijder onbevestigde apparaten die de afgelopen x dagen zijn aangemaakt.
        Standaard: 0 (niet van toepassing).
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 365
          step: 1
          unit_of_measurement: dagen

trigger_phase_probe:
  name: Fase-detectie starten (dim-puls)
  description: >
    Start actieve fase-detectie voor één of alle omvormers via een korte dim-puls.
    CloudEMS dimt de omvormer kort naar 40% en kijkt welke fase-stroom het meest
    reageert. Vereist een ingestelde dimmer-regelaar (control_entity).
    De probe wordt automatisch herhaald als de fase nog niet zeker is.
  fields:
    inverter_entity_id:
      name: Omvormer entiteit (optioneel)
      description: >
        Sensor-entiteit van de omvormer waarvoor de probe herstart moet worden.
        Laat leeg om de probe voor ALLE omvormers te herstarten.
      required: false
      selector:
        entity:
          domain: sensor

lamp_circulation_test:
  name: Test lampcirculatie
  description: >
    Start de lampcirculatie testmodus. De ingestelde lampen wisselen 2 minuten
    lang ongeacht de aanwezigheidsstatus. Handig om te controleren of alle lampen
    reageren en om fase-detectie te triggeren.

lamp_circulation_stop_test:
  name: Stop lamp test
  description: Stop de lampcirculatie testmodus voortijdig en zet alle lampen uit.

lamp_circulation_set_enabled:
  name: Lampcirculatie in-/uitschakelen
  description: Schakel de lampcirculatie (inbraakbeveiliging + energiebesparing) in of uit.
  fields:
    enabled:
      name: Ingeschakeld
      description: True = aan, False = uit
      required: true
      selector:
        boolean:

simulator_set:
  name: Testmodus activeren
  description: >
    Activeer de CloudEMS testmodus met gesimuleerde sensorwaarden.
    Leerprocessen worden bevroren zolang de simulator actief is.
    Historische data wordt nooit beïnvloed.
  fields:
    grid_w:
      name: Net vermogen (W)
      description: Gesimuleerd netverbruik in Watt (positief = import, negatief = export)
      selector:
        number:
          min: -25000
          max: 25000
          unit_of_measurement: W
    pv_w:
      name: PV vermogen (W)
      description: Gesimuleerd zonnepaneel-vermogen in Watt
      selector:
        number:
          min: 0
          max: 20000
          unit_of_measurement: W
    battery_soc:
      name: Batterij SoC (%)
      description: Gesimuleerd laadniveau van de batterij
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
    battery_w:
      name: Batterij vermogen (W)
      description: Gesimuleerd batterijvermogen (positief = laden, negatief = ontladen)
      selector:
        number:
          min: -10000
          max: 10000
          unit_of_measurement: W
    epex_now:
      name: EPEX prijs (€/kWh)
      description: Gesimuleerde EPEX spotprijs voor het huidige uur
      selector:
        number:
          min: -0.5
          max: 2.0
          step: 0.001
          unit_of_measurement: "€/kWh"
    outdoor_temp_c:
      name: Buitentemperatuur (°C)
      description: Gesimuleerde buitentemperatuur
      selector:
        number:
          min: -20
          max: 40
          unit_of_measurement: "°C"
    timeout_min:
      name: Timeout (minuten)
      description: Auto-stop na dit aantal minuten (standaard 30)
      default: 30
      selector:
        number:
          min: 1
          max: 480
          unit_of_measurement: min
    note:
      name: Notitie
      description: Optionele beschrijving van dit testscenario
      selector:
        text:

simulator_clear:
  name: Testmodus stoppen
  description: Stop de CloudEMS testmodus en herstel live sensorwaarden.

simulator_zone_temp:
  name: Zone-temperatuur simuleren
  description: >
    Update de gesimuleerde temperatuur van één klimaatzone terwijl de
    testmodus actief is. De simulator hoeft niet opnieuw geactiveerd te worden.
  fields:
    zone:
      name: Zone
      description: Naam van de klimaatzone (exact zoals geconfigureerd, bijv. "woonkamer")
      required: true
      selector:
        text:
    temp_c:
      name: Temperatuur (°C)
      description: Gesimuleerde ruimtetemperatuur voor deze zone
      required: true
      selector:
        number:
          min: 5
          max: 35
          step: 0.5
          unit_of_measurement: "°C"

simulator_stove_temp:
  name: Houtkachel-temperatuur simuleren
  description: >
    Simuleer de pijptemperatuur van een houtkachel in een zone. De
    WoodStoveDetector leert zelf de branddrempel — gebruik 150+ °C om
    "brandend" te simuleren, of 25 °C voor "koud/uit". De simulator
    moet al actief zijn.
  fields:
    zone:
      name: Zone
      description: Naam van de klimaatzone met houtkachel
      required: true
      selector:
        text:
    temp_c:
      name: Kacheltemperatuur (°C)
      description: >
        Gesimuleerde pijp/mantel-temperatuur. 150-250°C = brandend,
        25-40°C = koud. De detector leert de exacte drempel automatisch.
      required: true
      selector:
        number:
          min: 15
          max: 350
          step: 5
          unit_of_measurement: "°C"

clear_drift_profiles:
  name: Drift-profielen wissen
  description: >
    Wis opgeslagen drift-profielen. Gebruik dit na een firmware-update van
    een apparaat, na het verwijderen van een verkeerd gedetecteerd apparaat
    (bijv. cirkelzaag), of bij een schone start van de drift-tracker.
    Zonder filter worden alle profielen gewist.
  fields:
    device_type:
      name: Apparaattype (optioneel)
      description: >
        Wis alleen profielen van dit type. Laat leeg om alles te wissen.
        Voorbeelden: power_tool, garden, refrigerator, washing_machine
      required: false
      selector:
        select:
          options:
            - power_tool
            - garden
            - refrigerator
            - washing_machine
            - dishwasher
            - heat_pump
            - boiler
            - medical
            - gaming
            - kitchen
          custom_value: true

nilm_device_profile:
  name: NILM apparaatprofiel opvragen
  description: >
    Geeft het geleerde vermogensprofiel van een NILM-apparaat als melding in HA.
    Toont geleerd vermogen, standaarddeviatie, cycling-detectie, sessiecount,
    duty-cycle en eventuele energie-anomalieën.
    Zonder device_id worden alle bekende profielen getoond.
  fields:
    device_id:
      name: Apparaat ID (optioneel)
      description: >
        ID van het apparaat (te vinden in de NILM-beheer tab of via de
        sensor.cloudems_nilm_devices attribuut 'device_id'). Laat leeg voor
        een overzicht van alle apparaten.
      required: false
      selector:
        text:

zonneplan_battery_discharge:
  name: Zonneplan Nexus — Ontladen
  description: >
    Zet de Zonneplan Nexus thuisbatterij in ontlaadmodus via manual_control.
    Zie zonneplan_battery_charge voor vereisten en restore-gedrag.

zonneplan_battery_auto:
  name: Zonneplan Nexus — Automatisch (herstel)
  description: >
    Herstel het automatische Zonneplan beheer van de Nexus batterij.
    Schakelt manual_control uit en herstelt dynamic_charging naar de
    staat van vóór de laatste handmatige override.

zonneplan_set_mode:
  name: Zonneplan Nexus — Batterijmodus instellen
  description: >
    Stel de Batterijbesturingsmodus in van de Zonneplan Nexus thuisbatterij.
    Beschikbaar als de Zonneplan ONE integratie aanwezig is én
    'zonneplan_bridge_enabled' is ingeschakeld. CloudEMS slaat de huidige
    modus op en herstelt deze automatisch na de ingestelde restore-tijd.
    Dit is een opt-in functie voor leverancier-gebonden batterijen.
  fields:
    mode:
      name: Modus
      description: >
        home_optimization = Huisoptimalisatie (huis + zonnestroom, laag vermogen).
        self_consumption  = Zelfconsumptie (maximaal eigen zonnestroom opslaan).
        powerplay         = Powerplay (Zonneplan AI, onbalansmarkt).
      required: true
      selector:
        select:
          options:
            - label: "Huisoptimalisatie"
              value: "home_optimization"
            - label: "Zelfconsumptie"
              value: "self_consumption"
            - label: "Powerplay (onbalansmarkt)"
              value: "powerplay"
    deliver_to_home_w:
      name: Leveren aan huis (W)
      description: >
        Alleen bij modus 'home_optimization'. Stel de slider "Leveren aan huis"
        in (W). Laat leeg om de slider niet te wijzigen.
      required: false
      selector:
        number:
          min: 0
          max: 10000
          unit_of_measurement: W
    solar_charge_w:
      name: Zonnestroom opslaan (W)
      description: >
        Alleen bij modus 'home_optimization'. Stel de slider "Zonnestroom opslaan"
        in (W). Laat leeg om de slider niet te wijzigen.
      required: false
      selector:
        number:
          min: 0
          max: 10000
          unit_of_measurement: W

zonneplan_battery_charge:
  name: Zonneplan Nexus — Laden
  description: >
    Laat de Nexus laden. Gebruikt automatisch de beste beschikbare methode:
    Pad A (aanbevolen) = home_optimization modus + solar_charge slider.
    Pad B (legacy) = manual_control switch + charge state.
  fields:
    power_w:
      name: Laadvermogen (W)
      description: Gewenst laadvermogen in Watt. Laat leeg voor standaard (2500 W).
      required: false
      selector:
        number:
          min: 100
          max: 10000
          unit_of_measurement: W


shutter_manual:
  name: Rolluik — Handmatige bediening
  description: >
    Stuur een rolluik handmatig aan (open/dicht/stop) en schakel de automatische
    CloudEMS sturing tijdelijk uit voor het opgegeven aantal uren.
    Na afloop hervat CloudEMS automatisch de sturing.
  fields:
    entity_id:
      name: Rolluik entity
      description: Entity ID van het rolluik (bijv. cover.rolluik_slaapkamer).
      required: true
      selector:
        entity:
          domain: cover
    action:
      name: Actie
      description: open = omhoog, close = omlaag, stop = stoppen.
      required: true
      selector:
        select:
          options:
            - label: "Openen"
              value: "open"
            - label: "Sluiten"
              value: "close"
            - label: "Stoppen"
              value: "stop"
    position:
      name: Positie (%)
      description: Optioneel — stel exact percentage in (0=dicht, 100=open).
      required: false
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
    hours:
      name: Override duur (uren)
      description: Hoe lang automatische sturing uitgeschakeld blijft. Standaard 2 uur.
      required: false
      selector:
        number:
          min: 0.5
          max: 24
          step: 0.5
          unit_of_measurement: h

shutter_cancel_override:
  name: Rolluik — Automatische sturing hervat
  description: >
    Annuleer de handmatige override voor een rolluik (of alle rolluiken).
    CloudEMS hervat direct de automatische sturing.
  fields:
    entity_id:
      name: Rolluik entity (optioneel)
      description: Laat leeg om alle overrides te annuleren.
      required: false
      selector:
        entity:
          domain: cover

