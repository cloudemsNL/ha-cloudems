<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560">
  <defs>
    <style>
      .pcb { fill: #1a5c1a; stroke: #0d3d0d; stroke-width: 2; }
      .copper { fill: none; stroke: #c8860a; stroke-width: 1.5; }
      .silkscreen { fill: none; stroke: #f0f0f0; stroke-width: 0.8; font-family: monospace; }
      .component { fill: #2a2a2a; stroke: #888; stroke-width: 0.5; }
      .label { fill: #f0f0f0; font-family: monospace; font-size: 10px; }
      .label-small { fill: #ccc; font-family: monospace; font-size: 8px; }
      .label-title { fill: #ffcc00; font-family: monospace; font-size: 13px; font-weight: bold; }
      .esp32 { fill: #1a1a6e; stroke: #4444cc; stroke-width: 1; }
      .connector { fill: #333; stroke: #888; stroke-width: 0.5; }
      .screw { fill: #555; stroke: #aaa; stroke-width: 0.5; }
      .via { fill: #c8860a; stroke: #a06800; stroke-width: 0.5; }
      .dimension { fill: none; stroke: #aaa; stroke-width: 0.5; stroke-dasharray: 3,2; }
      .note { fill: #ffe0a0; font-family: monospace; font-size: 9px; }
      .warning { fill: #ff8040; font-family: monospace; font-size: 9px; font-weight: bold; }
    </style>
  </defs>

  <!-- PCB achtergrond (FR4 groen) -->
  <rect x="20" y="20" width="560" height="380" rx="4" class="pcb"/>

  <!-- PCB rand markering -->
  <rect x="20" y="20" width="560" height="380" rx="4" fill="none" stroke="#0d3d0d" stroke-width="3"/>

  <!-- Montagegaten (hoeken) -->
  <circle cx="40" cy="40" r="3" fill="#0d3d0d" stroke="#c8860a" stroke-width="0.5"/>
  <circle cx="560" cy="40" r="3" fill="#0d3d0d" stroke="#c8860a" stroke-width="0.5"/>
  <circle cx="40" cy="380" r="3" fill="#0d3d0d" stroke="#c8860a" stroke-width="0.5"/>
  <circle cx="560" cy="380" r="3" fill="#0d3d0d" stroke="#c8860a" stroke-width="0.5"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- ESP32-S3 DevKitC module -->
  <rect x="200" y="70" width="160" height="200" rx="3" class="esp32"/>
  <text x="280" y="95" text-anchor="middle" class="label-title">ESP32-S3</text>
  <text x="280" y="110" text-anchor="middle" class="label">DevKitC-1</text>

  <!-- ESP32 pinnen links (GPIO) -->
  <!-- L1 = GPIO1 -->
  <line x1="200" y1="130" x2="185" y2="130" stroke="#c8860a" stroke-width="1.5"/>
  <text x="182" y="133" text-anchor="end" class="label-small">GPIO1</text>
  <!-- L2 = GPIO2 -->
  <line x1="200" y1="145" x2="185" y2="145" stroke="#c8860a" stroke-width="1.5"/>
  <text x="182" y="148" text-anchor="end" class="label-small">GPIO2</text>
  <!-- ZMPT = GPIO3 -->
  <line x1="200" y1="160" x2="185" y2="160" stroke="#c8860a" stroke-width="1.5"/>
  <text x="182" y="163" text-anchor="end" class="label-small">GPIO3</text>
  <!-- L3 = GPIO4 -->
  <line x1="200" y1="175" x2="185" y2="175" stroke="#c8860a" stroke-width="1.5"/>
  <text x="182" y="178" text-anchor="end" class="label-small">GPIO4</text>
  <!-- LED = GPIO48 -->
  <line x1="200" y1="190" x2="185" y2="190" stroke="#c8860a" stroke-width="1.5"/>
  <text x="182" y="193" text-anchor="end" class="label-small">GPIO48</text>

  <!-- ESP32 pinnen rechts (Power) -->
  <line x1="360" y1="130" x2="375" y2="130" stroke="#ff4444" stroke-width="1.5"/>
  <text x="378" y="133" class="label-small">3V3</text>
  <line x1="360" y1="145" x2="375" y2="145" stroke="#4444ff" stroke-width="1.5"/>
  <text x="378" y="148" class="label-small">GND</text>
  <line x1="360" y1="160" x2="375" y2="160" stroke="#c8860a" stroke-width="1.5"/>
  <text x="378" y="163" class="label-small">EN</text>
  <line x1="360" y1="175" x2="375" y2="175" stroke="#c8860a" stroke-width="1.5"/>
  <text x="378" y="178" class="label-small">BOOT</text>
  <line x1="360" y1="190" x2="375" y2="190" stroke="#c8860a" stroke-width="1.5"/>
  <text x="378" y="193" class="label-small">USB-D+</text>
  <line x1="360" y1="205" x2="375" y2="205" stroke="#c8860a" stroke-width="1.5"/>
  <text x="378" y="208" class="label-small">USB-D-</text>

  <!-- USB-C connector naast ESP32 -->
  <rect x="410" y="155" width="35" height="20" rx="4" fill="#333" stroke="#888" stroke-width="0.8"/>
  <text x="427" y="168" text-anchor="middle" class="label-small" fill="#fff">USB-C</text>
  <text x="427" y="185" text-anchor="middle" class="label-small">J5</text>
  <!-- verbinding -->
  <line x1="375" y1="190" x2="410" y2="165" stroke="#c8860a" stroke-width="1" stroke-dasharray="2,1"/>
  <line x1="375" y1="205" x2="410" y2="175" stroke="#c8860a" stroke-width="1" stroke-dasharray="2,1"/>

  <!-- RESET + BOOT knoppen -->
  <rect x="410" y="195" width="20" height="12" rx="2" fill="#444" stroke="#888" stroke-width="0.5"/>
  <text x="420" y="204" text-anchor="middle" class="label-small" fill="#fff">RST</text>
  <line x1="375" y1="160" x2="410" y2="200" stroke="#c8860a" stroke-width="0.8" stroke-dasharray="2,1"/>

  <rect x="435" y="195" width="20" height="12" rx="2" fill="#444" stroke="#888" stroke-width="0.5"/>
  <text x="445" y="204" text-anchor="middle" class="label-small" fill="#fff">BOOT</text>
  <line x1="375" y1="175" x2="435" y2="200" stroke="#c8860a" stroke-width="0.8" stroke-dasharray="2,1"/>

  <!-- Status LED -->
  <circle cx="427" cy="230" r="5" fill="#00cc00" stroke="#008800" stroke-width="0.5"/>
  <text x="427" y="246" text-anchor="middle" class="label-small">LED1+R11</text>
  <line x1="375" y1="190" x2="427" y2="225" stroke="#c8860a" stroke-width="0.8" stroke-dasharray="2,1"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- CT L1 BLOK -->
  <text x="65" y="50" text-anchor="middle" class="label" fill="#ffaa00">── FASE L1 ──</text>

  <!-- J1: SCT-013 L1 aansluiting -->
  <rect x="30" y="60" width="30" height="30" rx="2" class="connector"/>
  <rect x="33" y="63" r="3" width="10" height="24" fill="#555"/>
  <rect x="47" y="63" r="3" width="10" height="24" fill="#555"/>
  <text x="45" y="100" text-anchor="middle" class="label">J1</text>
  <text x="45" y="110" text-anchor="middle" class="label-small">SCT L1</text>

  <!-- R1: 22Ω burden -->
  <rect x="80" y="70" width="25" height="10" rx="1" fill="#8B4513" stroke="#aaa" stroke-width="0.5"/>
  <text x="92" y="68" text-anchor="middle" class="label-small">R1</text>
  <text x="92" y="92" text-anchor="middle" class="label-small">22Ω</text>

  <!-- R4/R5: bias divider -->
  <rect x="122" y="58" width="20" height="8" rx="1" fill="#8B4513" stroke="#aaa" stroke-width="0.5"/>
  <text x="132" y="56" text-anchor="middle" class="label-small">R4 10k</text>
  <rect x="122" y="80" width="20" height="8" rx="1" fill="#8B4513" stroke="#aaa" stroke-width="0.5"/>
  <text x="132" y="97" text-anchor="middle" class="label-small">R5 10k</text>

  <!-- C1: 100nF -->
  <rect x="148" y="62" width="6" height="14" rx="1" fill="#cc8800" stroke="#aa6600" stroke-width="0.5"/>
  <text x="154" y="62" class="label-small">C1 100n</text>

  <!-- D1: ESD -->
  <polygon points="162,72 170,75 162,78" fill="#333" stroke="#aaa" stroke-width="0.5"/>
  <line x1="170" y1="72" x2="170" y2="78" stroke="#aaa" stroke-width="0.8"/>
  <text x="165" y="86" text-anchor="middle" class="label-small">D1</text>

  <!-- Copper trace L1: J1 → R1 → bias node → C1 → D1 → GPIO1 -->
  <polyline points="60,75 80,75" class="copper"/>
  <polyline points="105,75 122,75" class="copper"/>
  <polyline points="132,66 132,75 142,75" class="copper"/>
  <line x1="132" y1="75" x2="132" y2="80" class="copper"/>
  <polyline points="154,75 162,75" class="copper"/>
  <polyline points="170,75 185,130" class="copper"/>

  <!-- GND lijn van R5 naar GND -->
  <line x1="132" y1="88" x2="132" y2="98" stroke="#4444ff" stroke-width="1"/>
  <text x="125" y="108" class="label-small" fill="#6666ff">GND</text>
  <!-- 3V3 lijn naar R4 -->
  <line x1="132" y1="55" x2="132" y2="50" stroke="#ff4444" stroke-width="1"/>
  <text x="125" y="48" class="label-small" fill="#ff6666">3V3</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- CT L2 BLOK -->
  <text x="65" y="155" text-anchor="middle" class="label" fill="#ffaa00">── FASE L2 ──</text>

  <rect x="30" y="160" width="30" height="30" rx="2" class="connector"/>
  <rect x="33" y="163" r="3" width="10" height="24" fill="#555"/>
  <rect x="47" y="163" r="3" width="10" height="24" fill="#555"/>
  <text x="45" y="200" text-anchor="middle" class="label">J2</text>
  <text x="45" y="210" text-anchor="middle" class="label-small">SCT L2</text>

  <rect x="80" y="170" width="25" height="10" rx="1" fill="#8B4513" stroke="#aaa" stroke-width="0.5"/>
  <text x="92" y="168" text-anchor="middle" class="label-small">R2 22Ω</text>

  <rect x="122" y="158" width="20" height="8" rx="1" fill="#8B4513" stroke="#aaa" stroke-width="0.5"/>
  <text x="132" y="156" text-anchor="middle" class="label-small">R6 10k</text>
  <rect x="122" y="180" width="20" height="8" rx="1" fill="#8B4513" stroke="#aaa" stroke-width="0.5"/>
  <text x="132" y="197" text-anchor="middle" class="label-small">R7 10k</text>

  <rect x="148" y="162" width="6" height="14" rx="1" fill="#cc8800" stroke="#aa6600" stroke-width="0.5"/>
  <text x="154" y="162" class="label-small">C2 100n</text>

  <polygon points="162,172 170,175 162,178" fill="#333" stroke="#aaa" stroke-width="0.5"/>
  <line x1="170" y1="172" x2="170" y2="178" stroke="#aaa" stroke-width="0.8"/>
  <text x="165" y="186" text-anchor="middle" class="label-small">D3</text>

  <polyline points="60,175 80,175" class="copper"/>
  <polyline points="105,175 122,175" class="copper"/>
  <line x1="132" y1="166" x2="132" y2="175" class="copper"/>
  <line x1="132" y1="175" x2="132" y2="180" class="copper"/>
  <polyline points="154,175 162,175" class="copper"/>
  <polyline points="170,175 185,145" class="copper"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- CT L3 BLOK -->
  <text x="65" y="258" text-anchor="middle" class="label" fill="#ffaa00">── FASE L3 ──</text>

  <rect x="30" y="262" width="30" height="30" rx="2" class="connector"/>
  <rect x="33" y="265" r="3" width="10" height="24" fill="#555"/>
  <rect x="47" y="265" r="3" width="10" height="24" fill="#555"/>
  <text x="45" y="302" text-anchor="middle" class="label">J3</text>
  <text x="45" y="312" text-anchor="middle" class="label-small">SCT L3</text>

  <rect x="80" y="272" width="25" height="10" rx="1" fill="#8B4513" stroke="#aaa" stroke-width="0.5"/>
  <text x="92" y="270" text-anchor="middle" class="label-small">R3 22Ω</text>

  <rect x="122" y="260" width="20" height="8" rx="1" fill="#8B4513" stroke="#aaa" stroke-width="0.5"/>
  <text x="132" y="258" text-anchor="middle" class="label-small">R8 10k</text>
  <rect x="122" y="282" width="20" height="8" rx="1" fill="#8B4513" stroke="#aaa" stroke-width="0.5"/>
  <text x="132" y="299" text-anchor="middle" class="label-small">R9 10k</text>

  <rect x="148" y="264" width="6" height="14" rx="1" fill="#cc8800" stroke="#aa6600" stroke-width="0.5"/>
  <text x="154" y="264" class="label-small">C3 100n</text>

  <polygon points="162,274 170,277 162,280" fill="#333" stroke="#aaa" stroke-width="0.5"/>
  <line x1="170" y1="274" x2="170" y2="280" stroke="#aaa" stroke-width="0.8"/>
  <text x="165" y="288" text-anchor="middle" class="label-small">D5</text>

  <polyline points="60,277 80,277" class="copper"/>
  <polyline points="105,277 122,277" class="copper"/>
  <line x1="132" y1="268" x2="132" y2="277" class="copper"/>
  <line x1="132" y1="277" x2="132" y2="282" class="copper"/>
  <polyline points="154,277 162,277" class="copper"/>
  <polyline points="170,277 185,175" class="copper"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- ZMPT101B blok -->
  <text x="65" y="340" text-anchor="middle" class="label" fill="#80ccff">── SPANNING ──</text>

  <rect x="30" y="345" width="30" height="25" rx="2" class="connector"/>
  <text x="45" y="362" text-anchor="middle" class="label-small" fill="#fff">ZMPT</text>
  <text x="45" y="382" text-anchor="middle" class="label">J4</text>

  <rect x="80" y="348" width="20" height="8" rx="1" fill="#8B4513" stroke="#aaa" stroke-width="0.5"/>
  <text x="90" y="346" text-anchor="middle" class="label-small">R10 10k</text>

  <rect x="112" y="350" width="6" height="12" rx="1" fill="#cc8800" stroke="#aa6600" stroke-width="0.5"/>
  <text x="118" y="350" class="label-small">C4 100n</text>

  <polyline points="60,355 80,355 100,355 112,355" class="copper"/>
  <polyline points="118,355 185,160" class="copper"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- Voeding rails visualisatie -->
  <line x1="490" y1="40" x2="490" y2="390" stroke="#ff4444" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="492" y="55" class="label-small" fill="#ff6666">+3.3V</text>
  <line x1="510" y1="40" x2="510" y2="390" stroke="#4444ff" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="512" y="55" class="label-small" fill="#6666ff">GND</text>

  <!-- Bypass C10 op voedingslijn -->
  <rect x="488" y="100" width="24" height="8" rx="1" fill="#cc8800" stroke="#aa6600" stroke-width="0.5"/>
  <text x="500" y="118" text-anchor="middle" class="label-small">C10 100µ</text>

  <!-- DIN-rail montagegaten -->
  <rect x="25" y="395" width="550" height="12" rx="2" fill="#2a2a2a" stroke="#555" stroke-width="0.5"/>
  <text x="300" y="405" text-anchor="middle" class="label-small">DIN-rail montageklem</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- Afmetingen annotatie -->
  <line x1="20" y1="420" x2="580" y2="420" class="dimension"/>
  <line x1="20" y1="415" x2="20" y2="425" stroke="#aaa" stroke-width="0.5"/>
  <line x1="580" y1="415" x2="580" y2="425" stroke="#aaa" stroke-width="0.5"/>
  <text x="300" y="435" text-anchor="middle" class="label-small" fill="#aaa">100 mm</text>

  <line x1="590" y1="20" x2="590" y2="400" class="dimension"/>
  <line x1="585" y1="20" x2="595" y2="20" stroke="#aaa" stroke-width="0.5"/>
  <line x1="585" y1="400" x2="595" y2="400" stroke="#aaa" stroke-width="0.5"/>
  <text x="605" y="210" text-anchor="middle" class="label-small" fill="#aaa" transform="rotate(90,605,210)">80 mm</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- Legenda / notities rechts -->
  <rect x="610" y="20" width="175" height="520" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="697" y="40" text-anchor="middle" class="label-title">LEGENDA</text>

  <!-- Kleur codering -->
  <rect x="620" y="50" width="12" height="6" fill="#c8860a"/>
  <text x="638" y="57" class="label-small">Copper trace</text>
  <rect x="620" y="62" width="12" height="6" fill="#ff4444"/>
  <text x="638" y="69" class="label-small">+3.3V rail</text>
  <rect x="620" y="74" width="12" height="6" fill="#4444ff"/>
  <text x="638" y="81" class="label-small">GND rail</text>

  <line x1="618" y1="92" x2="782" y2="92" stroke="#333" stroke-width="0.5"/>
  <text x="697" y="105" text-anchor="middle" class="label" fill="#ffcc00">COMPONENTEN</text>

  <text x="618" y="120" class="label-small" fill="#fff">U1  ESP32-S3 DevKitC-1</text>
  <text x="618" y="132" class="label-small" fill="#fff">J1-J3  SCT-013 CT aansl.</text>
  <text x="618" y="144" class="label-small" fill="#fff">J4  ZMPT101B aansl.</text>
  <text x="618" y="156" class="label-small" fill="#fff">J5  USB-C voeding 5V</text>
  <text x="618" y="168" class="label-small" fill="#fff">R1-R3  22Ω burden 1W</text>
  <text x="618" y="180" class="label-small" fill="#fff">R4-R9  10kΩ bias divider</text>
  <text x="618" y="192" class="label-small" fill="#fff">R10  10kΩ ZMPT bias</text>
  <text x="618" y="204" class="label-small" fill="#fff">R11  470Ω LED weerstand</text>
  <text x="618" y="216" class="label-small" fill="#fff">C1-C4  100nF decoupling</text>
  <text x="618" y="228" class="label-small" fill="#fff">C7-C9  10µF bulk</text>
  <text x="618" y="240" class="label-small" fill="#fff">C10  100µF voeding</text>
  <text x="618" y="252" class="label-small" fill="#fff">D1,D3,D5  1N4148 ESD</text>
  <text x="618" y="264" class="label-small" fill="#fff">LED1  Status groen</text>
  <text x="618" y="276" class="label-small" fill="#fff">SW1/SW2  RESET/BOOT</text>

  <line x1="618" y1="286" x2="782" y2="286" stroke="#333" stroke-width="0.5"/>
  <text x="697" y="299" text-anchor="middle" class="label" fill="#ffcc00">PINOUT</text>
  <text x="618" y="314" class="label-small" fill="#80ff80">GPIO1 → SCT L1</text>
  <text x="618" y="326" class="label-small" fill="#80ff80">GPIO2 → SCT L2</text>
  <text x="618" y="338" class="label-small" fill="#80ff80">GPIO3 → ZMPT101B</text>
  <text x="618" y="350" class="label-small" fill="#80ff80">GPIO4 → SCT L3</text>
  <text x="618" y="362" class="label-small" fill="#80ff80">GPIO48 → Status LED</text>

  <line x1="618" y1="372" x2="782" y2="372" stroke="#333" stroke-width="0.5"/>
  <text x="697" y="385" text-anchor="middle" class="label" fill="#ffcc00">SPECS</text>
  <text x="618" y="400" class="label-small" fill="#fff">PCB: 100×80mm</text>
  <text x="618" y="412" class="label-small" fill="#fff">Lagen: 2 (FR4)</text>
  <text x="618" y="424" class="label-small" fill="#fff">Min trace: 0.2mm</text>
  <text x="618" y="436" class="label-small" fill="#fff">Min ruimte: 0.2mm</text>
  <text x="618" y="448" class="label-small" fill="#fff">Isolatie HV: 0.8mm</text>
  <text x="618" y="460" class="label-small" fill="#fff">Afwerking: HASL</text>

  <line x1="618" y1="470" x2="782" y2="470" stroke="#333" stroke-width="0.5"/>
  <!-- Waarschuwing -->
  <text x="697" y="485" text-anchor="middle" class="warning">⚠ VEILIGHEID</text>
  <text x="618" y="497" class="label-small" fill="#ff8040">Alleen split-core CT</text>
  <text x="618" y="509" class="label-small" fill="#ff8040">ZMPT101B geïsoleerd</text>
  <text x="618" y="521" class="label-small" fill="#ff8040">Erkend elektricien!</text>
  <text x="618" y="533" class="label-small" fill="#ff8040">DIN behuizing verplicht</text>

  <!-- Titel balk -->
  <rect x="20" y="445" width="560" height="20" rx="2" fill="#0d3d0d"/>
  <text x="35" y="459" class="label-small" fill="#88cc88">CloudEMS NILM Meter v3.0 — 3-fase — PCB Layout overzicht</text>
  <text x="530" y="459" text-anchor="end" class="label-small" fill="#88cc88">100×80mm 2L</text>
</svg>
