  - type: markdown
    title: "⏳ Onbesliste apparaten"
    content: |
      {% set devs = state_attr('sensor.cloudems_nilm_running_devices','device_list') or state_attr('sensor.cloudems_nilm_running_devices','devices') or [] %}
      {% set unconf = [] %}
      {% for d in devs %}
        {% if not d.get('confirmed', false) and not d.get('user_suppressed', false) %}
          {% set unconf = unconf + [d] %}
        {% endif %}
      {% endfor %}
      {% if unconf | length == 0 %}
      ✅ **Alle apparaten zijn beoordeeld.** Geen onbesliste apparaten.
      {% else %}
      **{{ unconf | length }} apparaten wachten op beoordeling.**
      Gebruik de **Apparaten tab** in de CloudEMS kaart om ze goed te keuren of te onderdrukken.
      Of kopieer het Device ID en gebruik Developer Tools → Services.

      | Apparaat | W | Fase | Bron | % | Device ID |
      |----------|---|------|------|---|-----------|
      {% for d in unconf | sort(attribute='power_w', reverse=true) %}
      {%- set ph = d.get('phase','L1') -%}
      {%- set ph_ico = '🔵' if ph == 'L1' else ('🟡' if ph == 'L2' else ('🟢' if ph == 'L3' else '⚪')) -%}
      {%- set src = d.get('source_type','nilm') -%}
      {%- set src_ico = '🔌' if src == 'smart_plug' else '🔍' -%}
      {%- set conf = d.get('confidence', 0) | int -%}
      | **{{ d.get('name', d.get('device_type','?')) }}** | {{ d.get('power_w', 0) | int }} W | {{ ph_ico }} {{ ph }} | {{ src_ico }} | {{ conf }}% | `{{ d.get('device_id', d.get('name','?')) }}` |
      {% endfor %}

      > 💡 Services: `cloudems.confirm_device` of `cloudems.suppress_nilm_device` met parameter `device_id`
      {% endif %}
