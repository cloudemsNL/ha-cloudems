          - entity: sensor.cloudems_apparaat_efficientiedrift
            name: Apparaat drift
          - entity: sensor.cloudems_battery_state_of_health
            name: Batterij gezondheid
          - entity: binary_sensor.cloudems_verbruik_anomalie
            name: Verbruiksanomalie
            state_color: true

      - type: markdown
        title: "ℹ️ Hoe werken CloudEMS Meldingen?"
        content: |
          CloudEMS detecteert automatisch problemen en meldt via:

          - **HA Persistent Notifications** (sidebar): altijd actief
          - **Mobiele push** (optioneel): stel `notification_service` in via CloudEMS configuratie

          **Prioriteiten:**
          🔴 Kritiek → direct + herinnering na 6u
          🟡 Waarschuwing → maximaal 1× per dag
          🔵 Info → gebundeld in avonddigest (20:00)

          Dempen: gebruik `cloudems.mute_alert` service met de alert-key als parameter.

