          *Nog geen voertuigen gedetecteerd. CloudEMS herkent e-bike en scooter laders (50–700W) automatisch via NILM.*
          {% else %}
          | Voertuig | Type | Sessies | Gem. kWh | Gem. duur | Per week |
          |----------|------|---------|----------|-----------|----------|
          {% for p in profiles -%}
          | {{ p.label }} | {{ p.vehicle_type }} | {{ p.sessions }} | {{ p.avg_kwh }} kWh | {{ p.avg_duration_min | int }} min | {{ p.sessions_per_week }}×/week |
          {% endfor %}
