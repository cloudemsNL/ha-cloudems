  - type: markdown
    title: "📋 Alle bekende NILM apparaten"
    content: |
      {% set devs = state_attr('sensor.cloudems_nilm_running_devices','device_list') or state_attr('sensor.cloudems_nilm_running_devices','devices') or [] %}
      {% if devs | length == 0 %}
      *CloudEMS leert apparaten kennen — na een paar uur verschijnen ze hier.*
      {% else %}
      {% set confirmed  = devs | selectattr('confirmed',       'defined') | selectattr('confirmed',       'eq', true) | list | length %}
      {% set suppressed = devs | selectattr('user_suppressed', 'defined') | selectattr('user_suppressed', 'eq', true) | list | length %}
      {% set total = devs | length %}
      **{{ total }}** apparaten &nbsp;·&nbsp; ✅ **{{ confirmed }}** goedgekeurd &nbsp;·&nbsp; 🚫 **{{ suppressed }}** onderdrukt &nbsp;·&nbsp; ⏳ **{{ total - confirmed - suppressed }}** onbeslist

      | Apparaat | Nu | Status | W | Fase | Bron | % |
      |----------|----|--------|---|------|------|---|
      {% for d in devs | sort(attribute='power_w', reverse=true) %}
      {%- set is_on   = d.get('state','') == 'on' or d.get('power_w', 0) > 0 -%}
      {%- set confirmed_d = d.get('confirmed', false) -%}
      {%- set suppressed_d = d.get('user_suppressed', false) -%}
      {%- set status  = '✅' if confirmed_d else ('🚫' if suppressed_d else '⏳') -%}
      {%- set active  = '🟢' if is_on else '⚫' -%}
      {%- set ph = d.get('phase','L1') -%}
      {%- set ph_ico  = '🔵' if ph == 'L1' else ('🟡' if ph == 'L2' else ('🟢' if ph == 'L3' else '⚪')) -%}
      {%- set src = d.get('source_type','nilm') -%}
      {%- set src_ico = '🔌' if src == 'smart_plug' else ('🧠' if src == 'local_ai' else ('☁️' if src == 'cloud_ai' else '🔍')) -%}
      {%- set conf = d.get('confidence', 0) | int -%}
      {%- set conf_ico = '🟢' if conf >= 70 else ('🟡' if conf >= 50 else '🔴') -%}
      | {{ d.get('name', d.get('device_type','?')) }} | {{ active }} | {{ status }} | {{ d.get('power_w', 0) | int }} | {{ ph_ico }} {{ ph }} | {{ src_ico }} | {% if src == 'smart_plug' %}✅{% else %}{{ conf_ico }} {{ conf }}%{% endif %} |
      {% endfor %}

      🟢 actief &nbsp;·&nbsp; ✅ goedgekeurd &nbsp;·&nbsp; ⏳ onbeslist &nbsp;·&nbsp; 🚫 onderdrukt &nbsp;·&nbsp; 🔌 stekker &nbsp;·&nbsp; 🔍 NILM &nbsp;·&nbsp; 🧠 AI
      {% endif %}
