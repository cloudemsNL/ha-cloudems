  - type: markdown
    title: 📊 Verbruik Vandaag per Categorie
    content: |
      {% set c = state_attr('sensor.cloudems_verbruik_categorien', 'pie_data') or [] %}
      {% set total = state_attr('sensor.cloudems_verbruik_categorien', 'total_kwh_today') or 0 %}
      {% set total_w = state_attr('sensor.cloudems_verbruik_categorien', 'total_w_now') or 0 %}
      {% set insight = state_attr('sensor.cloudems_verbruik_categorien', 'dominant_insight') or '' %}
      {% set batt_dev = state_attr('sensor.cloudems_nilm_running_devices','devices') | selectattr('device_type','eq','battery') | list %}
      {% set batt_w = batt_dev[0].current_power | int if batt_dev | length > 0 else 0 %}
      {% if c | length == 0 %}
      *Categorieën worden opgebouwd gedurende de dag.*
      {% else %}
      **Totaal huisverbruik: {{ total | round(1) }} kWh** *(batterijladen niet meegerekend)*

      | Categorie | Nu | Vandaag | % |
      |-----------|-----|---------|---|
      {% for cat in c -%}
      | {{ cat.name }} | {{ cat.w_now | int }} W | {{ cat.kwh }} kWh | {{ cat.pct }}% |
      {% endfor %}
      {% if batt_w > 50 %}| 🔋 Opslag (batterij) | {{ batt_w }} W | — | — |{% endif %}

      *{{ insight }}*
      {% endif %}
    card_mod:
      style: |
        ha-card {
          background: #222222 !important;
          border: 1px solid rgba(255,255,255,0.06) !important;
          border-radius: 16px !important;
          box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;
          --primary-text-color: #a3a3a3;
          --secondary-text-color: #666666;
          --primary-color: #00b140;
          --card-background-color: transparent;
          --ha-card-border-color: transparent;
        }
        ha-card:hover {
          border-color: rgba(0,177,64,0.5) !important;
          box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 16px rgba(0,177,64,0.12) !important;
          transform: translateY(-1px) !important;
        }
        .card-header {
          background: transparent !important;
          border-bottom: 1px solid rgba(255,255,255,0.07) !important;
          color: #ffffff !important;
          font-size: 12px !important;
          font-weight: 600 !important;
          padding: 14px 16px 12px !important;
        }
        ha-markdown-element table { width: 100% !important; border-collapse: collapse !important; }
        ha-markdown-element th {
