      style: |-
        ha-card {
          background: {% if state_attr('sensor.cloudems_lampcirculatie_status', 'phase_tip') %} rgb(26,46,26) {% else %} transparent {% endif %} !important;
          border: 0 !important;
          box-shadow: none !important;
          padding: 0 !important;
          margin: 0 !important;
          min-height: 0 !important;
        }
        ha-card:empty { display: none !important; }

  - type: markdown
    content: |

      **🔒 Inbraakbeveiliging** — Dynamische circulatie met willekeurige tijden (2-8 min)
      en wisselend 1-3 lampen tegelijk. Geen enkel herhaalbaar patroon.

      **⚡ Energiebesparing** — Alle lampen automatisch uit bij gedetecteerde afwezigheid.

      **🌙 Seizoensintelligentie** — Nacht wordt bepaald op basis van `sun.sun` (zon onder
      de horizon), zodat de circulatie automatisch later start in de zomer en eerder in
      de winter.

      **✨ Gedragsmimicry** — CloudEMS leert welke lampen bewoners normaal aandoen op
      welk tijdstip. Die lampen krijgen een hogere kans om gekozen te worden, zodat het
      gedrag realistischer lijkt.

      **🏘️ Buurt-correlatie** — Als buur-lampen worden gedetecteerd, verschuift CloudEMS
      de eigen schakelmoment zodat de timing niet gelijktijdig valt.

      **🚶 PIR-bypass** — Lampen gekoppeld aan een bewegingsmelder worden tijdelijk
      uitgesloten als de PIR recent actief was (iemand in de kamer).

      **💶 Negatieve prijs** — Bij negatieve EPEX-prijs wordt de circulatieduur verlengd:
      gratis stroom én maximale beveiligingstijd.

      **⚡ Fase-detectie** — Bij elke schakelactie leert CloudEMS passief de netfase
      van de lamp. Start de **Test** om dit direct te triggeren.
    card_mod:
      style: |
        ha-card {
          background: rgb(26,26,46) !important;
          border: 1px solid rgba(255,200,0,0.15) !important;
          border-radius: 16px !important;
          box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;
          --primary-text-color: rgb(255,255,255);
          --secondary-text-color: rgb(163,163,163);
          --card-background-color: transparent;
          --ha-card-border-color: transparent;
          padding: 4px;
        }

  - type: markdown
    title: ⚡ Lamp Fase-detectie + Gedragspatroon
    content: |
      {% set lamps = state_attr('sensor.cloudems_lampcirculatie_status', 'lamp_phases') %}
      {% set on_ids = state_attr('sensor.cloudems_lampcirculatie_status', 'lamps_on') or [] %}
      {% if lamps %}
      | Lamp | Status | Fase | ~W | Mimicry |
      |------|--------|------|----|---------| 
      {%- for l in lamps %}
      {%- set status = 'uitgesloten' if l.excluded else ('**AAN**' if l.entity_id in on_ids else 'uit') -%}{%- set fase = l.phase if l.phase else '?' -%}{%- set watt = (l.power_w | int | string ~ ' W') if l.power_w else '-' -%}{%- set mp = ((l.mimicry or 0) * 100) | round(0) | int -%}{%- set bar = '█' * (mp // 10) ~ '░' * (10 - mp // 10) %}
      | {{ l.label }} | {{ status }} | {{ fase }} | {{ watt }} | `{{ bar }}` {{ mp }}% |
      {%- endfor %}
      *Mimicry = kans dat bewoners dit licht nu zelf aan zouden doen.*
      {% else %}
      *Geen lampen gevonden. CloudEMS detecteert automatisch alle `light.*` entiteiten na herstart.*
      {% endif %}
