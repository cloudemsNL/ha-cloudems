- title: E-bike & Scooter
  path: cloudems-micromobiliteit
  icon: mdi:bicycle-electric
  background: "radial-gradient(ellipse 70% 50% at 50% -10%, rgba(0,177,64,0.08) 0%, transparent 60%),rgb(24,24,24)"
  card_mod:
    style: |
      hui-view { padding: 12px 12px 24px !important; }
  cards:
  - type: conditional
    conditions:
    - condition: numeric_state
      entity: sensor.cloudems_micro_mobiliteit
      below: 0.001
    card:
      type: markdown
      content: |
        ## 🚲 E-bike & Scooter nog niet actief

        CloudEMS herkent e-bike en scooter laders **automatisch** via NILM.

        **Hoe werkt het?**
        Sluit je e-bike of scooter aan op een stopcontact dat CloudEMS monitort. Na de eerste laadsessie (50–700 W, minimaal 20 minuten) wordt het voertuig automatisch herkend en bijgehouden.

        > Zorg dat NILM actief is en dat de lader zichtbaar is als een apparaat in het NILM overzicht.
      card_mod:
        style: |
          ha-card {
            background: rgb(34,34,34) !important;
            border: 1px solid rgba(0,177,64,0.2) !important;
            border-radius: 16px !important;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;
            --primary-text-color: rgb(163,163,163);
            --secondary-text-color: rgb(102,102,102);
            --primary-color: rgb(0,177,64);
            --card-background-color: transparent;
            --ha-card-border-color: transparent;
          }
          ha-markdown-element h2 { color: rgb(0,212,78) !important; font-size: 15px !important; margin-bottom: 8px !important; }
          ha-markdown-element strong { color: rgb(255,255,255) !important; }
          ha-markdown-element blockquote {
            border-left: 3px solid rgb(0,177,64) !important;
            background: rgba(0,177,64,0.07) !important;
            padding: 8px 14px !important;
            border-radius: 0 8px 8px 0 !important;
            color: rgb(163,163,163) !important;
          }
  - type: conditional
    conditions:
    - condition: state
      entity: sensor.cloudems_micro_mobiliteit
      state_not: unavailable
    - condition: state
      entity: sensor.cloudems_micro_mobiliteit
      state_not: unknown
    card:
      type: vertical-stack
      cards:
        - type: glance
          show_name: true
          show_icon: true
          show_state: true
          entities:
          - entity: sensor.cloudems_micro_mobiliteit
            name: Totaal geladen
            icon: mdi:lightning-bolt
          - entity: sensor.cloudems_micro_mobiliteit
            name: kWh vandaag
            attribute: kwh_today
            icon: mdi:battery-charging
          - entity: sensor.cloudems_micro_mobiliteit
            name: Voertuigen vandaag
            attribute: vehicles_today
            icon: mdi:counter
          - entity: sensor.cloudems_micro_mobiliteit
            name: Kosten vandaag
            attribute: cost_today_eur
            icon: mdi:currency-eur
          card_mod:
            style: |
              ha-card {
                background: rgb(34,34,34) !important;
                border: 1px solid rgba(255,255,255,0.06) !important;
                border-radius: 16px !important;
                box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;
                --primary-text-color: rgb(255,255,255);
                --secondary-text-color: rgb(163,163,163);
                --primary-color: rgb(0,177,64);
                --card-background-color: transparent;
              }
  - type: conditional
    conditions:
    - condition: state
      entity: sensor.cloudems_micro_mobiliteit
      state_not: unavailable
    card:
      type: markdown
      title: "🚲 Overzicht E-bike & Scooter"
      content: |
        {% set m = states('sensor.cloudems_micro_mobiliteit') | float(0) %}
        {% set kwh_today   = state_attr('sensor.cloudems_micro_mobiliteit', 'kwh_today') | float(0) %}
        {% set cost_today  = state_attr('sensor.cloudems_micro_mobiliteit', 'cost_today_eur') | float(0) %}
        {% set weekly_avg  = state_attr('sensor.cloudems_micro_mobiliteit', 'weekly_kwh_avg') | float(0) %}
        {% set total_sess  = state_attr('sensor.cloudems_micro_mobiliteit', 'total_sessions') | int(0) %}
        {% set best_hour   = state_attr('sensor.cloudems_micro_mobiliteit', 'best_charge_hour') %}
        {% set advice      = state_attr('sensor.cloudems_micro_mobiliteit', 'advice') %}
        {% set profiles    = state_attr('sensor.cloudems_micro_mobiliteit', 'vehicle_profiles') or [] %}
        {% set active      = state_attr('sensor.cloudems_micro_mobiliteit', 'active_sessions') or [] %}
        {% if active %}🟢 **{{ active | length }} sessie(s) actief**{% endif %}

        | Gegeven | Waarde |
        |---|---|
        | Totaal geladen | **{{ m }} kWh** |
        | Vandaag geladen | {{ kwh_today | round(2) }} kWh |
        | Kosten vandaag | €{{ cost_today | round(2) }} |
        | Gem. per week | {{ weekly_avg | round(2) }} kWh |
        | Totaal sessies | {{ total_sess }} |
        | Beste laaduur | {% if best_hour is not none %}{{ '%02d:00'|format(best_hour) }}{% else %}Onbekend{% endif %} |

        {% if advice %}> {{ advice }}{% endif %}

