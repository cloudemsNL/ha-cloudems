  - type: markdown
    title: 🤖 Ollama AI · Diagnostics
    content: |
      {% set e = 'sensor.cloudems_ollama_diagnostics' %}
      {% set s = states(e) %}
      {% if s in ('unavailable', 'unknown') %}
      ⏳ _Sensor wordt geladen... even geduld na herstart._
      {% else %}
      {% set err = state_attr(e, 'last_error') %}
      {% set model = state_attr(e, 'model') or '—' %}
      {% set host = state_attr(e, 'host') or '—' %}
      {% set port = state_attr(e, 'port') or '—' %}
      {% set found = state_attr(e, 'active_model_found') %}
      {% set mode = state_attr(e, 'nilm_active_mode') or '—' %}
      {% set total = state_attr(e, 'calls_total') | int(0) %}
      {% set success = state_attr(e, 'calls_success') | int(0) %}
      {% set failed = state_attr(e, 'calls_failed') | int(0) %}
      {% set rate = state_attr(e, 'success_rate_pct') | float(0) %}
      {% set last_ms = state_attr(e, 'last_response_ms') %}
      {% set avg_ms = state_attr(e, 'avg_response_ms') %}
      {% set last_ok = state_attr(e, 'last_success_ts') %}
      {% set check_ts = state_attr(e, 'last_check_ts') %}
      {% set enabled = state_attr(e, 'enabled') %}
      {% if not enabled %}
      ⚫ **Ollama is niet ingeschakeld.**
      Activeer via Instellingen → CloudEMS → Configureren → AI & NILM.
      {% else %}
      **Status:** {% if s == 'online' %}🟢 Online{% elif s == 'offline' %}🔴 Offline{% elif s == 'error' %}🟠 Fout{% elif s == 'timeout' %}🟠 Timeout{% else %}⚪ {{ s }}{% endif %} &nbsp;·&nbsp; **NILM:** {% if mode == 'ollama' %}🟢 Ollama{% elif mode == 'database' %}🟡 Database (fallback){% elif mode == 'cloud_ai' %}🔵 Cloud AI{% else %}{{ mode }}{% endif %}

      **Host:** `{{ host }}:{{ port }}` &nbsp;·&nbsp; **Model:** `{{ model }}`{% if s == 'online' %}{% if found %} ✅{% else %} ⚠️ niet gevonden{% endif %}{% endif %}

      **Check:** {{ check_ts or '_nog niet_' }} &nbsp;·&nbsp; **Fout:** {{ err or '_geen_' }}

      **Oproepen:** {{ total }} totaal · {{ success }} ok ({{ rate | round(0) }}%) · {{ failed }} mislukt &nbsp;·&nbsp; **Respons:** {% if last_ms %}{{ last_ms }}ms (nu) · {{ avg_ms }}ms (gem.){% else %}—{% endif %}
      {% if s in ('offline', 'error', 'timeout') %}

      ---
      ⚠️ **Ollama niet bereikbaar — database wordt als fallback gebruikt.**
      Reden: `{{ err or 'onbekend' }}`
      - Ollama gestopt? → `systemctl status ollama`
      - Verkeerd adres? → Instellingen → CloudEMS → AI & NILM
      - Model ontbreekt? → `ollama pull {{ model }}`
      - Firewall blokkeert poort `{{ port }}`?
      {% endif %}
      {% endif %}
      {% endif %}
