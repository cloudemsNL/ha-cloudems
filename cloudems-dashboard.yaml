      {% set neg = state_attr('sensor.cloudems_lampcirculatie_status', 'neg_price_active') %}
      {% set sun = state_attr('sensor.cloudems_lampcirculatie_status', 'sun_derived_night') %}
      {% if test %}🔬 TESTMODUS ACTIEF
      {% elif lc == 'circulation' and neg %}🔒 Beveiliging ACTIEF ⚡ negatieve prijs
      {% elif lc == 'circulation' %}🔒 Inbraakbeveiliging ACTIEF
      {% elif lc == 'night_off' and sun %}🌙 Nacht (zon onder horizon)
      {% elif lc == 'night_off' %}🌙 Nachtmodus
      {% elif lc == 'energy_saving' %}⚡ Energiebesparing — wacht...
      {% else %}✅ Standby — niemand weg
      {% endif %}
    secondary: >-
      {{ state_attr('sensor.cloudems_lampcirculatie_status', 'advice') }}
    icon: >-
      {% set lc = state_attr('sensor.cloudems_lampcirculatie_status', 'mode') %}
      {% if lc in ['circulation', 'test'] %}mdi:shield-lock
      {% elif lc == 'night_off' %}mdi:weather-night
      {% elif lc == 'energy_saving' %}mdi:lightning-bolt
      {% else %}mdi:lightbulb-group-outline
      {% endif %}
    icon_color: >-
      {% set lc = state_attr('sensor.cloudems_lampcirculatie_status', 'mode') %}
      {% set test = state_attr('sensor.cloudems_lampcirculatie_status', 'test_mode') %}
      {% set neg = state_attr('sensor.cloudems_lampcirculatie_status', 'neg_price_active') %}
      {% if test %}purple
      {% elif lc == 'circulation' and neg %}green
      {% elif lc == 'circulation' %}orange
      {% elif lc == 'night_off' %}blue
      {% elif lc == 'energy_saving' %}yellow
      {% else %}grey
      {% endif %}
    card_mod:
      style: |
        ha-card {
          background: rgb(34,34,34) !important;
          border: 1px solid rgba(255,255,255,0.06) !important;
          border-radius: 16px !important;
          box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;
          --primary-text-color: rgb(255,255,255);
          --secondary-text-color: rgb(163,163,163);
