- title: Batterij
  path: cloudems-batterij
  icon: mdi:battery-charging-80
  background: "radial-gradient(ellipse 70% 50% at 50% -10%, rgba(0,177,64,0.08) 0%, transparent 60%),rgb(24,24,24)"
  card_mod:
    style: |
      hui-view { padding: 12px 12px 24px !important; }
  cards:
  - type: markdown
    title: 🔋 Batterijen — Live status
    content: |
      {% set bats = state_attr('sensor.cloudems_batterij_epex_schema', 'batteries') or [] %}
      {% if bats | length == 0 %}
      {% set action = states('sensor.cloudems_batterij_epex_schema') %}
      {% set reason = state_attr('sensor.cloudems_batterij_epex_schema', 'reason') %}
      {% set soc    = state_attr('sensor.cloudems_batterij_epex_schema', 'soc_pct') %}
      {% set soc_icon = '🟢' if soc and soc >= 60 else '🟡' if soc and soc >= 20 else '🔴' if soc else '⚫' %}
      **Batterij 1** &nbsp;·&nbsp; {{ soc_icon }} {{ soc | round(0) if soc else '—' }}% SOC
      - Actie: {{ action or '—' }}
      - Reden: {{ reason or '—' }}
      {% else %}
      | Batterij | SOC | Status | Vermogen | Actie | Reden |
      |----------|-----|--------|----------|-------|-------|
      {% for b in bats -%}
      {%- set soc = b.soc_pct -%}
      {%- set pwr = b.power_w -%}
      {%- set soc_icon = '🟢' if soc and soc >= 60 else '🟡' if soc and soc >= 20 else '🔴' if soc is not none else '⚫' -%}
      {%- set soc_bar = '▓' * ((soc / 10) | int) ~ '░' * (10 - (soc / 10) | int) if soc is not none else '░░░░░░░░░░' -%}
      {%- if pwr is not none and pwr > 50 -%}{%- set status = '⚡ Laden' -%}
      {%- elif pwr is not none and pwr < -50 -%}{%- set status = '↗ Leveren' -%}
      {%- else -%}{%- set status = '— Idle' -%}{%- endif -%}
      {%- set pwr_str = ((pwr | int | string) ~ ' W') if pwr is not none else '—' -%}
      | **{{ b.label or ('Batterij ' ~ loop.index) }}** | {{ soc_icon }} {{ soc | round(0) if soc is not none else '—' }}% `{{ soc_bar }}` | {{ status }} | {{ pwr_str }} | {{ b.action or '—' }} | {{ (b.reason or '—') | truncate(35, True, '…') }} |
      {% endfor %}
      {% endif %}
