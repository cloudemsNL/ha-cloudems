title: ⚡ CloudEMS
views:
- title: Overzicht
  path: cloudems-overzicht
  icon: mdi:home-lightning-bolt
  background: radial-gradient(ellipse 70% 50% at 50% -10%, rgba(0,177,64,0.08) 0%, transparent 60%),#181818
  card_mod:
    style: |
      hui-view {
        padding: 12px 12px 24px !important;
      }
  cards:
  - type: custom:cloudems-card
    grid_sensor: sensor.cloudems_grid_power_w
    solar_sensor: sensor.cloudems_solar_power_w
    battery_soh: sensor.cloudems_battery_state_of_health
    congestion: sensor.cloudems_grid_congestion_utilisation
    nilm_sensor: sensor.cloudems_nilm_running_devices
    price_sensor: sensor.cloudems_energieprijs
    forecast_sensor: sensor.cloudems_solar_pv_forecast_today
    hints_sensor: sensor.cloudems_sensor_hints
    ev_sensor: sensor.cloudems_ev_laadstroom_dynamisch
    occupancy_sensor: sensor.cloudems_occupancy
    preheat_sensor: sensor.cloudems_climate_preheat
    pv_accuracy_sensor: sensor.cloudems_pv_forecast_accuracy
    ema_diag_sensor: sensor.cloudems_ema_diagnostics
    sanity_sensor: sensor.cloudems_sensor_sanity
    thermal_sensor: sensor.cloudems_thermal_model
    phase_sensors:
    - label: L1
      entity: sensor.cloudems_fase_l1_stroom
      max_a: 25
    - label: L2
      entity: sensor.cloudems_fase_l2_stroom
      max_a: 25
    - label: L3
      entity: sensor.cloudems_fase_l3_stroom
      max_a: 25
  - type: conditional
    conditions:
    - condition: numeric_state
      entity: sensor.cloudems_actieve_meldingen
      above: 0
    card:
      type: markdown
      title: 🔔 Actieve Meldingen
      content: |
        {% set n = state_attr('sensor.cloudems_actieve_meldingen', 'active_alerts') or [] %}
        {% for a in n[:3] %}
        {% if a.priority == 'critical' %}🔴{% elif a.priority == 'warning' %}🟡{% else %}🔵{% endif %} **{{ a.title }}** — {{ a.message }}
        {% endfor %}
        {% if n | length > 3 %}*...en {{ n | length - 3 }} meer. Zie tabblad Meldingen.*{% endif %}
      style: |
        ha-card {
          background: linear-gradient(135deg, #2d1515 0%, #3d1f1f 100%);
          border-left: 4px solid #e74c3c;
          border-radius: 10px;
        }
      card_mod:
        style: |
          ha-card {
            background: #222222 !important;
            border: 1px solid rgba(255,255,255,0.06) !important;
            border-radius: 16px !important;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;
            --primary-text-color: #a3a3a3;
            --secondary-text-color: #666666;
            --primary-color: #00b140;
            --card-background-color: transparent;
            --ha-card-border-color: transparent;
          }
          ha-card:hover {
            border-color: rgba(0,177,64,0.5) !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 16px rgba(0,177,64,0.12) !important;
            transform: translateY(-1px) !important;
          }
          .card-header {
            background: transparent !important;
            border-bottom: 1px solid rgba(255,255,255,0.07) !important;
            color: #ffffff !important;
            font-size: 12px !important;
            font-weight: 600 !important;
            padding: 14px 16px 12px !important;
          }
          ha-markdown-element table { width: 100% !important; border-collapse: collapse !important; }
          ha-markdown-element th {
            background: rgba(0,177,64,0.1) !important;
            color: #00d44e !important;
            font-size: 10px !important;
            font-weight: 700 !important;
            letter-spacing: 0.08em !important;
            text-transform: uppercase !important;
            padding: 8px 10px !important;
            border-bottom: 1px solid rgba(0,177,64,0.2) !important;
          }
          ha-markdown-element td {
            color: #a3a3a3 !important;
            border-bottom: 1px solid rgba(255,255,255,0.05) !important;
            padding: 7px 10px !important;
          }
          ha-markdown-element tr:hover td {
            background: rgba(0,177,64,0.06) !important;
            color: #ffffff !important;
          }
          ha-markdown-element strong { color: #ffffff !important; font-weight: 600 !important; }
          ha-markdown-element em { color: #666666 !important; }
          ha-markdown-element code {
            background: rgba(0,177,64,0.12) !important;
            color: #00d44e !important;
            padding: 1px 6px !important;
            border-radius: 4px !important;
            font-size: 12px !important;
          }
          ha-markdown-element blockquote {
            border-left: 3px solid #00b140 !important;
            background: rgba(0,177,64,0.07) !important;
            padding: 8px 14px !important;
            border-radius: 0 8px 8px 0 !important;
            color: #a3a3a3 !important;
          }
  - type: horizontal-stack
    cards:
    - type: entity
      entity: sensor.cloudems_grid_import_power
      name: Afname nu
      icon: mdi:transmission-tower-import
      card_mod:
        style: |
          ha-card {
            background: #222222 !important;
            border: 1px solid rgba(255,255,255,0.06) !important;
            border-radius: 16px !important;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;
