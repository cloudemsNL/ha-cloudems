  # VIEW 8 — 🔋 BATTERIJ
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Batterij
    path: cloudems-battery
    icon: mdi:battery-charging-high
    cards:

      # ── Multi-batterij overzicht ───────────────────────────────────────────
      - type: markdown
        title: "🔋 Batterijen — Live status"
        content: |
          {% set bats = state_attr('sensor.cloudems_batterij_epex_schema', 'batteries') or [] %}
          {% if bats | length == 0 %}
          {% set action = states('sensor.cloudems_batterij_epex_schema') %}
          {% set reason = state_attr('sensor.cloudems_batterij_epex_schema', 'reason') %}
          {% set soc    = state_attr('sensor.cloudems_batterij_epex_schema', 'soc_pct') %}
          **Batterij 1**
          - Actie: {{ action or '—' }}
          - Reden: {{ reason or '—' }}
          - SOC: {{ soc | round(1) if soc else '—' }}%
          {% else %}
          | Batterij | SOC | Actie | Reden | Vermogen |
          |----------|-----|-------|-------|----------|
          {% for b in bats -%}
          {% set soc_icon = '🟢' if b.soc_pct >= 60 else '🟡' if b.soc_pct >= 20 else '🔴' %}
          | **{{ b.label or ('Batterij ' ~ loop.index) }}** | {{ soc_icon }} {{ b.soc_pct | round(0) }}% | {{ b.action or '—' }} | {{ (b.reason or '—') | truncate(40, True, '…') }} | {{ b.power_w | int if b.power_w is not none else '—' }} W |
          {% endfor %}
          {% endif %}

      # ── SOC trend grafiek ──────────────────────────────────────────────────
      - type: custom:mini-graph-card
        name: "🔋 Batterij SOC (24u)"
        entities:
          - entity: sensor.cloudems_batterij_epex_schema
            attribute: soc_pct
            name: SOC %
            color: "#2ecc71"
        hours_to_show: 24
        points_per_hour: 4
        line_width: 2
        show:
          extrema: true
          average: false
          fill: fade

      # ── Batterij gezondheid ────────────────────────────────────────────────
      - type: markdown
        title: "🩺 Batterij gezondheid (SoH)"
        content: |
          {% set soh = states('sensor.cloudems_battery_state_of_health') %}
          {% set cycles = state_attr('sensor.cloudems_battery_state_of_health', 'total_cycles') %}
          {% set cap = state_attr('sensor.cloudems_battery_state_of_health', 'capacity_kwh') %}
          {% set level = state_attr('sensor.cloudems_battery_state_of_health', 'alert_level') %}
          {% set icon = '✅' if level == 'ok' or not level else ('⚠️' if level == 'warn' else '🔴') %}
          {{ icon }} **SoH: {{ soh }}%**
          - Bruikbare capaciteit: {{ cap | round(2) if cap else '—' }} kWh
          - Totaal cycli: {{ cycles or '—' }}

      # ── EPEX batterijschema ────────────────────────────────────────────────
      - type: entities
        title: "📅 EPEX Batterij Schema"
        icon: mdi:battery-clock
        entities:
          - entity: sensor.cloudems_batterij_epex_schema
            name: Huidige actie
          - type: attribute
            entity: sensor.cloudems_batterij_epex_schema
            attribute: reason
            name: Reden
          - type: attribute
            entity: sensor.cloudems_batterij_epex_schema
            attribute: soc_pct
            name: Batterij SOC (%)
          - entity: sensor.cloudems_battery_state_of_health
            name: Batterij gezondheid (SoH %)
          - type: attribute
            entity: sensor.cloudems_battery_state_of_health
            attribute: total_cycles
            name: Totaal cycli
          - type: attribute
            entity: sensor.cloudems_battery_state_of_health
            attribute: capacity_kwh
            name: Bruikbare capaciteit (kWh)

      # ── Batterij EPEX schema grafiek ───────────────────────────────────────
      - type: custom:mini-graph-card
        name: "🔋 Batterij EPEX prijsvenster (8u)"
        entities:
          - entity: sensor.cloudems_batterij_epex_schema
            name: Batterij actie
            color: "#22c55e"
          - entity: sensor.cloudems_energy_epex_today
            name: EPEX prijs
            color: "#f39c12"
            y_axis: secondary
        hours_to_show: 8
        points_per_hour: 2
        line_width: 2
        show:
          legend: true

