          --card-background-color: transparent;
          --ha-card-border-color: transparent;
        }
        ha-markdown-element strong { color: #ffffff !important; }

  # ── Alle apparaten tabel ─────────────────────────────────────────────────
  - type: markdown
    title: "📋 Alle bekende NILM apparaten"
    content: |
      {# Lees van nilm_devices (alle) met korte keys, of fallback naar running_devices (alleen actief) #}
      {% set devs_all  = state_attr('sensor.cloudems_nilm_devices','devices') or [] %}
      {% set devs_run  = state_attr('sensor.cloudems_nilm_running_devices','device_list') or state_attr('sensor.cloudems_nilm_running_devices','devices') or [] %}
      {# Gebruik nilm_devices als die gevuld is, anders running_devices als noodoplossing #}
      {% set use_short = devs_all | length > 0 %}
      {% set devs = devs_all if use_short else devs_run %}
      {% if devs | length == 0 %}
      *CloudEMS leert apparaten kennen — na een paar uur verschijnen ze hier.*
      {% else %}
      {# Kolommen hangen af van welke sensor gebruikt wordt #}
      {% if use_short %}
      {% set confirmed  = devs | selectattr('ok', 'eq', 1) | list | length %}
      {% set suppressed = devs | selectattr('sup', 'eq', 1) | list | length %}
      {% else %}
      {% set confirmed  = devs | selectattr('confirmed', 'defined') | selectattr('confirmed') | list | length %}
      {% set suppressed = 0 %}
      {% endif %}
      {% set total = devs | length %}
      **{{ total }}** apparaten &nbsp;·&nbsp; ✅ **{{ confirmed }}** goedgekeurd &nbsp;·&nbsp; 🙈 **{{ suppressed }}** verborgen &nbsp;·&nbsp; ⏳ **{{ total - confirmed - suppressed }}** onbeslist

      | Apparaat | Nu | Status | W | Fase | % | Device ID |
      |----------|----|--------|---|------|---|-----------|
      {% if use_short %}
      {% for d in devs | sort(attribute='w', reverse=true) %}
      {%- set is_on = d.on == 1 -%}
      {%- set status = '✅' if d.ok == 1 else ('🙈' if d.sup == 1 else '⏳') -%}
      {%- set ph = d.ph -%}
      {%- set ph_ico = '🔵' if ph == 'L1' else ('🟡' if ph == 'L2' else ('🟢' if ph == 'L3' else '⚪')) -%}
      {%- set conf = d.c | int -%}
      {%- set conf_str = '✅' if d.src == 'smart_plug' else (('🟢' if conf >= 70 else ('🟡' if conf >= 50 else '🔴')) ~ ' ' ~ conf ~ '%') -%}
      | {{ d.name }} | {{ '🟢' if is_on else '⚫' }} | {{ status }} | {{ d.w | int }} | {{ ph_ico }} {{ ph }} | {{ conf_str }} | `{{ d.id }}` |
      {% endfor %}
      {% else %}
      {% for d in devs | sort(attribute='power_w', reverse=true) %}
      {%- set ph = d.phase -%}
      {%- set ph_ico = '🔵' if ph == 'L1' else ('🟡' if ph == 'L2' else ('🟢' if ph == 'L3' else '⚪')) -%}
      {%- set conf = d.confidence | int -%}
      {%- set conf_str = '✅' if d.source_type == 'smart_plug' else (('🟢' if conf >= 70 else ('🟡' if conf >= 50 else '🔴')) ~ ' ' ~ conf ~ '%') -%}
      {%- set status = '✅' if d.confirmed else '⏳' -%}
      | {{ d.name }} | 🟢 | {{ status }} | {{ d.power_w | int }} | {{ ph_ico }} {{ ph }} | {{ conf_str }} | `{{ d.device_id }}` |
      {% endfor %}
      {% endif %}
      {% endif %}
    card_mod:
      style: |
        ha-card {
          background: #222222 !important;
          border: 1px solid rgba(255,255,255,0.06) !important;
          border-radius: 16px !important;
