  # VIEW 5 — 🏡 HUIS INTELLIGENTIE
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Huis Intelligentie
    path: cloudems-huis
    icon: mdi:home-analytics
    cards:

      - type: entities
        title: "📅 Dag-type Classificatie"
        entities:
          - entity: sensor.cloudems_dag_type_classificatie
            name: Type vandaag
          - type: attribute
            entity: sensor.cloudems_dag_type_classificatie
            attribute: confidence
            name: Zekerheid (%)
          - type: attribute
            entity: sensor.cloudems_dag_type_classificatie
            attribute: expected_kwh
            name: Verwacht verbruik (kWh)
          - type: attribute
            entity: sensor.cloudems_dag_type_classificatie
            attribute: advice
            name: Advies

      - type: entities
        title: "🌡️ Thermisch Huismodel"
        entities:
          - entity: sensor.cloudems_thermisch_huismodel
            name: Warmteverliescoëfficiënt (W/K)
          - type: attribute
            entity: sensor.cloudems_thermisch_huismodel
            attribute: rating
            name: Beoordeling
          - type: attribute
            entity: sensor.cloudems_thermisch_huismodel
            attribute: advice
            name: Advies
          - type: attribute
            entity: sensor.cloudems_thermisch_huismodel
            attribute: heating_days
            name: Stookdagen geleerd

      - type: markdown
        title: "📊 Verbruik per Categorie — Vandaag"
        content: |
          {% set s = states('sensor.cloudems_verbruik_categorien') %}
          {% if s in ('unavailable','unknown','none','') %}
          *Sensor nog niet beschikbaar — data wordt opgebouwd.*
          {% else %}
          {% set top = state_attr('sensor.cloudems_verbruik_categorien', 'top_category') %}
          {% set pct = state_attr('sensor.cloudems_verbruik_categorien', 'top_category_pct') %}
          {% set insight = state_attr('sensor.cloudems_verbruik_categorien', 'dominant_insight') %}
          **Totaal vandaag:** {{ s }} kWh
          {% if top %}| Grootste verbruiker | {{ top }} ({{ pct }}%) |{% endif %}
          {% if insight %}*{{ insight }}*{% endif %}
          {% endif %}

      - type: markdown
        title: "🍕 Verbruiksverdeling (huidig)"
        content: |
          {% set pie = state_attr('sensor.cloudems_verbruik_categorien', 'pie_data') or [] %}
          {% set avg = state_attr('sensor.cloudems_verbruik_categorien', 'avg_breakdown_pct') or {} %}
          {% if pie | length == 0 %}
          *Categorieën worden opgebouwd gedurende de dag.*
          {% else %}
          | Categorie | Nu (W) | Vandaag | 30d gem. |
          |-----------|--------|---------|----------|
          {% for cat in pie -%}
          | {{ cat.name }} | {{ cat.w_now | int }} W | {{ cat.pct }}% | – |
          {% endfor %}
          {% endif %}

      - type: horizontal-stack
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.cloudems_aanwezigheid_op_basis_van_stroom
                state_not: "unavailable"
            card:
              type: entity
              entity: binary_sensor.cloudems_aanwezigheid_op_basis_van_stroom
              name: Waarschijnlijk thuis
              state_color: true
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.cloudems_verbruik_anomalie
                state_not: "unavailable"
            card:
              type: entity
              entity: binary_sensor.cloudems_verbruik_anomalie
              name: Ongewoon verbruik
              state_color: true
          - type: entity
            entity: sensor.cloudems_standby_verbruik_altijd_aan
            name: Standby (W)

