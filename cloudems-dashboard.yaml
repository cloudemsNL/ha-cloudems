      {% set l3e = states('sensor.cloudems_grid_phase_l3_export_power') | float(0) | round(0) | int %}
      | Fase | Import (W) | Export (W) | Netto (W) |
      |------|-----------|-----------|-----------|
      | 🔵 **L1** | {{ l1i }} | {{ l1e }} | {{ l1i - l1e }} |
      | 🟡 **L2** | {{ l2i }} | {{ l2e }} | {{ l2i - l2e }} |
      | 🟢 **L3** | {{ l3i }} | {{ l3e }} | {{ l3i - l3e }} |
      | **Totaal** | **{{ l1i + l2i + l3i }}** | **{{ l1e + l2e + l3e }}** | **{{ (l1i + l2i + l3i) - (l1e + l2e + l3e) }}** |
