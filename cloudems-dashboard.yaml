      {% set devs = state_attr('sensor.cloudems_apparaat_efficientiedrift', 'devices') or [] %}
      {% set alerts = devs | selectattr('level', 'ne', 'ok') | list %}
      {% if devs | length == 0 %}
      *Nog geen data — wacht op ± 40 metingen per apparaat.*
      {% elif alerts | length == 0 %}
      ✅ *Alle {{ devs | length }} apparaten presteren normaal.*
      {% else %}
      *Drift > 30% = waarschuwing · > 50% = alert*

