  # ═══════════════════════════════════════════════════════════════════════════
  # VIEW 7 — 🤖 NILM APPARATEN
  # ═══════════════════════════════════════════════════════════════════════════
  - title: NILM Apparaten
    path: cloudems-nilm
    icon: mdi:home-analytics
    cards:

      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.cloudems_nilm_devices
            name: Gevonden
          - type: entity
            entity: sensor.cloudems_nilm_running_devices
            name: Nu aan
          - type: entity
            entity: sensor.cloudems_grid_import_power
            name: Afname nu (W)

      - type: markdown
        title: "🔝 Top 5 — Hoogste verbruikers nu"
        content: |
          {% set min_conf = 30 %}
          {% set top = namespace(rows=[]) %}
          {% for rank in range(1, 6) %}
            {% set entity = 'sensor.cloudems_nilm_top_' ~ rank ~ '_device' %}
            {% set w = states(entity) %}
            {% set nm = state_attr(entity, 'name') %}
            {% set conf = state_attr(entity, 'confidence') | float(0) %}
            {% if w not in ('unknown','unavailable','none','') and nm and conf >= min_conf %}
              {% set top.rows = top.rows + [{'rank': rank, 'name': nm, 'w': w | float(0), 'conf': conf | round(0) | int, 'confirmed': state_attr(entity, 'confirmed')}] %}
            {% endif %}
          {% endfor %}
          {% if top.rows | length == 0 %}
          *Geen actieve apparaten gedetecteerd (of zekerheid < {{ min_conf }}%).*
          {% else %}
          | # | Apparaat | Vermogen | Zekerheid |
          |---|----------|----------|-----------|
          {% for r in top.rows -%}
          | **{{ r.rank }}** | {{ '✅ ' if r.confirmed else '' }}{{ r.name }} | {{ r.w | int }} W | {{ '🟢' if r.conf >= 70 else '🟡' if r.conf >= 50 else '🔴' }} {{ r.conf }}% |
          {% endfor %}
          {% endif %}

      - type: markdown
        title: "⚙️ Apparaat Efficiëntiedrift"
        content: |
          {% set devs = state_attr('sensor.cloudems_apparaat_efficientiedrift', 'devices') or [] %}
          {% set alerts = devs | selectattr('level', 'ne', 'ok') | list %}
          {% if alerts | length == 0 %}
          ✅ *Alle apparaten presteren normaal.*
          {% else %}
          | Apparaat | Drift | Status |
          |----------|-------|--------|
          {% for d in alerts -%}
          | {{ d.label }} | {{ d.drift_pct | round(0) }}% | {% if d.level == 'alert' %}🔴{% else %}🟡{% endif %} |
          {% endfor %}
          {% endif %}

      - type: custom:mini-graph-card
        name: "📈 Top verbruikers (2u)"
        entities:
          - entity: sensor.cloudems_nilm_top_1_device
            name: "#1"
            color: "#e74c3c"
          - entity: sensor.cloudems_nilm_top_2_device
            name: "#2"
            color: "#f39c12"
          - entity: sensor.cloudems_nilm_top_3_device
            name: "#3"
            color: "#3498db"
        hours_to_show: 2
        points_per_hour: 4
        line_width: 2

      - type: markdown
        title: "📅 Geleerde Apparaat Schema's"
        content: |
          {% set scheds = state_attr('sensor.cloudems_nilm_apparaat_schemas', 'schedules') or [] %}
          {% set ready = scheds | selectattr('ready') | list %}
          {% if ready | length == 0 %}
          *Schema's worden geleerd.*
          {% else %}
          | Apparaat | Piek dag | Piek uur |
          |----------|----------|----------|
          {% for s in ready -%}
          | {{ s.label or s.device_type }} | {{ s.peak_weekday or '?' }} | {{ (s.peak_hour | string ~ ':00') if s.peak_hour is not none else '?' }} |
          {% endfor %}
          {% endif %}

      - type: entities
        title: "🤖 AI & NILM status"
        entities:
          - entity: sensor.cloudems_ai_status
            name: AI modus
          - entity: sensor.cloudems_nilm_sensor_input
            name: Sensor invoermodus
          - entity: sensor.cloudems_nilm_diagnostics
            name: Classificatiescore (%)

