##############################################################################
#  CloudEMS Dashboard — v1.16.0
#
#  Views:
#    1. 🏠  Overzicht          — real-time huis, dag-type, flex score, alerts
#    2. ☀️  Solar & PV          — productie, forecast, gezondheid, clipping,
#                                 schaduwdetectie, clipping-voorspelling
#    3. ⚡  Fasen & Net         — stromen, spanning, balans, fase-migratie
#    4. 💶  Prijzen & Kosten    — EPEX, kosten, gas
#    5. 🏡  Huis Intelligentie  — thermisch model, dag-type, verbruik-categorieën
#    6. 🚗  Mobiliteit          — EV auto + e-bike/scooter gezin
#    7. 🤖  NILM Apparaten      — detectie, top-5, drift, schema's
#    8. 🔋  Boiler & Batterij   — boilersturing, batterij EPEX, piekafschaving
#    8. 🔋  Batterij           — SOC, SoH, EPEX schema
#    9. 🛁  Boiler             — boiler sturing, triggers
#   10. 🧠  Zelflerend          — leervoortgang, anomalie, weerkalibratie
#   10. 🔔  Meldingen           — notification engine, alle actieve alerts
#   11. 🔧  Diagnose            — technisch, congestie, PID, hints
##############################################################################

title: "⚡ CloudEMS"
views:

  # ═══════════════════════════════════════════════════════════════════════════
  # VIEW 1 — 🏠 OVERZICHT
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Overzicht
    path: cloudems-overzicht
    icon: mdi:home-lightning-bolt
    cards:

      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.cloudems_actieve_meldingen
            above: 0
        card:
          type: markdown
          title: "🔔 Actieve Meldingen"
          content: |
            {% set n = state_attr('sensor.cloudems_actieve_meldingen', 'active_alerts') or [] %}
            {% for a in n[:3] %}
            {% if a.priority == 'critical' %}🔴{% elif a.priority == 'warning' %}🟡{% else %}🔵{% endif %} **{{ a.title }}** — {{ a.message }}
            {% endfor %}
            {% if n | length > 3 %}*...en {{ n | length - 3 }} meer. Zie tabblad Meldingen.*{% endif %}
          style: |
            ha-card {
              background: linear-gradient(135deg, #2d1515 0%, #3d1f1f 100%);
              border-left: 4px solid #e74c3c;
              border-radius: 10px;
            }

      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.cloudems_grid_import_power
            name: Afname nu
            icon: mdi:transmission-tower-import
          - type: entity
            entity: sensor.cloudems_grid_export_power
            name: Teruglevering nu
            icon: mdi:transmission-tower-export
          - type: entity
            entity: sensor.cloudems_solar_system_intelligence
            name: Zonnestroom nu
            icon: mdi:solar-power

      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.cloudems_dag_type_classificatie
            name: Dag-type
            icon: mdi:calendar-clock
            state_color: true
          - type: entity
            entity: sensor.cloudems_flexibel_vermogen
            name: Flex beschikbaar
            icon: mdi:lightning-bolt-circle
          - type: entity
            entity: binary_sensor.cloudems_aanwezigheid_op_basis_van_stroom
            name: Waarschijnlijk thuis
            icon: mdi:home-account
            state_color: true

      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.cloudems_energy_price_current_hour
            name: Prijs nu
            icon: mdi:currency-eur
            state_color: true
          - type: entity
            entity: sensor.cloudems_pv_zelfconsumptiegraad
            name: Zelfconsumptie
            icon: mdi:solar-power
          - type: entity
            entity: sensor.cloudems_energy_cost
            name: Kosten /uur
            icon: mdi:cash

      - type: markdown
        title: "📊 Verbruik Vandaag per Categorie"
        content: |
          {% set c = state_attr('sensor.cloudems_verbruik_categorien', 'pie_data') or [] %}
          {% set total = state_attr('sensor.cloudems_verbruik_categorien', 'total_kwh_today') or 0 %}
          {% set insight = state_attr('sensor.cloudems_verbruik_categorien', 'dominant_insight') or '' %}
          {% if c | length == 0 %}
          *Categorieën worden opgebouwd gedurende de dag.*
          {% else %}
          **Totaal: {{ total | round(1) }} kWh**

          | Categorie | Nu | Vandaag | % |
          |-----------|-----|---------|---|
          {% for cat in c -%}
          | {{ cat.name }} | {{ cat.w_now | int }} W | {{ cat.kwh }} kWh | {{ cat.pct }}% |
          {% endfor %}

          *{{ insight }}*
          {% endif %}

      - type: custom:mini-graph-card
        name: "⚡ Import · Export (24u)"
        entities:
          - entity: sensor.cloudems_grid_import_power
            name: Import
            color: "#e74c3c"
          - entity: sensor.cloudems_grid_export_power
            name: Export
            color: "#2ecc71"
        hours_to_show: 24
        points_per_hour: 4
        line_width: 2
        show:
          extrema: true
          average: true

      - type: markdown
        title: "💡 Inzicht & Advies"
        content: |
          {{ states('sensor.cloudems_energy_insights') }}
        style: |
          ha-card {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-left: 4px solid #f1c40f;
            border-radius: 12px;
            color: #eee;
          }

  # ═══════════════════════════════════════════════════════════════════════════
  # VIEW 2 — ☀️ SOLAR & PV
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Solar & PV
    path: cloudems-zon
    icon: mdi:solar-power-variant
    cards:

      # ── Totaalstatus bovenaan ──────────────────────────────────────────────
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.cloudems_solar_system_intelligence
            name: PV Totaal Nu (W)
            icon: mdi:solar-power
          - type: entity
            entity: sensor.cloudems_solar_pv_forecast_today
            name: Verwacht vandaag
            icon: mdi:calendar-today
          - type: entity
            entity: sensor.cloudems_solar_pv_forecast_tomorrow
            name: Verwacht morgen
            icon: mdi:calendar-arrow-right
          - type: entity
            entity: sensor.cloudems_pv_zelfconsumptiegraad
            name: Zelfconsumptie %
            icon: mdi:recycle

      # ── Per-omvormer kaarten (dynamisch via template) ──────────────────────
      - type: markdown
        title: "☀️ Omvormers — Live status"
        content: |
          {% set invs = state_attr('sensor.cloudems_solar_system_intelligence', 'inverters') or [] %}
          {% if invs | length == 0 %}
          *Geen omvormers geconfigureerd.*
          {% else %}
          | Omvormer | Nu | Piek 7d | Rated | Benutting | Richting | Fase | Clipping |
          |----------|----|---------|-------|-----------|----------|------|----------|
          {% for inv in invs -%}
          {% set rated = inv.rated_power_w %}
          {% set ceiling = inv.clipping_ceiling_w or inv.peak_w %}
          {% set util_color = '🟢' if inv.utilisation_pct >= 60 else '🟡' if inv.utilisation_pct >= 20 else '⚫' %}
          {% set clip_icon = '⚠️ JA' if inv.clipping else '✅' %}
          {% set rated_str = (rated | int | string ~ ' W') if rated else '—' %}
          | **{{ inv.label }}** | {{ inv.current_w | int }} W | {{ inv.peak_w_7d | int }} W | {{ rated_str }} | {{ util_color }} {{ inv.utilisation_pct | round(0) }}% | {{ inv.azimuth_compass or '?' }} {{ inv.tilt_deg | int if inv.tilt_deg else '' }}° | {{ ('✅ ' ~ inv.phase) if inv.phase_certain else ('🔍 ' ~ inv.phase) }} | {{ clip_icon }} |
          {% endfor %}
          {% endif %}

      # ── Productiegrafiek alle omvormers (24u) ─────────────────────────────
      - type: custom:mini-graph-card
        name: "☀️ PV productie totaal (24u)"
        entities:
          - entity: sensor.cloudems_solar_system_intelligence
            name: Totaal PV (W)
            color: "#f1c40f"
          - entity: sensor.cloudems_grid_export_power
            name: Teruglevering (W)
            color: "#2ecc71"
        hours_to_show: 24
        points_per_hour: 6
        line_width: 2
        show:
          extrema: true
          average: true
          fill: fade

      # ── Per-omvormer productie vergelijking ───────────────────────────────
      - type: custom:mini-graph-card
        name: "📊 Omvormers vergelijking (4u)"
        entities:
          - entity: sensor.cloudems_inverter_1_power
            name: Omvormer 1
            color: "#f39c12"
          - entity: sensor.cloudems_inverter_2_power
            name: Omvormer 2
            color: "#3498db"
          - entity: sensor.cloudems_inverter_3_power
            name: Omvormer 3
            color: "#2ecc71"
          - entity: sensor.cloudems_inverter_4_power
            name: Omvormer 4
            color: "#9b59b6"
        hours_to_show: 4
        points_per_hour: 6
        line_width: 2
        show:
          legend: true
          extrema: true

      # ── Omvormer utilisation gauges ────────────────────────────────────────
      - type: markdown
        title: "📈 Benutting & Clipping-drempel"
        content: |
          {% set invs = state_attr('sensor.cloudems_solar_system_intelligence', 'inverters') or [] %}
          {% for inv in invs %}
          **{{ inv.label }}**: {{ inv.current_w | int }} W
          {% set ceiling = inv.rated_power_w or inv.peak_w_7d or inv.peak_w %}
          {% if ceiling > 0 %}
          {% set pct = [(inv.current_w / ceiling * 100) | round(0), 100] | min | int %}
          {% set bar_filled = (pct / 5) | int %}
          `[{{ '█' * bar_filled }}{{ '░' * (20 - bar_filled) }}]` {{ pct }}% van {{ ceiling | int }} W
          {% if inv.rated_power_w %}*(rating: {{ inv.rated_power_w | int }} W)*{% endif %}
          {% endif %}
          {% endfor %}

      # ── PV gezondheid & forecast ───────────────────────────────────────────
      - type: entities
        title: "🔬 PV Paneelgezondheid"
        icon: mdi:solar-panel
        entities:
          - entity: sensor.cloudems_pv_paneelgezondheid
            name: Status
          - type: attribute
            entity: sensor.cloudems_pv_paneelgezondheid
            attribute: advice
            name: Advies
          - type: attribute
            entity: sensor.cloudems_pv_paneelgezondheid
            attribute: any_alert
            name: Alert actief

      # ── Clipping verlies ───────────────────────────────────────────────────
      - type: entities
        title: "✂️ Clipping Verlies & Curtailment"
        icon: mdi:solar-power-variant-outline
        entities:
          - entity: sensor.cloudems_clipping_verlies
            name: Verlies laatste 30 dagen (kWh)
          - type: attribute
            entity: sensor.cloudems_clipping_verlies
            attribute: total_eur_lost_year
            name: Geschat verlies per jaar (€)
          - type: attribute
            entity: sensor.cloudems_clipping_verlies
            attribute: worst_inverter
            name: Grootste verliezer
          - type: attribute
            entity: sensor.cloudems_clipping_verlies
            attribute: expansion_roi_years
            name: Terugverdientijd uitbreiding (jaar)
          - type: attribute
            entity: sensor.cloudems_clipping_verlies
            attribute: any_curtailment
            name: Feed-in curtailment vermoed
          - type: attribute
            entity: sensor.cloudems_clipping_verlies
            attribute: advice
            name: Advies

      # ── Clipping voorspelling morgen ───────────────────────────────────────
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.cloudems_clipping_voorspelling_morgen
            above: 0.05
        card:
          type: markdown
          title: "⚡ Clipping verwacht morgen"
          content: |
            {% set forecasts = state_attr('sensor.cloudems_clipping_voorspelling_morgen', 'forecasts') or [] %}
            {% set total = state_attr('sensor.cloudems_clipping_voorspelling_morgen', 'total_clipped_kwh') or 0 %}
            **Totaal verwacht geclipte energie morgen: {{ total }} kWh**

            {% for f in forecasts if f.predicted_clip_kwh > 0.05 %}
            🔶 **{{ f.advice }}**
            {% endfor %}

            💡 *Tip: laad de batterij vóór de clippinguren volledig op om geclipte energie optimaal te benutten.*
          style: |
            ha-card {
              background: linear-gradient(135deg, #2d2200 0%, #3d3000 100%);
              border-left: 4px solid #f39c12;
              border-radius: 10px;
            }

      # ── Schaduwdetectie ────────────────────────────────────────────────────
      - type: markdown
        title: "🌥️ Structurele Schaduwdetectie"
        content: |
          {% set s = state_attr('sensor.cloudems_schaduwdetectie', 'inverters') or [] %}
          {% set any_shadow = state_attr('sensor.cloudems_schaduwdetectie', 'any_shadow') %}
          {% set summary = state_attr('sensor.cloudems_schaduwdetectie', 'summary') %}
          {% set total_loss = states('sensor.cloudems_schaduwdetectie') | float(0) %}

          {% if s | length == 0 %}
          *Onvoldoende data — schaduwanalyse is beschikbaar na ~5 zonnige dagen.*
          {% elif not any_shadow %}
          ✅ **Geen structurele schaduw gedetecteerd** op de geconfigureerde omvormers.
          {% else %}
          ⚠️ **{{ summary }}**

          | Omvormer | Beschaduwd | Gedeeltelijk | Richting | Ernst | Verlies/dag |
          |----------|-----------|--------------|----------|-------|-------------|
          {% for inv in s -%}
          {% set dir_icon = '🌅' if inv.direction == 'oost' else '🌇' if inv.direction == 'west' else '☀️' if inv.direction == 'midden' else '🔀' if inv.direction == 'multi' else '✅' %}
          {% set sev_icon = '🔴' if inv.severity == 'ernstig' else '🟡' if inv.severity == 'matig' else '🟢' if inv.severity == 'licht' else '✅' %}
          {% set sh_uren = inv.shadowed_hours | map('string') | list | join(', ') ~ 'u' if inv.shadowed_hours else '—' %}
          {% set pt_uren = inv.partial_hours | map('string') | list | join(', ') ~ 'u' if inv.partial_hours else '—' %}
          | **{{ inv.label }}** | {{ sh_uren }} | {{ pt_uren }} | {{ dir_icon }} {{ inv.direction }} | {{ sev_icon }} {{ inv.severity }} | {{ inv.lost_kwh_day_est }} kWh |
          {% endfor %}

          {% for inv in s if inv.shadowed_hours or inv.partial_hours %}
          > 💬 {{ inv.advice }}
          {% endfor %}
          {% endif %}

      - type: entities
        title: "🌥️ Schaduw — Details per omvormer"
        icon: mdi:weather-partly-cloudy
        entities:
          - entity: sensor.cloudems_schaduwdetectie
            name: Totaal geschat verlies (kWh/dag)
          - type: attribute
            entity: sensor.cloudems_schaduwdetectie
            attribute: any_shadow
            name: Schaduw gedetecteerd
          - type: attribute
            entity: sensor.cloudems_schaduwdetectie
            attribute: summary
            name: Samenvatting

      # ── Zelfconsumptie ─────────────────────────────────────────────────────
      - type: entities
        title: "♻️ Zelfconsumptie"
        icon: mdi:recycle
        entities:
          - entity: sensor.cloudems_pv_zelfconsumptiegraad
            name: Zelfconsumptiegraad (%)
          - type: attribute
            entity: sensor.cloudems_pv_zelfconsumptiegraad
            attribute: best_solar_hour
            name: Beste zonuur
          - type: attribute
            entity: sensor.cloudems_pv_zelfconsumptiegraad
            attribute: monthly_saving_eur
            name: Potentiële besparing/maand (€)
          - type: attribute
            entity: sensor.cloudems_pv_zelfconsumptiegraad
            attribute: advice
            name: Advies

      # ── Oriëntatie leervoortgang ──────────────────────────────────────
      - type: markdown
        title: "🧭 Oriëntatie leervoortgang"
        content: |
          {% set invs = state_attr('sensor.cloudems_solar_system_intelligence', 'inverters') or [] %}
          {% if invs | length == 0 %}*Geen omvormers.*
          {% else %}
          | Omvormer | Azimut | Helling | Zekerheid | Voortgang |
          |----------|--------|---------|-----------|-----------|
          {% for inv in invs -%}
          {% set conf_icon = '✅' if inv.orientation_confident else '🔍' %}
          {% set pct = inv.clear_sky_samples / (inv.orientation_samples_needed or 30) * 100 | round(0) | int %}
          {% set pct = [pct, 100] | min %}
          | **{{ inv.label }}** | {{ inv.azimuth_compass or '?' }} ({{ inv.azimuth_learned | round(0) if inv.azimuth_learned else '?' }}°) | {{ (inv.tilt_learned | round(0) | string ~ '°') if inv.tilt_learned else '?' }} | {{ conf_icon }} | {{ pct }}% ({{ inv.clear_sky_samples }}/{{ inv.orientation_samples_needed }} metingen) |
          {% endfor %}
          {% endif %}

      # ── Energiemeter totalen ───────────────────────────────────────────────
      - type: entities
        title: "📊 Energiemeter totalen (kWh)"
        entities:
          - entity: sensor.cloudems_grid_import_energy_tariff_1
            name: Afname Tarief 1 (dal)
          - entity: sensor.cloudems_grid_import_energy_tariff_2
            name: Afname Tarief 2 (piek)
          - entity: sensor.cloudems_grid_export_energy_tariff_1
            name: Teruglevering Tarief 1
          - entity: sensor.cloudems_grid_export_energy_tariff_2
            name: Teruglevering Tarief 2

      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.cloudems_net_co2_intensiteit
            name: CO2 intensiteit
            icon: mdi:molecule-co2
          - type: entity
            entity: sensor.cloudems_ai_status
            name: AI modus
            icon: mdi:robot

  # ═══════════════════════════════════════════════════════════════════════════
  # VIEW 3 — ⚡ FASEN & NET
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Fasen
    path: cloudems-fasen
    icon: mdi:sine-wave
    cards:

      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.cloudems_grid_phase_l1_current
            name: L1 Stroom
            min: 0
            max: 25
            needle: true
            severity:
              green: 0
              yellow: 18
              red: 23
          - type: gauge
            entity: sensor.cloudems_grid_phase_l2_current
            name: L2 Stroom
            min: 0
            max: 25
            needle: true
            severity:
              green: 0
              yellow: 18
              red: 23
          - type: gauge
            entity: sensor.cloudems_grid_phase_l3_current
            name: L3 Stroom
            min: 0
            max: 25
            needle: true
            severity:
              green: 0
              yellow: 18
              red: 23

      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.cloudems_grid_phase_l1_voltage
            name: Spanning L1
          - type: entity
            entity: sensor.cloudems_grid_phase_l2_voltage
            name: Spanning L2
          - type: entity
            entity: sensor.cloudems_grid_phase_l3_voltage
            name: Spanning L3

      - type: entity
        entity: sensor.cloudems_grid_phase_imbalance
        name: Fase onbalans (A)
        icon: mdi:scale-unbalanced

      - type: conditional
        conditions:
          - condition: state
            entity: sensor.cloudems_fase_migratie_advies
            state_not: "geen_advies"
        card:
          type: markdown
          title: "🔀 Fase-migratie Advies"
          content: |
            {% set m = state_attr('sensor.cloudems_fase_migratie_advies', 'advices') or [] %}
            {% set imp = state_attr('sensor.cloudems_fase_migratie_advies', 'imbalance_a') %}
            **Fase onbalans: {{ (imp | float(0)) | round(2) }} A**

            | Apparaat | Van | Naar | Verbetering |
            |----------|-----|------|-------------|
            {% for a in m[:5] -%}
            | {{ a.device_label }} | {{ a.from_phase }} | {{ a.to_phase }} | {{ a.balance_gain_pct }}% |
            {% endfor %}

      - type: custom:mini-graph-card
        name: "📈 Fase stromen L1/L2/L3 (3u)"
        entities:
          - entity: sensor.cloudems_grid_phase_l1_current
            name: L1
            color: "#e74c3c"
          - entity: sensor.cloudems_grid_phase_l2_current
            name: L2
            color: "#3498db"
          - entity: sensor.cloudems_grid_phase_l3_current
            name: L3
            color: "#2ecc71"
        hours_to_show: 3
        points_per_hour: 6
        line_width: 2

      - type: entities
        title: "📊 Piekafschaving"
        entities:
          - entity: sensor.cloudems_grid_peak_shaving
            name: Piek vandaag (W)
          - entity: sensor.cloudems_grid_monthly_peak_import
            name: Maandpiek import (W)
          - type: attribute
            entity: sensor.cloudems_grid_peak_shaving
            attribute: limit_w
            name: Pieklimiet (W)
          - type: attribute
            entity: sensor.cloudems_grid_peak_shaving
            attribute: headroom_w
            name: Ruimte (W)

  # ═══════════════════════════════════════════════════════════════════════════
  # VIEW 4 — 💶 PRIJZEN & KOSTEN
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Prijzen & Kosten
    path: cloudems-prijzen
    icon: mdi:currency-eur
    cards:

      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.cloudems_energy_price_previous_hour
            name: Vorig uur
          - type: entity
            entity: sensor.cloudems_energy_price_current_hour
            name: "💶 Prijs nu"
            state_color: true
          - type: entity
            entity: sensor.cloudems_energy_price_next_hour
            name: Volgend uur

      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.cloudems_energy_epex_today
            name: Min vandaag
            attribute: min_today
            icon: mdi:trending-down
          - type: entity
            entity: sensor.cloudems_energy_epex_today
            name: Gem vandaag
            attribute: avg_today
          - type: entity
            entity: sensor.cloudems_energy_epex_today
            name: Max vandaag
            attribute: max_today
            icon: mdi:trending-up

      - type: entities
        title: "🕐 Goedkoopste uren"
        entities:
          - entity: binary_sensor.cloudems_energy_cheapest_1h
            name: Goedkoopste uur nu
            state_color: true
          - entity: binary_sensor.cloudems_energy_cheapest_2h
            name: Goedkoopste 2u-blok nu
            state_color: true
          - entity: binary_sensor.cloudems_energy_cheapest_3h
            name: Goedkoopste 3u-blok nu
            state_color: true
          - type: attribute
            entity: sensor.cloudems_energy_epex_today
            attribute: cheapest_2h_start
            name: Goedkoopste 2u blok (start)
          - type: attribute
            entity: sensor.cloudems_energy_epex_today
            attribute: cheapest_3h_start
            name: Goedkoopste 3u blok (start)

      - type: custom:mini-graph-card
        name: "📊 EPEX prijsverloop vandaag"
        entities:
          - entity: sensor.cloudems_energy_epex_today
            name: Prijs (€/kWh)
            color: "#f39c12"
        hours_to_show: 24
        points_per_hour: 1
        line_width: 0
        bar: true
        group_by: hour
        aggregate_func: first
        smoothing: false
        show:
          extrema: true
          average: true
          legend: false

      - type: conditional
        conditions:
          - condition: state
            entity: sensor.cloudems_gasstand
            state_not: "unavailable"
        card:
          type: entities
          title: "🔥 Gas (P1 DSMR / sensor)"
          entities:
            - entity: sensor.cloudems_gasstand
              name: Gasmeter stand (m³)
            - type: attribute
              entity: sensor.cloudems_gasstand
              attribute: gas_kwh
              name: Equivalent (kWh)

      - type: entities
        title: "⚡🔥 Goedkoopste Warmtebron"
        entities:
