      | {{ d.name or d.type }} | {{ d.power_w | int }} | {{ '🔵' if (d.phase or 'L1') == 'L1' else '🟡' if (d.phase or 'L1') == 'L2' else '🟢' if (d.phase or 'L1') == 'L3' else '⚪' }} {{ d.phase or 'L1' }} | {{ '🔌' if (d.source_type or 'nilm') == 'smart_plug' else '🔍' }} | {{ '✅' if (d.source_type or 'nilm') == 'smart_plug' else ('🟢' if d.confidence | int(0) >= 70 else '🟡' if d.confidence | int(0) >= 50 else '🔴') }}{% if (d.source_type or 'nilm') != 'smart_plug' %} {{ d.confidence | int(0) }}%{% endif %} |
