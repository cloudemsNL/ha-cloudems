  - type: markdown
    title: 🌥️ Structurele Schaduwdetectie
    content: |
      {% set s = state_attr('sensor.cloudems_schaduwdetectie', 'inverters') or [] %}
      {% set any_shadow = state_attr('sensor.cloudems_schaduwdetectie', 'any_shadow') %}
      {% set summary = state_attr('sensor.cloudems_schaduwdetectie', 'summary') %}
      {% set total_loss = states('sensor.cloudems_schaduwdetectie') | float(0) %}

      {% if s | length == 0 %}
      *Onvoldoende data — schaduwanalyse is beschikbaar na ~5 zonnige dagen.*
      {% elif not any_shadow %}
      ✅ **Geen structurele schaduw gedetecteerd** op de geconfigureerde omvormers.
      {% else %}
      ⚠️ **{{ summary }}**

      | Omvormer | Beschaduwd | Gedeeltelijk | Richting | Ernst | Verlies/dag |
      |----------|-----------|--------------|----------|-------|-------------|
      {% for inv in s -%}
      {% set dir_icon = '🌅' if inv.direction == 'oost' else '🌇' if inv.direction == 'west' else '☀️' if inv.direction == 'midden' else '🔀' if inv.direction == 'multi' else '✅' %}
      {% set sev_icon = '🔴' if inv.severity == 'ernstig' else '🟡' if inv.severity == 'matig' else '🟢' if inv.severity == 'licht' else '✅' %}
      {% set sh_uren = inv.shadowed_hours | map('string') | list | join(', ') ~ 'u' if inv.shadowed_hours else '—' %}
      {% set pt_uren = inv.partial_hours | map('string') | list | join(', ') ~ 'u' if inv.partial_hours else '—' %}
      | **{{ inv.label }}** | {{ sh_uren }} | {{ pt_uren }} | {{ dir_icon }} {{ inv.direction }} | {{ sev_icon }} {{ inv.severity }} | {{ inv.lost_kwh_day_est }} kWh |
      {% endfor %}

      {% for inv in s if inv.shadowed_hours or inv.partial_hours %}
      > 💬 {{ inv.advice }}
      {% endfor %}
      {% endif %}
