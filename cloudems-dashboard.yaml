      {% set dn = state_attr('sensor.cloudems_bill_simulator', 'day_night_cost_eur') | float(0) %}
      {% set months = state_attr('sensor.cloudems_bill_simulator', 'months_data') | int(0) %}
      {% set advice = state_attr('sensor.cloudems_bill_simulator', 'advice') %}
      {% if saving > 0 %}🟢{% else %}🔴{% endif %} **{{ advice }}**

      | Contract | Kosten | Verschil |
      |---|---|---|
      | ⚡ Dynamisch (werkelijk) | €{{ "%.2f"|format(dyn) }} | — |
      | 📌 Vast tarief | €{{ "%.2f"|format(fixed) }} | {% if saving > 0 %}✅ -€{{ "%.2f"|format(saving) }}{% else %}⬆️ +€{{ "%.2f"|format(saving|abs) }}{% endif %} |
      | 🌙 Dag/nacht | €{{ "%.2f"|format(dn) }} | {% set dn_diff = dyn - dn %}{% if dn_diff > 0 %}⬆️ +€{{ "%.2f"|format(dn_diff) }}{% else %}✅ -€{{ "%.2f"|format(dn_diff|abs) }}{% endif %} |

