  - type: markdown
    title: 📉 Salderingsafbouw Simulator
    content: |
      {% set s = state_attr('sensor.cloudems_kosten_vandaag', 'bill_simulator') or {} %}
      {% set export_kwh = s.get('dynamic_export_kwh', 0) | float(0) %}
      {% if export_kwh > 0 %}
      {% set dyn = s.get('dynamic_cost_eur', 0) | float(0) %}
      {% set price = s.get('fixed_tariff', 0.28) | float(0.28) %}

      Gebaseerd op **{{ export_kwh | round(0) | int }} kWh** teruggeleverd dit jaar (actuele data).

      | Jaar | Saldering % | Geschatte jaarrekening | Extra kosten t.o.v. nu |
      |---|---|---|---|
      | 2024 | 100% | €{{ (dyn) | round(0) | int }} | — |
      | 2025 | 64% | €{{ (dyn + export_kwh * 0.36 * price) | round(0) | int }} | +€{{ (export_kwh * 0.36 * price) | round(0) | int }} |
      | 2026 | 36% | €{{ (dyn + export_kwh * 0.64 * price) | round(0) | int }} | +€{{ (export_kwh * 0.64 * price) | round(0) | int }} |
      | 2027 | 0% | €{{ (dyn + export_kwh * 1.0 * price) | round(0) | int }} | +€{{ (export_kwh * 1.0 * price) | round(0) | int }} |

      > 💡 Bij 0% saldering (2027): een thuisbatterij van ~10 kWh bespaart gemiddeld €{{ (export_kwh * 0.07 * 10 * price) | round(0) | int }}–€{{ (export_kwh * 0.12 * 10 * price) | round(0) | int }}/jaar extra.

      _Berekening: teruggeleverde kWh × wegvallende salderingskorting × actuele vaste prijs €{{ price }}/kWh_
      {% else %}
      Nog geen exportdata beschikbaar. Salderingsberekening beschikbaar na ~24 uur.
      {% endif %}
