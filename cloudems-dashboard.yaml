      ℹ️ **Gebruik:** Kopieer een Device ID uit de tabel hieronder → plak in het veld hierboven → klik een actie knop.
      Maak éénmalig een helper aan via **Instellingen → Apparaten & diensten → Helpers → + Toevoegen → Tekst** met naam `cloudems_device_id`.
    card_mod:
