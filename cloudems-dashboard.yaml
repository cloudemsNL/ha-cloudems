      {% if s | length == 0 %}
      *Onvoldoende data — schaduwanalyse is beschikbaar na ~5 zonnige dagen.*
      {% elif not any_shadow %}
      ✅ **Geen structurele schaduw gedetecteerd** op de geconfigureerde omvormers.
      {% else %}
      ⚠️ **{{ summary }}**

      | Omvormer | Beschaduwd | Gedeeltelijk | Richting | Ernst | Verlies/dag |
      |----------|-----------|--------------|----------|-------|-------------|
