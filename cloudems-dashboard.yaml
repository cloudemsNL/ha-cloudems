      {% set total_w = state_attr('sensor.cloudems_verbruik_categorien', 'total_w_now') or 0 %}
      {% set insight = state_attr('sensor.cloudems_verbruik_categorien', 'dominant_insight') or '' %}
      {% set batt_dev = state_attr('sensor.cloudems_nilm_running_devices','devices') | selectattr('device_type','eq','battery') | list %}
      {% set batt_w = batt_dev[0].current_power | int if batt_dev | length > 0 else 0 %}
      {% if c | length == 0 %}
      *Categorieën worden opgebouwd gedurende de dag.*
      {% else %}
      **Totaal huisverbruik: {{ total | round(1) }} kWh** *(batterijladen niet meegerekend)*

      | Categorie | Nu | Vandaag | % |
      |-----------|-----|---------|---|
      {% for cat in c -%}
      | {{ cat.name }} | {{ cat.w_now | int }} W | {{ cat.kwh }} kWh | {{ cat.pct }}% |
      {% endfor %}
      {% if batt_w > 50 %}| 🔋 Opslag (batterij) | {{ batt_w }} W | — | — |{% endif %}

      *{{ insight }}*
      {% endif %}
