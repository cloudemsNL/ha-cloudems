<svg viewBox="0 0 460 160" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6366f1"/>
    </marker>
    <marker id="arr2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#22c55e"/>
    </marker>
    <marker id="arr3" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#fbbf24"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="460" height="160" rx="12" fill="#0f172a"/>

  <!-- EPEX prijs blok -->
  <rect x="12" y="30" width="80" height="60" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="52" y="52" text-anchor="middle" font-size="18">📈</text>
  <text x="52" y="68" text-anchor="middle" font-size="8" fill="#818cf8" font-weight="700">EPEX</text>
  <text x="52" y="79" text-anchor="middle" font-size="8" fill="#818cf8">Stroomprijzen</text>

  <!-- Arrow EPEX → CloudEMS -->
  <line x1="92" y1="60" x2="138" y2="60" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>

  <!-- CloudEMS beslisser -->
  <rect x="140" y="20" width="90" height="80" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="185" y="45" text-anchor="middle" font-size="16">⚡</text>
  <text x="185" y="62" text-anchor="middle" font-size="9" fill="#ffffff" font-weight="700">CloudEMS</text>
  <text x="185" y="75" text-anchor="middle" font-size="8" fill="#94a3b8">Beslisser</text>
  <text x="185" y="88" text-anchor="middle" font-size="7" fill="#475569">stuurt tijdelijk</text>

  <!-- PV forecast input -->
  <rect x="12" y="100" width="80" height="48" rx="8" fill="#1c1a0a" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="52" y="120" text-anchor="middle" font-size="16">☀️</text>
  <text x="52" y="135" text-anchor="middle" font-size="8" fill="#fbbf24" font-weight="700">PV forecast</text>
  <text x="52" y="145" text-anchor="middle" font-size="7" fill="#92400e">tariefgroep</text>

  <!-- Arrow PV → CloudEMS -->
  <line x1="92" y1="124" x2="138" y2="85" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- Arrow CloudEMS → Nexus -->
  <line x1="230" y1="60" x2="278" y2="60" stroke="#22c55e" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="254" y="54" text-anchor="middle" font-size="7" fill="#4ade80">override</text>

  <!-- Zonneplan Nexus -->
  <rect x="280" y="20" width="90" height="80" rx="8" fill="#0d2818" stroke="#22c55e" stroke-width="2"/>
  <text x="325" y="45" text-anchor="middle" font-size="16">🔋</text>
  <text x="325" y="62" text-anchor="middle" font-size="9" fill="#ffffff" font-weight="700">Zonneplan</text>
  <text x="325" y="75" text-anchor="middle" font-size="8" fill="#4ade80">Nexus</text>
  <text x="325" y="88" text-anchor="middle" font-size="7" fill="#166534">home_opt / powerplay</text>

  <!-- Auto-herstel pijl (terugkeer) -->
  <path d="M 325 100 Q 325 140 230 140 Q 185 140 185 105" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#arr3)"/>
  <text x="268" y="153" text-anchor="middle" font-size="7" fill="#f59e0b">⏱ auto-herstel na X min</text>

  <!-- Nexus eigen modus label -->
  <rect x="378" y="35" width="72" height="50" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="414" y="52" text-anchor="middle" font-size="9" fill="#9